services:
  news-ingestor-go:
    build:
      context: .
      dockerfile: Dockerfile.go-news
      args:
        BINARY_NAME: news-ingestor
        SOURCE_PATH: cmd/news-ingestor
    image: trade-news-ingestor-go:latest
    pull_policy: build
    container_name: news-ingestor-go
    restart: unless-stopped
    env_file:
    - ./news-pipeline.env
    environment:
    - REDIS_URL=${GO_GATEWAY_REDIS_URL}
    - NEWS_REDIS_SOCKET_TIMEOUT_MS=50
    - NEWS_REDIS_CONNECT_TIMEOUT_MS=200
    - NEWS_REDIS_MAX_CONNECTIONS=16
    - NEWS_RAW_STREAM=news:raw
    - NEWS_RAW_DLQ=news:raw:dlq
    - NEWS_INGESTOR_LEADER_KEY=news:ingestor:leader
    - NEWS_INGESTOR_LEADER_TTL_SEC=8
    - POLL_INTERVAL=10s
    - HTTP_TIMEOUT=6s
    - DEDUPE_TTL=30m
    - MAX_STREAM_LEN=100000
    - HEARTBEAT_TTL=30s
    - INSTANCE_ID=news-ingestor-go-1
    - USER_AGENT=trade-news-ingestor/1.0
    - HTTP_LISTEN=:8097
    - LOG_LEVEL=INFO
    - TZ=UTC
    networks:
    - scanner-ops
    - scanner-infra
    depends_on:
      redis:
        condition: service_healthy
      redis-worker-1:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - wget
      - --quiet
      - --tries=1
      - --spider
      - http://localhost:8097/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      placement:
        constraints:
        - node.hostname == minik
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 24M
          cpus: '0.25'
  news-ingestor-py:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        WORKDIR: /app
    image: trade-news-ingestor-py:latest
    pull_policy: build
    container_name: news-ingestor-py
    restart: unless-stopped
    environment:
    - PYTHONPATH=/app/python-worker
    - REDIS_URL=${GO_GATEWAY_REDIS_URL}
    - NEWS_REDIS_SOCKET_TIMEOUT_MS=50
    - NEWS_REDIS_CONNECT_TIMEOUT_MS=200
    - NEWS_REDIS_MAX_CONNECTIONS=16
    - NEWS_RAW_STREAM=news:raw
    - NEWS_RAW_DLQ=news:raw:dlq
    - NEWS_INGESTOR_LEADER_KEY=news:ingestor:leader
    - NEWS_INGESTOR_LEADER_TTL_SEC=8
    - NEWS_POLL_SEC=10
    - NEWS_DEDUPE_TTL_SEC=1800
    - NEWS_STREAM_MAXLEN=100000
    - LOG_LEVEL=INFO
    - HOSTNAME=news-ingestor-py-1
    - TZ=UTC
    env_file:
    - ./news-pipeline.env
    working_dir: /app/python-worker
    command:
    - sh
    - -c
    - sleep 120 && python services/news_ingestor_py/main.py
    networks:
    - scanner-ops
    - scanner-infra
    depends_on:
      redis:
        condition: service_healthy
      redis-worker-1:
        condition: service_healthy
    deploy:
      placement:
        constraints:
        - node.hostname == minik
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 24M
          cpus: '0.25'
  news-ingestor-py-standby:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        WORKDIR: /app
    image: trade-news-ingestor-py-standby:latest
    pull_policy: build
    container_name: news-ingestor-py-standby
    restart: unless-stopped
    environment:
    - REDIS_URL=${GO_GATEWAY_REDIS_URL}
    - NEWS_REDIS_SOCKET_TIMEOUT_MS=50
    - NEWS_REDIS_CONNECT_TIMEOUT_MS=200
    - NEWS_REDIS_MAX_CONNECTIONS=16
    - STANDBY_INGESTOR_ENABLE=1
    - NEWS_INGESTOR_LEADER_KEY=news:ingestor:leader
    - NEWS_INGESTOR_LEADER_TTL_MS=8000
    - LOG_LEVEL=INFO
    - TZ=UTC
    working_dir: /app/python-worker
    command:
    - python
    - -m
    - news_pipeline.standby_ingestor
    networks:
    - scanner-ops
    - scanner-infra
    depends_on:
      redis:
        condition: service_healthy
      redis-worker-1:
        condition: service_healthy
    deploy:
      placement:
        constraints:
        - node.hostname == minik
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 24M
          cpus: '0.25'
  news-analyzer:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        WORKDIR: /app
    image: trade-news-analyzer:latest
    pull_policy: build
    container_name: news-analyzer
    restart: unless-stopped
    environment:
    - REDIS_URL=${GO_GATEWAY_REDIS_URL}
    - NEWS_REDIS_SOCKET_TIMEOUT_MS=50
    - NEWS_REDIS_CONNECT_TIMEOUT_MS=200
    - NEWS_REDIS_MAX_CONNECTIONS=16
    - PG_DSN=${NEWS_POSTGRES_DSN:-postgresql://trading:${TRADING_PASSWORD}@postgres:5432/scanner_analytics}
    - NEWS_RAW_STREAM=news:raw
    - NEWS_ANALYSIS_STREAM=news:analysis
    - NEWS_RAW_DLQ=news:raw:dlq
    - NEWS_ANALYZER_GROUP=news-analyzer
    - NEWS_ANALYZER_CONSUMER=news-analyzer-1
    - NEWS_ANALYSIS_TTL_SEC=604800
    - LOG_LEVEL=INFO
    - HOSTNAME=news-analyzer-1
    - TZ=UTC
    env_file:
    - ./news-pipeline.env
    working_dir: /app/python-worker
    command:
    - python
    - -m
    - news_pipeline.analyzer_worker
    networks:
    - scanner-ops
    - scanner-infra
    depends_on:
      redis:
        condition: service_healthy
      redis-worker-1:
        condition: service_healthy
    deploy:
      placement:
        constraints:
        - node.hostname == minik
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 24M
          cpus: '0.5'
  news-feature-store:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        WORKDIR: /app
    image: trade-news-feature-store:latest
    pull_policy: build
    container_name: news-feature-store
    restart: unless-stopped
    environment:
    - REDIS_URL=${GO_GATEWAY_REDIS_URL}
    - NEWS_REDIS_SOCKET_TIMEOUT_MS=50
    - NEWS_REDIS_CONNECT_TIMEOUT_MS=200
    - NEWS_REDIS_MAX_CONNECTIONS=16
    - PG_DSN=${NEWS_POSTGRES_DSN:-postgresql://trading:${TRADING_PASSWORD}@postgres:5432/scanner_analytics}
    - NEWS_ANALYSIS_STREAM=news:analysis
    - NEWS_ANALYSIS_DLQ=news:analysis:dlq
    - NEWS_FEATURE_GROUP=news-feature-store
    - NEWS_FEATURE_CONSUMER=news-feature-store-1
    - NEWS_AGG_TTL_SEC=7200
    - NEWS_RISK_HALF_LIFE_SEC=1800
    - NEWS_SHADOW_REFRESH_MS=250
    - NEWS_SHADOW_CAL_REFRESH_MS=1000
    - NEWS_SHADOW_SYMBOL_TTL_MS=60000
    - NEWS_ENRICHER_MAX_STALE_SEC=300
    - LOG_LEVEL=INFO
    - HOSTNAME=news-feature-store-1
    - TZ=UTC
    env_file:
    - ./news-pipeline.env
    working_dir: /app/python-worker
    command:
    - sh
    - -c
    - sleep 120 && python -m news_pipeline.feature_store_worker
    networks:
    - scanner-ops
    - scanner-infra
    depends_on:
      redis:
        condition: service_healthy
      redis-worker-1:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      placement:
        constraints:
        - node.hostname == minik
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 24M
          cpus: '0.25'
  calendar-feature-store:
    build:
      context: .
      dockerfile: Dockerfile.python
      args:
        WORKDIR: /app
    image: trade-calendar-feature-store:latest
    pull_policy: build
    container_name: calendar-feature-store
    restart: unless-stopped
    environment:
    - REDIS_URL=${GO_GATEWAY_REDIS_URL}
    - NEWS_REDIS_SOCKET_TIMEOUT_MS=50
    - NEWS_REDIS_CONNECT_TIMEOUT_MS=200
    - NEWS_REDIS_MAX_CONNECTIONS=16
    - PG_DSN=${NEWS_POSTGRES_DSN:-postgresql://trading:${TRADING_PASSWORD}@postgres:5432/scanner_analytics}
    - CALENDAR_STREAM=calendar:events
    - CALENDAR_DLQ=calendar:events:dlq
    - CALENDAR_GROUP=calendar-feature-store
    - CALENDAR_CONSUMER=calendar-feature-store-1
    - CALENDAR_AGG_TTL_SEC=21600
    - LOG_LEVEL=INFO
    - HOSTNAME=calendar-feature-store-1
    - TZ=UTC
    env_file:
    - ./news-pipeline.env
    working_dir: /app/python-worker
    command:
    - python
    - -m
    - news_pipeline.calendar_store_worker
    networks:
    - scanner-ops
    - scanner-infra
    depends_on:
      redis:
        condition: service_healthy
      redis-worker-1:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      placement:
        constraints:
        - node.hostname == minik
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 24M
          cpus: '0.25'
  news-watchdog:
    build:
      context: .
      dockerfile: Dockerfile.go-news
      args:
        BINARY_NAME: news-watchdog
        SOURCE_PATH: cmd/news-watchdog
    image: trade-news-watchdog:latest
    pull_policy: build
    container_name: news-watchdog
    restart: unless-stopped
    environment:
    - REDIS_URL=${GO_GATEWAY_REDIS_URL}
    - NEWS_REDIS_SOCKET_TIMEOUT_MS=50
    - NEWS_REDIS_CONNECT_TIMEOUT_MS=200
    - NEWS_REDIS_MAX_CONNECTIONS=16
    - HB_MAX_AGE=45s
    - TZ=UTC
    networks:
    - scanner-ops
    - scanner-infra
    depends_on:
      redis:
        condition: service_healthy
      redis-worker-1:
        condition: service_healthy
    deploy:
      placement:
        constraints:
        - node.hostname == minik
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 24M
          cpus: '0.1'
  # ── Playwright browser worker: news page fetching + LLM web UI enrichment ──
  news-browser-worker:
    build:
      context: .
      dockerfile: Dockerfile.news-browser
    image: trade-news-browser:latest
    pull_policy: build
    container_name: news-browser-worker
    restart: unless-stopped
    shm_size: 2gb           # Chromium needs shared memory for renderer
    environment:
    - REDIS_URL=${GO_GATEWAY_REDIS_URL}
    - NEWS_RAW_STREAM=news:raw
    - NEWS_RAW_DLQ=news:raw:dlq
    - NEWS_STREAM_MAXLEN=100000
    - NEWS_BROWSER_POLL_SEC=120
    - NEWS_BROWSER_DEDUPE_TTL=1800
    - NEWS_BROWSER_DOMAIN_GAP_SEC=12
    - NEWS_BROWSER_METRICS_PORT=9831
    - PLAYWRIGHT_HEADLESS=1
    - PLAYWRIGHT_BROWSER_SESSIONS=/data/playwright_sessions
    - PLAYWRIGHT_LLM_TIMEOUT_SEC=90
    - PLAYWRIGHT_FETCH_TIMEOUT_MS=45000
    - PLAYWRIGHT_CONTEXT_TTL_MIN=30
    # Playwright LLM web UI — Qwen3-235B (highest priority, Google OAuth)
    - USE_PLAYWRIGHT_QWEN=1
    - QWEN_EMAIL=${QWEN_EMAIL:-}
    - QWEN_PASSWORD=${QWEN_PASSWORD:-}
    - QWEN_MODEL=${QWEN_MODEL:-qwen3-235b-a22b}
    - QWEN_THINKING=1
    # Playwright LLM web UI — DeepSeek
    - USE_PLAYWRIGHT_DEEPSEEK=1
    - DEEPSEEK_EMAIL=${DEEPSEEK_EMAIL:-}
    - DEEPSEEK_PASSWORD=${DEEPSEEK_PASSWORD:-}
    # Playwright LLM web UI — ChatGPT (free tier, no login needed)
    - USE_PLAYWRIGHT_CHATGPT=1
    - CHATGPT_EMAIL=${CHATGPT_EMAIL:-}
    - CHATGPT_PASSWORD=${CHATGPT_PASSWORD:-}
    # Playwright LLM web UI — Gemini (opt-in, Google login required)
    - USE_PLAYWRIGHT_GEMINI=0
    - GEMINI_GOOGLE_EMAIL=${GEMINI_GOOGLE_EMAIL:-}
    - GEMINI_GOOGLE_PASSWORD=${GEMINI_GOOGLE_PASSWORD:-}
    # News sources to fetch via browser (add anti-bot protected sites here)
    - NEWS_BROWSER_SOURCES=${NEWS_BROWSER_SOURCES:-}
    - LOG_LEVEL=INFO
    - TZ=UTC
    env_file:
    - ./news-pipeline.env
    volumes:
    - playwright_sessions:/data/playwright_sessions
    networks:
    - scanner-ops
    - scanner-infra
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      placement:
        constraints:
        - node.hostname == minik
      resources:
        limits:
          memory: 3G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # ── news-analyzer with Playwright LLM tier enabled ──────────────────────────
  # ── news-analyzer-playwright: analyzer worker with Playwright async enrichment ─
  # Режим NEWS_LLM_PLAYWRIGHT_ENABLE=0 → classic inline LLM (Gemini→Nvidia→Ollama)
  # Режим NEWS_LLM_PLAYWRIGHT_ENABLE=1 → только rules, jobs → playwright-enrichment-worker
  news-analyzer-playwright:
    build:
      context: .
      dockerfile: Dockerfile.news-browser
    image: trade-news-browser:latest
    pull_policy: never
    container_name: news-analyzer-playwright
    restart: unless-stopped
    shm_size: 512mb
    environment:
    - REDIS_URL=${GO_GATEWAY_REDIS_URL}
    - NEWS_RAW_STREAM=news:raw
    - NEWS_ANALYSIS_STREAM=news:analysis
    - NEWS_RAW_DLQ=news:raw:dlq
    - NEWS_ANALYZER_GROUP=news-analyzer
    - NEWS_ANALYZER_CONSUMER=news-analyzer-playwright-1
    - NEWS_ANALYSIS_TTL_SEC=604800
    - NEWS_LLM_ENRICH_ENABLED=1
    - LLM_FALLBACK_ENABLED=1
    # Classic inline LLM (used when NEWS_LLM_PLAYWRIGHT_ENABLE=0)
    - USE_PLAYWRIGHT_LLM=1
    - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
    - LOG_LEVEL=INFO
    - TZ=UTC
    env_file:
    - ./news-pipeline.env
    volumes:
    - playwright_sessions:/data/playwright_sessions
    networks:
    - scanner-ops
    - scanner-infra
    depends_on:
      redis:
        condition: service_healthy
    working_dir: /app/python-worker
    command:
    - python
    - -m
    - news_pipeline.analyzer_worker
    deploy:
      placement:
        constraints:
        - node.hostname == minik
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.2'

  # ── playwright-enrichment-worker: async Playwright LLM enrichment ────────────
  # Запускается только при NEWS_LLM_PLAYWRIGHT_ENABLE=1
  # Читает news:llm:jobs → Playwright LLM (Qwen/DeepSeek/ChatGPT) → news:llm:results
  # НЕ участвует в hot-path торговли.
  playwright-enrichment-worker:
    build:
      context: .
      dockerfile: Dockerfile.news-browser
    image: trade-news-browser:latest
    pull_policy: never
    container_name: playwright-enrichment-worker
    restart: unless-stopped
    shm_size: 2gb
    # Credentials and provider toggles come from env_file (news-pipeline.env).
    # Only override vars that are NOT in env_file here to avoid shadowing with empty strings.
    environment:
    - REDIS_URL=${GO_GATEWAY_REDIS_URL}
    - NEWS_LLM_PLAYWRIGHT_ENABLE=1
    - NEWS_LLM_WORKER_GROUP=playwright-enrichment
    - NEWS_LLM_WORKER_CONSUMER=pw-worker-1
    - PLAYWRIGHT_HEADLESS=1
    - PLAYWRIGHT_BROWSER_SESSIONS=/data/playwright_sessions
    - PLAYWRIGHT_QWEN_TIMEOUT_SEC=300
    - PLAYWRIGHT_CHATGPT_TIMEOUT_SEC=300
    - PLAYWRIGHT_ENRICHMENT_METRICS_PORT=9869
    - LOG_LEVEL=INFO
    - TZ=UTC
    env_file:
    - ./news-pipeline.env
    ports:
    - "9869:9869"
    volumes:
    - playwright_sessions:/data/playwright_sessions
    networks:
    - scanner-ops
    - scanner-infra
    depends_on:
      redis:
        condition: service_healthy
    working_dir: /app/python-worker
    command:
    - python
    - -m
    - services.playwright_enrichment_worker.main
    deploy:
      placement:
        constraints:
        - node.hostname == minik
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'

volumes:
  playwright_sessions:
    driver: local

networks:
  scanner-ops:
    external: true
  scanner-infra:
    external: true
