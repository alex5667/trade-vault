# Redis Configuration File для scanner-infra системы
# Оптимизировано для работы с большими объемами данных и множественными WebSocket соединениями

# ========================================
# СЕТЕВЫЕ НАСТРОЙКИ
# ========================================
# Порт для подключений
port 6379

# Привязка к интерфейсу (0.0.0.0 = все интерфейсы)
bind 0.0.0.0

# Таймаут неактивных соединений (секунды)
timeout 0

# TCP keepalive
tcp-keepalive 300

# Максимальное количество клиентских соединений
maxclients 50000

# ========================================
# НАСТРОЙКИ ПАМЯТИ
# ========================================
# Максимальное использование памяти (512MB)
maxmemory 512mb

# Политика вытеснения при достижении лимита памяти
# volatile-lru: удаляет ключи с TTL по LRU алгоритму
# allkeys-lru: удаляет любые ключи по LRU алгоритму
# volatile-random: удаляет случайные ключи с TTL
# allkeys-random: удаляет случайные ключи
# volatile-ttl: удаляет ключи с наименьшим TTL
# noeviction: не удаляет ключи (ошибка при записи)
maxmemory-policy volatile-lru

# Сжатие строк (поддерживается в Redis 6.2+)
# string-compression yes

# Размер хеш-таблиц (оптимизация для больших хешей)
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# Размер списков (оптимизация для больших списков)
list-max-ziplist-size -2

# Размер множеств (оптимизация для больших множеств)
set-max-intset-entries 512

# Размер отсортированных множеств (оптимизация для больших zset)
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# ========================================
# НАСТРОЙКИ PERSISTENCE
# ========================================
# Отключить RDB для экономии ресурсов (используем только AOF)
save ""

# Включить AOF для надежности
appendonly yes

# Имя файла AOF
appendfilename "appendonly.aof"

# Синхронизация AOF (always = максимальная надежность, everysec = баланс, no = максимальная производительность)
appendfsync everysec

# Автоматическое переписывание AOF при превышении размера
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ========================================
# НАСТРОЙКИ LOGGING
# ========================================
# Уровень логирования (debug, verbose, notice, warning)
loglevel notice

# Файл логов
logfile ""

# Максимальное количество команд в slow log
slowlog-log-slower-than 10000

# Максимальное количество записей в slow log
slowlog-max-len 128

# ========================================
# НАСТРОЙКИ КЛИЕНТОВ
# ========================================
# Таймаут для блокирующих операций (миллисекунды)
timeout 0

# Максимальное количество команд в pipeline
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit slave 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ========================================
# НАСТРОЙКИ REPLICATION
# ========================================
# Отключить репликацию для standalone режима
replica-serve-stale-data no

# ========================================
# НАСТРОЙКИ SECURITY
# ========================================
# Отключить опасные команды
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command CONFIG ""

# ========================================
# НАСТРОЙКИ LATENCY MONITORING
# ========================================
# Включить мониторинг задержек
latency-monitor-threshold 100

# ========================================
# НАСТРОЙКИ STREAMS
# ========================================
# Максимальное количество ID в XREAD
stream-node-max-bytes 4096
stream-node-max-entries 100

# ========================================
# НАСТРОЙКИ CLUSTER
# ========================================
# Отключить кластерный режим
cluster-enabled no

# ========================================
# НАСТРОЙКИ LAZY FREEING
# ========================================
# Включить lazy freeing для больших объектов
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# ========================================
# НАСТРОЙКИ THREADED I/O
# ========================================
# Количество потоков I/O (для Redis 6+)
io-threads 4
io-threads-do-reads yes

# ========================================
# НАСТРОЙКИ TCP BACKLOG
# ========================================
# Размер очереди входящих соединений
tcp-backlog 511

# ========================================
# НАСТРОЙКИ TCP NODELAY
# ========================================
# Отключить алгоритм Nagle для низких задержек (поддерживается в Redis 6.2+)
# tcp-nodelay yes

# ========================================
# НАСТРОЙКИ TCP KEEPALIVE
# ========================================
# Интервал проверки соединений
tcp-keepalive 300

# ========================================
# НАСТРОЙКИ CLIENT QUERY BUFFER
# ========================================
# Максимальный размер буфера запросов клиента
client-query-buffer-limit 1gb

# ========================================
# НАСТРОЙКИ PROTOCOL
# ========================================
# Размер протокольного буфера
proto-max-bulk-len 512mb

# ========================================
# НАСТРОЙКИ HZ
# ========================================
# Частота обновления внутренних задач (по умолчанию 10)
hz 10

# ========================================
# НАСТРОЙКИ DYNAMIC HZ
# ========================================
# Автоматическая настройка HZ
dynamic-hz yes

# ========================================
# НАСТРОЙКИ AOF REWRITE
# ========================================
# Процент роста AOF для перезаписи
auto-aof-rewrite-percentage 100

# Минимальный размер AOF для перезаписи
auto-aof-rewrite-min-size 64mb

# ========================================
# НАСТРОЙКИ RDB
# ========================================
# Сжатие RDB
rdbcompression yes

# Проверка контрольной суммы RDB
rdbchecksum yes

# ========================================
# НАСТРОЙКИ REPLICA
# ========================================
# Размер буфера вывода для реплик
repl-backlog-size 1mb

# TTL для буфера репликации
repl-backlog-ttl 3600

# ========================================
# НАСТРОЙКИ MAXMEMORY
# ========================================
# Дополнительные политики памяти
maxmemory-samples 5

# ========================================
# НАСТРОЙКИ ACTIVE REHASHING
# ========================================
# Процент времени для активного rehashing
activerehashing yes

# ========================================
# НАСТРОЙКИ CLIENT OUTPUT BUFFER
# ========================================
# Лимиты буферов вывода для разных типов клиентов
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ========================================
# НАСТРОЙКИ NOTIFY-KEYSpace-EVENTS
# ========================================
# Отключить уведомления о событиях ключей
notify-keyspace-events ""

# ========================================
# НАСТРОЙКИ SAVE
# ========================================
# Отключить автоматическое сохранение RDB
save ""

# ========================================
# НАСТРОЙКИ STOP-WRITES-ON-BGSAVE-ERROR
# ========================================
# Остановить запись при ошибке фонового сохранения
stop-writes-on-bgsave-error yes

# ========================================
# НАСТРОЙКИ RDB-SAVE-INCREMENTSAL-FSYNC
# ========================================
# Инкрементальная синхронизация при сохранении RDB
rdb-save-incremental-fsync yes

# ========================================
# НАСТРОЙКИ AOF-REWRITE-INCREMENTAL-FSYNC
# ========================================
# Инкрементальная синхронизация при перезаписи AOF
aof-rewrite-incremental-fsync yes 