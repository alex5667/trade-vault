# PostgreSQL configuration for scanner-infra
# ===========================================

# Connection settings
listen_addresses = '*'              # Accept connections from all IPs (required for Docker port forwarding)
max_connections = 1000
shared_preload_libraries = 'timescaledb,pg_stat_statements'

# Performance Tuning
shared_buffers = 4GB                # 25% of RAM (adjusted for general high-perf)
work_mem = 64MB                     # Memory for sorts/aggregations
effective_cache_size = 12GB         # ~75% of RAM
maintenance_work_mem = 512MB

# Authentication settings
password_encryption = scram-sha-256  # Match pg_hba.conf and actual stored password hashes

# Logging settings
log_min_messages = ERROR             # Write only ERRORs and above to logs (suppress WARNINGs)
log_statement = 'none'                   # No DML/DDL statement logging (was: 'ddl')
log_min_duration_statement = -1          # Disable slow query logging completely (was: 500ms)

# Log format
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_destination = 'stderr'

# Other useful logging settings
log_connections = on
log_disconnections = on
log_duration = off
log_error_verbosity = default

# Performance monitoring
track_activity_query_size = 4096
track_functions = pl
track_io_timing = on

# WAL & I/O Tuning (CRITICAL FOR WRITE SPEED)
wal_level = replica                # Required for max_wal_senders > 0
max_wal_size = 1GB                  # Reduced: prevents 60-70s checkpoint spikes on NVMe
min_wal_size = 256MB                # Keep enough WAL for recycle
checkpoint_timeout = 10min          # More frequent, smaller checkpoints
checkpoint_completion_target = 0.9  # Spread writes over 90% of checkpoint interval
synchronous_commit = off            # MAGIC SETTING: 10-20x faster INSERTs (async write)

# NVMe SSD Optimization
effective_io_concurrency = 200      # NVMe supports high parallelism (default=1 is for HDD)
random_page_cost = 1.1              # NVMe: random I/O nearly as fast as sequential (default=4 for HDD)

# Background Writer Tuning (spread dirty page writes)
bgwriter_lru_maxpages = 200         # Write more pages per round (default=100)
bgwriter_delay = 100ms              # More frequent bgwriter runs (default=200ms)
bgwriter_lru_multiplier = 4.0       # Aggressive prefetch for dirty pages (default=2.0)

# TimescaleDB Settings
# Background Workers
max_worker_processes = 16
max_parallel_workers = 16
timescaledb.max_background_workers = 8
timescaledb.telemetry_level = off
