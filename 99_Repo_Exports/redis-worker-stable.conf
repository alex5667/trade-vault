# ============================================================================
# Redis Worker Configuration - Lightweight & Stable
# Optimized for candles/signals storage with minimal overhead
# ============================================================================

# ============================================================================
# NETWORK CONFIGURATION
# ============================================================================
port 6379
bind 0.0.0.0
protected-mode no

# TCP settings for stability
tcp-keepalive 30
tcp-backlog 2048
# timeout 0 = никогда не разрывать неактивные соединения (исправлено для предотвращения ECONNRESET)
timeout 0

# ============================================================================
# MEMORY MANAGEMENT
# ============================================================================
# Reserve ~15% overhead (12GB usable from 14GB container limit)
maxmemory 12000mb
maxmemory-policy noeviction
maxmemory-samples 5

# ============================================================================
# CLIENT LIMITS
# ============================================================================
maxclients 20000

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 128mb 32mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Query buffer limit
client-query-buffer-limit 128mb
proto-max-bulk-len 128mb

# ============================================================================
# PERSISTENCE - AOF ONLY (RDB disabled)
# ============================================================================
# КРИТИЧНО: Data directory - сохраняем данные в volume для персистентности
# При перезапуске контейнера Redis автоматически восстанавливает данные из /data
dir /data

# RDB ПОЛНОСТЬЮ ОТКЛЮЧЁН:
# BGSAVE вызывал fork()-паузу каждые ~60 сек (при 10k+ изменений),
# что блокировало event loop и вызывало TimeoutError на всех asyncio-клиентах одновременно.
# Персистентность обеспечивается только через AOF (appendfsync everysec).
save ""
stop-writes-on-bgsave-error no
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
rdb-save-incremental-fsync yes

# Enable AOF with minimal overhead
# КРИТИЧНО: AOF обеспечивает восстановление данных при перезапуске
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite yes
# P2: 50% вместо 100% — AOF rewrite начинается раньше, не допускаем роста до 2.3GB
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 128mb
aof-rewrite-incremental-fsync yes
# КРИТИЧНО: Автоматическое восстановление поврежденных AOF файлов
aof-load-truncated yes
# КРИТИЧНО: Использование RDB преамбулы для быстрой загрузки
aof-use-rdb-preamble yes

# ============================================================================
# LOGGING AND MONITORING
# ============================================================================
loglevel notice
logfile ""

# Slow log for debugging
slowlog-log-slower-than 5000
slowlog-max-len 256

# Latency monitoring
latency-monitor-threshold 10

# ============================================================================
# MEMORY OPTIMIZATION
# ============================================================================
# Data structure optimization
hash-max-listpack-entries 512
hash-max-listpack-value 64
list-max-listpack-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-listpack-entries 128
zset-max-listpack-value 64
hll-sparse-max-bytes 3000

# Streams optimization
stream-node-max-bytes 4096
stream-node-max-entries 300

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================
# Conservative hz value
hz 10
dynamic-hz yes

# Active rehashing
activerehashing yes

# Lazy freeing
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes
replica-lazy-flush yes

# Threading
io-threads 2
io-threads-do-reads yes

# Jemalloc
jemalloc-bg-thread yes

# ============================================================================
# REPLICATION SETTINGS
# ============================================================================
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync yes
repl-diskless-sync-delay 5
repl-diskless-load on-empty-db
repl-ping-replica-period 10
repl-timeout 60
repl-disable-tcp-nodelay no
repl-backlog-size 8mb
repl-backlog-ttl 1800

# ============================================================================
# SECURITY
# ============================================================================
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command SHUTDOWN SHUTDOWN_REDIS_SAFE

# ============================================================================
# MISCELLANEOUS
# ============================================================================
lua-time-limit 5000
notify-keyspace-events ""
databases 16
always-show-logo no
set-proc-title yes
proc-title-template "{title} {listen-addr} {server-mode}"
crash-log-enabled yes

maxclients 20000
