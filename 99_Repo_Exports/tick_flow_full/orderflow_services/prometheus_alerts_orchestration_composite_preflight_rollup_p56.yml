groups:
  - name: trade_orchestration_composite_preflight_rollup_p56
    rules:
      - alert: TradeOrchestrationCompositePreflightRollupStaleWarn
        expr: orchestration_composite_preflight_rollup_lag_seconds > 1800
        for: 20m
        labels:
          severity: warning
        annotations:
          summary: Orchestration composite preflight rollup is stale
          description: Incremental rollup has not advanced for more than 30 minutes.

      - alert: TradeOrchestrationCompositePreflightBlockRatioHigh30dWarn
        expr: max by (purpose) (orchestration_composite_preflight_rollup_block_ratio{window="30d"}) > 0.05
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: High 30d orchestration block ratio
          description: Composite preflight block ratio exceeded 5% over 30d for a purpose.

      - alert: TradeOrchestrationCompositePreflightInvalidRatioHigh7dWarn
        expr: max by (purpose) (orchestration_composite_preflight_rollup_invalid_ratio{window="7d"}) > 0.03
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: High 7d orchestration invalid ratio
          description: Composite preflight invalid ratio exceeded 3% over 7d for a purpose.
