services:
  exec-health-freeze-override-commit-thaw:
    image: ${EXEC_HEALTH_OVERRIDE_COMMIT_THAW_IMAGE:-python:3.13-slim}
    working_dir: /repo
    volumes:
      - ${EXEC_HEALTH_REPO_ROOT:-.}:/repo
    environment:
      PYTHONPATH: /repo
      REDIS_URL: ${REDIS_URL:-}
      EXEC_HEALTH_REDIS_AUDIT_URL: ${EXEC_HEALTH_REDIS_AUDIT_URL:-}
      EXEC_HEALTH_REDIS_BOOTSTRAP_URL: ${EXEC_HEALTH_REDIS_BOOTSTRAP_URL:-}
      EXEC_HEALTH_ROLLOUT_PREFLIGHT_SCHEMA_VERSION: ${EXEC_HEALTH_ROLLOUT_PREFLIGHT_SCHEMA_VERSION:-}
      EXEC_HEALTH_DEPLOY_CONTRACT_PURPOSE: ${EXEC_HEALTH_DEPLOY_CONTRACT_PURPOSE:-}
      EXEC_HEALTH_ROLLOUT_PREFLIGHT_CLIENT_NAME: ${EXEC_HEALTH_ROLLOUT_PREFLIGHT_CLIENT_NAME:-}
      EXEC_HEALTH_ROLLOUT_PREFLIGHT_LIB_NAME: ${EXEC_HEALTH_ROLLOUT_PREFLIGHT_LIB_NAME:-}
      EXEC_HEALTH_ACK_SIGNING_SECRET: ${EXEC_HEALTH_ACK_SIGNING_SECRET:-}
      EXEC_HEALTH_REDIS_CLIENT_NAME: ${EXEC_HEALTH_REDIS_CLIENT_NAME:-}
      EXEC_HEALTH_REDIS_LIB_NAME: ${EXEC_HEALTH_REDIS_LIB_NAME:-}
      EXEC_HEALTH_SERVICE_IDENTITY_ENFORCE: ${EXEC_HEALTH_SERVICE_IDENTITY_ENFORCE:-1}
      EXEC_HEALTH_SERVICE_IDENTITY_REQUIRE_LIB_NAME: ${EXEC_HEALTH_SERVICE_IDENTITY_REQUIRE_LIB_NAME:-1}
      OPERATOR: ${OPERATOR:-}
      REQUEST_ID: ${REQUEST_ID:-}
    command:
      - /bin/bash
      - -lc
      - >-
        python -m pip install --no-cache-dir redis >/tmp/exec_health_override_commit_thaw_pip.log 2>&1 &&
        python -m orderflow_services.exec_health_freeze_override_v1 commit-thaw
    restart: "no"
