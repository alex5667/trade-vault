services:
  ml-route-incident-rca-apply-backfill-replayer-v3-57-2:
    build: .
    command: python -m orderflow_services.route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_experiment_incident_rca_apply_backfill_replayer_v3_57_2
    restart: "no"
    environment:
      REDIS_URL: ${REDIS_URL}
      TIMESCALE_DSN: ${TIMESCALE_DSN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ML_ROUTE_INCIDENT_RCA_APPLY_BACKFILL_REPLAYER_PORT: ${ML_ROUTE_INCIDENT_RCA_APPLY_BACKFILL_REPLAYER_PORT:-9998}
      ML_ROUTE_INCIDENT_RCA_APPLY_BACKFILL_MODE: ${ML_ROUTE_INCIDENT_RCA_APPLY_BACKFILL_MODE:-DRY_RUN}
      ML_ROUTE_INCIDENT_RCA_APPLY_BACKFILL_ALIASES: ${ML_ROUTE_INCIDENT_RCA_APPLY_BACKFILL_ALIASES:-slo,retry,escalation}
      ML_ROUTE_INCIDENT_RCA_APPLY_BACKFILL_BATCH_SIZE: ${ML_ROUTE_INCIDENT_RCA_APPLY_BACKFILL_BATCH_SIZE:-500}
      ML_ROUTE_INCIDENT_RCA_APPLY_BACKFILL_START_ID: ${ML_ROUTE_INCIDENT_RCA_APPLY_BACKFILL_START_ID:-0-0}
      ML_ROUTE_INCIDENT_RCA_APPLY_BACKFILL_END_ID: ${ML_ROUTE_INCIDENT_RCA_APPLY_BACKFILL_END_ID:-+}
      ML_ROUTE_INCIDENT_RCA_APPLY_BACKFILL_RESUME: ${ML_ROUTE_INCIDENT_RCA_APPLY_BACKFILL_RESUME:-1}
    ports:
      - "9998:9998"

  ml-route-incident-rca-apply-reconcile-auditor-v3-57-2:
    build: .
    command: python -m orderflow_services.route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_experiment_incident_rca_apply_reconcile_auditor_v3_57_2
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL}
      TIMESCALE_DSN: ${TIMESCALE_DSN}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ML_ROUTE_INCIDENT_RCA_APPLY_RECONCILE_AUDITOR_PORT: ${ML_ROUTE_INCIDENT_RCA_APPLY_RECONCILE_AUDITOR_PORT:-9999}
      ML_ROUTE_INCIDENT_RCA_APPLY_RECONCILE_WINDOW_MIN: ${ML_ROUTE_INCIDENT_RCA_APPLY_RECONCILE_WINDOW_MIN:-1440}
      ML_ROUTE_INCIDENT_RCA_APPLY_RECONCILE_POLL_SEC: ${ML_ROUTE_INCIDENT_RCA_APPLY_RECONCILE_POLL_SEC:-300}
      ML_ROUTE_INCIDENT_RCA_APPLY_RECONCILE_SAMPLE_N: ${ML_ROUTE_INCIDENT_RCA_APPLY_RECONCILE_SAMPLE_N:-20}
    ports:
      - "9999:9999"
