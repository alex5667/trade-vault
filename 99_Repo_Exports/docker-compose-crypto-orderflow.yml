  v12-of-train-timer:
    build: *id001
    container_name: scanner-v12-of-train-timer
    restart: unless-stopped
    environment:
    - REDIS_URL=redis://redis-worker-1:6379/0
    - PYTHONPATH=.:/app
    - PYTHONUNBUFFERED=1
    - V12_TRAIN_ENABLED=${V12_TRAIN_ENABLED:-1}
    - V12_TRAIN_INTERVAL_SEC=${V12_TRAIN_INTERVAL_SEC:-21600}
    - V12_SIGNAL_STREAM=${V12_SIGNAL_STREAM:-signals:of:inputs}
    - V12_OUTCOME_STREAM=${V12_OUTCOME_STREAM:-trades:closed}
    - V12_SIGNAL_COUNT=${V12_SIGNAL_COUNT:-500000}
    - V12_OUTCOME_COUNT=${V12_OUTCOME_COUNT:-200000}
    - V12_LOOKBACK_DAYS=${V12_LOOKBACK_DAYS:-30}
    - V12_Y_MIN_R=${V12_Y_MIN_R:-0.05}
    - V12_OUT_DIR=${V12_OUT_DIR:-/var/lib/trade/ml_models/edge_stack_v12_of}
    - ML_EDGE_STACK_OOF_FEATURE_SCHEMA_VER=v12_of
    - EDGE_STACK_MIN_JOINED=${EDGE_STACK_MIN_JOINED:-500}
    - EDGE_STACK_POS_RATE_MIN=${EDGE_STACK_POS_RATE_MIN:-0.03}
    - EDGE_STACK_POS_RATE_MAX=${EDGE_STACK_POS_RATE_MAX:-0.65}
    - EDGE_STACK_PROMOTE_BRIER_MAX=${EDGE_STACK_PROMOTE_BRIER_MAX:-0.30}
    - EDGE_STACK_PROMOTE_ECE_MAX=${EDGE_STACK_PROMOTE_ECE_MAX:-0.08}
    - EDGE_STACK_CANDIDATE_KEY=${V12_CANDIDATE_KEY:-cfg:ml_confirm:edge_stack_v1:candidate_v12}
    - EDGE_STACK_CHAMPION_KEY=${V12_CHAMPION_KEY:-cfg:ml_confirm:edge_stack_v1:candidate_v12}
    - EDGE_STACK_AUTO_PROMOTE=${V12_AUTO_PROMOTE:-0}
    - EDGE_STACK_TRAIN_METRICS_KEY=${V12_TRAIN_METRICS_KEY:-metrics:edge_stack_train_v12:last}
    - EDGE_STACK_SCENARIO_PREFIX=${EDGE_STACK_SCENARIO_PREFIX:-bucket:}
    - EDGE_STACK_INCLUDE_TIME_ONEHOT=${EDGE_STACK_INCLUDE_TIME_ONEHOT:-1}
    - EDGE_STACK_WINDOW_HOURS=${V12_WINDOW_HOURS:-72}
    - NOTIFY_STREAM=${NOTIFY_STREAM:-notify:telegram}
    - NOTIFY_V12_TRAIN_RESULT=${NOTIFY_V12_TRAIN_RESULT:-1}
    - SCANNER_CONSUMER_NAME=scanner-v12-of-train-timer
    - TZ=UTC
    depends_on: *id002
    networks: *id003
    volumes:
    - ./python-worker:/app
    - /var/lib/trade/ml_models/edge_stack_v12_of:/var/lib/trade/ml_models/edge_stack_v12_of
    working_dir: /app
    command:
    - bash
    - -c
    - "sleep 60\nwhile true; do\n  if [ \"$${V12_TRAIN_ENABLED:-1}\" = \"0\" ]; then\n\
      \    echo '[v12-of-train-timer] disabled (V12_TRAIN_ENABLED=0), sleeping...'\n\
      \    sleep $${V12_TRAIN_INTERVAL_SEC:-21600}\n    continue\n  fi\n\n  OUTDIR=$${V12_OUT_DIR:-/var/lib/trade/ml_models/edge_stack_v12_of}\n\
      \  mkdir -p \"$$OUTDIR\"\n  DATASET=\"$$OUTDIR/v12_of_train_$$(date +%Y%m%d_%H%M).jsonl\"\
      \n  REPORT=\"$$OUTDIR/v12_of_report.json\"\n  MODEL_DIR=\"$$OUTDIR\"\n\n  echo\
      \ \"[v12-of-train-timer] $$(date -u) \u2014 starting dataset build \u2192 $$DATASET\"\
      \n  T0=$$(date +%s)\n\n  python3 -m ml_analysis.tools.build_v12_of_dataset \\\
      \n    --redis_url \"$$REDIS_URL\" \\\n    --signal_stream \"$${V12_SIGNAL_STREAM:-signals:of:inputs}\"\
      \ \\\n    --outcome_stream \"$${V12_OUTCOME_STREAM:-trades:closed}\" \\\n  \
      \  --signal_count $${V12_SIGNAL_COUNT:-500000} \\\n    --outcome_count $${V12_OUTCOME_COUNT:-200000}\
      \ \\\n    --lookback_days $${V12_LOOKBACK_DAYS:-30} \\\n    --y_min_r $${V12_Y_MIN_R:-0.05}\
      \ \\\n    --out_jsonl \"$$DATASET\" \\\n    --out_report_json \"$$REPORT\" \\\
      \n    --out_quarantine_jsonl \"$$OUTDIR/v12_quarantine.jsonl\" \\\n  && echo\
      \ \"[v12-of-train-timer] $$(date -u) \u2014 dataset ok, starting training...\"\
      \ \\\n  && python3 -m ml_analysis.tools.nightly_edge_stack_v1_train_bundle \\\
      \n    --dataset \"$$DATASET\" \\\n    --feature_schema_ver v12_of \\\n    --out_dir\
      \ \"$$MODEL_DIR\" \\\n    --promote_candidate_only 1 \\\n  && echo \"[v12-of-train-timer]\
      \ $$(date -u) \u2014 training done in $$(( $$(date +%s) - $$T0 ))s\" \\\n  ||\
      \ echo \"[v12-of-train-timer] $$(date -u) \u2014 FAILED (see logs above)\"\n\
      \n  echo \"[v12-of-train-timer] sleeping $${V12_TRAIN_INTERVAL_SEC:-21600}s...\"\
      \n  sleep $${V12_TRAIN_INTERVAL_SEC:-21600}\ndone\n"
    profiles:
    - default
    deploy:
      resources:
        limits:
          cpus: '1.00'
        reservations:
          devices:
          - driver: nvidia
            count: all
            capabilities:
            - gpu
          memory: 24M
  ml-scorer-pipeline-timer:
    build: *id001
    runtime: nvidia
    container_name: scanner-ml-scorer-pipeline-timer
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2G
        reservations:
          memory: 24M
    environment:
    - REDIS_URL=redis://redis-worker-1:6379/0
    - PG_DSN=${ANALYTICS_DB_DSN}
    - PYTHONPATH=.:/app
    - PYTHONUNBUFFERED=1
    - GPU_ENABLED=true
    - OMP_NUM_THREADS=${ML_SCORER_OMP_THREADS:-4}
    - OPENBLAS_NUM_THREADS=${ML_SCORER_OMP_THREADS:-4}
    - ML_SCORER_V2_ENABLED=${ML_SCORER_V2_ENABLED:-1}
    - ML_SCORER_V2_MIN_SAMPLES=${ML_SCORER_V2_MIN_SAMPLES:-2000}
    - ML_SCORER_V2_LOOKBACK_DAYS=${ML_SCORER_V2_LOOKBACK_DAYS:-60}
    - ML_SCORER_V3_ENABLED=${ML_SCORER_V3_ENABLED:-1}
    - ML_SCORER_V3_MIN_SAMPLES=${ML_SCORER_V3_MIN_SAMPLES:-2000}
    - ML_SCORER_V3_LOOKBACK_DAYS=${ML_SCORER_V3_LOOKBACK_DAYS:-60}
    - ML_SCORER_TRAIN_INTERVAL_SEC=${ML_SCORER_V3_TRAIN_INTERVAL_SEC:-21600}
    - NOTIFY_STREAM=${NOTIFY_STREAM:-notify:telegram}
    - ML_SCORER_APPROVAL_REQUIRED=${ML_SCORER_APPROVAL_REQUIRED:-0}
    - ML_SCORER_REMINDER_SEC=${ML_SCORER_REMINDER_SEC:-1800}
    - ML_SCORER_MIN_ROC_DELTA=${ML_SCORER_MIN_ROC_DELTA:-0.002}
    - ML_SCORER_CHAMPION_METRICS_KEY=${ML_SCORER_CHAMPION_METRICS_KEY:-ml_scorer:champion_metrics}
    - TZ=UTC
    depends_on: *id002
    networks: *id003
    volumes:
    - ./python-worker:/app
    - /var/lib/trade/ml_models:/var/lib/trade/ml_models
    working_dir: /app
    command:
    - bash
    - -c
    - "sleep 100\nLAST_TRAIN=0\nTRAIN_INTERVAL=$${ML_SCORER_TRAIN_INTERVAL_SEC:-21600}\n\
      REMINDER_CHECK=900\n\nwhile true; do\n  NOW=$$(date +%s)\n\n  if [ \"$${ML_SCORER_V2_ENABLED:-1}\"\
      \ = \"0\" ] && [ \"$${ML_SCORER_V3_ENABLED:-1}\" = \"0\" ]; then\n    echo '[ml-scorer-pipeline]\
      \ both V2 and V3 disabled, sleeping...'\n    sleep $$REMINDER_CHECK\n    continue\n\
      \  fi\n\n  ELAPSED=$$(( NOW - LAST_TRAIN ))\n  if [ $$ELAPSED -ge $$TRAIN_INTERVAL\
      \ ]; then\n    echo \"[ml-scorer-pipeline] $$(date -u) \u2014 starting ETL V3...\"\
      \n    T_ETL=$$(date +%s)\n    \n    # Step 1: Run ETL\n    python3 scripts/build_ml_dataset_from_scratch.py\
      \ \\\n      && echo \"[ml-scorer-pipeline] $$(date -u) \u2014 ETL done in $$((\
      \ $$(date +%s) - $$T_ETL ))s\" \\\n      || echo \"[ml-scorer-pipeline] $$(date\
      \ -u) \u2014 ETL FAILED (see logs)\"\n\n    # Step 2: Train V2\n    if [ \"\
      $${ML_SCORER_V2_ENABLED:-1}\" = \"1\" ]; then\n      echo \"[ml-scorer-v2] $$(date\
      \ -u) \u2014 starting training...\"\n      T0=$$(date +%s)\n      python3 scripts/train_ml_scorer.py\
      \ \\\n        --lookback $${ML_SCORER_V2_LOOKBACK_DAYS:-60} \\\n        --min_samples\
      \ $${ML_SCORER_V2_MIN_SAMPLES:-2000} \\\n        --output /var/lib/trade/ml_models/scorer_v2/scorer_v2.joblib\
      \ \\\n        --approval $${ML_SCORER_APPROVAL_REQUIRED:-1} \\\n      && echo\
      \ \"[ml-scorer-v2] $$(date -u) \u2014 done in $$(( $$(date +%s) - $$T0 ))s\"\
      \ \\\n      || echo \"[ml-scorer-v2] $$(date -u) \u2014 FAILED (see logs)\"\n\
      \    fi\n\n    # Step 3: Train V3\n    if [ \"$${ML_SCORER_V3_ENABLED:-1}\"\
      \ = \"1\" ]; then\n      echo \"[ml-scorer-v3] $$(date -u) \u2014 starting training...\"\
      \n      T0=$$(date +%s)\n      python3 scripts/train_ml_scorer_v3.py \\\n  \
      \      --lookback $${ML_SCORER_V3_LOOKBACK_DAYS:-60} \\\n        --min_samples\
      \ $${ML_SCORER_V3_MIN_SAMPLES:-2000} \\\n        --output /var/lib/trade/ml_models/scorer_v3/scorer_v3.joblib\
      \ \\\n        --approval $${ML_SCORER_APPROVAL_REQUIRED:-1} \\\n      && echo\
      \ \"[ml-scorer-v3] $$(date -u) \u2014 done in $$(( $$(date +%s) - $$T0 ))s\"\
      \ \\\n      || echo \"[ml-scorer-v3] $$(date -u) \u2014 FAILED (see logs)\"\n\
      \    fi\n\n    LAST_TRAIN=$$(date +%s)\n  fi\n\n  if [ \"$${ML_SCORER_V2_ENABLED:-1}\"\
      \ = \"1\" ]; then\n    python3 -c \"from scripts.train_ml_scorer import check_and_send_reminders;\
      \ check_and_send_reminders()\" 2>&1 || true\n  fi\n  if [ \"$${ML_SCORER_V3_ENABLED:-1}\"\
      \ = \"1\" ]; then\n    python3 -c \"from scripts.train_ml_scorer_v3 import check_and_send_reminders;\
      \ check_and_send_reminders()\" 2>&1 || true\n  fi\n\n  NEXT=$$(( TRAIN_INTERVAL\
      \ - ($$(date +%s) - LAST_TRAIN) ))\n  echo \"[ml-scorer-pipeline] sleeping $${REMINDER_CHECK}s\
      \ (next train in $${NEXT}s)...\"\n  sleep $$REMINDER_CHECK\ndone\n"
    profiles:
    - default
  ml-scorer-v3-calibrator-timer:
    build: *id001
    container_name: scanner-ml-scorer-v3-calibrator-timer
    restart: unless-stopped
    environment:
    - REDIS_URL=redis://redis-worker-1:6379/0
    - PYTHONPATH=.:/app
    - PYTHONUNBUFFERED=1
    - ML_SCORER_V2_ENABLED=${ML_SCORER_V2_ENABLED:-1}
    - ML_SCORER_MODE=${ML_SCORER_MODE:-shadow}
    - NOTIFY_STREAM=${NOTIFY_STREAM:-notify:telegram}
    - RECS_HMAC_SECRET=${RECS_HMAC_SECRET}
    - DECISIONS_FINAL_STREAM=${DECISIONS_FINAL_STREAM:-signals:of:inputs}
    - ML_OUTCOME_STREAM=${ML_OUTCOME_STREAM:-trades:closed}
    - MLS_CAL_HOURS=${MLS_CAL_HOURS:-168}
    - MLS_CAL_MIN_SCORED_TRADES=${MLS_CAL_MIN_SCORED_TRADES:-50}
    - MLS_CAL_MAX_SCAN=${MLS_CAL_MAX_SCAN:-500000}
    - MLS_CAL_MIN_AUC=${MLS_CAL_MIN_AUC:-0.53}
    - MLS_CAL_MAX_BRIER=${MLS_CAL_MAX_BRIER:-0.25}
    - MLS_CAL_ENFORCE_HOLDDOWN_H=${MLS_CAL_ENFORCE_HOLDDOWN_H:-72}
    - MLS_CAL_REMINDER_SEC=${MLS_CAL_REMINDER_SEC:-1800}
    - MLS_CAL_CFG_KEY=${MLS_CAL_CFG_KEY:-cfg:ml_scorer:mode}
    - TZ=UTC
    depends_on: *id002
    networks: *id003
    volumes:
    - ./python-worker:/app
    working_dir: /app
    command:
    - bash
    - -c
    - "sleep 120\nCAL_INTERVAL=$${MLS_CAL_CAL_INTERVAL_SEC:-21600}\n\nwhile true;\
      \ do\n  if [ \"$${ML_SCORER_V2_ENABLED:-1}\" = \"0\" ]; then\n    echo '[ml-scorer-v3-cal]\
      \ disabled, sleeping...'\n    sleep 900\n    continue\n  fi\n\n  CUR_MODE=$${ML_SCORER_MODE:-shadow}\n\
      \  if [ \"$$CUR_MODE\" = \"enforce\" ]; then\n    echo \"[ml-scorer-v3-cal]\
      \ ML_SCORER_MODE=enforce already active. Nothing to calibrate.\"\n    sleep\
      \ $$CAL_INTERVAL\n    continue\n  fi\n\n  echo \"[ml-scorer-v3-cal] $$(date\
      \ -u) \u2014 evaluating shadow performance...\"\n  T0=$$(date +%s)\n\n  python3\
      \ tools/ml_scorer_v3_calibrator.py \\\n    --hours $${MLS_CAL_HOURS:-168} \\\
      \n    --min-scored-trades $${MLS_CAL_MIN_SCORED_TRADES:-50} \\\n    --max-scan\
      \ $${MLS_CAL_MAX_SCAN:-500000} \\\n  && echo \"[ml-scorer-v3-cal] $$(date -u)\
      \ \u2014 done in $$(( $$(date +%s) - T0 ))s\" \\\n  || echo \"[ml-scorer-v3-cal]\
      \ $$(date -u) \u2014 FAILED (see logs)\"\n\n  echo \"[ml-scorer-v3-cal] sleeping\
      \ $${CAL_INTERVAL}s until next check...\"\n  sleep $$CAL_INTERVAL\ndone\n"
    profiles:
    - default
    deploy:
      resources:
        reservations:
          memory: 24M
