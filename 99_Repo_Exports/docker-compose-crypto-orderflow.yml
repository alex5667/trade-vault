    - TELEGRAM_ALLOWED_CHAT_ID=${TELEGRAM_ALLOWED_CHAT_ID:-${TELEGRAM_CHAT_ID:-}}
    - TELEGRAM_ADMIN_USER_IDS=${TELEGRAM_ADMIN_USER_IDS:-}
    - REDIS_URL=redis://redis-worker-1:6379/0
    - ANTIGRAVITY_INBOX_KEY=${ANTIGRAVITY_INBOX_KEY:-antigravity:inbox}
    - OPS_EVENT_STREAM=${OPS_EVENT_STREAM:-ops:eventlog}
    - TELEGRAM_BOT_OFFSET_KEY=${TELEGRAM_TASK_BOT_OFFSET_KEY:-ops:telegram_task_bot:offset}
    - TELEGRAM_BOT_POLL_INTERVAL_S=${TELEGRAM_TASK_BOT_POLL_INTERVAL_S:-2.0}
    - TELEGRAM_BOT_LONGPOLL_TIMEOUT_S=${TELEGRAM_TASK_BOT_LONGPOLL_TIMEOUT_S:-25}
    - SCANNER_CONSUMER_NAME=chatops-telegram-task-bot
    - TZ=UTC
    depends_on:
      redis-worker-1:
        condition: service_healthy
    networks:
    - trade-network
    - scanner-infra
    deploy:
      resources:
        reservations:
          memory: 24M
  public-proxy:
    image: caddy:2.8.4
    container_name: trade-public-proxy
    restart: unless-stopped
    environment:
    - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-localhost}
    - CADDY_LOCAL_TLS=${CADDY_LOCAL_TLS:-0}
    - TZ=UTC
    ports:
    - ${PUBLIC_HTTP_PORT:-80}:80
    - ${PUBLIC_HTTPS_PORT:-443}:443
    volumes:
    - ./monitoring/public_proxy/Caddyfile:/etc/caddy/Caddyfile:ro
    - caddy_data:/data
    - caddy_config:/config
    networks:
    - trade-network
    deploy:
      resources:
        reservations:
          memory: 24M
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: trade-blackbox-exporter
    profiles:
    - disabled
    restart: unless-stopped
    command:
    - --config.file=/etc/blackbox/blackbox.yml
    ports:
    - ${BLACKBOX_PORT:-9115}:9115
    volumes:
    - ./monitoring/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    networks:
    - trade-network
    deploy:
      resources:
        reservations:
          memory: 24M
    environment:
    - TZ=UTC
  runbooks-web:
    image: nginx:1.27-alpine
    container_name: trade-runbooks-web
    restart: unless-stopped
    ports:
    - ${RUNBOOKS_WEB_PORT:-8082}:8082
    volumes:
    - ./monitoring/runbooks:/usr/share/nginx/html:ro
    - ./monitoring/runbooks_web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
    - trade-network
    deploy:
      resources:
        reservations:
          memory: 24M
    environment:
    - TZ=UTC
  chatops-metrics-exporter:
    build:
      context: .
      dockerfile: monitoring/chatops/chatops_metrics_exporter/Dockerfile
    container_name: chatops-metrics-exporter
    restart: unless-stopped
    environment:
    - REDIS_URL=${REDIS_URL:-${REDIS_URL}}
    - CHATOPS_METRICS_EXPORTER_PORT=${CHATOPS_METRICS_EXPORTER_PORT:-9817}
    - SCANNER_CONSUMER_NAME=chatops-metrics-exporter
    - TZ=UTC
    ports:
    - ${CHATOPS_METRICS_EXPORTER_PORT:-9817}:9817
    healthcheck:
      test:
      - CMD-SHELL
      - python3 -c 'import urllib.request; urllib.request.urlopen("http://localhost:9817/metrics")'
        || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      redis-worker-1:
        condition: service_healthy
    networks:
    - trade-network
    deploy:
      resources:
        reservations:
          memory: 24M
  trade-grafana:
    image: grafana/grafana:11.1.0
    container_name: trade-grafana
    profiles:
    - disabled
    restart: unless-stopped
    ports:
    - ${GRAFANA_PORT:-3000}:3000
    environment:
    - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
    - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-%(protocol)s://%(domain)s/grafana/}
    - GF_SERVER_SERVE_FROM_SUB_PATH=${GRAFANA_SERVE_FROM_SUB_PATH:-true}
    - GF_USERS_ALLOW_SIGN_UP=false
    - GF_AUTH_ANONYMOUS_ENABLED=false
    - TZ=UTC
    volumes:
    - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    - grafana_data:/var/lib/grafana
    depends_on:
    - trade-prometheus
    networks:
    - trade-network
    deploy:
      resources:
        reservations:
          memory: 24M
  trade-prometheus:
    image: prom/prometheus:v2.54.1
    container_name: trade-prometheus
    profiles:
    - disabled
    restart: unless-stopped
    environment:
    - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-https://localhost}
    - PROM_TEMPLATE_PATH=/etc/prometheus/prometheus.yml.tmpl
    - PROM_CONFIG_PATH=/etc/prometheus/prometheus.yml
    - PROMETHEUS_EXTRA_ARGS=--log.level=warn ${PROMETHEUS_EXTRA_ARGS:-}
    - TZ=UTC
    entrypoint:
    - /bin/sh
    - /etc/prometheus/entrypoint_envsubst.sh
    ports:
    - ${PROMETHEUS_PORT:-9090}:9090
    volumes:
    - ./monitoring/prometheus/prometheus.yml.tmpl:/etc/prometheus/prometheus.yml.tmpl:ro
    - ./monitoring/prometheus/entrypoint_envsubst.sh:/etc/prometheus/entrypoint_envsubst.sh:ro
    - ./ok_rate_logic:/etc/prometheus/rules/ok_rate_logic:ro
    - ./orderflow_services:/etc/prometheus/rules/orderflow_services:ro
    - ./infra/prometheus/rules:/etc/prometheus/rules/bybit_dq:ro
    - trade_prometheus_data:/prometheus
    networks:
    - trade-network
    deploy:
      resources:
        reservations:
          memory: 24M
  trade-alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: trade-alertmanager
    profiles:
    - disabled
    restart: unless-stopped
    ports:
    - ${ALERTMANAGER_PORT:-9093}:9093
    volumes:
    - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    - trade_alertmanager_data:/alertmanager
    command:
    - --config.file=/etc/alertmanager/alertmanager.yml
    - --storage.path=/alertmanager
    - --web.external-url=${ALERTMANAGER_EXTERNAL_URL:-}
    - --web.route-prefix=${ALERTMANAGER_ROUTE_PREFIX:-/}
    networks:
    - trade-network
    deploy:
      resources:
        reservations:
          memory: 24M
    environment:
    - TZ=UTC
  of-gate-dlq-exporter:
    build: *id001
    restart: always
    environment:
    - REDIS_URL=redis://redis-worker-1:6379/0
    - OF_GATE_DLQ_EXPORTER_PORT=9154
    - OF_GATE_DLQ_EXPORTER_REFRESH_SEC=10
    - OF_GATE_DLQ_STREAMS=stream:dlq:of_gate_metrics,stream:dlq:of_gate_quarantine
    - PYTHONUNBUFFERED=1
    - PYTHONPATH=/app
    - TZ=UTC
    command:
    - python
    - -m
    - orderflow_services.of_gate_dlq_exporter_v1
    ports:
    - 9154:9154
    healthcheck:
      test:
      - CMD-SHELL
      - python3 -c 'import urllib.request; urllib.request.urlopen("http://localhost:9154/metrics")'
        || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      redis-worker-1:
        condition: service_healthy
    networks:
    - trade-network
    - scanner-network
    volumes:
    - ./python-worker:/app
    deploy:
      resources:
        reservations:
          memory: 24M
  of-gate-archiver-exporter:
    build: *id001
    container_name: scanner-of-gate-archiver-exporter
    restart: always
    environment:
    - REDIS_URL=redis://redis-worker-1:6379/0
    - OF_GATE_ARCHIVER_EXPORTER_PORT=9152
    - PYTHONUNBUFFERED=1
    - PYTHONPATH=/app
    - SCANNER_CONSUMER_NAME=scanner-of-gate-archiver-exporter
    - TZ=UTC
    command:
    - python
    - -m
    - orderflow_services.of_gate_archiver_exporter_v1
    ports:
    - 9152:9152
    healthcheck:
      test:
      - CMD-SHELL
      - python3 -c 'import urllib.request; urllib.request.urlopen("http://localhost:9152/metrics")'
        || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      redis-worker-1:
        condition: service_healthy
    networks:
    - trade-network
    - scanner-network
    volumes:
    - ./python-worker:/app
    deploy:
      resources:
        reservations:
          memory: 24M
  periodic-reporter-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-periodic-reporter-timer
    restart: unless-stopped
    working_dir: /app
    volumes:
    - ./python-worker:/app
    - /var/lib/trade:/var/lib/trade
    environment:
    - REDIS_URL=redis://redis-worker-1:6379/0
    - PYTHONUNBUFFERED=1
    - PYTHONPATH=/app
    - PERIODIC_REPORT_CHECK_INTERVAL_SEC=0
    - DAILY_REPORT_ENABLED=true
    - DAILY_REPORT_UTC_HOUR=17
    - DAILY_REPORT_UTC_MINUTE=0
    - DAILY_REPORT_SOURCE=CryptoOrderFlow
    - HOURLY_REPORT_ENABLED=true
    - PERIODIC_REPORT_WINDOW_SECONDS=3600
    - PERIODIC_REPORT_SEND_VIRTUAL_ONLY=true
    - PERIODIC_REPORT_USE_ZSET=1
    - PERIODIC_REPORT_VIRTUAL_TP_BY_MFE=true
    - REDIS_CLOSED_ZSETS_ENABLED=1
    - REPORT_TRIGGER_COUNT=1000000
    - ANALYTICS_DB_DSN=${ANALYTICS_DB_DSN}
    - OF_SCORE_MIN=${OF_SCORE_MIN:-0.45}
    - TZ=UTC
    command: 'sh -c "sleep 120 && python -m services.periodic_reporter"

      '
    depends_on:
      redis-worker-1:
        condition: service_healthy
      redis-worker-2:
        condition: service_healthy
    networks:
    - scanner-network
    deploy:
      resources:
        reservations:
          memory: 24M
networks:
  scanner-network:
