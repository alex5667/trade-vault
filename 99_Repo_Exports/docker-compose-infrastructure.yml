services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
    - 192.168.0.168:6379:6379
    volumes:
    - redis-data:/data
    - ./redis-external-access.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes
    networks:
    - scanner-infra
    - scanner-network
    healthcheck:
      test:
      - CMD-SHELL
      - redis-cli -h localhost -p 6379 --raw ping 2>&1 | grep -qE 'PONG|LOADING'
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 180s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: '4.0'
        reservations:
          memory: 4G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      memlock:
        soft: -1
        hard: -1
    shm_size: 2gb
    sysctls:
      net.core.somaxconn: 65535
      net.ipv4.tcp_max_syn_backlog: 65535
    environment:
    - TZ=UTC
  redis-worker-1:
    image: redis:7-alpine
    container_name: redis-worker-1
    ports:
    - 127.0.0.1:63791:6379
    expose:
    - '6379'
    volumes:
    - redis-worker-1-data:/data
    - ./redis-worker-stable.conf:/usr/local/etc/redis/redis-worker-stable.conf:ro
    - ./redis-worker-1.conf:/usr/local/etc/redis/redis.conf:ro
    - ./redis-worker-1-acl.conf:/usr/local/etc/redis/redis-worker-1-acl.conf:ro
    - ./redis-worker-entrypoint.sh:/usr/local/bin/redis-worker-entrypoint.sh:ro
    entrypoint:
    - /bin/sh
    - /usr/local/bin/redis-worker-entrypoint.sh
    networks:
      scanner-infra:
        aliases:
        - redis-worker-1
        - scanner-redis-worker-1
      scanner-network:
        aliases:
        - redis-worker-1
        - scanner-redis-worker-1
    depends_on:
      redis:
        condition: service_healthy
    environment:
    - REDIS_HEALTHCHECK_URL=redis://exec_health_freeze_audit:${EXEC_HEALTH_FREEZE_AUDIT_PASS}@localhost:6379/0
    - ACL_FILENAME=redis-worker-1-acl.conf
    - TZ=UTC
    healthcheck:
      test:
      - CMD-SHELL
      - redis-cli -u $$REDIS_HEALTHCHECK_URL ping 2>&1 | grep -qE 'PONG|LOADING' ||
        redis-cli ping 2>&1 | grep -qE 'PONG|LOADING'
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 10GB
          cpus: '3.0'
        reservations:
          memory: 3G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    shm_size: 512mb
    sysctls:
      net.core.somaxconn: 65535
  redis-worker-1b:
    image: redis:7-alpine
    container_name: redis-worker-1b
    expose:
    - '6379'
    volumes:
    - redis-worker-1b-data:/data
    - ./redis-worker-stable.conf:/usr/local/etc/redis/redis-worker-stable.conf
    - ./redis-worker-1b.conf:/usr/local/etc/redis/redis.conf
    - ./redis-worker-1-acl.conf:/usr/local/etc/redis/redis-worker-1-acl.conf:ro
    - ./redis-worker-entrypoint.sh:/usr/local/bin/redis-worker-entrypoint.sh:ro
    entrypoint:
    - /bin/sh
    - /usr/local/bin/redis-worker-entrypoint.sh
    networks:
      scanner-infra:
        aliases:
        - redis-worker-1b
      scanner-network:
        aliases:
        - redis-worker-1b
    depends_on:
      redis:
        condition: service_healthy
    environment:
    - REDIS_HEALTHCHECK_URL=redis://exec_health_freeze_audit:${EXEC_HEALTH_FREEZE_AUDIT_PASS}@localhost:6379/0
    - ACL_FILENAME=redis-worker-1-acl.conf
    - TZ=UTC
    healthcheck:
      test:
      - CMD-SHELL
      - redis-cli -u $$REDIS_HEALTHCHECK_URL ping 2>&1 | grep -qE 'PONG|LOADING' ||
        redis-cli ping 2>&1 | grep -qE 'PONG|LOADING'
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 10GB
          cpus: '2.0'
        reservations:
          memory: 3G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    shm_size: 512mb
    sysctls:
      net.core.somaxconn: 65535
  redis-worker-2:
    image: redis:7-alpine
    container_name: redis-worker-2
    expose:
    - '6379'
    volumes:
    - redis-worker-2-data:/data
    - ./redis-worker-stable.conf:/usr/local/etc/redis/redis-worker-stable.conf:ro
    - ./redis-worker-2.conf:/usr/local/etc/redis/redis.conf:ro
    - ./redis-worker-2-acl.conf:/usr/local/etc/redis/redis-worker-2-acl.conf:ro
    - ./redis-worker-entrypoint.sh:/usr/local/bin/redis-worker-entrypoint.sh:ro
    entrypoint:
    - /bin/sh
    - /usr/local/bin/redis-worker-entrypoint.sh
    networks:
      scanner-infra:
        aliases:
        - redis-worker-2
        - scanner-redis-worker-2
      scanner-network:
        aliases:
        - redis-worker-2
        - scanner-redis-worker-2
    depends_on:
      redis:
        condition: service_healthy
    environment:
    - REDIS_HEALTHCHECK_URL=redis://exec_health_freeze_audit:${EXEC_HEALTH_FREEZE_AUDIT_PASS}@localhost:6379/0
    - ACL_FILENAME=redis-worker-2-acl.conf
    - TZ=UTC
    healthcheck:
      test:
      - CMD-SHELL
      - redis-cli -u $$REDIS_HEALTHCHECK_URL ping 2>&1 | grep -qE 'PONG|LOADING' ||
        redis-cli ping 2>&1 | grep -qE 'PONG|LOADING'
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 14GB
          cpus: '3.0'
        reservations:
          memory: 2G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    shm_size: 512mb
    sysctls:
      net.core.somaxconn: 65535
  redis-worker-2b:
    image: redis:7-alpine
    container_name: redis-worker-2b
    expose:
    - '6379'
    volumes:
    - redis-worker-2b-data:/data
    - ./redis-worker-stable.conf:/usr/local/etc/redis/redis-worker-stable.conf
    - ./redis-worker-2b.conf:/usr/local/etc/redis/redis.conf
    - ./redis-worker-2-acl.conf:/usr/local/etc/redis/redis-worker-2-acl.conf:ro
    - ./redis-worker-entrypoint.sh:/usr/local/bin/redis-worker-entrypoint.sh:ro
    entrypoint:
    - /bin/sh
    - /usr/local/bin/redis-worker-entrypoint.sh
    networks:
      scanner-infra:
        aliases:
        - redis-worker-2b
      scanner-network:
        aliases:
        - redis-worker-2b
    depends_on:
      redis:
        condition: service_healthy
    environment:
    - REDIS_HEALTHCHECK_URL=redis://exec_health_freeze_audit:${EXEC_HEALTH_FREEZE_AUDIT_PASS}@localhost:6379/0
    - ACL_FILENAME=redis-worker-2-acl.conf
    - TZ=UTC
    healthcheck:
      test:
      - CMD-SHELL
      - redis-cli -u $$REDIS_HEALTHCHECK_URL ping 2>&1 | grep -qE 'PONG|LOADING' ||
        redis-cli ping 2>&1 | grep -qE 'PONG|LOADING'
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 13GB
          cpus: '2.0'
        reservations:
          memory: 1G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    shm_size: 512mb
    sysctls:
      net.core.somaxconn: 65535
  redis-main-stream-bootstrap:
    image: redis:7-alpine
    container_name: redis-main-stream-bootstrap
    restart: on-failure
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - scanner-infra
    environment:
    - TZ=UTC
    command: >
      sh -c "
        for stream in stream:liq_evt_quarantine stream:symbols; do
          redis-cli -h redis XADD \"$$stream\" '*' type init source bootstrap &&
          redis-cli -h redis XTRIM \"$$stream\" MAXLEN 1;
        done
      "
    deploy:
      resources:
        limits:
          cpus: '0.05'
          memory: 32M

  redis-worker-2-stream-bootstrap:
    image: redis:7-alpine
    container_name: redis-worker-2-stream-bootstrap
    restart: on-failure
    depends_on:
      redis-worker-2:
        condition: service_healthy
    networks:
    - scanner-infra
    environment:
    - TZ=UTC
    command: >
      sh -c "
        for stream in orders:exec dlq:signals dlq:ticks dlq:events dlq:book_deltas; do
          redis-cli -h redis-worker-2 XADD \"$$stream\" '*' type init source bootstrap &&
          redis-cli -h redis-worker-2 XTRIM \"$$stream\" MAXLEN 1;
        done
      "
    deploy:
      resources:
        limits:
          cpus: '0.05'
          memory: 32M
  redis-worker-3:
    image: redis:7-alpine
    container_name: redis-worker-3
    expose:
    - '6379'
    ports:
    - 127.0.0.1:63793:6379
    volumes:
    - redis-worker-3-data:/data
    - ./redis-worker-stable.conf:/usr/local/etc/redis/redis-worker-stable.conf:ro
    - ./redis-worker-3.conf:/usr/local/etc/redis/redis.conf:ro
    - ./redis-worker-3-acl.conf:/usr/local/etc/redis/redis-worker-3-acl.conf:ro
    - ./redis-worker-entrypoint.sh:/usr/local/bin/redis-worker-entrypoint.sh:ro
