      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 10GB
          cpus: '3.0'
        reservations:
          memory: 2G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    shm_size: 512mb
    sysctls:
      net.core.somaxconn: 65535
  redis-worker-3b:
    image: redis:7-alpine
    container_name: redis-worker-3b
    expose:
    - '6379'
    volumes:
    - redis-worker-3b-data:/data
    - ./redis-worker-stable.conf:/usr/local/etc/redis/redis-worker-stable.conf
    - ./redis-worker-3b.conf:/usr/local/etc/redis/redis.conf
    - ./redis-worker-3-acl.conf:/usr/local/etc/redis/redis-worker-3-acl.conf:ro
    - ./redis-worker-entrypoint.sh:/usr/local/bin/redis-worker-entrypoint.sh:ro
    entrypoint:
    - /bin/sh
    - /usr/local/bin/redis-worker-entrypoint.sh
    networks:
      scanner-infra:
        aliases:
        - redis-worker-3b
      scanner-network:
        aliases:
        - redis-worker-3b
    depends_on:
