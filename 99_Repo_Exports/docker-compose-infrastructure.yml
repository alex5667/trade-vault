        - scanner-redis-worker-3
    depends_on:
      redis:
        condition: service_healthy
    environment:
    - REDIS_HEALTHCHECK_URL=redis://exec_health_freeze_audit:${EXEC_HEALTH_FREEZE_AUDIT_PASS}@localhost:6379/0
    - ACL_FILENAME=redis-worker-3-acl.conf
    - TZ=UTC
    healthcheck:
      test:
