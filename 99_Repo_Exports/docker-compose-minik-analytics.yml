    - PYTHONUNBUFFERED=1
    - REDIS_URL=${REDIS_URL}
    - ANALYTICS_DB_DSN=${ANALYTICS_DB_DSN}
    - BBO_TS_STREAM=events:bbo_ts
    - BBO_TS_CG=bbo_ts_writer
    - BBO_TS_BLOCK_MS=5000
    - BBO_TS_COUNT=256
    - BBO_TS_DLQ_STREAM=events:bbo_ts:dlq
    - BBO_TS_DLQ_MAXLEN=200000
    - BBO_TS_WRITER_BATCH_SIZE=500
    - BBO_TS_WRITER_METRICS_PORT=9826
    - TZ=UTC
    networks: *id002
    dns: *id003
    container_name: scanner-bbo-ts-writer
    volumes:
    - ./python-worker:/app
    command: python3 tools/run_daemon_with_minik_failover.py --job-name bbo_ts_writer --is-minik -- python -m services.posttrade.bbo_ts_writer

  scanner-of-gate-sre:
    build: *id001
    restart: unless-stopped
    environment:
    - PYTHONUNBUFFERED=1
    - REDIS_URL=${REDIS_URL}
    - OF_GATE_METRICS_STREAM=metrics:of_gate
    - NOTIFY_TELEGRAM_STREAM=notify:telegram
    - OF_INPUTS_STREAM=signals:of:inputs
    - TRADE_EVENTS_STREAM=events:trades
    - CONF_CAL_AB_SHADOW=false
    - OF_SCORE_MIN=0.60
    - TZ=UTC
    networks: *id002
    dns: *id003
    container_name: scanner-of-gate-sre
    volumes:
    - /var/lib/trade:/var/lib/trade
    - ./python-worker/persistence:/app/persistence
    command: "python3 tools/run_daemon_with_minik_failover.py --job-name of_gate_sre --is-minik -- sh -c \"\n  echo '[OF-GATE-SRE] Starting monitoring loop...'\n  mkdir\
      \ -p /var/lib/trade/of_bench /var/lib/trade/of_gate_golden /var/lib/trade/of_replay\n\
      \n  echo '[OF-GATE-SRE] Waiting for redis-worker-1...'\n  for i in $$(seq 1\
      \ 12); do\n    python -c \\\"import redis; r=redis.from_url('${REDIS_URL:-${REDIS_URL}}');\
      \ r.ping()\\\" 2>/dev/null && echo '[OF-GATE-SRE] Redis ready.' && break\n \
      \   echo \\\"[OF-GATE-SRE] Redis not ready, retry (max 12)...\\\"\n    sleep\
      \ 5\n  done\n\n  while true; do\n    M=`date +%M`\n    H=`date +%H`\n\n    #\
      \ SRE monitor: 00,10,20,30,40,50\n    case \"$$M\" in 00|10|20|30|40|50)\
      \ python -m tools.of_gate_sre_monitor --window-min 10 --always 0 || echo 'SRE\
      \ monitor failed' ;; esac\n\n    # Latency benchmark: 05,35\n    case \"$$M\"\
      \ in 05|35) python -m tools.bench_of_gate_latency --window-min 60 --out /var/lib/trade/of_bench/latency_bench_last.json\
      \ || echo 'Benchmark failed' ;; esac\n    \n    # Nightly tasks\n    if [ \"\
      $$M\" = \"00\" ]; then\n      if [ \"$$H\" = \"02\" ]; then python -m tools.of_gate_golden_snapshot\
      \ --window-hours 24 --baseline /var/lib/trade/of_gate_golden/baseline.json --out-dir\
      \ /var/lib/trade/of_gate_golden --fail-on-drift 0 --notify 1 || echo 'Snapshot\
      \ failed'; fi\n      if [ \"$$H\" = \"03\" ]; then python -m tools.golden_replay_of_confirm_from_redis\
      \ --out-dir /var/lib/trade/of_replay --stream signals:of:inputs --field payload\
      \ --since-hours 24 --max-records 200000 --baseline /var/lib/trade/of_replay/baseline.ndjson\
      \ --fail-on-mismatch 0 || echo 'Replay failed'; fi\n      if [ \"$$H\" = \"\
      04\" ]; then python -m tools.ml_calibration_health_monitor || echo 'ML monitor\
      \ failed'; fi\n    fi\n    \n    sleep 60\n  done\n\"\n"

