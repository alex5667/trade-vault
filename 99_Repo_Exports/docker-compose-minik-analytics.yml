      +%-M); if [ \\\"$$HOUR\\\" -eq 3 ] && [ \\\"$$MIN\\\" -ge 40 ] && [ \\\"$$MIN\\\"
      -lt 55 ]; then if [ -n \\\"$$RISK_AUDIT_SQL_DSN\\\" ]; then python3 -u scripts/purge_risk_audit_hot_tables.py
