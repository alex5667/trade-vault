  scanner-redis-reconnect-watchdog:
    image: docker:27-cli
    restart: unless-stopped
    container_name: scanner-redis-reconnect-watchdog
    environment:
    - REDIS_HOST=${REDIS_HOST:-192.168.0.168}
    - REDIS_PORT=6379
    - REDIS_TICKS_HOST=${REDIS_HOST:-192.168.0.168}
    - REDIS_TICKS_PORT=6380
    - CHECK_INTERVAL=30
    - DOWN_THRESHOLD=2
    - TZ=UTC
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    command: 'sh -c "echo ''[watchdog] starting. checking redis every $$CHECK_INTERVAL
      s, threshold $$DOWN_THRESHOLD consecutive failures''; prev_state=up; fail_count=0;
      while true; do if nc -z -w 3 $$REDIS_HOST $$REDIS_PORT >/dev/null 2>&1 && nc
      -z -w 3 $$REDIS_TICKS_HOST $$REDIS_TICKS_PORT >/dev/null 2>&1; then if [ \"$$prev_state\"
      = \"down\" ]; then echo \"[watchdog] $$(date -u +%FT%TZ) redis recovered after
      $$fail_count failures — restarting minik analytics containers\"; docker ps --filter
      ''name=scanner-'' --filter ''status=running'' --format ''{{.Names}}'' | grep
      -v ''scanner-redis-reconnect-watchdog'' | xargs -r -n1 docker restart -t 10
      >/dev/null && echo \"[watchdog] restart complete\"; fi; prev_state=up; fail_count=0;
      else fail_count=$$((fail_count+1)); if [ \"$$fail_count\" -ge \"$$DOWN_THRESHOLD\"
      ] && [ \"$$prev_state\" = \"up\" ]; then echo \"[watchdog] $$(date -u +%FT%TZ)
      redis DOWN ($$fail_count consecutive failures)\"; prev_state=down; fi; fi; sleep
      $$CHECK_INTERVAL; done"

      '

