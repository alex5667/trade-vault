    networks: *id002
    dns: *id003
    container_name: scanner-trade-ml-sre-monitor-timer
    volumes:
    - ./python-worker:/app
    command: "python3 tools/run_daemon_with_minik_failover.py --job-name trade_ml_sre_monitor --is-minik -- sh -c \"sleep 5 && while true; do\\\n  NF=/tmp/.sre_notify_ts;\\\n \
      \ if [ ! -f $$NF ] || find $$NF -mmin +60 | grep -q .; then\\\n    echo 'Running\
      \ SRE Monitors WITH notify (1h gate)...';\\\n    python3 -m tools.sre_monitor_all_v3\
      \ --emit-metrics --notify --emit-suggestions;\\\n    touch $$NF;\\\n  else\\\
      \n    echo 'Running SRE Monitors metrics-only (notify suppressed)...';\\\n \
      \   python3 -m tools.sre_monitor_all_v3 --emit-metrics --emit-suggestions;\\\
      \n  fi;\\\n  echo 'Monitor done. Sleeping 10 minutes...';\\\n  sleep 600;\\\n\
      done\"\n"

  scanner-trade-execution-healthcheck-timer:
    build: *id001
    restart: unless-stopped
    environment:
    - PYTHONUNBUFFERED=1
    - REDIS_URL=${REDIS_URL}
    - EXECUTION_JOURNAL_DSN=${EXECUTION_JOURNAL_DSN}
    - RUNBOOK_REPORT_DIR=/var/lib/trade-runbook/reports
    - "USER_STREAM_CACHE_PREFIX=orders:user_stream:"
    - USER_STREAM_STALE_MS=120000
    - EXEC_CONSISTENCY_STREAM_COUNT=5000
    - "EXEC_CONSISTENCY_SID_PREFIX_ALLOWLIST=crypto-of:"
    - "ORDERS_STATE_KEY_PREFIX=orders:state:"
    - "EXEC_STREAM=orders:exec"
    - "EXEC_HEALTHCHECK_TEXTFILE_PATH="
    - TZ=UTC
    networks: *id002
    dns: *id003
    container_name: scanner-trade-execution-healthcheck-timer
    volumes:
    - ./python-worker:/app
    - ./var/runbook-reports:/var/lib/trade-runbook/reports:rw
    command: "python3 tools/run_daemon_with_minik_failover.py --job-name exec_healthcheck_timer --is-minik -- sh -c \"sleep 5 && while true; do\n  echo '[p7-healthcheck] Running\
      \ execution healthcheck...';\n  if [ -n \\\"$$EXEC_HEALTHCHECK_TEXTFILE_PATH\\\
      \" ]; then\n    python3 -u scripts/execution_healthcheck.py --report-dir /var/lib/trade-runbook/reports\
      \ --textfile-output \\\"$$EXEC_HEALTHCHECK_TEXTFILE_PATH\\\" || true;\n  else\n\
      \    python3 -u scripts/execution_healthcheck.py --report-dir /var/lib/trade-runbook/reports\
      \ || true;\n  fi;\n  sleep 60;\ndone\"\n"

  scanner-bbo-ts-writer:
