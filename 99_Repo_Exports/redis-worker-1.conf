# redis-worker-1.conf — extends redis-worker-stable.conf with ACL file for ExecHealth users
# Used by redis-worker-1 and redis-worker-1b containers only

include /usr/local/etc/redis/redis-worker-stable.conf

# ExecHealth ACL users (exec_health_freeze_*) — persisted via aclfile
# The file contains hashed passwords; regenerated by exec_health_freeze_acl_policy_v1.py
aclfile /data/redis-worker-1-acl.conf
