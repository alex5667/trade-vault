# redis-worker-1b.conf — replica of redis-worker-1
# Extends redis-worker-1.conf (which includes redis-worker-stable.conf)
# CRITICAL: replicaof must come AFTER include to override any default

include /usr/local/etc/redis/redis-worker-stable.conf

# ExecHealth ACL users — same ACL base as master
aclfile /data/redis-worker-1-acl.conf

# ============================================================================
# REPLICA CONFIGURATION
# ============================================================================
# Connect to redis-worker-1 (Docker DNS resolves to the master container)
replicaof redis-worker-1 6379

# Lower maxmemory — replica needs enough to hold master dataset (~9GB currently)
maxmemory 10000mb
