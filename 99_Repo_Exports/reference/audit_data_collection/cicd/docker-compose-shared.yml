x-crypto-of-common:
  build:
    context: .
    dockerfile: python-worker/Dockerfile.gpu
  runtime: nvidia
  environment: *id001
  depends_on:
    redis:
      condition: service_healthy
    redis-ticks:
      condition: service_healthy
  networks:
  - scanner-network
  volumes:
  - ./logs:/app/logs
  restart: on-failure:5
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: '0.5'
      reservations:
        memory: 128M
  command:
  - sh
  - -c
  - sleep 40 && python services/crypto_orderflow_service.py
