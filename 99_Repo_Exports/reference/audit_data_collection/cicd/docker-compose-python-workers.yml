# Docker Compose Override System
# ============================
#
# Gate Profile Overrides:
# - make up:       Uses docker-compose.override.soft.yml (default/soft profile)
# - make up-hard:  Uses docker-compose.override.hard.yml (hard profile with vetoes)
#
# Override files modify the multi-symbol-orderflow service environment variables
# to apply different gate profiles without changing the base configuration.
#
# Gate profiles:
#   default/soft: не режем поток (bad-ts => skip EMA; entry-policy can be audit-only elsewhere)
#   strict:       tighter but still conservative
#   hard:         bad-ts => huge slippage (veto via gate), optional entry-policy vetoes
#
#   hard:         bad-ts => huge slippage (veto via gate), optional entry-policy vetoes
#

x-default-python-worker: &default-python-worker
  build:
    context: .
    dockerfile: python-worker/Dockerfile
  restart: on-failure:5
  networks:
    - scanner-network

services:
  python-worker:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    image: scanner-python-worker:latest
    container_name: scanner-python-worker
    # runtime: nvidia
    profiles:
      - default
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/metrics\")' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      # Gate profile:
      #   default/soft: не режем поток (bad-ts => skip EMA; entry-policy can be audit-only elsewhere)
      #   strict:       tighter but still conservative
      #   hard:         bad-ts => huge slippage (veto via gate), optional entry-policy vetoes
      - TRADES_DB_DSN=postgresql://trading:trading_password@postgres:5432/scanner_analytics
      - REDIS_HOST=redis-worker-1
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_URL=redis://redis-worker-1:6379/0
      - REDIS_TICKS_URL=redis://redis-ticks:6379/0
      - REDIS_TICKS_HOST=redis-ticks
      - REDIS_TICKS_PORT=6379
      - REDIS_SOCKET_TIMEOUT=30
      - REDIS_SOCKET_CONNECT_TIMEOUT=10
      - REDIS_MAX_CONNECTIONS=100
      - REDIS_RETRY_ON_TIMEOUT=true
      - REDIS_HEALTH_CHECK_INTERVAL=30
      # tight redis for news/calendar рядом с tick-loop
      - NEWS_REDIS_SOCKET_TIMEOUT_SEC=0.05
      - NEWS_REDIS_CONNECT_TIMEOUT_SEC=0.2
      - NEWS_REDIS_MAX_CONNECTIONS=30
      
      # trade news reco module
      - TRADE_NEWS_RECO_READER_ENABLE=1
      - TRADE_NEWS_RECO_REDIS_URL=${REDIS_URL:-redis://redis-worker-1:6379/0}
      - TRADE_NEWS_RECO_MAP_KEY=trade:cache:news_reco_map
      - TRADE_NEWS_RECO_POLL_MS=250
      - TRADE_NEWS_RECO_POLL_JITTER_MS=50
      - TRADE_NEWS_RECO_STALE_FAIL_OPEN_MS=5000
      - TRADE_NEWS_RECO_MAX_SYMBOLS=2000
      
      # logging
      - TM_ORPHAN_TIMEOUT_ENABLED=0
      - NEWS_LOG_MINI_SAMPLE_PCT=1
      - NEWS_DEBUG_FULL=false
      - NEWS_DEBUG_FULL_SAMPLE_PCT=1
      - NEWS_DEBUG_FULL_MAX_JSON_BYTES=409
      - REDIS_SIGNALS_HOST=redis-worker-1
      - REDIS_SIGNALS_PORT=6379
      - REDIS_SIGNALS_HOST_2=redis-worker-2
      - REDIS_SIGNALS_PORT_2=6379
      - L2_NEGATIVE_SKEW_STALE_MS=5000
      - MANUAL_AUDIT_LEVEL=compact
      - MANUAL_AUDIT_MAX_BYTES=12000
      - MANUAL_AUDIT_ROUND=4
      - CONF_BREAKDOWN_MAX_KEYS=8
      - CONF_BREAKDOWN_ROUND=4
      - METRICS_EVERY_MS=15000
      - MODE_MOMO_EMA_ALPHA=0.02
      - XAU_HANDLER_ENABLED=true
      - XAU_SYMBOL=XAUUSD
      - XAU_TICK_STREAM=stream:tick_XAUUSDT
      - XAU_TICK_STREAM_MAXLEN=50000
      - XAU_TICK_POLL_INTERVAL=0.2
      - XAU_TICK_FETCH_COUNT=500
      - XAU_TICK_LOOKBACK_SEC=5.0
      - XAU_GROUP=xauusd-signal-group
