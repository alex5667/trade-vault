      - SESSION_CLOSE_HOUR=0
      - SESSION_CLOSE_MIN=0
      - ATR_SOURCE=ticks
      - ATR_TF=1m
      - AUTO_CALIBRATION_THRESHOLD=100
      - AUTO_CALIBRATION_SYMBOLS=BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,1000PEPEUSDT,DOGEUSDT,1000SHIBUSDT,1000FLOKIUSDT,1000BONKUSDT,WIFUSDT,SUIUSDT,APTUSDT,ARBUSDT,XAUUSDT
      - AUTO_CALIBRATION_SOURCE=CryptoOrderFlow
