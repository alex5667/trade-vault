      - SIGNAL_BRIDGE_MAXLEN=5000

      # bridge dispatcher settings
      - SIGNAL_BRIDGE_READ_COUNT=200
      - SIGNAL_BRIDGE_READ_BLOCK_MS=1000
      - SIGNAL_BRIDGE_TARGET_MAXLEN=5000
      - SIGNAL_BRIDGE_CLAIM_MIN_IDLE_MS=60000
      - SIGNAL_BRIDGE_CLAIM_COUNT=200
      - SIGNAL_BRIDGE_CLAIM_EVERY_MS=5000
      - SIGNAL_OUTBOX_ACK_RETRY_TTL_SEC=600

      # maintenance + diagnostics
      - SIGNAL_MAINTENANCE_EVERY_MS=60000
      - SIGNAL_MAINTENANCE_SCAN_COUNT=400
      - SIGNAL_DIAG_EVERY_MS=30000

      # DecisionTrace system (end-to-end signal correlation & diagnostics)
      - DECISION_TRACE_ENABLE=1
      - DECISION_TRACE_MAX_EVENTS=200
      - DECISION_TRACE_DIAG_STREAM=stream:signals:diagnostics
      - SIGNAL_DIAGNOSTICS_STREAM=stream:signals:diagnostics
      - DECISION_TRACE_SIDECAR_UPDATE_ON_SUCCESS=0
      - DECISION_TRACE_LOG_SAMPLE_RATE=0.02
      - DECISION_TRACE_SUMMARY_MAXLEN=240
      - DECISION_TRACE_SIDECAR_MAX_BYTES=120000
      - RUNTIME_SNAPSHOT_REFRESH_SEC=5
      # RUNTIME_RELOAD_TOKEN=... (опционально: смена значения гарантированно сбросит кеш)
      # RUNTIME_REDIS_RELOAD_KEY=runtime:reload (опционально: sync-Redis key-based reload)
      - RUNTIME_REFRESH_EVERY_SEC=10

      # retry scheduler (delayed per-target retries)
      - SIGNAL_RETRY_ZSET=zset:signals:retry
      - SIGNAL_RETRY_DEDUP_PREFIX=retry:scheduled
      - SIGNAL_RETRY_POP_LIMIT=50
      - SIGNAL_RETRY_BASE_MS=250
      - SIGNAL_RETRY_MAX_MS=15000
      - SIGNAL_RETRY_JITTER_MS=250
      - SIGNAL_RETRY_DRAIN_EVERY_MS=200

      # per-target DLQ streams
      - SIGNAL_DLQ_NOTIFY_STREAM=stream:signals:dlq:notify
      - SIGNAL_DLQ_SIGNAL_STREAM_STREAM=stream:signals:dlq:signal_stream
      - SIGNAL_DLQ_AUDIT_STREAM=stream:signals:dlq:audit
      - SIGNAL_DLQ_MANUAL_STREAM=stream:signals:dlq:manual
      - SIGNAL_DLQ_SNAPSHOT_STREAM=stream:signals:dlq:snapshot
      - SIGNAL_OUTBOX_ATTEMPT_TTL_SEC=86400
      - SIGNAL_OUTBOX_LAST_ERROR_TTL_SEC=86400
      - SIGNAL_DELIVERY_TTL_SEC=86400
      - SIGNAL_DELIVERY_INFLIGHT_TTL_MS=60000
      - SIGNAL_DELIVERY_MARKER_PREFIX=signals:deliver
      - SIGNAL_ENV_DONE_PREFIX=signals:env_done
      - SIGNAL_DELIVERY_INDEX_KEY=signals:idx:deliver
      - SIGNAL_ENV_DONE_INDEX_KEY=signals:idx:env_done
      - SIGNAL_MARKER_JANITOR_EVERY_SEC=10
      - SIGNAL_MARKER_INDEX_BATCH=1000
      - SIGNAL_MARKER_INDEX_MAX=500000
      - SIGNAL_OUTBOX_PENDING_DETAIL_EVERY_SEC=10
      - SIGNAL_OUTBOX_PENDING_TOPN_PER_CONSUMER=5
      - SIGNAL_MARKER_CLEANUP_EVERY_SEC=60
      - SIGNAL_MARKER_CLEANUP_BATCH=2000
      - SIGNAL_MARKER_CLEANUP_BUFFER_SEC=60
      - SIGNAL_DISPATCHER_DIAG_EVERY_SEC=10
      - SIGNAL_DISPATCHER_REAP_IDLE_CONSUMERS=1
      - SIGNAL_DISPATCHER_REAP_IDLE_MS=900000
      - SIGNAL_DISPATCHER_REAP_EVERY_SEC=60
      - SIGNAL_DISPATCHER_PENDING_SAMPLE_EVERY_SEC=30
      - SIGNAL_DISPATCHER_PENDING_SAMPLE_COUNT=20
      - SIGNAL_DISPATCHER_PENDING_STUCK_IDLE_MS=300000
      - SIGNAL_DISPATCHER_CLEAN_DEAD_CONSUMERS=1
      - SIGNAL_DISPATCHER_DEAD_CONSUMER_IDLE_MS=900000
      - SIGNAL_SID_LEASE_TTL_MS=15000
      - SIGNAL_ENV_DONE_TTL_SEC=86400
      - NOTIFY_GATE_MODE=hash
      - DOM_VENDOR=BINANCE
      - DOM_DEPTH=15
      - MOCK_MID_PRICE=3955.0
      - MOCK_TICK_SIZE=0.1
      - BOOK_STREAM=stream:book_XAUUSD
      - BOOK_LAST_KEY=book:levels:XAUUSD
      - LOCAL_CALIBRATION_FILE=/app/data/local_calibration.json
      - PG_DSN=postgresql://trading:trading_password@postgres:5432/trade
      - DATABASE_URL=postgresql://trading:trading_password@postgres:5432/trade
      - CALIB_LOOKBACK_DAYS=365
      - CALIB_MIN_TRADES_CLUSTER=300
      - CALIB_MIN_TRADES_BUCKET=100
      - CALIB_MIN_MEAN_PNL_R=0.0
      - CONF_CAL_MODE=isotonic
      - CONF_CAL_PATH=/app/calibration/confidence_calibration.json
      - CONF_CAL_MIN_SAMPLES=300
      - CONF_CAL_RELOAD_SEC=30
      # auto-train gating
      - CONF_CAL_MIN_NEW_SAMPLES=300
      - CONF_CAL_HISTORY_DIR=/app/calibration/history
      - CONF_CAL_HISTORY_KEEP=50
      # stricter top-M guard (M=3)
      - CONF_CAL_GATE_GROUP_TOPM_ENABLE=1
      - CONF_CAL_GATE_GROUP_TOPM=3
      - CONF_CAL_GATE_GROUP_TOPM_SCALE=0.6
      # normalization
      - CONF_CAL_KIND_STRIP_VERSION=1
      - CONF_CAL_KIND_MAP_JSON='{"absorption_v2":"absorption"}'
      - GPU_ENABLED=true
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - USE_FILE_LOGGING=true
      - LOG_DIR=/app/logs
      - LOG_LEVEL=INFO
      - DQ_DEBUG_INTERVAL_SEC=60
      - BAD_TIME_RECOVERY_OK_STREAK=5
      - BAD_TIME_RECOVERY_MAX_MS=8000
      - BAD_TIME_RECOVERY_FAIL_QUARANTINE_MS=20000
      - BAD_TIME_RECOVERY_FAIL_STATE_FREEZE_MS=5000
      # snapshots writer/reader
      - EMP_TIME_SNAPSHOTS_READ=1


      # writer storage
      - EMP_TIME_SNAPSHOT_BUF_MAX=300
      - EMP_TIME_SNAPSHOT_BUF_TTL_SEC=0 # или 604800, если хотите TTL

      # fast-T (опционально)
      - EMP_TTD_FAST_IF_REGIME=1
      - EMP_TTD_FAST_REGIME_KEYWORDS="trend,expansion"

      # survival hard veto (включать постепенно)
      - EMP_SURVIVE_MIN=0.55
      - EMP_LEVELS_BUF_MAX=300
      - EMP_LEVELS_BUF_TTL_SEC=604800
      - EMP_TP1_BPS_MIN=15
      - EMP_TP1_BPS_MAX=600
      - EMP_SL_BPS_MIN=10
      - EMP_SL_BPS_MAX=800

      # EV TP1 hit-rate stats (atomic EMA)
      - EV_TP1_STATS_ENABLED=1
      - EV_TP1_EMA_ALPHA=0.05
      - EV_TP1_STATS_TTL_SEC=2592000

      # Trailing policy
      - TRAIL_FORCE_ALWAYS_AFTER_TP1=0
      - TRAIL_COND_ENABLED=1

      # Execution cost EMA
      - EXEC_COST_EMA_ENABLED=1
      - EXEC_COST_EMA_ALPHA=0.05
      - EXEC_COST_EMA_MIN_SAMPLES=20
      - EXEC_COST_EMA_TTL_SEC=2592000
      - EXEC_COST_EMA_DIM_TF=1
      - EXEC_COST_EMA_DIM_KIND=1
      - EXEC_COST_EMA_WRITE_LEGACY=1
      - EXEC_COST_EMA_READ_LEGACY_FALLBACK=1
      - EXEC_COST_EMA_KEY_PREFIX=slipema
      # ------------------------------------------------------------
      # Reliability calibration (conf_pct -> hit-rate)
      #
      # Supported outcomes:
      #   - tp1
      #   - tp2
      #   - win
      #   - nosl_after_tp1
      #
      # Optional strict-by-horizon proxy:
      #   - nosl_after_tp1_t{T}  (ms)
      #     examples: nosl_after_tp1_t500, nosl_after_tp1_t2000
      #
      # Default (pipeline recommendation):
      #   - tp2             : entry-quality compromise
      #   - nosl_after_tp1  : management/hold quality (giveback control)
      #
      # To choose a single variant:
      #   REL_CAL_OUTCOMES=tp1
      # or:
      #   REL_CAL_OUTCOMES=win
      # ------------------------------------------------------------
      - REL_CAL_ENABLED=1
      - REL_CAL_OUTCOMES=tp2,nosl_after_tp1
      - REL_CAL_BUCKET_STEP_PCT=5
      - REL_CAL_TTL_SEC=2592000
      - REL_CAL_USE_KIND_DIM=1
      - REL_CAL_USE_REGIME_DIM=1
      - REL_CAL_USE_VENUE_DIM=1
      - REL_CAL_USE_SESSION_DIM=1
      - REL_CAL_USE_TF_DIM=1
      - NOSL_AFTER_TP1_BUCKETS_MS="500,2000"
      - NOSL_AFTER_TP1_STOP_REASONS="SL,TRAILING_STOP"
      - SLIPPAGE_EMA_MIN_SAMPLES=20
      # -------------------------------------------------------------------
      # Edge Cost Gate TS Policy (fail-open by default)
      #
      # Recommended for most systems:
      - EDGE_TS_BAD_POLICY=veto
      - EDGE_TS_SECONDS_POLICY=normalize
      - EDGE_TS_MAX_SKEW_MS=21600000
      - EDGE_SLIP_EMA_MIN_SAMPLES=${EDGE_SLIP_EMA_MIN_SAMPLES:-20}
      # Optional strict mode:
      - EDGE_TS_BAD_FLOOR_BPS=${EDGE_TS_BAD_FLOOR_BPS:-50}
      - EDGE_TS_BAD_VETO_BPS=1000000

      # Feature Drift Alarm (online microstructure monitoring)
      # Gate profiles:
      #   default|soft  -> не режем поток (audit + лёгкий tighten K)
      #   strict        -> veto только на экстремальном spread shock
      #   hard          -> veto + feature drift + ts bad veto-floor
      - GATE_PROFILE=hard

      # Feature Drift Alarm (online microstructure monitoring)
      - FEATURE_DRIFT_ENABLED=1
      - FEATURE_DRIFT_BASE_ALPHA=0.01
      - FEATURE_DRIFT_FAST_ALPHA=0.10
      - FEATURE_DRIFT_MIN_SAMPLES=200
      - FEATURE_DRIFT_Z_THRESHOLD=4.0
      - FEATURE_DRIFT_FACTOR_SLOPE=0.15
      - FEATURE_DRIFT_FACTOR_MAX=1.60
      - FEATURE_DRIFT_TTL_S=300
      - FEATURE_DRIFT_UPDATE_EVERY_MS=250
      - FEATURE_DRIFT_ALERT_STREAM=stream:alerts:feature_drift
      - FEATURE_DRIFT_ALERT_COOLDOWN_MS=30000
      - FEATURE_DRIFT_INCLUDE_KIND=0
      - FEATURE_DRIFT_NOTE=1

      # --- Vol Regime Tracker (realized vol ratio) ---
      - VOL_REGIME_FAST_ALPHA=0.25
      - VOL_REGIME_SLOW_ALPHA=0.03
      - VOL_REGIME_Z_WINDOW=240

      # --- Book Resilience Tracker (depth recovery after sweep) ---
      - BOOK_RESILIENCE_RECOVERY_RATIO=0.85
      - BOOK_RESILIENCE_MAX_WINDOW_MS=15000

      # Entry policy gate
      - ENTRY_POLICY_ENABLED=1
      - ENTRY_POLICY_DIAG_STREAM=entry_policy_diag
      - SMT_LEADER_MODE=observe

      # Feature drift alarm (в default профиле не veto, только tighten K)
      - FEATURE_DRIFT_Z=6.0
      - FEATURE_DRIFT_ALPHA=0.02

      # Slippage EMA writer
      - SLIPPAGE_EMA_ALPHA=0.05

      # =================================================================
      # RELIABILITY CURVES SYSTEM (TP2 hit with maximum stability)
      # =================================================================
      # Writer: StatsAggregator writes tp2 reliability curves to Redis
      - RELIABILITY_TARGETS=tp2
      - RELIABILITY_BUCKET_STEP=5
      - RELIABILITY_SMT_COH_THR=0.65
      - RELIABILITY_WRITE_LEGACY=1

      # Adjuster: TradeMonitor applies confidence post-calibration
      # "TP2 hit (компромисс)" + максимальная стабильность
      - RELIABILITY_ADJUST_ENABLED=1
      - RELIABILITY_ADJUST_TARGET=tp2
      - RELIABILITY_ADJ_PROFILE=hardest
      - RELIABILITY_ADJ_ALPHA=0.5
      - RELIABILITY_ADJ_MIN_BUCKET_SAMPLES=100
      - RELIABILITY_ADJ_MIN_SAMPLES_GLOBAL=1000
      - RELIABILITY_ADJ_MIN_SAMPLES_CTX=500
      - RELIABILITY_ADJ_MIN_DELTA=0.04
      - RELIABILITY_ADJ_MIN_Z=2.58
      - RELIABILITY_ADJ_PRIOR_N=150
      - RELIABILITY_ADJ_MAX_ABS=0.10

      # =================================================================
      # COST/SLIPPAGE SYSTEM
      # =================================================================
      # Slippage EMA writer

      # Entry spread limits
      - ENTRY_SPREAD_BPS_MAX=25.0
      - ENTRY_RECHECK_BUCKETS=2
      - ENTRY_RECHECK_BUCKET_MS=60000

      # RUNTIME_RELOAD_TOKEN=... (опционально: смена значения гарантированно сбросит кеш)
      # RUNTIME_REDIS_RELOAD_KEY=runtime:reload (опционально: sync-Redis key-based reload)
      - RUNTIME_RELOAD_KEY=runtime:reload
      - ML_CONFIRM_MODEL_PATH=/var/lib/trade/of_reports/models/model.joblib
      - ML_CONFIRM_MODE=SHADOW
      - ML_CONFIRM_FAIL_POLICY=OPEN
      - ML_REDIS_URL=redis://redis-worker-1:6379/0
      - ML_CONFIRM_METRICS_STREAM=metrics:ml_confirm
      - ML_CONFIRM_P_MIN=0.55
      - OF_CONFIRM_VERSION=3
      # ML Confirm: метрики и selective prediction (мягкий старт для SHADOW -> ENFORCE)
      - ML_CONFIRM_METRICS_ENABLE=${ML_CONFIRM_METRICS_ENABLE:-1}
      - ML_CONFIRM_METRICS_SAMPLE=${ML_CONFIRM_METRICS_SAMPLE:-1.0}
      # Selective prediction: сначала только band (очень мягко)
      - ML_CONFIRM_ABSTAIN_BAND=${ML_CONFIRM_ABSTAIN_BAND:-0.02}
      - ML_CONFIRM_CONF_MIN=${ML_CONFIRM_CONF_MIN:-0.0}
      - ML_CONFIRM_ABSTAIN_ON_MISSING=${ML_CONFIRM_ABSTAIN_ON_MISSING:-0}
      # Hard floor guardrail (если нужно сделать floor безопаснее)
      - ML_CONFIRM_P_MIN_HARD_FLOOR=${ML_CONFIRM_P_MIN_HARD_FLOOR:-0.0}
      # Canary rollout share (0.0=OFF, 1.0=ALL, 0.05=5%)
      - ML_CONFIRM_ENFORCE_SHARE=${ML_CONFIRM_ENFORCE_SHARE:-0.0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-worker-1:
        condition: service_healthy
      redis-worker-2:
        condition: service_healthy
      go-worker-1m:
        condition: service_healthy
      go-worker-5m:
        condition: service_healthy
      go-worker-15m:
        condition: service_healthy
    networks:
      - scanner-network
    restart: on-failure:5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command:
      - sh
      - -c
      - sleep 30 && python main.py
    volumes:
      - ./python-worker:/app
      - ./logs:/app/logs
      - /var/lib/trade:/var/lib/trade
      - ./calibration:/app/calibration

