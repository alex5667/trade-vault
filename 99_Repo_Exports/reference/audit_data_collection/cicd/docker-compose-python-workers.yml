  policy-effectiveness-report:
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    container_name: scanner-policy-effectiveness-report
    profiles:
      - default
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - TRADES_CLOSED_STREAM=trades:closed
      - POLICY_EFF_LOOKBACK_H=24
      - POLICY_EFF_MAX_SCAN=200000
    depends_on:
      redis:
        condition: service_healthy
      redis-worker-1:
        condition: service_healthy
    networks:
      - scanner-network
    restart: on-failure:5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    command:
      - sh
      - -c
      - while true; do python tools/policy_effectiveness_report_worker_v1.py --once; sleep 300; done
