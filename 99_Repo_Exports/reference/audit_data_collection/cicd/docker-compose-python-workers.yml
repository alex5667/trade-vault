      - ORDERFLOW_SIGNAL_STREAM=signals:orderflow:XAUUSD
      - NOTIFY_SIGNAL_EVERY_N=100
      - SIGNAL_OUTBOX_CLAIM_MIN_IDLE_MS=30000
      - SIGNAL_OUTBOX_CLAIM_COUNT=200
      - SIGNAL_OUTBOX_MSG_LEASE_TTL_MS=90000
      - SIGNAL_TARGET_CB_FAIL_THRESHOLD=5
      - SIGNAL_TARGET_CB_OPEN_SEC=15
      - SIGNAL_OUTBOX_RETRY_SLEEP_SEC=0.25
      - SIGNAL_OUTBOX_RETRY_SLEEP_MAX_SEC=2.0
      - SIGNAL_OUTBOX_CLEANUP_DEAD_CONSUMERS=0
