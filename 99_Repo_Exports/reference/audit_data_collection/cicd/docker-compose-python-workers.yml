  # =============================================================================
  # Stream Archiver - надежное архивирование Redis Streams в PostgreSQL
  # =============================================================================
  # Цель: долгосрочное хранение entry_audit и position events для:
  # - AB-тестирование и winner evaluation
  # - Debugging policy gates
  # - Timeline анализ позиций (trailing moves)
  # - Winrate/ROC статистика
  #
  # Consumer Group pattern:
  # - XREADGROUP + XACK для exactly-once processing
  # - XAUTOCLAIM для recovery pending messages (crash recovery)
  # - DLQ stream для failed messages
  # - Idempotent: ON CONFLICT DO NOTHING по stream_id
  # =============================================================================
  entry-audit-archiver:
    <<: *default-python-worker
    container_name: scanner-entry-audit-archiver
    command:
      - sh
      - -c
      - sleep 30 && python -u services/archivers/stream_archiver.py
    environment:
      # PostgreSQL (precedence: TRADES_DB_DSN > DATABASE_URL > PG_DSN)
      - REDIS_URL=${REDIS_URL:-redis://redis-worker-1:6379/0}
      - TRADES_DB_DSN=${TRADES_DB_DSN:-postgresql://trading:trading_password@postgres:5432/scanner_analytics}
      - DATABASE_URL=${DATABASE_URL:-postgresql://trading:trading_password@postgres:5432/scanner_analytics}
      - PG_DSN=${PG_DSN:-postgresql://trading:trading_password@postgres:5432/trade}
      
      # Stream names
      - TRADE_ENTRY_AUDIT_STREAM=${TRADE_ENTRY_AUDIT_STREAM:-stream:trade:entry_audit}
      - TRADE_EVENTS_STREAM=${TRADE_EVENTS_STREAM:-events:trades}
      
      # Entry audit archiver
      - ENTRY_AUDIT_ARCHIVE_ENABLED=${ENTRY_AUDIT_ARCHIVE_ENABLED:-1}
      - ENTRY_AUDIT_CG=${ENTRY_AUDIT_CG:-entry_audit_archiver}
      - ENTRY_AUDIT_CONSUMER=${ENTRY_AUDIT_CONSUMER:-archiver_1}
      - ENTRY_AUDIT_BATCH=${ENTRY_AUDIT_BATCH:-500}
      - ENTRY_AUDIT_BLOCK_MS=${ENTRY_AUDIT_BLOCK_MS:-2000}
      - ENTRY_AUDIT_MIN_IDLE_MS=${ENTRY_AUDIT_MIN_IDLE_MS:-60000}
      - ENTRY_AUDIT_DLQ_STREAM=${ENTRY_AUDIT_DLQ_STREAM:-stream:dlq:entry_audit}
      
      # Position events archiver
      - POSITION_EVENTS_ARCHIVE_ENABLED=${POSITION_EVENTS_ARCHIVE_ENABLED:-1}
      - POSITION_EVENTS_CG=${POSITION_EVENTS_CG:-position_events_archiver}
      - POSITION_EVENTS_CONSUMER=${POSITION_EVENTS_CONSUMER:-archiver_1}
      - POSITION_EVENTS_BATCH=${POSITION_EVENTS_BATCH:-500}
      - POSITION_EVENTS_BLOCK_MS=${POSITION_EVENTS_BLOCK_MS:-2000}
      - POSITION_EVENTS_MIN_IDLE_MS=${POSITION_EVENTS_MIN_IDLE_MS:-60000}
      - POSITION_EVENTS_DLQ_STREAM=${POSITION_EVENTS_DLQ_STREAM:-stream:dlq:position_events}
      - POSITION_EVENTS_TYPES=${POSITION_EVENTS_TYPES:-TP_HIT,TP1_HIT,TP2_HIT,TP3_HIT,TRAILING_MOVE,TRAILING_STARTED,SL_HIT,SL_ADJUST,POSITION_OPENED,POSITION_CLOSED}
    depends_on:
      redis-worker-1:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - scanner-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M

  # =============================================================================
  # Stream Exporter - fail-safe NDJSON.gz архив на диск
  # =============================================================================
  # Цель: offline replay и долгосрочный архив (независимо от PostgreSQL).
  # Работает через XRANGE (инкрементально), хранит last_id в Redis.
  #
  # Формат файлов: /exports/stream_name/stream_name_YYYYMMDD.ndjson.gz
  # Retention: удаление файлов старше STREAM_EXPORT_KEEP_DAYS дней
  # =============================================================================
  stream-exporter:
    <<: *default-python-worker
    container_name: scanner-stream-exporter
    command:
      - sh
      - -c
      - sleep 10 && python -u tools/stream_exporter.py
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis-worker-1:6379/0}
      
      # Stream names
      - TRADE_ENTRY_AUDIT_STREAM=${TRADE_ENTRY_AUDIT_STREAM:-stream:trade:entry_audit}
      - TRADE_EVENTS_STREAM=${TRADE_EVENTS_STREAM:-events:trades}
      
      # Export settings
      - STREAM_EXPORT_ENABLED=${STREAM_EXPORT_ENABLED:-1}
      - STREAM_EXPORT_DIR=${STREAM_EXPORT_DIR:-/var/log/trade/exports}
      - STREAM_EXPORT_KEEP_DAYS=${STREAM_EXPORT_KEEP_DAYS:-90}
      - STREAM_EXPORT_INTERVAL_SEC=${STREAM_EXPORT_INTERVAL_SEC:-300}
    volumes:
      - ${STREAM_EXPORT_HOST_DIR:-./exports}:/var/log/trade/exports
    networks:
      - scanner-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 64M

