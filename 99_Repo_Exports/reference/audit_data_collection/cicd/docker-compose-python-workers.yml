      # ------------------------
      # --- Calibrator Audit Stream ---
      - EFF_CALIB_MIN_SAMPLES=300
      - CALIB_PERSIST_ENABLE=1
      - CALIB_AUDIT_ENABLE=1
      - CALIB_AUDIT_STREAM=signals:calib:effq
      - CALIB_AUDIT_STREAM_MAXLEN=200000
      # --- Golden Replay Streams ---
      - PUBLISH_OF_INPUTS=1
      - PUBLISH_OF_CONFIRM=1
      # ------------------------
      # --- SRE Metrics for OF Gate (world-class: drift + latency + exec risk) ---
      - OF_GATE_METRICS_STREAM=metrics:of_gate
      - OF_GATE_METRICS_ENABLE=1
      - OF_GATE_METRICS_SAMPLE=0.05
      - OF_GATE_METRICS_MAXLEN=200000
      - OF_GATE_METRICS_SAMPLE_SALT=prod_v1
      # Soft-fail thresholds (analytics: near-miss signals)
      - OF_SOFT_SCORE_MIN=0.60
      - OF_SOFT_EXEC_RISK_NORM_MAX=0.65
      # ------------------------
      - STOP_ATR_MULT=0.8
      # --- RR-TP & Sizing ---
      # risk_usd = RISK_PERCENT(5%) * ACCOUNT_DEPOSIT_USD(100) = 5 USD
      # margin_max = risk_usd = 5 USD (один источник, без лишних переменных)
      # max_notional = risk_usd * ACCOUNT_LEVERAGE = 5 * 100 = 500 USDT
      # max_qty = max_notional / entry_price (динамически на каждый сигнал)
      - RISK_USD_PER_TRADE=0
      - RISK_MAX_QTY=0.5
      - RISK_MIN_NOTIONAL_USD=5
      - TP_MODE_BTCUSDT=RR
      - TP_MODE_ETHUSDT=RR
      - TP_RR=0.7,1.3,2.0
      # ----------------------
      - STOP_PCT=0.2
      - STOP_POINTS=1.0
      - TP_MODE=RR
      - TP_ATR_MULTS=0.6,1.0,1.5
      - NOTIFY_STREAM=notify:telegram
      - TRADES_CLOSED_ZSET_INDEX=1
      - ENABLE_CLOSED_ZSET_INDEX=1
