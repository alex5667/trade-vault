      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    command:
      - sh
      - -c
      - sleep 15 && if [ "$$DYNAMIC_SYMBOLS" = "true" ]; then python main_multi_symbol_dynamic.py; else python main_multi_symbol.py;
        fi
  py-obi-service:
    build:
      context: ./py-obi
      dockerfile: Dockerfile.gpu
    container_name: scanner-py-obi
    runtime: nvidia
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8088
      - OBI_WINDOW_LEVELS=5
      - OBI_THRESHOLD=0.25
      - OBI_SUSTAIN_MS=1200
      - RING_SECONDS=600
      - NOTIFY_URL=http://scanner-go-gateway:8090/notify
      - REDIS_HOST=redis-ticks
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis-ticks:6379/0
      - GPU_ENABLED=true
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    depends_on:
      redis:
        condition: service_healthy
      redis-ticks:
        condition: service_healthy
    ports:
      - 8088:8088
    command:
      - sh
      - -c
      - "echo \"\u23F3 \u041E\u0436\u0438\u0434\u0430\u043D\u0438\u0435 \u043F\u043E\u043B\u043D\u043E\u0439 \u0437\u0430\u0433\
        \u0440\u0443\u0437\u043A\u0438 Redis...\"\nsleep 30\necho \"\U0001F680 \u0417\u0430\u043F\u0443\u0441\u043A py-obi \u0441\
        \u0435\u0440\u0432\u0438\u0441\u0430...\"\npython3 book_obi_service.py\n"
    networks:
      - scanner-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
        reservations:
          memory: 256M
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8088/healthz
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  signal-outbox-router:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-signal-outbox-router
