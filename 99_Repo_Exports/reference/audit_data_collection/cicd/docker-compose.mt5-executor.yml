# Docker Compose для MT5 Event Executor
# Использование: docker-compose -f docker-compose.yml -f docker-compose.mt5-executor.yml up -d

services:
  # MT5 Event Executor - Приём событий от MT5 EA
  mt5-event-executor:
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    container_name: scanner-mt5-event-executor
    command: python -m services.mt5_event_executor
    restart: unless-stopped
    networks:
      - scanner-network
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - '8091:8091' # HTTP endpoint для MT5
    environment:
      - REDIS_URL=redis://scanner-redis:6379/0
      - TRADE_EVENTS_STREAM=events:trades
      - SIGNAL_PREFIX=signals
      - TRADE_STATE_PREFIX=trade:state
      - PRICE_TOLERANCE=0.5
      - MT5_EXECUTOR_HOST=0.0.0.0
      - MT5_EXECUTOR_PORT=8091
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1

    volumes:
      - ./python-worker:/app
      - ./common:/app/common

    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import requests; r=requests.get('http://localhost:8091/health', timeout=2); exit(0 if r.ok else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M

    labels:
      - 'com.scanner.service=mt5-event-executor'
      - 'com.scanner.version=1.0.0'
      - 'com.scanner.description=MT5 Events Classification and Execution'

    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

networks:
  scanner-network:
    external: true
