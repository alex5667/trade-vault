services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
    - 0.0.0.0:6379:6379
    volumes:
    - redis-data:/data
    - ./redis-external-access.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes
    networks:
    - scanner-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost -p 6379 --raw ping | grep -q PONG"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 180s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: '4.0'
        reservations:
          memory: 4G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      memlock:
        soft: -1
        hard: -1
    shm_size: 2gb
    sysctls:
      net.core.somaxconn: 65535
  redis-worker-1:
    image: redis:7-alpine
    container_name: redis-worker-1
    expose:
    - '6379'
    volumes:
    - redis-worker-1-data:/data
    - ./redis-worker-stable.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      scanner-network:
        aliases:
        - redis-worker-1
        - scanner-redis-worker-1
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost -p 6379 --raw ping | grep -q PONG"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 14G
          cpus: '2.0'
        reservations:
          memory: 3G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    shm_size: 512mb
    sysctls:
      net.core.somaxconn: 4096
  redis-worker-1b:
    image: redis:7-alpine
    container_name: redis-worker-1b
    expose:
    - '6379'
    volumes:
    - redis-worker-1b-data:/data
    - ./redis-worker-stable.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      scanner-network:
        aliases:
        - redis-worker-1b
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost -p 6379 --raw ping | grep -q PONG"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 5G
          cpus: '2.0'
        reservations:
          memory: 1G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    shm_size: 512mb
    sysctls:
      net.core.somaxconn: 4096
  redis-worker-2:
    image: redis:7-alpine
    container_name: redis-worker-2
    expose:
    - '6379'
    volumes:
    - redis-worker-2-data:/data
    - ./redis-worker-stable.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      scanner-network:
        aliases:
        - redis-worker-2
        - scanner-redis-worker-2
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost -p 6379 --raw ping | grep -q PONG"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 12G
          cpus: '2.0'
        reservations:
          memory: 2G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    shm_size: 512mb
    sysctls:
      net.core.somaxconn: 4096
  redis-worker-2b:
    image: redis:7-alpine
    container_name: redis-worker-2b
    expose:
    - '6379'
    volumes:
    - redis-worker-2b-data:/data
    - ./redis-worker-stable.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      scanner-network:
        aliases:
        - redis-worker-2b
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost -p 6379 --raw ping | grep -q PONG"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 5G
          cpus: '2.0'
        reservations:
          memory: 1G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    shm_size: 512mb
    sysctls:
      net.core.somaxconn: 4096
  redis-ticks:
    image: redis:7-alpine
    container_name: redis-ticks
    expose:
    - '6379'
    volumes:
    - redis-ticks-data:/data
    - ./redis-ticks.conf:/usr/local/etc/redis/redis.conf
    command: 'redis-server /usr/local/etc/redis/redis.conf --maxmemory 16gb --maxmemory-policy allkeys-lru

      '
    networks:
      scanner-network:
        aliases:
        - redis-ticks
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost -p 6379 --raw ping 2>&1 | grep -qE 'PONG|LOADING'"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: '3.0'
        reservations:
          memory: 2G
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    shm_size: 1gb
    sysctls:
      net.core.somaxconn: 8192
  postgres:
    image: timescale/timescaledb-ha:pg15.15-ts2.24.0
    container_name: scanner-postgres
    environment:
    - POSTGRES_USER=postgres
    - POSTGRES_PASSWORD=12345
    - POSTGRES_DB=trade
    - POSTGRES_PORT=5432
    ports:
    - 5434:5432
    volumes:
    - postgres-data:/home/postgres/pgdata/data
    - ./init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
    - ./postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
    - scanner-network
    restart: unless-stopped
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres -d trade
      interval: 10s
      timeout: 5s
      retries: 5

  metrics-proxy:
    image: nginx:1.27-alpine
    container_name: metrics-proxy
    restart: unless-stopped
    volumes:
      - ./metrics-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "192.168.0.168:9200:9200"
    networks:
      - scanner-network

  monitoring-smoke-exporter:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-monitoring-smoke-exporter
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - MONITORING_SMOKE_METRICS_KEY=metrics:monitoring_smoke:last
      - MONITORING_SMOKE_EXPORTER_PORT=9814
      - PYTHONPATH=.:/app
    volumes:
      - ./python-worker:/app
    command: ["python", "-m", "ml_analysis.tools.monitoring_smoke_exporter_v1"]
    ports:
      - "9814:9814"
    networks:
      - scanner-network

  # ============================================================================
  # Redis Exporters — oliver006/redis_exporter per redis-worker instance
  # Docs: https://github.com/oliver006/redis_exporter
  # ============================================================================
  redis-exporter-worker-1:
    image: oliver006/redis_exporter:v1.66.0
    container_name: redis-exporter-worker-1
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis-worker-1:6379
      - REDIS_EXPORTER_LOG_FORMAT=txt
    expose:
      - "9121"
    depends_on:
      redis-worker-1:
        condition: service_healthy
    networks:
      - scanner-network

  redis-exporter-worker-2:
    image: oliver006/redis_exporter:v1.66.0
    container_name: redis-exporter-worker-2
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis-worker-2:6379
      - REDIS_EXPORTER_LOG_FORMAT=txt
    expose:
      - "9121"
    depends_on:
      redis-worker-2:
        condition: service_healthy
    networks:
      - scanner-network

  redis-exporter-worker-1b:
    image: oliver006/redis_exporter:v1.66.0
    container_name: redis-exporter-worker-1b
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis-worker-1b:6379
      - REDIS_EXPORTER_LOG_FORMAT=txt
    expose:
      - "9121"
    depends_on:
      redis-worker-1b:
        condition: service_healthy
    networks:
      - scanner-network

  redis-exporter-worker-2b:
    image: oliver006/redis_exporter:v1.66.0
    container_name: redis-exporter-worker-2b
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis-worker-2b:6379
      - REDIS_EXPORTER_LOG_FORMAT=txt
    expose:
      - "9121"
    depends_on:
      redis-worker-2b:
        condition: service_healthy
    networks:
      - scanner-network

networks:
  scanner-network:
    external: true

volumes:
  redis-data:
  redis-worker-1-data:
  redis-worker-1b-data:
  redis-worker-2-data:
  redis-worker-2b-data:
  redis-ticks-data:
  postgres-data:
