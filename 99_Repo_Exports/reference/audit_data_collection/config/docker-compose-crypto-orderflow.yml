    build: *id001
    command: ["python", "-m", "services.of_confirm_service"]
    environment:
      CONFIDENCE_EVIDENCE_ENABLE: "1"
      # Split streams configuration for microbar consumption
      MICROBAR_SPLIT_STREAMS_ENABLE: ${MICROBAR_SPLIT_STREAMS_ENABLE:-1}
      MICROBAR_LEGACY_STREAM: ${MICROBAR_LEGACY_STREAM:-events:microbar_closed}
      MICROBAR_PER_SYMBOL_STREAM_TEMPLATE: ${MICROBAR_PER_SYMBOL_STREAM_TEMPLATE:-events:microbar_closed:{sym}}
      MICROBAR_SYMBOLS_SET: ${MICROBAR_SYMBOLS_SET:-events:microbar_closed:symbols}
      # Enable microbar consumption in of_confirm_service (integrated in _consume_ticks loop)
      # Required: MICROBAR_SPLIT_STREAMS_ENABLE=1 and OF_CONFIRM_BARS_ENABLE=1
      OF_CONFIRM_BARS_ENABLE: ${OF_CONFIRM_BARS_ENABLE:-1}
      OF_CONFIRM_BARS_REFRESH_SEC: ${OF_CONFIRM_BARS_REFRESH_SEC:-30}
      OF_CONFIRM_BARS_MAX_STREAMS: ${OF_CONFIRM_BARS_MAX_STREAMS:-200}
      OF_CONFIRM_BARS_BATCH: ${OF_CONFIRM_BARS_BATCH:-200}
