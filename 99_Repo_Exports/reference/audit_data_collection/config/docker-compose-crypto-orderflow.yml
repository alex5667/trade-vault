      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - NOTIFY_TELEGRAM_STREAM=notify:telegram
      # A8 Observability Smoke Checks
      - ENABLE_A8_NEW_FEATURES_SMOKE=1
      - A8_SMOKE_RECENT_S=600
      - A8_SMOKE_NAN_RATE_MAX=0.01
      - A8_SMOKE_RV_MIN_READY=40
      - A8_SMOKE_RV_EPS_BPS=1e-6
      - A8_SMOKE_RV_NEVER_READY_MIN_RECENT=200
