      - ENABLE_OF_GATE_DLQ_AUTO_REPLAY_TIMER=${ENABLE_OF_GATE_DLQ_AUTO_REPLAY_TIMER:-1}
      - OF_GATE_DLQ_AUTO_REPLAY_COMMIT=${OF_GATE_DLQ_AUTO_REPLAY_COMMIT:-0}
      - ENABLE_OF_INPUTS_DLQ_AUTO_REPLAY=1
      - ENABLE_OF_INPUTS_DLQ_DB_ARCHIVE_P98=1
      - OF_INPUTS_DLQ_AUTO_REPLAY_COMMIT=1
      - CANARY_SYMBOLS=${CANARY_SYMBOLS:-BTCUSDT,ETHUSDT}
      - "CFG_HASH_PREFIX=config:orderflow:"
      - CFG_DRIFT_STATE_KEY=sre:cfg:last_snapshot
      - BASELINE_INPUTS=${BASELINE_INPUTS:-/var/lib/trade/of_reports/baselines/inputs_canary.ndjson}
      - BASELINE_OUTPUT=${BASELINE_OUTPUT:-/var/lib/trade/of_reports/baselines/baseline.ndjson}
      - OUT_DIR=/var/lib/trade/of_reports/out
      - LAT_P99_US_MAX=${LAT_P99_US_MAX:-3000}
      - THROUGHPUT_MIN=${THROUGHPUT_MIN:-2000}
      - REGRESS_MAX_MISMATCHES=${REGRESS_MAX_MISMATCHES:-0}
      - REGRESS_FAIL_DISABLE_ENFORCE=${REGRESS_FAIL_DISABLE_ENFORCE:-1}
      - REGRESS_TARGET_SYMBOLS=${REGRESS_TARGET_SYMBOLS:-BTCUSDT,ETHUSDT}
      - RECS_HMAC_SECRET=${RECS_HMAC_SECRET:-CHANGE_ME_LONG_RANDOM}
      - RECS_TTL_SEC=${RECS_TTL_SEC:-86400}
      - ML_CONFIRM_MODE=OFF
      - ML_CONFIRM_METRICS_MAXLEN=200000    # P1: буфер 200k для archiver
      - OFC_CAPTURE=${OFC_CAPTURE:-/tmp/ofc_capture.ndjson}
      - OFC_GOLDEN=${OFC_GOLDEN:-/tmp/ofc_golden.ndjson}
      - OFC_VALIDATE_STRICT=${OFC_VALIDATE_STRICT:-1}
      - OFC_REPLAY_STRICT=${OFC_REPLAY_STRICT:-1}
      - OFC_REPLAY_MAX_ROWS=${OFC_REPLAY_MAX_ROWS:-0}
      - DYN_CFG_KEY=settings:dynamic_cfg
      - CRYPTO_NOTIFY_STREAM=notify:telegram
      - ALERTS_GLOB=/app/alerts_source/prometheus_alerts_*.yml
      - ENABLE_META_COV_QUARANTINE_MONITOR=1
      - META_COV_QUAR_NOTIFY_COOLDOWN_SEC=3600
      - ENABLE_META_COV_OPS_BUNDLE=0
      - ENABLE_META_COV_OUTCOME_AUTO_APPLY=0
      - ENABLE_META_COV_OUTCOME_GUARD=0
      - META_COV_OPS_APPLY=0
      - ENABLE_META_AB_V2_NIGHTLY=1
      - META_AB_V2_NIGHTLY_TIMEOUT_S=2100
      - ENABLE_CONFIRMATIONS_COVERAGE_NIGHTLY=1
      # OF Gate contract smoke-check (hourly :08) — exit=2 sends alert
      # Set ENABLE_OF_GATE_CONTRACT_SMOKE=0 for emergency rollback without code change
      - OF_GATE_METRICS_ENABLE=${OF_GATE_METRICS_ENABLE:-1}
      - ML_FEATURE_SCHEMA_VER=v4_of
      - ENABLE_OF_GATE_CONTRACT_SMOKE=${ENABLE_OF_GATE_CONTRACT_SMOKE:-1}
      - OF_GATE_CONTRACT_SMOKE_MODULE=${OF_GATE_CONTRACT_SMOKE_MODULE:-orderflow_services.of_gate_metrics_contract_check_v1}
      - OF_GATE_CONTRACT_SMOKE_TIMEOUT_S=${OF_GATE_CONTRACT_SMOKE_TIMEOUT_S:-120}
      - OF_GATE_CONTRACT_SMOKE_DRY_RUN=${OF_GATE_CONTRACT_SMOKE_DRY_RUN:-0}
      - OF_GATE_CONTRACT_CHECK_LIMIT=${OF_GATE_CONTRACT_CHECK_LIMIT:-2000}
      - OF_GATE_CONTRACT_BAD_MAX=${OF_GATE_CONTRACT_BAD_MAX:-0.001}
      # Cooldown/dedup — avoids re-sending the same alert within COOLDOWN_S seconds
      - OF_GATE_CONTRACT_SMOKE_COOLDOWN_S=${OF_GATE_CONTRACT_SMOKE_COOLDOWN_S:-21600}
      - OF_GATE_CONTRACT_SMOKE_DEDUP_BUCKET=${OF_GATE_CONTRACT_SMOKE_DEDUP_BUCKET:-0.0001}
      - OF_GATE_CONTRACT_SMOKE_DEDUP_ENABLE=${OF_GATE_CONTRACT_SMOKE_DEDUP_ENABLE:-1}
      - OF_GATE_CONTRACT_SMOKE_DEDUP_PREFIX=${OF_GATE_CONTRACT_SMOKE_DEDUP_PREFIX:-dedup:alert:of_gate_contract:}
      # TOOL_NOTIFY=0: timers worker sends the alert itself (no duplicate from the tool)
      - OF_GATE_CONTRACT_SMOKE_TOOL_NOTIFY=${OF_GATE_CONTRACT_SMOKE_TOOL_NOTIFY:-0}
      # World-practice trackers smoke-check (hourly :11) — exit=2 sends alert
      # Auto-enabled when OF_GATE_METRICS_ENABLE=1. Set ENABLE_WORLD_PRACTICE_SMOKE=0 to disable.
      - ENABLE_WORLD_PRACTICE_SMOKE=${ENABLE_WORLD_PRACTICE_SMOKE:-1}
      - WORLD_PRACTICE_SMOKE_TIMEOUT_S=${WORLD_PRACTICE_SMOKE_TIMEOUT_S:-120}
      - WORLD_PRACTICE_SMOKE_COOLDOWN_S=${WORLD_PRACTICE_SMOKE_COOLDOWN_S:-21600}
      - WORLD_PRACTICE_SMOKE_MODULE=${WORLD_PRACTICE_SMOKE_MODULE:-orderflow_services.world_practice_gauges_smoke_check_v1}
      # Feature Registry: OOF training без feature_cols.json
      # ML_EDGE_STACK_OOF_FEATURE_SCHEMA_VER: если задан, тренируем из Registry (без feature_cols.json)
      # ML_EDGE_STACK_OOF_REQUIRE_REGISTRY=0: soft-fail (fallback на legacy feature_cols.json если нет registry)
      - ML_EDGE_STACK_OOF_FEATURE_SCHEMA_VER=${ML_EDGE_STACK_OOF_FEATURE_SCHEMA_VER:-v3}
      - ML_EDGE_STACK_OOF_REQUIRE_REGISTRY=${ML_EDGE_STACK_OOF_REQUIRE_REGISTRY:-0}
      - ML_EDGE_STACK_OOF_SCENARIO_PREFIX=${ML_EDGE_STACK_OOF_SCENARIO_PREFIX:-bucket:}
      - ML_EDGE_STACK_OOF_INCLUDE_TIME_ONEHOT=${ML_EDGE_STACK_OOF_INCLUDE_TIME_ONEHOT:-1}
      # Опциональный path к dataset report.json (для hash-check feature_cols → column drift alert)
      - ML_EDGE_STACK_OOF_DATASET_REPORT_JSON=${ML_EDGE_STACK_OOF_DATASET_REPORT_JSON:-}
      # P71: Slippage decomposition calibrator + execution-risk layer
      - ENABLE_SLIPPAGE_CALIBRATOR=${ENABLE_SLIPPAGE_CALIBRATOR:-1}
      - SLIPPAGE_DECOMP_ENABLE=${SLIPPAGE_DECOMP_ENABLE:-1}
      - SLIPPAGE_DECOMP_IMPACT_COEFF_BPS=${SLIPPAGE_DECOMP_IMPACT_COEFF_BPS:-8.0}
      - SLIPPAGE_DECOMP_CAP_BPS=${SLIPPAGE_DECOMP_CAP_BPS:-200.0}
      # P1/P2: OF Gate SRE monitor (every 15m at offset :08) → ok_rate/soft_rate/no_data
      # Set ENABLE_OF_GATE_SRE_MONITOR_TIMER=1 to enable; default 0 for safe rollout
      - ENABLE_OF_GATE_SRE_MONITOR_TIMER=${ENABLE_OF_GATE_SRE_MONITOR_TIMER:-0}
      - SRE_OF_GATE_WINDOW_MIN=${SRE_OF_GATE_WINDOW_MIN:-15}
      - SRE_OF_GATE_MIN_N=${SRE_OF_GATE_MIN_N:-200}
      - SRE_OF_GATE_ALWAYS=${SRE_OF_GATE_ALWAYS:-0}
      - SRE_OF_GATE_TIMEOUT_S=${SRE_OF_GATE_TIMEOUT_S:-180}
      # P59: Nightly edge_stack_v1 training bundle (Dataset→Validate→Train→Validate→Promote)
      # EDGE_STACK_BUNDLE_ENABLED=1 disables old 05:00/05:10 fallback steps (no-op guard in worker)
      - EDGE_STACK_BUNDLE_ENABLED=${EDGE_STACK_BUNDLE_ENABLED:-1}
      # EDGE_STACK_AUTO_PROMOTE=0 safe default: produces candidate only, never auto-promotes champion
      # Set to 1 only after 2-3 nights of stable metrics (brier/ECE within thresholds)
      - EDGE_STACK_AUTO_PROMOTE=${EDGE_STACK_AUTO_PROMOTE:-0}
      - EDGE_STACK_V1_DIR=${EDGE_STACK_V1_DIR:-/var/lib/trade/ml_models/edge_stack_v1}
      - EDGE_STACK_WINDOW_HOURS=${EDGE_STACK_WINDOW_HOURS:-72}
      # Dataset guardrails (fail_validate if violated)
      - EDGE_STACK_MIN_JOINED=${EDGE_STACK_MIN_JOINED:-2000}
      - EDGE_STACK_POS_RATE_MIN=${EDGE_STACK_POS_RATE_MIN:-0.05}
      - EDGE_STACK_POS_RATE_MAX=${EDGE_STACK_POS_RATE_MAX:-0.60}
      # Train validation guardrails → also used by Prometheus alerts
      - EDGE_STACK_PROMOTE_BRIER_MAX=${EDGE_STACK_PROMOTE_BRIER_MAX:-0.30}
      - EDGE_STACK_PROMOTE_ECE_MAX=${EDGE_STACK_PROMOTE_ECE_MAX:-0.08}
      - EDGE_STACK_SCENARIO_PREFIX=${EDGE_STACK_SCENARIO_PREFIX:-bucket:}
      - EDGE_STACK_INCLUDE_TIME_ONEHOT=${EDGE_STACK_INCLUDE_TIME_ONEHOT:-1}
      # Redis key for metrics hash (read by edge-stack-train-exporter)
      - EDGE_STACK_TRAIN_METRICS_KEY=${EDGE_STACK_TRAIN_METRICS_KEY:-metrics:edge_stack_train:last}
      # P60: Shadow eval guard thresholds (used by tools.edge_stack_shadow_eval_bundle_v1)
      # Candidate Brier must be ≤ champion * MAX_BRIER_REL (1.02 = max 2% regression)
      - EDGE_STACK_PROMOTE_MAX_BRIER_REL=${EDGE_STACK_PROMOTE_MAX_BRIER_REL:-1.02}
      # Absolute ECE difference limit between candidate and champion
      - EDGE_STACK_PROMOTE_MAX_ECE_ABS_DIFF=${EDGE_STACK_PROMOTE_MAX_ECE_ABS_DIFF:-0.005}
      # Candidate must >= champion precision@top5% + this delta (0 = no requirement)
      - EDGE_STACK_PROMOTE_MIN_PREC_DELTA=${EDGE_STACK_PROMOTE_MIN_PREC_DELTA:-0.0}
      # Redis key for shadow eval metrics hash (read by edge-stack-shadow-exporter)
      - EDGE_STACK_SHADOW_METRICS_KEY=${EDGE_STACK_SHADOW_METRICS_KEY:-metrics:edge_stack_shadow:last}
      # P60: Redis keys for champion/candidate cfgs (consumed by shadow eval bundle)
      - EDGE_STACK_CHAMPION_KEY=${EDGE_STACK_CHAMPION_KEY:-cfg:ml_confirm:edge_stack_v1:champion}
      - EDGE_STACK_CANDIDATE_KEY=${EDGE_STACK_CANDIDATE_KEY:-cfg:ml_confirm:edge_stack_v1:candidate}
      # Auto-init fix: p_min default for edge_stack_v1 auto-generated cfg
      - EDGE_STACK_P_MIN_DEFAULT=${EDGE_STACK_P_MIN_DEFAULT:-0.55}
      - EDGE_STACK_HARD_P_MIN_FLOOR=${EDGE_STACK_HARD_P_MIN_FLOOR:-0.0}
      # P78: Nightly OF-gate rollups refresh (Timescale CAGG refresh for ok_rate history)
      # Set ENABLE_OF_GATE_ROLLUPS_REFRESH_NIGHTLY=1 to activate; default 0 for safe rollout.
      # Safe window is in UTC; must have DB access (TRADES_DB_DSN).
      - ENABLE_OF_GATE_ROLLUPS_REFRESH_NIGHTLY=${ENABLE_OF_GATE_ROLLUPS_REFRESH_NIGHTLY:-1}
      - OF_GATE_ROLLUPS_REFRESH_DAYS=${OF_GATE_ROLLUPS_REFRESH_DAYS:-30}
      - OF_GATE_ROLLUPS_REFRESH_TIMEOUT_S=${OF_GATE_ROLLUPS_REFRESH_TIMEOUT_S:-1800}
      - OF_GATE_ROLLUPS_REFRESH_SAFE_START_UTC=${OF_GATE_ROLLUPS_REFRESH_SAFE_START_UTC:-02:30}
      - OF_GATE_ROLLUPS_REFRESH_SAFE_END_UTC=${OF_GATE_ROLLUPS_REFRESH_SAFE_END_UTC:-05:30}
      # P-BPG: Nightly enforce bucket promoter (06:10 UTC, after slippage calibrator)
      # Reads v_exec_slippage_eval (DB) + metrics:of_gate (Redis) and proposes allowlist expansion.
      # ENABLE_ENFORCE_BUCKET_PROMOTER=1 activates; PROMOTE_APPLY=0 = propose-only (safe default).
      - ENABLE_ENFORCE_BUCKET_PROMOTER=${ENABLE_ENFORCE_BUCKET_PROMOTER:-0}
      - ENFORCE_BUCKET_PROMOTER_TIMEOUT_S=${ENFORCE_BUCKET_PROMOTER_TIMEOUT_S:-600}
      - ENABLE_ENFORCE_BUCKET_PREFLIGHT=${ENABLE_ENFORCE_BUCKET_PREFLIGHT:-1}
      - ENFORCE_BUCKET_NOTIFY=${ENFORCE_BUCKET_NOTIFY:-1}
      - ENFORCE_BUCKET_NOTIFY_COOLDOWN_SEC=${ENFORCE_BUCKET_NOTIFY_COOLDOWN_SEC:-1800}
      - ENABLE_ENFORCE_BUCKET_ROLLBACK=${ENABLE_ENFORCE_BUCKET_ROLLBACK:-1}
      - ENFORCE_BUCKET_ROLLBACK_APPLY=${ENFORCE_BUCKET_ROLLBACK_APPLY:-1}
      # PROMOTE_APPLY=0: write proposal:* keys only (no cfg:* override). Set 1 for auto-apply.
      - PROMOTE_APPLY=${PROMOTE_APPLY:-0}
      - PROMOTE_MIN_APPLY_GAP_SEC=${PROMOTE_MIN_APPLY_GAP_SEC:-21600}
      - ENFORCE_BUCKET_PROMOTER_LOCK_KEY=${ENFORCE_BUCKET_PROMOTER_LOCK_KEY:-lock:enforce_bucket_promoter}
      - ENFORCE_BUCKET_PROMOTER_LOCK_TTL_SEC=${ENFORCE_BUCKET_PROMOTER_LOCK_TTL_SEC:-1800}
      - ENFORCE_BUCKET_ROLLBACK_LOCK_KEY=${ENFORCE_BUCKET_ROLLBACK_LOCK_KEY:-lock:enforce_bucket_promoter:rollback}
      - ENFORCE_BUCKET_ROLLBACK_LOCK_TTL_SEC=${ENFORCE_BUCKET_ROLLBACK_LOCK_TTL_SEC:-900}
      - PROMOTE_LOOKBACK_HOURS=${PROMOTE_LOOKBACK_HOURS:-24}
      - PROMOTE_MIN_DB_SAMPLES=${PROMOTE_MIN_DB_SAMPLES:-100}
      - PROMOTE_MAX_P95_RESID_BPS=${PROMOTE_MAX_P95_RESID_BPS:-3.0}
      - PROMOTE_MAX_P99_RESID_BPS=${PROMOTE_MAX_P99_RESID_BPS:-8.0}
      - PROMOTE_MIN_ELIGIBLE=${PROMOTE_MIN_ELIGIBLE:-200}
      - PROMOTE_MIN_OK_SOFT=${PROMOTE_MIN_OK_SOFT:-0.05}
      - PROMOTE_ADD_ORDER=${PROMOTE_ADD_ORDER:-HIGH_VOL,LOW_LIQ}
      - PROMOTE_DEFAULT_BUCKET=${PROMOTE_DEFAULT_BUCKET:-HIGH_VOL_LOW_LIQ}
      - PROMOTE_MAX_SCAN=${PROMOTE_MAX_SCAN:-200000}
      - PROMOTE_PROPOSAL_TTL_SEC=${PROMOTE_PROPOSAL_TTL_SEC:-259200}
      # P80: Per-symbol promotion overrides
      - PROMOTE_SCOPE=${PROMOTE_SCOPE:-per_symbol}
      - PROMOTE_SYMBOLS=${PROMOTE_SYMBOLS:-BTCUSDT,ETHUSDT}
      - PROMOTE_DB_STATS_SOURCE=${PROMOTE_DB_STATS_SOURCE:-mv}
      - PROMOTE_STATS_MV=${PROMOTE_STATS_MV:-mv_exec_slippage_eval_1h_stats}
      # P80: MV Refresher Guard + SLO Freezer
      - ENABLE_EXEC_SLIP_STATS_REFRESHER=${ENABLE_EXEC_SLIP_STATS_REFRESHER:-1}
      - ENABLE_ENFORCE_BUCKET_SLO_FREEZER=${ENABLE_ENFORCE_BUCKET_SLO_FREEZER:-1}
      - ENFORCE_FREEZE_SYMBOLS=${ENFORCE_FREEZE_SYMBOLS:-BTCUSDT,ETHUSDT}
      - ENFORCE_FREEZE_LOOKBACK_H=${ENFORCE_FREEZE_LOOKBACK_H:-4}
      - ENFORCE_FREEZE_MIN_DB_SAMPLES=${ENFORCE_FREEZE_MIN_DB_SAMPLES:-80}
      - ENFORCE_FREEZE_MAX_P95_RESID_BPS=${ENFORCE_FREEZE_MAX_P95_RESID_BPS:-6.0}
      - ENFORCE_FREEZE_MAX_P99_RESID_BPS=${ENFORCE_FREEZE_MAX_P99_RESID_BPS:-15.0}
      - ENFORCE_FREEZE_MAX_EDGE_NEG_SHARE=${ENFORCE_FREEZE_MAX_EDGE_NEG_SHARE:-0.40}
      # P80: OF-gate rollups freshness probe (hourly :52, writes to Redis hash for exporter)
      # Runs automatically if ENABLE_OF_GATE_ROLLUPS_REFRESH_NIGHTLY=1; set explicitly to override.
      - ENABLE_OF_GATE_ROLLUPS_FRESHNESS_PROBE=${ENABLE_OF_GATE_ROLLUPS_FRESHNESS_PROBE:-1}
      - OF_GATE_ROLLUPS_FRESHNESS_TIMEOUT_S=${OF_GATE_ROLLUPS_FRESHNESS_TIMEOUT_S:-60}
      - OF_GATE_ROLLUPS_FRESHNESS_METRICS_KEY=${OF_GATE_ROLLUPS_FRESHNESS_METRICS_KEY:-metrics:of_gate_rollups_freshness}

      # P102: Feature Denylist Autogen
      - ENABLE_FEATURE_DENYLIST_PROPOSAL=${ENABLE_FEATURE_DENYLIST_PROPOSAL:-1}
      - FEATURE_SELECTION_RUN_DIR=${FEATURE_SELECTION_RUN_DIR:-/var/lib/trade/feature_selection}

      # P104: Feature Denylist Proposal Exporter (hourly :46, node_exporter textfile collector)
      # Writes feature_denylist_proposals_total / oldest_pending_age_seconds / ab_runner_* gauges.
      # Set ENABLE_FEATURE_DENYLIST_EXPORTER=1 to activate (default: 0 for staged rollout).
      # FEATURE_DENYLIST_EXPORT_PATH must be writable by the container and scraped by node_exporter.
      - ENABLE_FEATURE_DENYLIST_EXPORTER=${ENABLE_FEATURE_DENYLIST_EXPORTER:-1}
      - FEATURE_DENYLIST_EXPORT_PATH=${FEATURE_DENYLIST_EXPORT_PATH:-/var/lib/node_exporter/textfile_collector/feature_denylist.prom}
      - FEATURE_DENYLIST_EXPORTER_MODULE=${FEATURE_DENYLIST_EXPORTER_MODULE:-ml_analysis.tools.feature_denylist_proposal_exporter_v1}
      - FEATURE_DENYLIST_EXPORTER_TIMEOUT_S=${FEATURE_DENYLIST_EXPORTER_TIMEOUT_S:-30}

      # P81: OF-gate timescale policy probe (hourly :37, writes to Redis hash for exporter)
      # set ENABLE_OF_GATE_TIMESCALE_POLICY_PROBE=1 to activate
      - ENABLE_OF_GATE_TIMESCALE_POLICY_PROBE=${ENABLE_OF_GATE_TIMESCALE_POLICY_PROBE:-1}

      # Lock key shared with nightly refresh (prevents concurrent multi-container runs)
      - OF_GATE_ROLLUPS_REFRESH_LOCK_KEY=${OF_GATE_ROLLUPS_REFRESH_LOCK_KEY:-lock:of_gate_rollups_refresh}
      # DB DSN required by freshness probe + rollups refresh (TimescaleDB)
      - TRADES_DB_DSN=${TRADES_DB_DSN:-postgresql://trading:trading_password@postgres:5432/scanner_analytics}

      # P83: Nightly OF-gate DLQ archive to DB
      # Set ENABLE_OF_GATE_DLQ_DB_ARCHIVE_NIGHTLY=1 to activate
      - ENABLE_OF_GATE_DLQ_DB_ARCHIVE_NIGHTLY=${ENABLE_OF_GATE_DLQ_DB_ARCHIVE_NIGHTLY:-1}
      - OF_GATE_DLQ_DB_ARCHIVE_TIMEOUT_S=${OF_GATE_DLQ_DB_ARCHIVE_TIMEOUT_S:-1800}
      - OF_GATE_DLQ_DB_ARCHIVE_STREAMS=${OF_GATE_DLQ_DB_ARCHIVE_STREAMS:-stream:dlq:of_gate_metrics,stream:dlq:of_gate_quarantine}
      - OF_GATE_DLQ_DB_ARCHIVE_SAFE_START_UTC=${OF_GATE_DLQ_DB_ARCHIVE_SAFE_START_UTC:-02:30}
      - OF_GATE_DLQ_DB_ARCHIVE_SAFE_END_UTC=${OF_GATE_DLQ_DB_ARCHIVE_SAFE_END_UTC:-05:30}

      # P85: Monitoring Smoke Tests (nightly) + Auto Promote Gate
      - ENABLE_MONITORING_SMOKE_NIGHTLY=${ENABLE_MONITORING_SMOKE_NIGHTLY:-1}
      - MONITORING_SMOKE_TIMEOUT_S=${MONITORING_SMOKE_TIMEOUT_S:-240}
      - MONITORING_SMOKE_FAIL_MODE=${MONITORING_SMOKE_FAIL_MODE:-fail_closed}
      - MONITORING_SMOKE_MAX_AGE_S=${MONITORING_SMOKE_MAX_AGE_S:-21600}
      - MONITORING_SMOKE_METRICS_KEY=${MONITORING_SMOKE_METRICS_KEY:-metrics:monitoring_smoke:last}

      # P107/P109: OFInputs exporters smoke-check (hourly :14)
      # Checks HTTP /metrics of all of-inputs exporters; on failure sets a global fail-closed
      # auto-apply block in Redis (cleared automatically on recovery, owner-safe).
      # ENABLE_OF_INPUTS_EXPORTERS_SMOKE_P107=0 disables entirely (for emergency rollback).
      - ENABLE_OF_INPUTS_EXPORTERS_SMOKE_P107=${ENABLE_OF_INPUTS_EXPORTERS_SMOKE_P107:-1}
      - OF_INPUTS_EXPORTERS_SMOKE_TIMEOUT_S=${OF_INPUTS_EXPORTERS_SMOKE_TIMEOUT_S:-30}
      - OF_INPUTS_EXPORTERS_SMOKE_COOLDOWN_S=${OF_INPUTS_EXPORTERS_SMOKE_COOLDOWN_S:-21600}
      - OF_INPUTS_EXPORTERS_SMOKE_MODULE=${OF_INPUTS_EXPORTERS_SMOKE_MODULE:-orderflow_services.of_inputs_exporters_smoke_p107}
      # Fail-closed block controls (P109)
      - OF_INPUTS_EXPORTERS_SMOKE_BLOCK_AUTO_APPLY=${OF_INPUTS_EXPORTERS_SMOKE_BLOCK_AUTO_APPLY:-1}
      - OF_INPUTS_EXPORTERS_SMOKE_BLOCK_REASON=${OF_INPUTS_EXPORTERS_SMOKE_BLOCK_REASON:-of_inputs_exporters_smoke}
      - OF_INPUTS_EXPORTERS_SMOKE_BLOCK_TTL_S=${OF_INPUTS_EXPORTERS_SMOKE_BLOCK_TTL_S:-21600}

      # P111: OF-Gate exporters wiring smoke-check (hourly :14)
      # Checks HTTP /metrics of all of-gate exporters; on failure sets a global fail-closed
      # auto-apply block in Redis (cleared automatically on recovery, owner-safe).
      - ENABLE_OF_GATE_EXPORTERS_SMOKE_P111=${ENABLE_OF_GATE_EXPORTERS_SMOKE_P111:-1}
      - OF_GATE_EXPORTERS_SMOKE_TIMEOUT_S=${OF_GATE_EXPORTERS_SMOKE_TIMEOUT_S:-30}
      - OF_GATE_EXPORTERS_SMOKE_COOLDOWN_S=${OF_GATE_EXPORTERS_SMOKE_COOLDOWN_S:-21600}
      - OF_GATE_EXPORTERS_SMOKE_MODULE=${OF_GATE_EXPORTERS_SMOKE_MODULE:-orderflow_services.of_gate_exporters_smoke_p111}
      # Fail-closed block controls
      - OF_GATE_EXPORTERS_SMOKE_BLOCK_AUTO_APPLY=${OF_GATE_EXPORTERS_SMOKE_BLOCK_AUTO_APPLY:-1}
      - OF_GATE_EXPORTERS_SMOKE_BLOCK_REASON=${OF_GATE_EXPORTERS_SMOKE_BLOCK_REASON:-of_gate_exporters_smoke}
      - OF_GATE_EXPORTERS_SMOKE_BLOCK_TTL_S=${OF_GATE_EXPORTERS_SMOKE_BLOCK_TTL_S:-21600}

    depends_on: *id003
    networks: *id004
    volumes:
      - ./python-worker:/app
      - ./ml_analysis:/app/ml_analysis:ro
      - ./ok_rate_logic:/app/alerts_source:ro
      - /tmp:/tmp
      - /var/lib/trade/of_reports:/var/lib/trade/of_reports
      - /var/lib/trade/feature_selection:/var/lib/trade/feature_selection
      # P104: textfile_collector dir for node_exporter (feature_denylist.prom written hourly :46)
      - /var/lib/node_exporter/textfile_collector:/var/lib/node_exporter/textfile_collector
    working_dir: /app
    command: >
      sh -c "sleep 30 && python3 -m services.of_timers_worker"
    profiles: ["default"]

  # P76 — OF gate contract smoke-check Prometheus exporter (:9148)
  # Reads sre:of_gate_contract_smoke (written hourly by of-timers-worker at :08)
  # and exposes Prometheus Gauges (bad_share, missing_schema_share, top dq_code, etc.)
  of-gate-contract-smoke-exporter:
    build: *id001
    container_name: scanner-of-gate-smoke-exporter
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - OF_GATE_CONTRACT_SMOKE_OUT_STREAM=${OF_GATE_CONTRACT_SMOKE_OUT_STREAM:-sre:of_gate_contract_smoke}
      - OF_GATE_CONTRACT_SMOKE_EXPORTER_PORT=${OF_GATE_CONTRACT_SMOKE_EXPORTER_PORT:-9148}
      # Poll interval for reading the summary stream (default 15s)
      - OF_GATE_CONTRACT_SMOKE_EXPORTER_INTERVAL_SEC=${OF_GATE_CONTRACT_SMOKE_EXPORTER_INTERVAL_SEC:-15}
      - PYTHONUNBUFFERED=1
    depends_on: *id003
    networks: *id004
    volumes:
      - ./python-worker:/app
    working_dir: /app
    ports:
      - "9148:9148"
    command: ["python3", "-m", "orderflow_services.of_gate_contract_smoke_exporter_v1"]
    profiles: ["default"]

  # Meta coverage rollout exporter (P35/P37)
  meta-cov-rollout-exporter:
    build: *id001
    container_name: scanner-meta-cov-rollout-exporter
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - META_ENFORCE_KEY=cfg2:meta_enforce
      - META_COV_QUARANTINE_KEY=cfg2:meta_cov_quarantine
      - META_COV_OPS_STATE_KEY=cfg2:meta_cov_ops_state
      - OPS_STREAM_META_COV=ops:meta_cov_ops
      - META_COV_SOURCE_WINDOW_SEC=3600   # P1: ограничиваем окно XREVRANGE (было ∞)
      - META_COV_READ_COUNT=5000           # P1: было 50000 → снижаем нагрузку на Redis
    depends_on: *id003
    networks: *id004
    volumes:
      - ./python-worker:/app
    working_dir: /app
    ports:
      - '9623:9623'
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'    # P1: был без лимита → XREVRANGE блокировал Redis 6-7ms
        reservations:
          memory: 64M
    command: >
      sh -c "python3 orderflow_services/meta_cov_rollout_exporter_v1.py --port 9623"
    profiles: ["default"]

  # Note: edge-stack-shadow-exporter (port 8013) and edge-stack-train-exporter (port 9813)
  # have been removed from here because they are duplicates of the 
  # -p60 and -p59 exporters defined in docker-compose-timers.yml

  archiver-signals-1:
    build: *id001
    runtime: nvidia
    container_name: scanner-archiver-signals-1
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - TRADES_DB_DSN=postgresql://trading:trading_password@postgres:5432/scanner_analytics
      - ENTRY_AUDIT_ARCHIVE_ENABLED=0
      - POSITION_EVENTS_ARCHIVE_ENABLED=0
      - CONFIDENCE_SCORES_ARCHIVE_ENABLED=1
      - CONF_SCORES_BATCH=5000
      - CONF_SCORES_AUTO_MIGRATE=1
      # P71: trades:closed archival for slippage decomp / edge-minus-slip analysis
      # Set to 1 once trades_closed table is provisioned (DDL auto-runs on first start)
      - TRADES_CLOSED_ARCHIVE_ENABLED=${TRADES_CLOSED_ARCHIVE_ENABLED:-0}
      - TRADES_CLOSED_AUTO_MIGRATE=${TRADES_CLOSED_AUTO_MIGRATE:-1}
      - TRADES_CLOSED_STREAM=${TRADES_CLOSED_STREAM:-trades:closed}
      # P3: of_gate_metrics archival → per-tick rows (ok/ok_soft/symbol/scenario_v4/reason_code)
      # Set OF_GATE_METRICS_ARCHIVE_ENABLED=1 to enable (DDL auto-runs on first start)
      - OF_GATE_METRICS_ARCHIVE_ENABLED=${OF_GATE_METRICS_ARCHIVE_ENABLED:-1}
      - OF_GATE_METRICS_AUTO_MIGRATE=${OF_GATE_METRICS_AUTO_MIGRATE:-1}
      - OF_GATE_METRICS_ROLLUPS_AUTO_MIGRATE=${OF_GATE_METRICS_ROLLUPS_AUTO_MIGRATE:-0}
      - OF_GATE_METRICS_STREAM=${OF_GATE_METRICS_STREAM:-metrics:of_gate}
      - OF_GATE_METRICS_CG=${OF_GATE_METRICS_CG:-of_gate_metrics_archiver}
      - OF_GATE_METRICS_CONSUMER=${OF_GATE_METRICS_CONSUMER:-archiver_of_gate_1}
      - OF_GATE_METRICS_BATCH=${OF_GATE_METRICS_BATCH:-5000}
      - OF_GATE_METRICS_BLOCK_MS=${OF_GATE_METRICS_BLOCK_MS:-1000}
      - OF_GATE_METRICS_MIN_IDLE_MS=${OF_GATE_METRICS_MIN_IDLE_MS:-60000}
      - OF_GATE_METRICS_DLQ_STREAM=${OF_GATE_METRICS_DLQ_STREAM:-stream:dlq:of_gate_metrics}
      # P3: quarantine archival → of_gate_metrics_quarantine table (DQ-rejected events)
      # Set OF_GATE_QUARANTINE_ARCHIVE_ENABLED=1 to enable alongside raw metrics archiver
      - OF_GATE_QUARANTINE_ARCHIVE_ENABLED=${OF_GATE_QUARANTINE_ARCHIVE_ENABLED:-1}
      - OF_GATE_QUARANTINE_AUTO_MIGRATE=${OF_GATE_QUARANTINE_AUTO_MIGRATE:-1}
      - OF_GATE_QUARANTINE_STREAM=${OF_GATE_QUARANTINE_STREAM:-quarantine:metrics:of_gate}
      - OF_GATE_QUARANTINE_CG=${OF_GATE_QUARANTINE_CG:-of_gate_quarantine_archiver}
      - OF_GATE_QUARANTINE_CONSUMER=${OF_GATE_QUARANTINE_CONSUMER:-archiver_of_gate_q_1}
      - OF_GATE_QUARANTINE_BATCH=${OF_GATE_QUARANTINE_BATCH:-5000}
      - OF_GATE_QUARANTINE_BLOCK_MS=${OF_GATE_QUARANTINE_BLOCK_MS:-1000}
      - OF_GATE_QUARANTINE_MIN_IDLE_MS=${OF_GATE_QUARANTINE_MIN_IDLE_MS:-60000}
      - OF_GATE_QUARANTINE_DLQ_STREAM=${OF_GATE_QUARANTINE_DLQ_STREAM:-stream:dlq:of_gate_quarantine}
    depends_on: *id003
    networks: *id004
    volumes:
      - ./python-worker:/app
    working_dir: /app
    command: >
      sh -c "sleep 30 && python3 -u services/archivers/stream_archiver.py"
    profiles: ["default"]

  trade-close-joiner:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    runtime: nvidia
    restart: always
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - TRADE_EVENTS_STREAM=events:trades
      - TRADE_EVENTS_GROUP=trade_close_joiner_v1
      - TRADES_CLOSED_STREAM=trades:closed
      - ML_REPLAY_INPUTS_STREAM=ml_replay_inputs_v1
      - CLOSE_WAIT_STREAM=trades:close_wait
      - JOIN_DEDUP_TTL_SEC=604800
      - LABEL_WIN_R_MIN=0.0
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    command: ["python", "-m", "services.orderflow.trade_close_joiner_worker_v1"]
    volumes: *id005
    networks:
      - trade-network
      - scanner-network


  # =====================================================================
  # Prometheus real deploy wiring (patch_prometheus_real_deploy_wiring_v1)
  # Separate from scanner-prometheus (docker-compose-monitoring.yml on port 19090).
  # This instance runs on trade-network and knows all orderflow alert rules.
  # Prometheus (real deploy wiring)
  # -----------------------------

  chatops-telegram-freeze-bot:
    build:
      context: .
      dockerfile: monitoring/chatops/telegram_freeze_bot/Dockerfile
    container_name: chatops-telegram-freeze-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ALLOWED_CHAT_ID=${TELEGRAM_ALLOWED_CHAT_ID:-${TELEGRAM_CHAT_ID:-}}
      - TELEGRAM_ADMIN_USER_IDS=${TELEGRAM_ADMIN_USER_IDS:-}
      - REDIS_URL=${REDIS_URL:-redis://redis-worker-1:6379/0}
      - OPS_EVENT_STREAM=${OPS_EVENT_STREAM:-ops:eventlog}
      - EDGE_STACK_PROMOTE_FREEZE_DURATION_S=${EDGE_STACK_PROMOTE_FREEZE_DURATION_S:-86400}
      - TELEGRAM_BOT_OFFSET_KEY=${TELEGRAM_BOT_OFFSET_KEY:-ops:telegram_freeze_bot:offset}
      - TELEGRAM_BOT_POLL_INTERVAL_S=${TELEGRAM_BOT_POLL_INTERVAL_S:-2.0}
      - TELEGRAM_BOT_LONGPOLL_TIMEOUT_S=${TELEGRAM_BOT_LONGPOLL_TIMEOUT_S:-25}
      - PYTHONPATH=/app/python-worker
    volumes:
      - ./python-worker:/app/python-worker:ro
    networks:
      - trade-network

  # Public reverse proxy (single base URL for phone-friendly links, HTTPS via Let's Encrypt)
  # Set PUBLIC_DOMAIN=your.domain.tld and ensure ports 80/443 are reachable.
  # For local dev you can use PUBLIC_DOMAIN=localhost and CADDY_LOCAL_TLS=1.
  public-proxy:
    image: caddy:2.8.4
    container_name: trade-public-proxy
    restart: unless-stopped
    environment:
      - PUBLIC_DOMAIN=${PUBLIC_DOMAIN:-localhost}
      - CADDY_LOCAL_TLS=${CADDY_LOCAL_TLS:-0}
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"
    volumes:
      - ./monitoring/public_proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - trade-network

  # Blackbox exporter (HTTP checks for Grafana/Runbooks/Alertmanager/Prometheus)
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: trade-blackbox-exporter
    profiles: ["disabled"]
    restart: unless-stopped
    command:
      - "--config.file=/etc/blackbox/blackbox.yml"
    ports:
      - "${BLACKBOX_PORT:-9115}:9115"
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    networks:
      - trade-network

  # Runbooks static web (serves monitoring/runbooks/*.md)
  # Used by alert annotations runbook_url.
  runbooks-web:
    image: nginx:1.27-alpine
    container_name: trade-runbooks-web
    restart: unless-stopped
    ports:
      - "${RUNBOOKS_WEB_PORT:-8082}:8082"
    volumes:
      - ./monitoring/runbooks:/usr/share/nginx/html:ro
      - ./monitoring/runbooks_web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - trade-network

  chatops-metrics-exporter:
    build:
      context: .
      dockerfile: monitoring/chatops/chatops_metrics_exporter/Dockerfile
    container_name: chatops-metrics-exporter
    restart: unless-stopped
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis-worker-1:6379/0}
      - CHATOPS_METRICS_EXPORTER_PORT=${CHATOPS_METRICS_EXPORTER_PORT:-9817}
    ports:
      - "${CHATOPS_METRICS_EXPORTER_PORT:-9817}:9817"
    networks:
      - trade-network

  trade-grafana:
    image: grafana/grafana:11.1.0
    container_name: trade-grafana
    profiles: ["disabled"]
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      # When served behind /grafana via public-proxy:
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-%(protocol)s://%(domain)s/grafana/}
      - GF_SERVER_SERVE_FROM_SUB_PATH=${GRAFANA_SERVE_FROM_SUB_PATH:-true}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - trade-prometheus
    networks:
      - trade-network

  trade-prometheus:
    image: prom/prometheus:v2.54.1
    container_name: trade-prometheus
    profiles: ["disabled"]
    restart: unless-stopped
    environment:
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-https://localhost}
      - PROM_TEMPLATE_PATH=/etc/prometheus/prometheus.yml.tmpl
      - PROM_CONFIG_PATH=/etc/prometheus/prometheus.yml
      # If serving behind proxy prefix, pass extra args here:
      - PROMETHEUS_EXTRA_ARGS=--log.level=warn ${PROMETHEUS_EXTRA_ARGS:-}
    entrypoint: ["/bin/sh", "/etc/prometheus/entrypoint_envsubst.sh"]
    ports:
      # Env-overridable port; defaults to 9090 (distinct from scanner-prometheus on 19090)
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml.tmpl:/etc/prometheus/prometheus.yml.tmpl:ro
      - ./monitoring/prometheus/entrypoint_envsubst.sh:/etc/prometheus/entrypoint_envsubst.sh:ro
      # Load rules from ok_rate_logic/prometheus_alerts_*.yml
      - ./ok_rate_logic:/etc/prometheus/rules/ok_rate_logic:ro
      # Main prometheus config with scrape jobs for P59/P60 + alerting wiring
      - ./orderflow_services:/etc/prometheus/rules/orderflow_services:ro
      # Bybit DQ alerts
      - ./infra/prometheus/rules:/etc/prometheus/rules/bybit_dq:ro
      # Persistent TSDB storage
      - trade_prometheus_data:/prometheus
    networks:
      - trade-network



  # Optional Alertmanager: required for real notifications (Telegram/Email/Slack).
  # Without it Prometheus still shows firing alerts in its UI but won't send them.
  # Config at monitoring/alertmanager/alertmanager.yml has Telegram webhook routing.
  trade-alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: trade-alertmanager
    profiles: ["disabled"]
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      # Full alertmanager config with quiet hours + Telegram webhook routing
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - trade_alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      # When served behind /alertmanager via public-proxy:
      - "--web.external-url=${ALERTMANAGER_EXTERNAL_URL:-}"
      - "--web.route-prefix=${ALERTMANAGER_ROUTE_PREFIX:-/}"
    networks:
      - trade-network

  of-gate-dlq-exporter:
    build: *id001
    runtime: nvidia
    restart: always
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - OF_GATE_DLQ_EXPORTER_PORT=9154
      - OF_GATE_DLQ_EXPORTER_REFRESH_SEC=10
      - OF_GATE_DLQ_STREAMS=stream:dlq:of_gate_metrics,stream:dlq:of_gate_quarantine
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    command: ["python", "-m", "orderflow_services.of_gate_dlq_exporter_v1"]
    ports:
      - "9154:9154"
    networks:
      - trade-network
      - scanner-network
    volumes:
      - ./python-worker:/app

  of-gate-archiver-exporter:
    build: *id001
    container_name: scanner-of-gate-archiver-exporter
    restart: always
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - OF_GATE_ARCHIVER_EXPORTER_PORT=9152
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    command: ["python", "-m", "orderflow_services.of_gate_archiver_exporter_v1"]
    ports:
      - "9152:9152"
    networks:
      - trade-network
      - scanner-network
    volumes:
      - ./python-worker:/app

  # Periodic Reporter Timer: daily bulk report в 17:00 UTC для всех символов
  # Запускает periodic_reporter.main() с main loop (CHECK_INTERVAL=300)
  periodic-reporter-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-periodic-reporter-timer
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - /var/lib/trade:/var/lib/trade
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - CRYPTO_NOTIFY_REDIS_URL=redis://redis-worker-2:6379/0
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      # Main loop: CHECK_INTERVAL=0 → третий механизм (каждые N сек) ВЫКЛЮЧЕН.
      # Работают только hourly (в XX:00) и daily (в 17:00) schedulers через sleep(10) loop.
      - PERIODIC_REPORT_CHECK_INTERVAL_SEC=0
      # Daily bulk report: 17:00 UTC, все символы из stats:symbols
      - DAILY_REPORT_ENABLED=true
      - DAILY_REPORT_UTC_HOUR=17
      - DAILY_REPORT_UTC_MINUTE=0
      - DAILY_REPORT_SYMBOLS=ALL
      - DAILY_REPORT_SOURCE=CryptoOrderFlow
      # Hourly reports
      - HOURLY_REPORT_ENABLED=true
      # Window для hourly отчётов (1 час)
      - PERIODIC_REPORT_WINDOW_SECONDS=3600
      # Включить virtual trades в отчёты (если нет реальных)
      - PERIODIC_REPORT_SEND_VIRTUAL_ONLY=true
      # ZSET index для быстрого поиска сделок
      - PERIODIC_REPORT_USE_ZSET=1
      - REDIS_CLOSED_ZSETS_ENABLED=1
      - REPORT_TRIGGER_COUNT=1000000
      - PG_DSN=postgresql://trading:trading_password@postgres:5432/scanner_analytics
      - TRADES_DB_DSN=postgresql://trading:trading_password@postgres:5432/scanner_analytics
    command: >
      sh -c "sleep 20 && python -m services.periodic_reporter"
    networks:
      - scanner-network

networks:
  scanner-network:
    external: true

  trade-network:
    external: true

volumes:
  # Named volumes for Prometheus + Alertmanager persistence across restarts
  trade_prometheus_data:
  trade_alertmanager_data:
  grafana_data:
  caddy_data:
  caddy_config:
