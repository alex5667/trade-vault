        redis-cli -u redis://redis-worker-1:6379 SADD crypto:symbols:meme3 DOGEUSDT WIFUSDT
        sleep 40 && python services/crypto_orderflow_service.py
    container_name: scanner-crypto-orderflow-meme-3

