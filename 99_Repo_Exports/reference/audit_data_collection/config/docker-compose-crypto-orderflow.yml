  scanner-crypto-orderflow-meme:
    build: *id001
    environment:
      - CRYPTO_SYMBOLS_SET_KEY=crypto:symbols:meme
      - CRYPTO_DEFAULT_SYMBOLS_ENABLED=0
      - REDIS_URL=redis://redis-worker-1:6379/0
      - REDIS_TICKS_URL=redis://redis-ticks:6379/0
      - ATR_REDIS_URL=redis://redis-worker-2:6379/0
      - CRYPTO_NOTIFY_REDIS_URL=redis://redis-worker-2:6379/0
      - PG_DSN=postgresql://trading:trading_password@postgres:5432/scanner_analytics
      - TRADES_DB_DSN=postgresql://trading:trading_password@postgres:5432/scanner_analytics
      # Meme-specific parameters:
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - PYTHONUNBUFFERED=1
      - TICK_SAMPLE_RATE=${TICK_SAMPLE_RATE:-0.5}    # P1: снижено 1.0→0.5 (защита от meme flash-crash)
      - OUTBOX_STREAM_MAXLEN=10000                    # P1: ограничиваем outbox RAM
    depends_on: *id003
    networks: *id004
    volumes: *id005
    restart: on-failure:5
    deploy: *id006
    # Эксклюзивное прописывание своего сета символов перед стартом: meme = 1000FLOKIUSDT + 1000BONKUSDT
    command:
      - sh
      - -c
      - |
        redis-cli -u redis://redis-worker-1:6379 DEL crypto:symbols:meme
        redis-cli -u redis://redis-worker-1:6379 SADD crypto:symbols:meme 1000FLOKIUSDT 1000BONKUSDT
        sleep 40 && python services/crypto_orderflow_service.py
    container_name: scanner-crypto-orderflow-meme

