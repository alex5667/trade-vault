
services:
  crypto-orderflow-service:
    build: &id001
      context: .
      dockerfile: python-worker/Dockerfile.gpu
#    runtime: nvidia
    environment:
      - LIQMAP_FEATURES_ENABLE=1
      - LIQMAP_SNAPSHOT_KEY_PREFIX=liqmap:snapshot
      # Canonical env vars (patch A1): windows, refresh throttle, fail-open stale
      - LIQMAP_FEATURES_WINDOWS=5m,1h
      - LIQMAP_FEATURES_REFRESH_MS=1500
      - LIQMAP_FEATURES_FAILOPEN_STALE_MS=120000
      # Optional tuning
      - LIQMAP_NEAR_BAND_BPS=20
      - LIQMAP_PEAK_MIN_SHARE=0.05
      - LIQMAP_FEATURE_PEAK_RANGE_BPS=600
      - LIQMAP_FEATURE_FRONT_RUN_BPS=20
      - LIQMAP_FEATURE_SL_BUFFER_BPS=15
      - LIQMAP_SL_WIDEN_CAP=1.25
      - LIQMAP_SL_WIDEN_HARD_VETO=1
      - OMP_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - METRICS_PORT=8001
      - PROMETHEUS_PORT=8001
      - CONFIDENCE_EVIDENCE_ENABLE=1
      # Confidence Calibration A/B
      - CONF_CAL_AB_MODE=${CONF_CAL_AB_MODE:-off}
      - CONF_CAL_AB_SHARE=${CONF_CAL_AB_SHARE:-0.0}
      - CONF_CAL_AB_SHADOW=${CONF_CAL_AB_SHADOW:-false}
      - CONF_CAL_CHALLENGER_BUNDLE_PATH=${CONF_CAL_CHALLENGER_BUNDLE_PATH:-}
      - CONF_CAL_AB_STICKY_KEY=${CONF_CAL_AB_STICKY_KEY:-symbol|session}
      - VETO_TOPN_WINDOW_MS=300000
      - VETO_TOPN_N=5
      - VETO_TOPN_MIN_TOTAL=30
      - VETO_TOPN_ALERT_SHARE=0.50
      - VETO_TOPN_ALERT_COUNT=50
      - VETO_TOPN_COOLDOWN_MS=600000
      - VETO_TOPN_CHANGE_MIN_SHARE=0.35
      - VETO_TOPN_CHANGE_COOLDOWN_MS=900000
      - VETO_TOPN_FAMILY_CHANGE_MIN_SHARE=0.45
      - VETO_TOPN_FAMILY_CHANGE_MIN_DELTA=0.20
      - VETO_TOPN_FAMILY_CHANGE_MIN_TOTAL_DELTA=7
      - VETO_TOPN_FAMILY_CHANGE_MIN_TOTAL_RATIO=1.10
      - VETO_TOPN_FAMILY_CHANGE_COOLDOWN_MS=900000


      - CVD_DIV_PUBLISH=1
      - CVD_SNAPSHOT_ENABLE=1
      # Bias Cascade & Divergence Inference (roi_bias_cascade_div_infer_v2)
      - BIAS_REGIME_ENABLE=1
      - BIAS_RSI_ENABLE=1
      - BIAS_REGIME_TTL_MS=300000
      - BIAS_RSI_TTL_MS=300000
      - BIAS_RSI_HI=60
      - BIAS_RSI_LO=40
      - BIAS_RSI_REQUIRE_SLOPE=0
      - DIV_INFER_ENABLE=1
      - DIV_INFER_MIN_STRENGTH=0.0
      - DIV_INFER_MAX_AGE_MS=180000
      - REASON_MISMATCH_WINDOW_MS=60000

      - REASON_MISMATCH_MIN_EVENTS=50
      - REASON_MISMATCH_RATIO_WARN=0.02
      - REASON_MISMATCH_RATIO_ERROR=0.005
      - REASON_MISMATCH_ALERT_COOLDOWN_MS=30000
      - REASON_LEGACY_ALERT_WINDOW_S=300
      - REASON_LEGACY_ALERT_MIN_EVENTS=50
      - REASON_LEGACY_ALERT_COOLDOWN_S=900
      - DATA_QUALITY_GATE_ENABLED=1
      # --- P2/F: Data Quality Gate (DQ) Policy v2 ----------
      - DQ_GATE_ENABLE=1
      - DQ_GATE_MODE=penalty
      - DQ_MODE=safe
      - DQ_PEN_MAX=0.10
      - DQ_TICK_GAP_MIN_SAMPLES=50
      # -----------------------------------------------------
      - DATA_ATR_STALE_MAX_MS=60000
      - SYMBOLS=BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,SUIUSDT,APTUSDT,ARBUSDT,XAUUSDT
      - REDIS_URL=redis://redis-worker-1:6379/0
      - REDIS_TICKS_URL=redis://redis-ticks:6379/0
      - ATR_SOURCE=redis
      - ATR_TF=1m
      - CRYPTO_OF_REFRESH_SEC=30
      - PERIODIC_REPORT_WINDOW_SECONDS=3600
      - REPORT_TRIGGER_COUNT=1000000
      - ML_REPLAY_CAPTURE_ENABLE=1
      # Periodic reporter: main loop НЕ запускается в crypto_orderflow_service (только в periodic-reporter-timer)
      - PERIODIC_REPORT_CHECK_INTERVAL_SEC=0
      # Событийные hourly/daily отчёты отключены — расписанием управляет periodic-reporter-timer
      - DISABLE_SCHEDULED_REPORTS=true
      - HOURLY_REPORT_ENABLED=false
      # Daily bulk report env (используется только periodic-reporter-timer, здесь для документации)
      - DAILY_REPORT_ENABLED=false
      - DAILY_REPORT_UTC_HOUR=17
      - DAILY_REPORT_UTC_MINUTE=0
      - DAILY_REPORT_SYMBOLS=ALL
      - DAILY_REPORT_SOURCE=CryptoOrderFlow
      - CRYPTO_OF_LOG_LEVEL=INFO
      - DEBUG_VETO=1
      - CRYPTO_OF_DEBUG_DELTAS=true
      - LOG_SAMPLE_DELTA_EVENT_RATE=10000
      - LOG_SAMPLE_LOW_CONF_RATE=10000
      - LOG_SAMPLE_OFI_PUBLISHING_RATE=10000
      - LOG_SAMPLE_OFI_PUBLISHED_RATE=10000
      - LOG_SAMPLE_DN_TIER_VETO_RATE=10000
      - CRYPTO_OF_DEBUG_DELTAS=1
      - DELTA_Z_THRESHOLD=3.0
      - CRYPTO_OF_REQUIRE_STRONG_CONFIRMATION=0
      - CRYPTO_OF_STRONG_GATE_SHADOW=1

      # Taker Flow Gate & Slippage Decomp
      - taker_flow_gate_mode=shadow
      - taker_flow_contra_z_hard=2.5
      - taker_flow_contra_imb_hard=0.25
      - taker_flow_gate_min_abs_rate=2.0
      - slippage_decomp_enable=1
      - slippage_decomp_enforce_max=1
      - slippage_decomp_impact_coeff_bps=10.0
      - regime_slip_factor_high_vol_low_liq=0.70
      - regime_slip_factor_low_liq=0.85
      - regime_slip_factor_high_vol=0.85
      - regime_need_bump_high_vol_low_liq=1
      - regime_enforce_strong_high_vol_low_liq=1

      - OBI_STABLE_SCORE_MIN=0.85
      - WEAK_RECENT_WINDOW=5
      - FP_EDGE_VALID_MS=30000
      - ORDERS_QUEUE=orders:queue
      - CRYPTO_NOTIFY_STREAM=notify:telegram
      # ✅ P0/P1: Performance and reliability improvements
      - CRYPTO_OF_BOOTSTRAP_MAX_CONC=10
      - CRYPTO_OF_ACK_BATCH=200
      - CRYPTO_OF_MAX_LAG_MS=1000
      - REDIS_MAIN_MAX_CONNECTIONS=1000
      - REDIS_TICKS_MAX_CONNECTIONS=1000
      - REDIS_NOTIFY_MAX_CONNECTIONS=10
      # P45 Unified Decision Record
      - DECISION_RECORD_ENABLE=1
      - DECISION_RECORD_EARLY_VETO_ENABLE=1
      - DECISION_RECORD_SAMPLE=1.0
      - DECISION_TTL_SEC=1209600
      - DECISIONS_FINAL_STREAM=decisions:final
      - DECISIONS_FINAL_MAXLEN=200000
      - DECISION_DQ_HEALTH_MIN=0.70
      - CRYPTO_OF_DROP_ON_LAG=true
      - CRYPTO_OF_MAX_TS_SKEW_MS=21600000
      - CRYPTO_OF_PEL_SWEEP=false
      - CRYPTO_OF_PEL_SWEEP_INTERVAL_SEC=10
      - CRYPTO_OF_PEL_MIN_IDLE_MS=60000
      - CRYPTO_OF_PEL_COUNT=200
      - CRYPTO_OF_PEL_QUARANTINE=false
      # PEL Recovery (Expert Recommendations)
      - REDIS_SOCKET_TIMEOUT=15
      - REDIS_SOCKET_CONNECT_TIMEOUT=5
      - REDIS_PEL_RECOVERY_EVERY_SEC=30
      - REDIS_PEL_MIN_IDLE_MS=15000
      - REDIS_PEL_CLAIM_COUNT=100
      - REDIS_PEL_START_ID=0-0
      - REDIS_PEL_CLAIM_MAX_ITERS=2
      - TICK_UID_DEDUPE_CACHE_SIZE=4096
      # Tick Deduplication
      - TICK_DEDUPE_ENABLE=1
      - TICK_DEDUPE_MAX=50000
      - TICK_DEDUP_WINDOW=4096
      # Tick Dedup (in-memory deduper)
      - TICK_DEDUP_ENABLE=1
      - TICK_DEDUP_MAX_ITEMS=20000
      - TICK_DEDUP_MAX_AGE_MS=180000
      # Tick Quarantine (bad schema/time/exception)
      - TICK_QUARANTINE_ENABLE=1
      - TICK_QUARANTINE_STREAM=stream:tick:quarantine
      - TICK_QUARANTINE_MAXLEN=50000
      - TICK_QUARANTINE_SAMPLE_RATE=0.05
      # Tick Time Policy (event-time hygiene before strategy)
      - TICK_TIME_MAX_FUTURE_MS=5000
      - TICK_TIME_MAX_PAST_MS=120000
      - TICK_TIME_MAX_REORDER_MS=1500
      - TICK_TIME_ALLOW_SOFT_REORDER=1
      - TICK_TIME_CLAMP_SOFT_FUTURE=1
      # Tick Time Observability (Prometheus histograms + optional Redis stream for offline quantiles)
      - TICK_TIME_OBSERVE_ENABLE=1
      - TICK_TIME_AGE_CLAMP_MS=120000
      - TICK_TIME_STREAM_ENABLE=0
      - TICK_TIME_STREAM_KEY=metrics:tick_time
      - TICK_TIME_STREAM_SAMPLE=0.01
      - TICK_TIME_STREAM_MAXLEN=200000
      # Bad Time Quarantine Policy (next_step_6_tick_time_policy_enforce_autotune)
      - BAD_TIME_TRIGGER_STREAK=3
      - BAD_TIME_TRIGGER_SCORE=3.0
      - BAD_TIME_HARD_PENALTY=1.0
      - BAD_TIME_SOFT_PENALTY=0.2
      - BAD_TIME_DECAY_PER_OK=0.1
      - BAD_TIME_QUARANTINE_MS=60000
      - BAD_TIME_STATE_FREEZE_MS=15000
      # Tick Side Policy (UNKNOWN side)
      - CRYPTO_OF_UNKNOWN_SIDE_POLICY=ignore_delta
      - TICK_SIDE_QUARANTINE_STREAM=stream:tick_side:quarantine
      - TICK_SIDE_QUARANTINE_MAXLEN=20000
      - TICK_SIDE_QUARANTINE_SAMPLE=0.01
      # Step16: limit cardinality + throttle gauge emission (per label)
      - TICK_QUALITY_SYMBOL_ALLOWLIST=BTCUSDT,ETHUSDT,SOLUSDT
      - TICK_QUALITY_SYMBOL_LABEL_MODE=collapse
      - TICK_QUALITY_EMA_UPDATE_MIN_MS=250
      - TICK_INGEST_LATENCY_SAMPLE=0.1
      - CRYPTO_NOTIFY_REDIS_URL=redis://redis-worker-2:6379/0

      - CRYPTO_RAW_STREAM=signals:crypto:raw
      - ATR_REDIS_URL=redis://redis-worker-2:6379/0
      - REDIS_SAVE_TP_FILLS=1
      - REDIS_CLOSED_ZSETS_ENABLED=1
      - REDIS_LEGACY_CLOSED_LISTS_ENABLED=1
      - TRADES_CLOSED_STREAM_COMPACT=0
      - REDIS_SAVE_SIGNAL_PAYLOAD=0
      - HEALTH_SNAPSHOT_CACHE_TTL_MS=2000
      - CRYPTO_NOTIFY_SIGNAL_EVERY_N=100
      - CRYPTO_SIGNAL_MIN_CONF=${CRYPTO_SIGNAL_MIN_CONF:-55}
      - CRYPTO_PAPER_SHADOW_ENABLED=${CRYPTO_PAPER_SHADOW_ENABLED:-0}
      - BINANCE_VIRTUAL_ORDERS_ENABLED=${BINANCE_VIRTUAL_ORDERS_ENABLED:-0}
      # PAPER_ORDERS_STREAM and PAPER_ORDERS_MAXLEN intentionally omitted — paper shadow is disabled
      - DISABLE_CONFIDENCE_FILTER=false
      - MIN_SIGNAL_CONFIDENCE=70
      - ATR_JUMP_MAX_REL=${ATR_JUMP_MAX_REL:-1.2}
      - MIN_SIGNAL_CONFIDENCE__XAUUSD=20
      - MIN_SIGNAL_CONFIDENCE__XAUUSDT=70
      # Отключение релаксации confidence для мем-коинов (по умолчанию снижается до 30%)
      - CONF_RELAX_DISABLE=true
      # Альтернативно можно установить свой порог релаксации:
      # - CONF_RELAX_MAX=70
      - GOLDEN_PATTERN_MIN_CONFIDENCE=90
      - SIGNAL_METRIC_WEIGHT__DELTA_SPIKE_Z=1.0
      - SIGNAL_METRIC_WEIGHT__OBI=0.7
      - SIGNAL_METRIC_WEIGHT__WEAK_PROGRESS=0.5
      - SIGNAL_METRIC_WEIGHT__ATR_QUANTILE=0.3
      - SCORING_LIQUIDITY_WEIGHT=0.3
      - SCORING_LIQUIDITY_HARD_FLOOR=0.15
      - SCORING_LIQUIDITY_ENABLED=1
      - SCORING_LIQUIDITY_BREAK_FLOOR=0.3
      - SCORING_LIQUIDITY_ABSORPTION_KILL_FLOOR=0.6
      - SCORING_LIQ_BREAK_MAX=0.15
      - SCORING_LIQ_ABSORB_MAX=0.15
      - SCORING_LIQ_NEUTRAL_SPAN=0.05
      - SIGNAL_PATTERN_WEIGHT__BREAKOUT_R1=1.2
      - SIGNAL_PATTERN_WEIGHT__FADE_PDH=1.1
      - SIGNAL_PATTERN_WEIGHT__FADE_HTF_OB=1.3
      - SIGNAL_PATTERN_MIN_CONF__BREAKOUT_R1=85
      - SIGNAL_PATTERN_MIN_CONF__FADE_PDH=80
      - SIGNAL_PATTERN_MIN_CONF__FADE_HTF_OB=88
      - TP1_SHIFT_MULT=1.4
      - SLQ_ENABLE=1
      - SLQ_K=0.7
      - PYTHONPATH=/app
      - ACCOUNT_DEPOSIT_USD=100
      - ACCOUNT_LEVERAGE=100
      - RISK_PERCENT=5.0
      - CRYPTO_COMMISSION_RATE=0.0005
      - TRAILING_TP1_OFFSET_ATR=0.6
      - TRAILING_AFTER_TP1_SOURCES=CryptoOrderFlow
      - TRAILING_TP1_OFFSET_ATR_CRYPTOORDERFLOW=0.5
      - TRAILING_TP1_OFFSET_ATR_ETHUSDT=0.45
      - TM_ORPHAN_TIMEOUT_ENABLED=0
      - PUBLISH_OF_INPUTS=1
      - OF_INPUTS_STREAM=signals:of:inputs
      - OF_INPUTS_STREAM_MAXLEN=5000000
      - OF_INPUTS_PERSIST_ENABLE=1
      - OF_INPUTS_PERSIST_PATH=/var/lib/trade/of_inputs_archive
      - OF_INPUTS_PERSIST_BATCH=1000
      - PUBLISH_OF_CONFIRM=1
      - OF_CONFIRM_STREAM=signals:of:confirm
      - CRYPTO_ATR_BPS_MIN_STATIC=0.0
      - CRYPTO_ATR_GATE_AUDIT_ONLY=false
      - CRYPTO_OF_PUBLISH_CONFIRM=true
      - CRYPTO_OF_CONFIRM_STREAM=signals:of:confirm
      # OFC Capture for golden replay
      - OFC_CAPTURE=1
      - OFC_CAPTURE_EVERY_N=50
      - OFC_CAPTURE_PATH=/tmp/ofc_capture.ndjson
      - OFC_CAPTURE_SNAPSHOT=1
      - OFC_CAPTURE_CANCEL_STATE=0
      # ML Confirm Gate Configuration
      - ML_CONFIRM_MODE=SHADOW
      - ML_CONFIRM_FAIL_POLICY=OPEN
      - ML_CFG_CHAMPION_KEY=cfg:ml_confirm:champion
      - ML_CFG_CHALLENGER_KEY=cfg:ml_confirm:challenger
      - ML_MODEL_CACHE_TTL_MS=60000
      - ML_FEATURE_SCHEMA_VER=v5_of_stable
      - ML_CONFIRM_CHECK_FEATURE_NAMES=1
      # P61: ML Confirm Rollout Configuration
      - ML_CONFIRM_ROLLOUT_MODE=${ML_CONFIRM_ROLLOUT_MODE:-shadow}
      - ML_CONFIRM_CANARY_RATE=${ML_CONFIRM_CANARY_RATE:-0.05}
      - ML_DENY_ALLOW_RULE_STRONG=${ML_DENY_ALLOW_RULE_STRONG:-true}
      - ML_ABSTAIN_ALLOW_RULE_STRONG=${ML_ABSTAIN_ALLOW_RULE_STRONG:-true}
      - ML_CONFIRM_METRICS_MAXLEN=200000    # P1: было hardcode 50000 → +4x буфер для archiver
      # ------------------------------------------------------------------
      # PRE-PUBLISH GATES: Rollout Plan (детерминированная оценка качества сигналов)
      # ------------------------------------------------------------------
      # Этап 1: SHADOW-анализ (только запись в rejected stream, гейты disabled)
      # - Запись veto-сигналов в signals:crypto:rejected для триажа
      # - Метрики pre_publish_veto_total для мониторинга
      # - Гейты отключены (enabled=False) - безопасный старт
      - CRYPTO_REJECTED_SIGNAL_STREAM=signals:crypto:rejected
      - CRYPTO_REJECTED_SIGNAL_MAXLEN=50000
      - PRE_PUBLISH_GATE_MODE=SHADOW
      # P50: Drift Gate (Global market/feature drift check)
      - ENABLE_PP_DRIFT_GATE=1
      - DRIFT_GATE_BLOCK_POLICY=DENY
      - OF_RULE_STRONG_MIN=0.75
      # HardDataQualityGate: отсекает stale L2/touch/ATR, gaps, low depth
      # По умолчанию отключен (0) - безопасный rollout
      - DATA_HARD_GATE_ENABLED=0
      # Этап 2: Включить HardDataQualityGate на 1-2 символа для тестирования
      # Раскомментируйте для включения на конкретных символах:
      # - DATA_HARD_GATE_ENABLED__BTCUSDT=1
      # - DATA_HARD_GATE_ENABLED__ETHUSDT=1
      # Параметры HardDataQualityGate (глобальные, можно переопределить per-symbol):
      - DATA_REQUIRE_EPOCH_TS=0
      - DATA_STRICT_MISSING_ATR_TS=0
      - DATA_STRICT_TOUCH_FRESH=0
      - DATA_VETO_FLAGS=
      # RegimeSessionGate: отсекает по regime/session матрице, spread/depth/burst_flip
      # По умолчанию отключен (0) - постепенное расширение
      - RS_GATE_ENABLED=0
      # Этап 3: Подключить RegimeSessionGate на конкретных символах
      # Раскомментируйте для включения на конкретных символах:
      # - RS_GATE_ENABLED__BTCUSDT=1
      # - RS_GATE_ENABLED__ETHUSDT=1
      # Параметры RegimeSessionGate (глобальные, можно переопределить per-symbol×kind×regime):
      - RS_SPREAD_MAX_BPS_DEFAULT=0.0
      - RS_DEPTH_MIN_DEFAULT=0.0
      - RS_BURST_FLIP_MAX_DEFAULT=0.0
      # Примеры per-symbol×kind конфигурации (раскомментируйте при необходимости):
      # - RS_SPREAD_MAX_BPS__BTCUSDT__breakout=8.0
      # - RS_DEPTH_MIN__BTCUSDT__breakout=0.0
      # - RS_BURST_FLIP_MAX__BTCUSDT__breakout=0.65
      # - RS_DENY__BTCUSDT__breakout__range=1
      # - RS_ALLOW_ONLY_REGIMES__BTCUSDT__breakout=trend,expansion
      - ML_MODEL_FALLBACK_ENABLE=1
      # Confidence Scorer Enhancements (Phases 1-3)
      - ML_SCORING_ENABLE=1
      - SCORER_WEIGHTS_PATH=python-worker/config/suggested_weights.json
      - SCORER_ML_MODEL_PATH=python-worker/ml_models/scorer_model.lgb
      - PG_DSN=postgresql://trading:trading_password@postgres:5432/scanner_analytics
      - TRADES_DB_DSN=postgresql://trading:trading_password@postgres:5432/scanner_analytics
      # XAUUSDT Specific Overrides (Fix for ATR Gate & Cooldown)
      - XAU_ATR_GATE_AUDIT_ONLY=false
      - XAU_EXEC_RISK_REF_BPS=8.0
      - XAU_MIN_SIGNAL_INTERVAL=12
      - XAU_REQUIRE_STRONG_CONFIRMATION=0
      - XAU_STRONG_GATE_SHADOW=1
      - STREAM_TICK_XAUUSDT=stream:tick_XAUUSDT
      - STREAM_BOOK_XAUUSDT=stream:book_XAUUSDT

      # Microburst & Microstructure
      - BURST_ENABLE=1
      - CRYPTO_BURST_ENABLE=1
      - BURST_WINDOW_MS=2500
      - BURST_MAX_AGE_MS=8000
      - PRESSURE_WINDOW_MS=60000
      - PRESSURE_HI_PER_MIN=4.0
      - PRESSURE_MIN_CANDIDATE_SCORE=1.0
      - PRESSURE_TIER_CALIB_MIN_SAMPLES=300
      - PRESSURE_TIER_CALIB_REFRESH_MS=60000
      - PRESSURE_TIER1_USD_BTCUSDT=50000
      - PRESSURE_TIER2_USD_BTCUSDT=150000
      - PRESSURE_TIER1_USD_ETHUSDT=25000
      - PRESSURE_TIER2_USD_ETHUSDT=75000
      - PRESSURE_TIER1_USD_SOLUSDT=50000
      - PRESSURE_TIER2_USD_SOLUSDT=150000
      # DN-GATE Thresholds (per-symbol)
      - BTC_DN_TIER0_USD=50000
      - BTC_DN_TIER1_USD=80000
      - BTC_DN_TIER2_USD=150000
      - ETH_DN_TIER0_USD=25000
      - ETH_DN_TIER1_USD=40000
      - ETH_DN_TIER2_USD=75000
      - SPREAD_STATS_WINDOW=300
      - SPREAD_Z_PENALTY_START=2.0
      - SPREAD_Z_PENALTY_FULL=5.0
      - PRESSURE_SPREAD_Z_MAX=4.0
      - PRESSURE_BOOK_STALE_MAX_MS=3000
      - BOOK_STALE_PENALTY_START_MS=1000
      - BOOK_STALE_PENALTY_FULL_MS=5000
      - BOOK_RATE_EMA_ALPHA=0.2
      - CAND_W_DELTA_Z=0.5
      
      # Telegram Publishing: Disabled (routed via ExecutionGateService)
      - PUBLISH_TELEGRAM_DIRECT=0
      - CAND_B_OBI=0.2
      - CAND_B_ICE=0.2
      - CAND_B_ABSORPTION=0.1
      - CAND_B_RECLAIM=0.1
      - CAND_P_SPREAD_Z=0.25
      - CAND_P_SPREAD_BPS=0.15
      - CAND_P_BOOK_STALE=0.20

      # Book churn stats
      - BOOK_RATE_STATS_WINDOW=300
      - BOOK_CHURN_Z_START=2.0
      - BOOK_CHURN_Z_FULL=5.0
      - BOOK_CHURN_Z_HI=4.0

      # Expert Calibration - Book Rate & Delta Notional
      - BOOK_CALIB_MIN_SAMPLES=300
      - BOOK_CALIB_KEY_PREFIX=calib:book_rate
      - BOOK_CALIB_REGIMES_SET_PREFIX=calib:book_rate:regimes
      - BOOK_CALIB_TTL_SEC=604800
      - DN_CALIB_MIN_SAMPLES=300
      - DN_CALIB_KEY_PREFIX=calib:dn
      - DN_CALIB_REGIMES_SET_PREFIX=calib:dn:regimes
      - DN_CALIB_TTL_SEC=604800
      - BOOK_CALIB_ENABLE=1
      - DN_CALIB_ENABLE=1

      # Candidate penalty/veto
      - BOOK_RATE_Z_PENALTY_START=2.0
      - BOOK_RATE_Z_PENALTY_FULL=5.0
      - CAND_P_BOOK_CHURN=0.15
      - PRESSURE_BOOK_RATE_Z_MAX=6.0

      # Strong need escalation on churn
      - STRONG_NEED_CHURN=3

      # Same-tick need escalation
      - STRONG_NEED_ESCALATED=3
      - STRONG_NEED_EXTREME_ENABLE=1
      - STRONG_NEED_EXTREME=4

      # A/B/C routing and contextual split
      - AB_VER=1
      - AB_SPLIT_B_DEFAULT=10
      - AB_SPLIT_C_DEFAULT=10
      - AB_SPLIT_B_THIN=20
      - AB_SPLIT_C_THIN=20
      - ENTRY_AB_EXECUTE_ARMS_DEFAULT=A
      - ENTRY_AB_EXECUTE_ARMS_THIN=A

      # Regime ADX-aware parameters
      - REGIME_ADX_HI_Q=0.75
      - REGIME_ADX_LO_Q=0.40
      - REGIME_W_ADX=0.20
