services:
  scanner-route-incident-rca-mirror-rollout-controller-v3-9:
    build: { context: ., dockerfile: python-worker/Dockerfile.gpu }
    command: ["python", "-m", "orderflow_services.route_incident_rca_mirror_rollout_controller_v3_9"]
    restart: unless-stopped
    networks:
      - scanner-timers
      - scanner-infra
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis-worker-1:6379/0}
      ANALYTICS_DB_DSN: ${ANALYTICS_DB_DSN:-}
      ML_ROUTE_INCIDENT_RCA_MIRROR_ROLLOUT_PORT: ${ML_ROUTE_INCIDENT_RCA_MIRROR_ROLLOUT_PORT:-9925}
      ML_ROUTE_INCIDENT_RCA_MIRROR_ROLLOUT_ADVISORY_ONLY: ${ML_ROUTE_INCIDENT_RCA_MIRROR_ROLLOUT_ADVISORY_ONLY:-1}
      ML_ROUTE_INCIDENT_RCA_MIRROR_ROLLOUT_EXECUTOR_MODE: ${ML_ROUTE_INCIDENT_RCA_MIRROR_ROLLOUT_EXECUTOR_MODE:-DRY_RUN}
      ML_ROUTE_INCIDENT_RCA_MIRROR_ROLLOUT_PROMOTION_COOLDOWN_SEC: ${ML_ROUTE_INCIDENT_RCA_MIRROR_ROLLOUT_PROMOTION_COOLDOWN_SEC:-21600}
      ML_ROUTE_INCIDENT_RCA_MIRROR_ROLLOUT_ALLOW_GOVERNOR_PROMOTION: ${ML_ROUTE_INCIDENT_RCA_MIRROR_ROLLOUT_ALLOW_GOVERNOR_PROMOTION:-1}
      ML_ROUTE_INCIDENT_RCA_MIRROR_ROLLOUT_ALLOW_VERIFICATION_ROLLBACK: ${ML_ROUTE_INCIDENT_RCA_MIRROR_ROLLOUT_ALLOW_VERIFICATION_ROLLBACK:-1}
    ports: ["${ML_ROUTE_INCIDENT_RCA_MIRROR_ROLLOUT_PORT:-9925}:9925"]
    depends_on: [redis-worker-1]
