services:
  scanner-route-incident-rca-shadow-handoff-v3-5:
    build: { context: ., dockerfile: python-worker/Dockerfile.gpu }
    command: ["python", "-m", "orderflow_services.route_incident_rca_shadow_handoff_adapter_v3_5"]
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis-worker-1:6379/0}
      ANALYTICS_DB_DSN: ${ANALYTICS_DB_DSN:-}
      ML_ROUTE_INCIDENT_RCA_SHADOW_PORT: ${ML_ROUTE_INCIDENT_RCA_SHADOW_PORT:-9921}
      ML_ROUTE_INCIDENT_RCA_SHADOW_SOURCE_STREAM: ${ML_ROUTE_INCIDENT_RCA_SHADOW_SOURCE_STREAM:-stream:ml:route_incident_rca_handoff_shadow_source}
      ML_ROUTE_INCIDENT_RCA_HANDOFF_SHADOW_STREAM: ${ML_ROUTE_INCIDENT_RCA_HANDOFF_SHADOW_STREAM:-stream:ml:vertex_local_handoff_shadow_requests}
      ML_ROUTE_INCIDENT_RCA_LEGACY_SHADOW_STREAM: ${ML_ROUTE_INCIDENT_RCA_LEGACY_SHADOW_STREAM:-stream:ml:route_incident_rca_legacy_shadow_requests}
      ML_ROUTE_INCIDENT_RCA_SHADOW_ENABLED: ${ML_ROUTE_INCIDENT_RCA_SHADOW_ENABLED:-1}
      ML_ROUTE_INCIDENT_RCA_SHADOW_MODE: ${ML_ROUTE_INCIDENT_RCA_SHADOW_MODE:-AUDIT_ONLY}
      ML_ROUTE_INCIDENT_RCA_SHADOW_MAX_PAYLOAD_BYTES: ${ML_ROUTE_INCIDENT_RCA_SHADOW_MAX_PAYLOAD_BYTES:-131072}
      ML_ROUTE_INCIDENT_RCA_SHADOW_MAX_PROMPT_CHARS: ${ML_ROUTE_INCIDENT_RCA_SHADOW_MAX_PROMPT_CHARS:-16000}
    ports: ["${ML_ROUTE_INCIDENT_RCA_SHADOW_PORT:-9921}:9921"]
    depends_on: [redis-worker-1]
    networks:
      - scanner-timers
      - scanner-infra
