services:
  scanner-route-incident-rca-mirror-verification-v3-8:
    build: { context: ., dockerfile: python-worker/Dockerfile.gpu }
    command: ["python", "-m", "orderflow_services.route_incident_rca_mirror_verification_loop_v3_8"]
    restart: unless-stopped
    networks:
      - scanner-timers
      - scanner-infra
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis-worker-1:6379/0}
      ANALYTICS_DB_DSN: ${ANALYTICS_DB_DSN:-}
      ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_PORT: ${ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_PORT:-9924}
      ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_RUN_EVERY_SEC: ${ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_RUN_EVERY_SEC:-300}
      ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_WINDOW_MIN: ${ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_WINDOW_MIN:-240}
      ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_LOOKBACK_COUNT: ${ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_LOOKBACK_COUNT:-500}
      ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_ADVISORY_ONLY: ${ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_ADVISORY_ONLY:-1}
      ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_EXECUTOR_MODE: ${ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_EXECUTOR_MODE:-DRY_RUN}
      ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_MIN_SAMPLE: ${ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_MIN_SAMPLE:-20}
      ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_MAX_MISMATCH_RATE: ${ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_MAX_MISMATCH_RATE:-0.00}
      ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_MAX_DRIFT_RATE: ${ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_MAX_DRIFT_RATE:-0.25}
      ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_MIN_MATCH_RATE: ${ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_MIN_MATCH_RATE:-0.65}
      ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_MAX_PENDING_TOTAL: ${ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_MAX_PENDING_TOTAL:-10}
      ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_MAX_COMPARATOR_AGE_MS: ${ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_MAX_COMPARATOR_AGE_MS:-1800000}
      ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_ROLLBACK_COOLDOWN_SEC: ${ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_ROLLBACK_COOLDOWN_SEC:-21600}
    ports: ["${ML_ROUTE_INCIDENT_RCA_MIRROR_VERIFICATION_PORT:-9924}:9924"]
    depends_on: [redis-worker-1]
