groups:
- name: of_gate_archiver_p78
  rules:
      # ── Staleness alerts ────────────────────────────────────────────────────
      # metrics archiver: no update for >15m means the archiver process is likely stuck/dead
  - alert: OF_Gate_Archiver_Metrics_Stale
    expr: (time()*1000 - of_gate_archiver_last_run_ts_ms{kind="metrics"})/1000 >
      900
    for: 10m
    labels:
      severity: page
    annotations:
      summary: of_gate metrics archiver is stale
      description: >
        No updates from of_gate metrics archiver for >15m.
        Check stream_archiver container logs and Redis connectivity.
        OF_GATE_METRICS_ARCHIVE_ENABLED must be 1.
        Age(s)={{ $value | humanizeDuration }}

      # quarantine archiver: lower severity (no quarantine traffic is also ok)
  - alert: OF_Gate_Archiver_Quarantine_Stale
    expr: (time()*1000 - 
      of_gate_archiver_last_run_ts_ms{kind="quarantine"})/1000 > 900
    for: 10m
    labels:
      severity: warn
    annotations:
      summary: of_gate quarantine archiver is stale
      description: >
        No updates from of_gate quarantine archiver for >15m.
        Check stream_archiver container and Redis connectivity.
        OF_GATE_QUARANTINE_ARCHIVE_ENABLED must be 1.
        Age(s)={{ $value | humanizeDuration }}

      # rollups refresh: alert only if it has ever run (gated on last_run_ts_ms > 0)
      # to avoid noise when manual refresh has never been triggered
      runbook_path: /runbooks/tbd.md
      dashboard_path: /d/tbd
  - alert: OF_Gate_RollupsRefresh_Stale
    expr: of_gate_archiver_last_run_ts_ms{kind="rollups_refresh"} > 0 and 
      (time()*1000 - 
      of_gate_archiver_last_run_ts_ms{kind="rollups_refresh"})/1000 > 86400
    for: 1h
    labels:
      severity: warn
    annotations:
      summary: of_gate rollups refresh job is stale
      description: >
        No updates from of_gate rollups refresh for >24h.
        If you rely on manual refresh, check the nightly timer job.
        Run: python -m orderflow_services.of_gate_history_migration_v1 refresh --days
        7
        Age(s)={{ $value | humanizeDuration }}

      # ── Error alerts ─────────────────────────────────────────────────────────
      # Monotonic-ish gauges: alert on any increase over 10m
      runbook_path: /runbooks/tbd.md
      dashboard_path: /d/tbd
  - alert: OF_Gate_Archiver_Errors
    expr: increase(of_gate_archiver_error_total{kind="metrics"}[10m]) > 0
    for: 5m
    labels:
      severity: page
    annotations:
      summary: of_gate metrics archiver errors detected
      description: >
        Error count increased in the last 10m.
        Inspect DLQ stream: stream:dlq:of_gate_metrics
        Check archiver logs for parse_error / pg_batch_error.

  - alert: OF_Gate_QuarantineArchiver_Errors
    expr: increase(of_gate_archiver_error_total{kind="quarantine"}[10m]) > 0
    for: 5m
    labels:
      severity: warn
    annotations:
      summary: of_gate quarantine archiver errors detected
      description: >
        Error count increased in the last 10m.
        Inspect DLQ stream: stream:dlq:of_gate_quarantine
        Check archiver logs for parse_error / pg_batch_error.


      runbook_path: /runbooks/tbd.md
      dashboard_path: /d/tbd
  - alert: OF_Gate_RollupsRefresh_Errors
    expr: increase(of_gate_archiver_error_total{kind="rollups_refresh"}[24h]) > 
      0
    for: 10m
    labels:
      severity: warn
    annotations:
      summary: of_gate rollups refresh job errors detected
      description: "Errors increased for rollups_refresh in last 24h. Check of_gate_history_migration
        logs and DB connectivity."

      # P80: Rollups freshness probe (DB view max(bucket))
      runbook_path: /runbooks/tbd.md
      dashboard_path: /d/tbd
  - alert: OF_Gate_RollupsFreshnessProbe_Stale
    expr: (time()*1000 - 
      of_gate_archiver_last_run_ts_ms{kind="rollups_freshness"})/1000 > 1800
    for: 15m
    labels:
      severity: warn
    annotations:
      summary: of_gate rollups freshness probe is stale
      description: "No updates from rollups freshness probe for >30m. Ensure of_timers_worker
        runs of_gate_rollups_freshness_probe_v1 and DB is reachable. Age(s)={{ $value
        }}"

      runbook_path: /runbooks/tbd.md
      dashboard_path: /d/tbd
  - alert: OF_Gate_Rollups_5m_Stale
    expr: of_gate_rollups_freshness_ok == 1 and 
      of_gate_rollups_bucket_age_sec{view="5m"} > 1800
    for: 15m
    labels:
      severity: warn
    annotations:
      summary: of_gate_ok_rate_5m rollup is stale
      description: "Latest bucket in of_gate_ok_rate_5m is older than 30m. Age(s)={{
        $value }}"

      runbook_path: /runbooks/tbd.md
      dashboard_path: /d/tbd
  - alert: OF_Gate_Rollups_1h_Stale
    expr: of_gate_rollups_freshness_ok == 1 and 
      of_gate_rollups_bucket_age_sec{view="1h"} > 10800
    for: 30m
    labels:
      severity: warn
    annotations:
      summary: of_gate_ok_rate_1h rollup is stale
      description: "Latest bucket in of_gate_ok_rate_1h is older than 3h. Age(s)={{
        $value }}"

      # P81: Timescale policy probe (jobs/policies existence)
      runbook_path: /runbooks/tbd.md
      dashboard_path: /d/tbd
  - alert: OF_Gate_TimescalePolicyProbe_Stale
    expr: (time()*1000 - 
      of_gate_archiver_last_run_ts_ms{kind="timescale_policy_probe"})/1000 > 
      7200
    for: 20m
    labels:
      severity: warn
    annotations:
      summary: of_gate timescale policy probe is stale
      description: "No updates from timescale policy probe for >2h. Ensure of_timers_worker
        runs of_gate_timescale_policy_probe_v1 and DB is reachable. Age(s)={{ $value
        }}"

      runbook_path: /runbooks/tbd.md
      dashboard_path: /d/tbd
  - alert: OF_Gate_TimescaleMissing
    expr: of_gate_timescale_expect == 1 and of_gate_timescale_present == 0
    for: 30m
    labels:
      severity: page
    annotations:
      summary: timescaledb extension missing (expected)
      description: "Timescale extension is missing but expected. Rollups/retention
        policies will not run."

  - alert: OF_Gate_TimescalePoliciesMissing
    expr: of_gate_timescale_present == 1 and of_gate_timescale_policies_missing 
      > 0
    for: 20m
    labels:
      severity: page
    annotations:
      summary: missing Timescale policies for OF-gate rollups
      description: "One or more required policies are missing. See of_gate_timescale_policy_present
        panel. missing={{ $value }}"

  - alert: OF_Gate_TimescalePoliciesDisabled
    expr: of_gate_timescale_present == 1 and of_gate_timescale_policies_disabled
      > 0
    for: 20m
    labels:
      severity: warn
    annotations:
      summary: Timescale policies disabled for OF-gate rollups
      description: "One or more required policies are disabled (scheduled=false).
        disabled={{ $value }}"
      runbook_path: /runbooks/tbd.md
      dashboard_path: /d/tbd
