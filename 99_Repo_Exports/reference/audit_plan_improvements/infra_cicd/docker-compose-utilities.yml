services:
  calibration-scheduler:
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    image: scanner-python-worker:latest
    container_name: scanner-calibration-scheduler
    environment:
      - PG_DSN=postgresql://trading:trading_password@scanner-postgres:5432/scanner_analytics
      - REDIS_HOST=redis-worker-1
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis-worker-1:6379/0
      - TZ=Europe/Kyiv
    depends_on:
      postgres:
        condition: service_healthy
      redis-worker-1:
        condition: service_healthy
    networks:
      - scanner-network
    restart: unless-stopped
    command:
      - sh
      - /app/calibration_scheduler.sh
    volumes:
      - ./calibration_scheduler.sh:/app/calibration_scheduler.sh:ro
      - ./python-worker:/app/python-worker:ro
      - ./logs:/app/logs
      - ./calibration:/app/calibration
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M

  redis-cleanup:
    build:
      context: .
      dockerfile: Dockerfile.cleanup
    container_name: redis-cleanup
    environment:
    - REDIS_HOST=redis-worker-1
    - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
      go-worker-1m:
        condition: service_started
      go-worker-5m:
        condition: service_started
    networks:
    - scanner-network
    restart: unless-stopped
    command:
    - sh
    - -c
    - sleep 60 && while true; do ./redis-streams-cleanup.sh setup; sleep 21600; done
  stream-trimmer:
    build:
      context: .
      dockerfile: telegram-worker/Dockerfile
    container_name: scanner-stream-trimmer
    environment:
    - REDIS_HOST=redis-worker-1
    - REDIS_PORT=6379
    - TRIM_INTERVAL_SECONDS=300
    - DRY_RUN=false
    depends_on:
      redis-worker-1:
        condition: service_healthy
    networks:
    - scanner-network
    restart: unless-stopped
    command:
    - sh
    - -c
    - sleep 30 && python3 /app/scripts/redis_batch_stream_trimmer.py
    volumes:
    - ./scripts:/app/scripts
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M

  capture-microbars:
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    container_name: scanner-capture-microbars
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis-worker-1:6379/0}
      # Split streams configuration
      - MICROBAR_SPLIT_STREAMS_ENABLE=${MICROBAR_SPLIT_STREAMS_ENABLE:-0}
      - MICROBAR_LEGACY_STREAM=${MICROBAR_LEGACY_STREAM:-events:microbar_closed}
      - MICROBAR_PER_SYMBOL_STREAM_TEMPLATE=${MICROBAR_PER_SYMBOL_STREAM_TEMPLATE:-events:microbar_closed:{sym}}
      - MICROBAR_SYMBOLS_SET=${MICROBAR_SYMBOLS_SET:-events:microbar_closed:symbols}
      # Capture configuration
      - MICROBAR_CAPTURE_SYMBOLS=${MICROBAR_CAPTURE_SYMBOLS:-}
      - MICROBAR_CAPTURE_MAX_SYMBOLS=${MICROBAR_CAPTURE_MAX_SYMBOLS:-200}
      - OUTPUT_FILE=${MICROBAR_OUTPUT_FILE:-microbar_closed_slice.ndjson}
      - DURATION_SEC=${MICROBAR_DURATION_SEC:-900}
    depends_on:
      redis-worker-1:
        condition: service_healthy
    networks:
      - scanner-network
    restart: "no"
    profiles:
      - utilities
    command:
      - python
      - /app/scripts/capture_microbars.py
    volumes:
      - ./python-worker:/app
      - ./data:/app/data
    working_dir: /app
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
        reservations:
          memory: 128M
  regime-worker:
    build:
      context: .
      dockerfile: regime-worker/Dockerfile
    image: scanner_infra-regime-worker:latest
    container_name: scanner-regime-worker
    environment:
    - REDIS_READ_HOST=redis-worker-1
    - REDIS_READ_PORT=6379
    - REDIS_HOST=redis-worker-1
    - REDIS_PORT=6379
    - REGIME_WILDER_N=14
    - REGIME_STREAM_OUT=stream:regime
    - REGIME_CONSUMER_GROUP=regime-worker-group
    - REGIME_READ_COUNT=10
    - REGIME_READ_BLOCK_MS=1000
    - DATABASE_URL=postgresql://trading:trading_password@scanner-postgres:5432/scanner_analytics
    - REGIME_QUANTILES_TTL_SEC=600
    depends_on:
      redis:
        condition: service_healthy
      redis-worker-1:
        condition: service_healthy
      go-worker-1m:
        condition: service_healthy
      go-worker-5m:
        condition: service_healthy
      go-worker-15m:
        condition: service_healthy
      go-worker-1h:
        condition: service_healthy
    networks:
    - scanner-network
    restart: unless-stopped
    command:
    - sh
    - -c
    - sleep 35 && python main.py
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
  regime-quantiles-job:
    build:
      context: .
      dockerfile: regime-quantiles-job/Dockerfile
    image: scanner_infra-regime-quantiles-job:latest
    container_name: scanner-regime-quantiles-job
    environment:
    - DATABASE_URL=postgresql://trading:trading_password@scanner-postgres:5432/scanner_analytics
    - REDIS_URL=redis://redis-worker-1:6379/0
    - REGIME_QUANTILES_INTERVAL_SEC=${REGIME_QUANTILES_INTERVAL_SEC:-900}
    - REGIME_QUANTILES_LOOKBACK_DAYS=${REGIME_QUANTILES_LOOKBACK_DAYS:-14}
    - REGIME_QUANTILES_MIN_SAMPLES=${REGIME_QUANTILES_MIN_SAMPLES:-80}
    depends_on:
      redis-worker-1:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
    - scanner-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
  regime-storage:
    build:
      context: .
      dockerfile: regime-storage/Dockerfile
    image: scanner_infra-regime-storage:latest
    container_name: scanner-regime-storage
    environment:
    - REDIS_HOST=redis-worker-1
    - REDIS_PORT=6379
    - DATABASE_URL=postgresql://trading:trading_password@scanner-postgres:5432/scanner_analytics
    - REGIME_STORAGE_READ_COUNT=50
    - REGIME_STORAGE_READ_BLOCK_MS=5000
    depends_on:
      redis-worker-1:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
    - scanner-network
    restart: unless-stopped
    command:
    - sh
    - -c
    - sleep 45 && python regime_storage.py
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
  migration-runner:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    image: scanner_infra-migration-runner:latest
    container_name: scanner-migration-runner
    environment:
    - PG_DSN=postgresql://trading:trading_password@scanner-postgres:5432/scanner_analytics
    depends_on:
      postgres:
        condition: service_healthy
    networks:
    - scanner-network
    command: ["sh", "/app/python-worker/migrations/apply_migrations.sh"]
    volumes:
    - ./python-worker/migrations:/app/python-worker/migrations:ro
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 128M


  health-monitor:
    build:
      context: .
      dockerfile: Dockerfile.health-monitor
    image: scanner_infra-health-monitor:latest
    container_name: scanner-health-monitor
    environment:
    - REDIS_URL=redis://redis-worker-1:6379/0
    - NOTIFY_STREAM=notify:telegram
    - HEALTH_CHECK_INTERVAL=60
    - HEALTH_STALL_THRESHOLD=600
    - HEALTH_STARTUP_GRACE_SEC=300
    # depends_on:
    #   redis-worker-1:
    #     condition: service_healthy
    networks:
    - scanner-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M
  docker-watchdog:
    build:
      context: .
      dockerfile: Dockerfile.watchdog
    image: scanner_infra-docker-watchdog:latest
    container_name: scanner-docker-watchdog
    environment:
    - REDIS_URL=redis://redis-worker-1:6379/0
    - NOTIFY_STREAM=notify:telegram
    # depends_on:
    #   redis-worker-1:
    #     condition: service_healthy
    networks:
    - scanner-network
    restart: unless-stopped
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 64M

  tb-pipeline-runner:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-tb-pipeline-runner
    restart: "no"
    runtime: nvidia
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - GPU_ENABLED=true
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Bias Cascade & Divergence Inference (roi_bias_cascade_div_infer_v2)
      - BIAS_REGIME_ENABLE=1
      - BIAS_RSI_ENABLE=1
      - BIAS_REGIME_TTL_MS=300000
      - BIAS_RSI_TTL_MS=300000
      - BIAS_RSI_HI=60
      - BIAS_RSI_LO=40
      - BIAS_RSI_REQUIRE_SLOPE=0
      - DIV_INFER_ENABLE=1
      - DIV_INFER_MIN_STRENGTH=0.0
      - DIV_INFER_MAX_AGE_MS=180000
    working_dir: /app
    command: ["sleep", "infinity"]
    volumes:
      - ./python-worker:/app
      - /var/lib/trade/ml_runs:/var/lib/trade/ml_runs
      - /tmp:/tmp
      - /var/lib/trade/of_reports:/var/lib/trade/of_reports:ro
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - scanner-network

networks:
  scanner-network:
    external: true
