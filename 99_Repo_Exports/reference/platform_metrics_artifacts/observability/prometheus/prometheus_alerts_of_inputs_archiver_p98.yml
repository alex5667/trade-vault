groups:
- name: of_inputs_archiver_p98
  rules:
  - alert: OF_OFInputsDLQDBArchiverStale_Warn
    expr: >
      (of_inputs_archiver_staleness_sec{kind="dlq"} > 3600)
      and on() (max(of_inputs_dlq_len{stream="stream:dlq:of_inputs"}) > 0)
    for: 20m
    labels:
      severity: warning
    annotations:
      summary: 'OFInputs DLQ DB archiver stale while DLQ non-empty'
      description: 'DLQ->DB archiver has not updated for >1h while stream:dlq:of_inputs has backlog. Check DB/Redis connectivity and the archiver job.'
      runbook_path: /runbooks/runbook_of_inputs_dlq_db_archive_p98.md
      dashboard_path: /d/of_inputs_archiver_p98

  - alert: OF_OFInputsDLQDBArchiverStale_Crit
    expr: >
      (of_inputs_archiver_staleness_sec{kind="dlq"} > 6*3600)
      and on() (max(of_inputs_dlq_len{stream="stream:dlq:of_inputs"}) > 0)
    for: 20m
    labels:
      severity: critical
    annotations:
      summary: 'CRIT: OFInputs DLQ DB archiver very stale while DLQ non-empty'
      description: 'DLQ->DB archiver has not updated for >6h while stream:dlq:of_inputs has backlog. Postmortem visibility degraded.'
      runbook_path: /runbooks/runbook_of_inputs_dlq_db_archive_p98.md
      dashboard_path: /d/of_inputs_archiver_p98

  - alert: OF_OFInputsQuarantineDBArchiverStale_Warn
    expr: >
      (of_inputs_archiver_staleness_sec{kind="quarantine"} > 3600)
      and on() (max(of_inputs_dlq_len{stream="quarantine:signals:of:inputs"}) > 0)
    for: 20m
    labels:
      severity: warning
    annotations:
      summary: 'OFInputs quarantine DB archiver stale while quarantine non-empty'
      description: 'Quarantine->DB archiver has not updated for >1h while quarantine stream has backlog.'
      runbook_path: /runbooks/runbook_of_inputs_dlq_db_archive_p98.md
      dashboard_path: /d/of_inputs_archiver_p98

  - alert: OF_OFInputsQuarantineDBArchiverStale_Crit
    expr: >
      (of_inputs_archiver_staleness_sec{kind="quarantine"} > 6*3600)
      and on() (max(of_inputs_dlq_len{stream="quarantine:signals:of:inputs"}) > 0)
    for: 20m
    labels:
      severity: critical
    annotations:
      summary: 'CRIT: OFInputs quarantine DB archiver very stale while quarantine non-empty'
      description: 'Quarantine->DB archiver has not updated for >6h while quarantine stream has backlog.'
      runbook_path: /runbooks/runbook_of_inputs_dlq_db_archive_p98.md
      dashboard_path: /d/of_inputs_archiver_p98

  - alert: OF_OFInputsDBArchiverErrorsSpike_Warn
    expr: >
      (max_over_time(of_inputs_archiver_error_total{kind="dlq"}[30m]) - min_over_time(of_inputs_archiver_error_total{kind="dlq"}[30m])) > 0
      or
      (max_over_time(of_inputs_archiver_error_total{kind="quarantine"}[30m]) - min_over_time(of_inputs_archiver_error_total{kind="quarantine"}[30m])) > 0
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: 'OFInputs DB archiver errors increased'
      description: 'Error counter changed in the last 30m. Inspect logs of of_inputs_dlq_archive_to_db_p98.py and DB availability.'
      runbook_path: /runbooks/runbook_of_inputs_dlq_db_archive_p98.md
      dashboard_path: /d/of_inputs_archiver_p98
