  # OFC (Orderflow Confirm) Golden Replay & Validation Timers
  # Интегрированы для детерминированного replay и валидации capture
  ofc-validate-capture-timer:
    build: *id001
    runtime: nvidia
    container_name: scanner-ofc-validate-capture-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - OFC_CAPTURE=${OFC_CAPTURE:-/tmp/ofc_capture.ndjson}
      - OFC_VALIDATE_STRICT=${OFC_VALIDATE_STRICT:-1}
    depends_on: *id003
    networks: *id004
    volumes:
      - ./python-worker:/app
      - /tmp:/tmp
    working_dir: /app
    command: >
      sh -c "sleep 60 && while true; do
        OFC_CAPTURE=$${OFC_CAPTURE:-/tmp/ofc_capture.ndjson};
        OFC_VALIDATE_STRICT=$${OFC_VALIDATE_STRICT:-1};
        if [ -f \"$$OFC_CAPTURE\" ]; then
          echo 'Validating OFC capture...';
          STRICT_FLAG=\"\";
          if [ \"$$OFC_VALIDATE_STRICT\" = \"1\" ]; then
            STRICT_FLAG=\"--strict-runtime\";
          fi
          python3 tools/ofc_validate_capture.py --input \"$$OFC_CAPTURE\" $$STRICT_FLAG || true;
          echo 'OFC validation done. Sleeping 1 hour...';
        else
          echo 'OFC capture file not found, skipping validation...';
        fi
        sleep 3600;
      done"
    profiles: ["default"]

  ofc-replay-timer:
    build: *id001
    runtime: nvidia
    container_name: scanner-ofc-replay-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - OFC_GOLDEN=${OFC_GOLDEN:-/tmp/ofc_golden.ndjson}
