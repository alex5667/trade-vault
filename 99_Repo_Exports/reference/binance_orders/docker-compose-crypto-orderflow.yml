  # Side Sign Audit Timer (Step 9: static audit for SELL-bias patterns)
  # Scans codebase for risky side->sign conversions (else -1, != "BUY", defaults "BUY")
  # Step 12: also generates batch patches from audit JSON
  side-sign-audit-timer:
    build: *id001


    container_name: scanner-side-sign-audit-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      # Step 12: enable batch patch generation (default: 0, set to 1 to enable)
      - SIDE_SIGN_AUDIT_GENERATE_PATCH=${SIDE_SIGN_AUDIT_GENERATE_PATCH:-0}
      - SIDE_SIGN_AUDIT_APPLY_PATCH=${SIDE_SIGN_AUDIT_APPLY_PATCH:-0}
      - SIDE_SIGN_AUDIT_PATCH_DIR=${SIDE_SIGN_AUDIT_PATCH_DIR:-/tmp}
    depends_on: *id003
    networks: *id004
    volumes:
      - ./python-worker:/app
      - .:/repo
    working_dir: /repo
    command: >
      sh -c "sleep 120 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        # Run daily at 04:00 (static code audit for side->sign patterns)
        if [ \"$$HOUR\" = \"04\" ] && [ \"$$MIN\" = \"00\" ]; then
          echo 'Running side sign audit (SELL-bias pattern detection)...';
          AUDIT_JSON=\"$${SIDE_SIGN_AUDIT_PATCH_DIR}/side_audit_$$(date +%Y%m%d_%H%M%S).json\";
          python3 -m tools.audit_side_sign_usage --root /repo --format json > \"$$AUDIT_JSON\" || echo 'Side sign audit failed (non-critical)';
          python3 -m tools.audit_side_sign_usage --root /repo --format text || echo 'Side sign audit text output failed (non-critical)';
          # Step 12: generate patch if enabled
          if [ \"$$SIDE_SIGN_AUDIT_GENERATE_PATCH\" = \"1\" ] && [ -f \"$$AUDIT_JSON\" ]; then
            PATCH_FILE=\"$${SIDE_SIGN_AUDIT_PATCH_DIR}/side_sign_patch_$$(date +%Y%m%d_%H%M%S).diff\";
            echo 'Generating batch patch from audit...';
            python3 -m tools.patch_from_side_audit --root /repo --audit \"$$AUDIT_JSON\" --out \"$$PATCH_FILE\" || echo 'Patch generation failed (non-critical)';
            if [ -f \"$$PATCH_FILE\" ] && [ \"$$SIDE_SIGN_AUDIT_APPLY_PATCH\" = \"1\" ]; then
              echo 'Applying patch in-place with backups...';
              python3 -m tools.patch_from_side_audit --root /repo --audit \"$$AUDIT_JSON\" --apply --backup || echo 'Patch application failed (non-critical)';
            fi
          fi
          echo 'Side sign audit done. Sleeping 1 hour...';
          sleep 3600;
        else
          sleep 60;
        fi
      done"
    profiles: ["default"]


  sre-monitor-all-timer:
    build: *id001
    container_name: scanner-sre-monitor-all-timer
    image: scanner-python-worker-gpu
    entrypoint: '/bin/bash -c "trap : TERM INT; sleep infinity & wait"'
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis-worker-1:6379/0
      - DYN_CFG_KEY=settings:dynamic_cfg
      - CRYPTO_NOTIFY_STREAM=notify:telegram
      # P71 Policy effectiveness report (deltas vs baseline=ok)
      - ENABLE_POLICY_EFFECTIVENESS_REPORT=1
      # Optional tuning
      # - POLICY_EFF_BASELINE_MIN_N=40
      # - POLICY_EFF_INTERVAL_SEC=600
      # P35 Quarantine Monitor
      - ENABLE_META_COV_QUARANTINE_MONITOR=1
      - META_COV_QUAR_NOTIFY_COOLDOWN_SEC=3600
      # Meta coverage ops (P35+): keep OFF by default in the unified SRE timer
      - ENABLE_META_COV_OPS_BUNDLE=0
      - ENABLE_META_COV_OUTCOME_AUTO_APPLY=0
      - ENABLE_META_COV_OUTCOME_GUARD=0
      - META_COV_OPS_APPLY=0


#


  # Meta coverage rollout exporter (P35/P37)
  meta-cov-rollout-exporter:
    build: *id001
    container_name: scanner-meta-cov-rollout-exporter
    restart: unless-stopped
    environment:
