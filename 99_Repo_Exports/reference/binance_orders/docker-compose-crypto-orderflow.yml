    command: >
      sh -c "python3 -m orderflow_services.of_inputs_v3_circuit_state_exporter_p100 --port 9164"
    profiles: ["default"]

  # Prometheus rules bundle validator smoke timer (P102)
  # NOTE: prefer running via services.of_timers_worker (hourly :09). Keep this as an optional fallback.
  prom-rules-bundle-smoke-timer:
    build: *id001
    container_name: scanner-prom-rules-bundle-smoke-timer
    image: scanner-python-worker-gpu
    entrypoint: '/bin/bash -c "trap : TERM INT; sleep infinity & wait"'
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis-worker-1:6379/0
      - DYN_CFG_KEY=settings:dynamic_cfg
      # Fail-closed hold (align with other anti-flap defaults)
      - AUTO_APPLY_BLOCK_HOLD_S=300
      # Orchestrated module
      - ENABLE_PROM_RULES_BUNDLE_SMOKE=1
    depends_on: *id003
    networks: *id004
    working_dir: /app
    command: >
      sh -c "sleep 60 && while true; do
        echo 'Running PROM RULES BUNDLE SMOKE...';
        python3 -m services.prom_rules_bundle_smoke_runner_v1 || echo 'PROM RULES BUNDLE SMOKE failed';
        sleep 300;
      done"
    # P105: demoted to manual fallback; canonical runner is of-timers-worker
    profiles: ["manual"]


  # Consolidated timers worker (preferred) — runs prom rules bundle smoke (:09) + rules loaded probe (:10)
  # P105: canonical wiring for prom smoke checks via services.of_timers_worker
  of-timers-worker:
    build: *id001
    container_name: scanner-of-timers-worker
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis-worker-1:6379/0
      # Prometheus API endpoint for rules-loaded probe
      # Override via env/compose if your Prometheus is elsewhere
      - PROMETHEUS_URL=http://prometheus:9090

      # Enable only the relevant monitors here (others can be enabled separately)
      - ENABLE_PROM_RULES_BUNDLE_SMOKE=1
      - ENABLE_PROM_RULES_LOADED_PROBE=1

      # Anti-flap / dedup defaults (6h = 21600s)
      # Ensures fail-closed block survives between hourly runs without "protuhanie"
      - PROM_RULES_BUNDLE_SMOKE_COOLDOWN_S=21600
      - PROM_RULES_LOADED_PROBE_COOLDOWN_S=21600

    depends_on: *id003
    networks: *id004
    volumes:
      - .:/app
    working_dir: /app
    command: ["python", "-m", "services.of_timers_worker"]
    profiles: ["default"]

networks:
  scanner-network:
    external: true

  trade-network:
    external: true
