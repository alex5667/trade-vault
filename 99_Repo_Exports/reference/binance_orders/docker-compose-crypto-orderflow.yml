  # Meta coverage ops auto-apply timer (P35+)
  meta-enforce-cov-auto-apply-timer:
    build: *id001
    container_name: scanner-meta-enforce-cov-auto-apply-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      # P73 Policy effectiveness (P71) nightly/periodic Telegram summary
      - ENABLE_POLICY_EFFECTIVENESS_TG_REPORT=1
      - POLICY_EFF_TG_COOLDOWN_SEC=21600
      - POLICY_EFF_TG_MIN_TOTAL_N=200
      - POLICY_EFF_TG_STALE_WARN_SEC=1800
      - POLICY_EFF_TG_STALE_CRIT_SEC=7200
      - TELEGRAM_MODE=redis
      - TELEGRAM_NOTIFY_STREAM=notify:telegram
      - META_COV_OPS_APPLY=1
      - META_COV_OPS_ENABLE_ROLLOUT=1
      - META_COV_OPS_ENABLE_OUTCOME=1
      - META_COV_OPS_ENABLE_QUARANTINE=0
      - META_ENFORCE_KEY=cfg2:meta_enforce
      - META_ENFORCE_COV_PREFIX=cfg:suggestions:meta_enforce_cov
      - META_COV_QUARANTINE_KEY=cfg2:meta_cov_quarantine
      - META_COV_OPS_STATE_KEY=cfg2:meta_cov_ops_state
      - OPS_STREAM_META_COV=ops:meta_cov_ops
      # P41 Trade Meta Fields
      - META_COV_OUTCOME_ENRICH_FROM_TRADES_CLOSED=1
      - TRADES_CLOSED_STREAM=trades:closed
      - META_COV_OUTCOME_ENRICH_MAX_SCAN=200000
      - META_COV_PREFLIGHT_REQUIRE_TRADE_META=0
    depends_on: *id003
    networks: *id004
    volumes:
      - .:/app
    working_dir: /app
    command: >
      sh -c "sleep 60 && while true; do
        echo 'Running META COV OPS bundle...';
        python3 tools/nightly_meta_enforce_cov_ops_bundle_v1.py --emit-eventlog || echo 'META COV OPS bundle failed';
        sleep 300;
