  # Edge Stack v1 Dataset Builder Timer (builds train dataset from ml_replay_inputs_v1 + trades:closed via SID join)
  # Updated to use ml_analysis.tools.build_edge_stack_dataset_from_redis v5 (nearest-join with bucket tie-breaker)
  # v2 adds: quarantine JSONL, drop stats, mismatch diagnostics
  # v3 adds: join_strategy (sid/nearest/sid_or_nearest), join_tolerance_ms, fallback join by nearest signal
  # v4 adds: join_secondary filter (dir/scenario), nearest_max_scan, ambiguity tracking
  # v5 adds: bucket tie-breaker (JOIN_BUCKET_KEYS), soft secondary modes (dir_scenario_soft), enhanced diagnostics
  # Recommendations integration: малый прогон (sanity) перед большим прогоном для быстрой проверки drop/mismatch
  edge-stack-v1-dataset-timer:
    build: *id001
    container_name: scanner-edge-stack-v1-dataset-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app:/app/ml_analysis
      - ML_REPLAY_STREAM=${ML_REPLAY_STREAM:-signals:of:inputs}
      - TRADES_CLOSED_STREAM=${TRADES_CLOSED_STREAM:-trades:closed}
      - ARCHIVE_DIR=/var/lib/trade/of_inputs_archive
      - SIGNALS_COUNT=${SIGNALS_COUNT:-200000}
      - CLOSES_COUNT=${CLOSES_COUNT:-200000}
      - EDGE_STACK_DATASET_OUT=${EDGE_STACK_DATASET_OUT:-/var/lib/trade/ml_models/edge_stack_v1_oof/edge_train.jsonl}
    depends_on: *id003
    networks: *id004
    volumes:
      - ./python-worker:/app
      - /var/lib/trade/of_inputs_archive:/var/lib/trade/of_inputs_archive
      - /var/lib/trade/ml_models:/var/lib/trade/ml_models
    working_dir: /app
    command: >
      sh -c "sleep 300 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        # Run daily at 05:00 UTC
        if [ "$$MIN" = "00" ] && [ "$$HOUR" = "5" ]; then
          echo '=== Edge Stack v1 Dataset Builder with Archive Fallback ===';
          python3 -m ml_analysis.tools.build_edge_stack_dataset_fallback_v1 \
            --redis_url $${REDIS_URL:-redis://redis-worker-1:6379/0} \
            --signal_stream $${ML_REPLAY_STREAM:-signals:of:inputs} \
            --closed_stream $${TRADES_CLOSED_STREAM:-trades:closed} \
            --archive_dir $${ARCHIVE_DIR:-/var/lib/trade/of_inputs_archive} \
            --signals_count $${SIGNALS_COUNT:-200000} \
            --closes_count $${CLOSES_COUNT:-200000} \
            --out $${EDGE_STACK_DATASET_OUT:-/var/lib/trade/ml_models/edge_stack_v1_oof/edge_train.jsonl};
          echo 'Dataset build done. Sleeping 1 hour...';
        fi
        sleep 3600;
      done"
    profiles: ["default"]

  # ML Edge Stack v1 OOF Training Timer (OOF stacking with Purged/Embargo split + Platt calibration)
  # Updated to use ml_analysis.tools.train_edge_stack_v1_oof (recommendations integration)
  # P0 fix: правильная сборка фич с transforms/scaler
  # P1: OOF stacking (LR + GBDT -> meta LR) + Platt калибровка на OOF meta-prob
  # Recommendations integration: проверка edge_dataset_report.json перед обучением (joined >= 2000, pos_rate разумный)
  ml-train-edge-stack-v1-oof-timer:
    build: *id001
    runtime: nvidia
    container_name: scanner-ml-train-edge-stack-v1-oof-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app:/app/ml_analysis
      - ML_EDGE_STACK_OOF_DATASET_PATH=${ML_EDGE_STACK_OOF_DATASET_PATH:-/var/lib/trade/ml_models/edge_stack_v1_oof/edge_train.jsonl}
      - ML_EDGE_STACK_OOF_FEATURE_COLS_JSON=${ML_EDGE_STACK_OOF_FEATURE_COLS_JSON:-/var/lib/trade/ml_models/edge_stack_v1_oof/feature_cols.json}
      - ML_EDGE_STACK_OOF_REPORT_JSON=${ML_EDGE_STACK_OOF_REPORT_JSON:-/var/lib/trade/ml_models/edge_stack_v1_oof/edge_dataset_report.json}
      - ML_EDGE_STACK_OOF_MODELS_ROOT=${ML_EDGE_STACK_OOF_MODELS_ROOT:-/var/lib/trade/ml_models}
      - ML_EDGE_STACK_OOF_N_SPLITS=${ML_EDGE_STACK_OOF_N_SPLITS:-5}
      - ML_EDGE_STACK_OOF_PURGE_MS=${ML_EDGE_STACK_OOF_PURGE_MS:-300000}
      - ML_EDGE_STACK_OOF_EMBARGO_MS=${ML_EDGE_STACK_OOF_EMBARGO_MS:-300000}
      - ML_EDGE_STACK_OOF_MIN_TRAIN=${ML_EDGE_STACK_OOF_MIN_TRAIN:-500}
      - ML_EDGE_STACK_OOF_LR_C=${ML_EDGE_STACK_OOF_LR_C:-1.0}
      - ML_EDGE_STACK_OOF_GBDT_MAX_DEPTH=${ML_EDGE_STACK_OOF_GBDT_MAX_DEPTH:-3}
      - ML_EDGE_STACK_OOF_GBDT_LR=${ML_EDGE_STACK_OOF_GBDT_LR:-0.05}
      - ML_EDGE_STACK_OOF_GBDT_MAX_ITER=${ML_EDGE_STACK_OOF_GBDT_MAX_ITER:-400}
      - ML_EDGE_STACK_OOF_CALIBRATE=${ML_EDGE_STACK_OOF_CALIBRATE:-1}
      # Пороги для проверки качества датасета перед обучением
      - ML_EDGE_STACK_OOF_MIN_JOINED=${ML_EDGE_STACK_OOF_MIN_JOINED:-2000}
      - ML_EDGE_STACK_OOF_MIN_POS_RATE=${ML_EDGE_STACK_OOF_MIN_POS_RATE:-0.01}
      - ML_EDGE_STACK_OOF_MAX_POS_RATE=${ML_EDGE_STACK_OOF_MAX_POS_RATE:-0.50}
    depends_on: *id003
    networks: *id004
    volumes:
      - ./python-worker:/app
      - ./ml_analysis:/app/ml_analysis
      - /var/lib/trade/ml_models:/var/lib/trade/ml_models
    working_dir: /app
    command: >
      sh -c "sleep 60 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        # Run daily at 05:10-05:20 UTC (after dataset builder at 05:00)
        if [ \"$$HOUR\" -eq 5 ] && [ \"$$MIN\" -ge 10 ] && [ \"$$MIN\" -lt 20 ]; then
          echo '=== ML Edge Stack v1 OOF Training: Starting pipeline ===';
          DATASET=$${ML_EDGE_STACK_OOF_DATASET_PATH:-/var/lib/trade/ml_models/edge_stack_v1_oof/edge_train.jsonl};
          FEATURE_COLS=$${ML_EDGE_STACK_OOF_FEATURE_COLS_JSON:-/var/lib/trade/ml_models/edge_stack_v1_oof/feature_cols.json};
          REPORT_JSON=$${ML_EDGE_STACK_OOF_REPORT_JSON:-/var/lib/trade/ml_models/edge_stack_v1_oof/edge_dataset_report.json};
          OUT_MODEL=$${ML_EDGE_STACK_OOF_MODELS_ROOT:-/var/lib/trade/ml_models}/edge_stack_v1_oof/edge_stack_v1_$$(date +%Y%m%d_%H%M%S).joblib;
          # Проверка наличия файлов
          if [ ! -f \"$$DATASET\" ]; then
            echo \"❌ Dataset file not found: $$DATASET, skipping ML Edge Stack v1 OOF training...\";
            sleep 3600;
            continue;
          fi
          if [ ! -f \"$$FEATURE_COLS\" ]; then
            echo \"❌ Feature cols file not found: $$FEATURE_COLS, skipping ML Edge Stack v1 OOF training...\";
            sleep 3600;
            continue;
          fi
          # Проверка edge_dataset_report.json перед обучением (рекомендации: joined >= 2000, pos_rate разумный)
          if [ -f \"$$REPORT_JSON\" ]; then
            echo 'Проверка edge_dataset_report.json перед обучением...';
            JOINED=$$(python3 -c \"import json; f=open('$$REPORT_JSON'); d=json.load(f); print(d.get('joined', 0)); f.close()\" 2>/dev/null || echo '0');
            POS_RATE=$$(python3 -c \"import json; f=open('$$REPORT_JSON'); d=json.load(f); print(d.get('pos_rate', 0.0)); f.close()\" 2>/dev/null || echo '0.0');
            echo \"Report: joined=$$JOINED (минимум: $${ML_EDGE_STACK_OOF_MIN_JOINED:-2000}), pos_rate=$$POS_RATE (диапазон: $${ML_EDGE_STACK_OOF_MIN_POS_RATE:-0.01}-$${ML_EDGE_STACK_OOF_MAX_POS_RATE:-0.50})\";
            if [ \"$$JOINED\" -lt \"$${ML_EDGE_STACK_OOF_MIN_JOINED:-2000}\" ]; then
              echo \"❌ joined ($$JOINED) < минимум ($${ML_EDGE_STACK_OOF_MIN_JOINED:-2000}), пропускаем обучение. Проверьте edge_dataset_report.json и edge_quarantine.jsonl\";
              sleep 3600;
              continue;
            fi
            # Проверка pos_rate (должен быть разумным, не экстремальным)
            POS_CHECK=$$(python3 -c \"import json; f=open('$$REPORT_JSON'); d=json.load(f); pr=d.get('pos_rate', 0.0); min_pr=$${ML_EDGE_STACK_OOF_MIN_POS_RATE:-0.01}; max_pr=$${ML_EDGE_STACK_OOF_MAX_POS_RATE:-0.50}; print('OK' if min_pr <= pr <= max_pr else 'WARN'); f.close()\" 2>/dev/null || echo 'WARN');
            if [ \"$$POS_CHECK\" = \"WARN\" ]; then
              echo \"⚠️  pos_rate вне диапазона ($${ML_EDGE_STACK_OOF_MIN_POS_RATE:-0.01}-$${ML_EDGE_STACK_OOF_MAX_POS_RATE:-0.50}), но продолжаем обучение\";
            else
              echo \"✅ pos_rate в разумном диапазоне\";
            fi
            echo '✅ Проверка report.json пройдена, запускаем обучение...';
          else
            echo \"⚠️  Report file not found: $$REPORT_JSON, продолжаем обучение без проверки\";
          fi
          # Обучение модели
          echo 'Running ML Edge Stack v1 OOF training (Purged/Embargo OOF + Platt calibration)...';
          mkdir -p $$(dirname \"$$OUT_MODEL\");
          python3 -m ml_analysis.tools.train_edge_stack_v1_oof \
            --data_jsonl \"$$DATASET\" \
            --out_model \"$$OUT_MODEL\" \
            --feature_cols_json \"$$FEATURE_COLS\" \
            --n_splits $${ML_EDGE_STACK_OOF_N_SPLITS:-5} \
            --purge_ms $${ML_EDGE_STACK_OOF_PURGE_MS:-300000} \
            --embargo_ms $${ML_EDGE_STACK_OOF_EMBARGO_MS:-300000} \
            --min_train $${ML_EDGE_STACK_OOF_MIN_TRAIN:-500} \
            --lr_C $${ML_EDGE_STACK_OOF_LR_C:-1.0} \
            --gbdt_max_depth $${ML_EDGE_STACK_OOF_GBDT_MAX_DEPTH:-3} \
            --gbdt_learning_rate $${ML_EDGE_STACK_OOF_GBDT_LR:-0.05} \
            --gbdt_max_iter $${ML_EDGE_STACK_OOF_GBDT_MAX_ITER:-400} \
            --calibrate $${ML_EDGE_STACK_OOF_CALIBRATE:-1} || { echo '❌ ML Edge Stack v1 OOF training failed (non-critical)'; sleep 3600; continue; }
          # Проверка успешного создания модели
          if [ -f \"$$OUT_MODEL\" ]; then
            echo \"✅ ML Edge Stack v1 OOF training completed: $$OUT_MODEL\";
            # Копирование модели в стандартное место для SHADOW/Canary деплоя (если нужно)
            if [ -n \"$${ML_EDGE_STACK_OOF_MODEL_DEPLOY_PATH:-}\" ]; then
              cp \"$$OUT_MODEL\" \"$${ML_EDGE_STACK_OOF_MODEL_DEPLOY_PATH}\" && echo \"✅ Model copied to deploy path: $${ML_EDGE_STACK_OOF_MODEL_DEPLOY_PATH}\" || echo \"⚠️  Failed to copy model to deploy path\";
            fi
          else
            echo \"❌ Model file not found after training: $$OUT_MODEL\";
          fi
          echo '=== ML Edge Stack v1 OOF Training: Pipeline completed ===';
          echo 'ML Edge Stack v1 OOF training done. Sleeping 1 hour...';
        else
          sleep 60;
        fi
      done"
    profiles: ["default"]

