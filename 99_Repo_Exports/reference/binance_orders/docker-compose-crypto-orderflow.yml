      - SMT_LEADER_DIR_WINDOW=6
      - SMT_LEADER_CONFIRM_MIN_BPS=12.0
      - SMT_COH_MIN_CORR=0.55
      - SMT_PRICE_STALE_MS=7000
      - SMT_COH_THR=0.65
      - SMT_LEADER_MIN_OF_SCORE=1.0
      - SMT_ZONE_MAX_BP=15.0
      # SMT News Gate
      - SMT_NEWS_ASSET_CLASS=crypto
      - SMT_NEWS_HI_GRADE=4
      - SMT_NEWS_PRE_SEC=300
      - SMT_NEWS_POST_SEC=300
      # SMT ADX-aware strictness
      - SMT_ADX_TREND_HI_Q=0.75
      - SMT_ADX_CHOP_LO_Q=0.40
      - SMT_ENTRY_MIN_OF_SCORE=1.0
      - SMT_ENTRY_MIN_OF_SCORE_CHOP=1.0
      - SMT_ENTRY_MIN_OF_SCORE_TREND=1.0
      - SMT_ENTRY_OBI_MIN_SEC=1.5
      - ENTRY_ADX_CHOP_LO_Q=0.40

      # Pressure-aware cooldown

      # Redis cache TTLs for ADX computation
      - RQ_CACHE_MS=60000
      - ADX_CACHE_MS=300

      # Snapshot staleness TTLs
      - WP_VALID_MS=15000
      - OF_DIR_VALID_MS=30000

      # Trailing parameters for new symbols (disabled for memecoins initially)
      - TRAILING_AFTER_TP1_1000PEPEUSDT=true
      - TRAILING_TP1_OFFSET_ATR_1000PEPEUSDT=0.55

      - TRAILING_AFTER_TP1_DOGEUSDT=true
      - TRAILING_TP1_OFFSET_ATR_DOGEUSDT=0.50

      - TRAILING_AFTER_TP1_1000SHIBUSDT=true
      - TRAILING_TP1_OFFSET_ATR_1000SHIBUSDT=0.55

      - TRAILING_AFTER_TP1_1000FLOKIUSDT=true
      - TRAILING_TP1_OFFSET_ATR_1000FLOKIUSDT=0.60

      - TRAILING_AFTER_TP1_1000BONKUSDT=true
      - TRAILING_TP1_OFFSET_ATR_1000BONKUSDT=0.60

      - TRAILING_AFTER_TP1_WIFUSDT=true
