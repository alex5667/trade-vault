  # OFInputs V3 circuit breaker state exporter (P100/P102)
  of-inputs-v3-circuit-exporter:
    build: *id001
    container_name: scanner-of-inputs-v3-circuit-exporter
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=/app
      # P105: renamed from OF_INPUTS_V3_EXPORTER_POLL_SEC (used by the exporter module)
      - OF_INPUTS_V3_CIRCUIT_EXPORTER_REFRESH_SEC=5
    depends_on: *id003
    networks: *id004
    volumes:
      - .:/app
    working_dir: /app
    ports:
