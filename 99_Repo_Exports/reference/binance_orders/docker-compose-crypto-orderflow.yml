          OFC_BENCH_ITERS=$${OFC_BENCH_ITERS:-2000};
          OFC_BENCH_MODE=$${OFC_BENCH_MODE:-restore_each};
          OFC_BUDGET_P95_US=$${OFC_BUDGET_P95_US:-350};
          OFC_BUDGET_P99_US=$${OFC_BUDGET_P99_US:-900};
          python3 tools/bench_ofc_build.py --input \"$$OFC_GOLDEN\" --warmup $$OFC_BENCH_WARMUP --iters $$OFC_BENCH_ITERS \
            --mode $$OFC_BENCH_MODE --budget-p95-us $$OFC_BUDGET_P95_US --budget-p99-us $$OFC_BUDGET_P99_US || true;
          echo 'OFC benchmark done. Sleeping 1 hour...';
        else
          echo 'OFC golden file not found, skipping benchmark...';
        fi
        sleep 3600;
      done"
    profiles: ["default"]

  # Nightly OFC golden pipeline (validate -> fill_expected -> strict replay -> bench)
  ofc-nightly-golden-timer:
    build: *id001
    runtime: nvidia
    container_name: scanner-ofc-nightly-golden-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - OFC_CAPTURE=${OFC_CAPTURE:-/tmp/ofc_capture.ndjson}
      - OFC_GOLDEN=${OFC_GOLDEN:-/tmp/ofc_golden.ndjson}
      - OFC_BENCH_WARMUP=${OFC_BENCH_WARMUP:-200}
      - OFC_BENCH_ITERS=${OFC_BENCH_ITERS:-2000}
      - OFC_BENCH_MODE=${OFC_BENCH_MODE:-restore_each}
      - OFC_BUDGET_P95_US=${OFC_BUDGET_P95_US:-350}
      - OFC_BUDGET_P99_US=${OFC_BUDGET_P99_US:-900}
    depends_on: *id003
    networks: *id004
    volumes:
      - ./python-worker:/app
      - /tmp:/tmp
    working_dir: /app
    command: >
      sh -c "sleep 60 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        if [ \"$$HOUR\" -eq 3 ] && [ \"$$MIN\" -ge 15 ] && [ \"$$MIN\" -lt 25 ]; then
          echo 'Running nightly OFC golden pipeline...';
          OFC_CAPTURE=$${OFC_CAPTURE:-/tmp/ofc_capture.ndjson};
          OFC_GOLDEN=$${OFC_GOLDEN:-/tmp/ofc_golden.ndjson};
          if [ -f \"$$OFC_CAPTURE\" ]; then
            bash tools/ofc_nightly_golden.sh \"$$OFC_CAPTURE\" \"$$OFC_GOLDEN\" || echo 'Nightly golden pipeline failed (non-critical)';
            echo 'Nightly OFC golden pipeline done. Sleeping 1 hour...';
          else
            echo 'OFC capture file not found, skipping nightly golden pipeline...';
          fi
          sleep 3600;
        else
          sleep 60;
        fi
      done"
    profiles: ["default"]

  # OFC Replay Capture Timer (replay OFC capture NDJSON to validate determinism and snapshot completeness)
  ofc-replay-capture-timer:
    build: *id001
    runtime: nvidia
    container_name: scanner-ofc-replay-capture-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - OFC_CAPTURE_PATH=${OFC_CAPTURE_PATH:-/tmp/ofc_capture.ndjson}
      - OFC_REPLAY_OUTPUT=${OFC_REPLAY_OUTPUT:-/tmp/ofc_replayed.ndjson}
      - OFC_REPLAY_LIMIT=${OFC_REPLAY_LIMIT:-0}
      - OFC_REPLAY_STRICT=${OFC_REPLAY_STRICT:-0}
    depends_on: *id003
    networks: *id004
    volumes:
      - ./python-worker:/app
      - /tmp:/tmp
    working_dir: /app
    command: >
      sh -c "sleep 240 && while true; do
        OFC_CAPTURE_PATH=$${OFC_CAPTURE_PATH:-/tmp/ofc_capture.ndjson};
        OFC_REPLAY_OUTPUT=$${OFC_REPLAY_OUTPUT:-/tmp/ofc_replayed.ndjson};
        OFC_REPLAY_LIMIT=$${OFC_REPLAY_LIMIT:-0};
        OFC_REPLAY_STRICT=$${OFC_REPLAY_STRICT:-0};
        if [ -f \"$$OFC_CAPTURE_PATH\" ]; then
          echo 'Running OFC replay capture validation...';
          STRICT_FLAG=\"\";
          if [ \"$$OFC_REPLAY_STRICT\" = \"1\" ]; then
            STRICT_FLAG=\"--strict\";
          fi;
          LIMIT_FLAG=\"\";
          if [ \"$$OFC_REPLAY_LIMIT\" -gt 0 ]; then
            LIMIT_FLAG=\"--limit $$OFC_REPLAY_LIMIT\";
          fi;
          python3 tools/ofc_replay_capture.py --in \"$$OFC_CAPTURE_PATH\" --out \"$$OFC_REPLAY_OUTPUT\" $$LIMIT_FLAG $$STRICT_FLAG || true;
          echo 'OFC replay capture validation done. Sleeping 1 hour...';
          sleep 3600;
        else
          echo 'OFC capture file not found, sleeping 5 minutes...';
          sleep 300;
        fi
      done"
    profiles: ["default"]

  # OFC Golden Replay Timer (deterministic replay from OFC_CAPTURE ndjson)
  ofc-golden-replay-timer:
    build: *id001
    runtime: nvidia
    container_name: scanner-ofc-golden-replay-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - OFC_CAPTURE_PATH=${OFC_CAPTURE_PATH:-/tmp/ofc_capture.ndjson}
      - OFC_REPLAY_LIMIT=${OFC_REPLAY_LIMIT:-0}
      - OFC_REPLAY_BASELINE_DIGEST=${OFC_REPLAY_BASELINE_DIGEST:-}
    depends_on: *id003
    networks: *id004
    volumes:
      - ./python-worker:/app
      - /tmp:/tmp
    working_dir: /app
    command: >
      sh -c "sleep 180 && while true; do
        OFC_CAPTURE_PATH=$${OFC_CAPTURE_PATH:-/tmp/ofc_capture.ndjson};
        OFC_REPLAY_LIMIT=$${OFC_REPLAY_LIMIT:-0};
        OFC_REPLAY_BASELINE_DIGEST=$${OFC_REPLAY_BASELINE_DIGEST:-};
        if [ -f \"$$OFC_CAPTURE_PATH\" ]; then
          echo 'Running OFC golden replay...';
          LIMIT_FLAG=\"\";
          if [ \"$$OFC_REPLAY_LIMIT\" != \"0\" ]; then
            LIMIT_FLAG=\"--limit $$OFC_REPLAY_LIMIT\";
          fi
          BASELINE_FLAG=\"\";
          if [ -n \"$$OFC_REPLAY_BASELINE_DIGEST\" ]; then
            BASELINE_FLAG=\"--baseline-digest $$OFC_REPLAY_BASELINE_DIGEST\";
          fi
          python3 tools/ofc_golden_replay.py --path \"$$OFC_CAPTURE_PATH\" $$LIMIT_FLAG $$BASELINE_FLAG || true;
          echo 'OFC golden replay done. Sleeping 1 hour...';
        else
          echo 'OFC capture file not found, skipping golden replay...';
        fi
        sleep 3600;
      done"
