      - TRAILING_AFTER_TP1_SUIUSDT=true
      - TRAILING_TP1_OFFSET_ATR_SUIUSDT=0.45

      - TRAILING_AFTER_TP1_APTUSDT=true
      - TRAILING_TP1_OFFSET_ATR_APTUSDT=0.45

      - TRAILING_AFTER_TP1_ARBUSDT=true
