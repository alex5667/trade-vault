      - ./python-worker/handlers:/app/handlers
      - ./python-worker/tools:/app/tools
      - /tmp:/tmp
    restart: on-failure:5
    deploy: &id006
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    command: &id007
      - sh
      - -c
      - sleep 40 && python services/crypto_orderflow_service.py
    container_name: scanner-crypto-orderflow
