services:
  go-worker-1m:
    build:
      context: ./go-worker
      dockerfile: Dockerfile
    container_name: scanner-go-worker-1m
    environment:
    - REDIS_HOST=redis-worker-1
    - REDIS_PORT=6379
    - REDIS_DB=0
    - REDIS_POOL_SIZE=500
    - REDIS_MIN_IDLE_CONNS=15
    - REDIS_MAX_RETRIES=5
    - REDIS_RETRY_MIN_BACKOFF=100ms
    - REDIS_RETRY_MAX_BACKOFF=3s
    - REDIS_DIAL_TIMEOUT=10s
    - REDIS_READ_TIMEOUT=30s
    - REDIS_WRITE_TIMEOUT=30s
    - REDIS_POOL_TIMEOUT=10s
    - BINANCE_WS_TIMEFRAME=kline_1m
    - REDIS_CANDLES_HOST=redis-worker-1
    - REDIS_CANDLES_PORT=6379
    - REDIS_CANDLES_HOST_2=redis-worker-2
    - REDIS_CANDLES_PORT_2=6379
    - REDIS_TICKS_HOST=redis-ticks
    - REDIS_TICKS_PORT=6379
    - PROMETHEUS_PORT=2112
    - BINANCE_MAX_PAIRS_TO_FETCH=300
    - ENABLE_BINANCE_TOP_SYMBOLS=false
    - REQUIRED_SYMBOLS=BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,1000PEPEUSDT,DOGEUSDT,1000SHIBUSDT,1000FLOKIUSDT,1000BONKUSDT,WIFUSDT,SUIUSDT,APTUSDT,ARBUSDT,XAUUSDT
    - BINANCE_MIN_SYMBOLS_REQUIRED=15
    - BINANCE_MAX_PAIRS_TO_ADD=300
    - BINANCE_MIN_TRADES_24H=1000
    - USE_UNIFIED_PIPELINE=safe
    - REDIS_WORKER_HOST=redis-worker-1
    - REDIS_WORKER_PORT=6379
    - FUTURES_WS_ENABLED=true
    - HYPERLIQUID_WS_ENABLED=${HYPERLIQUID_WS_ENABLED:-false}
    - HYPERLIQUID_COINS=${HYPERLIQUID_COINS:-BTC,ETH}
    - HYPERLIQUID_WS_READ_TIMEOUT=90s
    - HYPERLIQUID_WS_PING_PERIOD=20s
    - HYPERLIQUID_WS_WRITE_WAIT=5s
    - HYPERLIQUID_WS_MSG_CHAN_CAP=5000
    - ENABLE_DATA_COLLECTION=true
    - BYBIT_DATA_COLLECTION_ENABLED=false
    - BYBIT_FUTURES_WS_ENABLED=false
    - BYBIT_WS_PING_PERIOD=20s
    - BYBIT_WS_READ_TIMEOUT=90s
    - BYBIT_WS_HANDSHAKE_TIMEOUT=45s
    - BYBIT_WS_DIAL_TIMEOUT=30s
    - BYBIT_WS_TCP_KEEPALIVE=60s
    - BYBIT_WS_WRITE_WAIT=5s
    - BYBIT_FUNDING_SYMBOLS=BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,1000PEPEUSDT,DOGEUSDT,1000SHIBUSDT,1000FLOKIUSDT,1000BONKUSDT,WIFUSDT,SUIUSDT,APTUSDT,ARBUSDT,XAUUSDT
    - FUTURES_SYMBOLS=BTCUSDT,ETHUSDT,BNBUSDT,SOLUSDT,XRPUSDT,1000PEPEUSDT,DOGEUSDT,1000SHIBUSDT,1000FLOKIUSDT,1000BONKUSDT,WIFUSDT,SUIUSDT,APTUSDT,ARBUSDT,XAUUSDT
    - REST_CANDLE_TIMEOUT=60s
    - API_CLIENT_TIMEOUT=30s
    - WS_HANDSHAKE_TIMEOUT=45s
    - WS_DIAL_TIMEOUT=30s
    - WS_TCP_KEEPALIVE=15s
    - FUTURES_WS_READ_TIMEOUT=300s
    - FUTURES_WS_PING_PERIOD=10s
    - FUTURES_WS_WRITE_WAIT=10s
    - LIQ_WS_ENABLED=true
    - LIQ_SOURCES=binance
    depends_on:
      redis:
        condition: service_healthy
      redis-worker-1:
        condition: service_healthy
      redis-worker-2:
        condition: service_healthy
      redis-ticks:
        condition: service_healthy
    networks:
    - scanner-network
    restart: unless-stopped
    command:
    - sh
    - -c
    - "echo \"\u23F3 \u041E\u0436\u0438\u0434\u0430\u043D\u0438\u0435 Redis (\u0443\u0432\u0435\u043B\u0438\u0447\u0435\u043D\
      \u043D\u043E\u0435 \u0432\u0440\u0435\u043C\u044F)...\"\nsleep 5\necho \"\U0001F680 \u0417\u0430\u043F\u0443\u0441\u043A\
      \ go-worker-1m...\"\n./main\n"
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.5'
        reservations:
          memory: 384M
    dns:
    - 8.8.8.8
    - 8.8.4.4
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
    - ./logs:/app/logs
    healthcheck:
      test:
      - CMD
      - wget
      - --no-verbose
      - --tries=1
      - --spider
      - http://localhost:2112/metrics
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
