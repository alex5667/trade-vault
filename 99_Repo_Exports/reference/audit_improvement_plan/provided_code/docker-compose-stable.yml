# Docker Compose для scanner-infra с оптимизированными настройками Redis
# Настроено для стабильной работы с высокими нагрузками

services:
  # Основной Redis с оптимизированными настройками
  redis:
    image: redis:7-alpine
    container_name: scanner-redis
    ports:
      - '6379:6379'
    volumes:
      - scanner-redis-data:/data
      - ./redis-stable-high-load.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - scanner-network
    healthcheck:
      test: 
        - "CMD"
        - "redis-cli"
        - "-h"
        - "localhost"
        - "-p"
        - "6379"
        - "ping"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    # Оптимизированные ресурсы
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '4.0'
        reservations:
          memory: 4G
          cpus: '2.0'
    # Настройки для высокой производительности
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # Настройки для стабильности сети
    sysctls:
      - net.core.somaxconn=65535
      - net.ipv4.tcp_max_syn_backlog=65535
      - net.core.netdev_max_backlog=5000
      - net.ipv4.tcp_keepalive_time=600
      - net.ipv4.tcp_keepalive_intvl=60
      - net.ipv4.tcp_keepalive_probes=3
    # Настройки для производительности
    shm_size: 2gb
    # Переменные окружения для Redis
    environment:
      - REDIS_REPLICATION_MODE=master
    # Логирование
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Go Worker с улучшенными настройками Redis клиента
  go-worker:
    build:
      context: ./go-worker
      dockerfile: Dockerfile
    container_name: scanner-go-worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_POOL_SIZE=500
      - REDIS_MIN_IDLE_CONNS=50
      - REDIS_MAX_RETRIES=50
      - REDIS_DIAL_TIMEOUT=30s
      - REDIS_READ_TIMEOUT=300s
      - REDIS_WRITE_TIMEOUT=300s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - scanner-network
    restart: unless-stopped
    # Ресурсы для go-worker
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    # Настройки для стабильности
    ulimits:
      nofile:
        soft: 32768
        hard: 32768
    # Логирование
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Python Worker с оптимизированными настройками
  python-worker:
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    container_name: scanner-python-worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_SOCKET_TIMEOUT=300
      - REDIS_SOCKET_CONNECT_TIMEOUT=30
      - REDIS_MAX_CONNECTIONS=200
      - REDIS_RETRY_ON_TIMEOUT=true
      - REDIS_HEALTH_CHECK_INTERVAL=30
      # DecisionTrace system (end-to-end signal correlation & diagnostics)
      - DECISION_TRACE_ENABLE=1
      - DECISION_TRACE_MAX_EVENTS=200
      - DECISION_TRACE_DIAG_STREAM=stream:signals:diagnostics
      - SIGNAL_DIAGNOSTICS_STREAM=stream:signals:diagnostics
      - DECISION_TRACE_SIDECAR_UPDATE_ON_SUCCESS=0
      - DECISION_TRACE_LOG_SAMPLE_RATE=0.02
      - DECISION_TRACE_SUMMARY_MAXLEN=240
      - DECISION_TRACE_SIDECAR_MAX_BYTES=120000
      - RUNTIME_REFRESH_EVERY_SEC=10
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - scanner-network
    restart: unless-stopped
    # Ресурсы для python-worker
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    # Логирование
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Trade Back с оптимизированными настройками Redis
  trade-back:
    build:
      context: ./trade_back_fixed
      dockerfile: Dockerfile
    container_name: scanner-trade-back
    ports:
      - '3000:3000'
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_CONNECT_TIMEOUT=15000
      - REDIS_COMMAND_TIMEOUT=10000
      - REDIS_MAX_RETRIES_PER_REQUEST=20
      - REDIS_RETRY_DELAY_ON_FAILOVER=50
      - REDIS_KEEPALIVE=30000
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - scanner-network
    restart: unless-stopped
    # Ресурсы для trade-back
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    # Логирование
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  # Redis Monitor для мониторинга производительности
  redis-monitor:
    image: redis:7-alpine
    container_name: scanner-redis-monitor
    command: >
      sh -c "
        apk add --no-cache redis-tools &&
        while true; do
          echo '=== Redis Stats ===' &&
          redis-cli -h redis info stats &&
          echo '=== Memory Usage ===' &&
          redis-cli -h redis info memory &&
          echo '=== Clients ===' &&
          redis-cli -h redis info clients &&
          echo '=== Replication ===' &&
          redis-cli -h redis info replication &&
          sleep 60
        done
      "
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - scanner-network
    restart: unless-stopped
    # Логирование
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "2"

networks:
  scanner-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    driver_opts:
      com.docker.network.bridge.name: scanner-br
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.host_binding_ipv4: "0.0.0.0"
      com.docker.network.bridge.mtu: "1500"

volumes:
  scanner-redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/docker/volumes/scanner-redis-data
