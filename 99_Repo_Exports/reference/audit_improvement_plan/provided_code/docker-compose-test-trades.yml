version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: scanner_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scanner_analytics"]
      interval: 30s
      timeout: 10s
      retries: 3

  python-worker:
    build:
      context: .
      dockerfile: Dockerfile.python
    volumes:
      - ./start_trade_monitor.sh:/app/start_trade_monitor.sh
      - ./run_trade_monitor.py:/app/run_trade_monitor.py
    environment:
      REDIS_URL: redis://redis:6379/0
      TRADES_DB_DSN: postgresql://postgres:12345@postgres:5432/scanner_analytics
      TM_USE_SYMBOL_LOCKS: "1"
      TM_ORPHAN_HOUSEKEEP_INTERVAL_MS: "30000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["/bin/bash", "/app/start_trade_monitor.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  paper-executor:
    build:
      context: .
      dockerfile: Dockerfile.python
    volumes:
      - ./start_paper_executor.sh:/app/start_paper_executor.sh
    environment:
      REDIS_URL: redis://redis:6379/0
      TRADES_DB_DSN: postgresql://postgres:12345@postgres:5432/scanner_analytics
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["/bin/bash", "/app/start_paper_executor.sh"]
    healthcheck:
      test: ["CMD", "pgrep", "-f", "paper_executor"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
  postgres_data:
