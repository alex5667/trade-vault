      - ./python-worker:/app
      - ./calibration:/app/calibration
    command: >
      sh -c "sleep 60 && while true; do
        echo 'Running Auto Train Confidence Calibrator V2...';
        python3 -m ml_analysis.tools.nightly_confidence_calibrator_bundle_v2 \
          --lookback_days $${CONF_CAL_V2_DAYS:-60} \
          --method $${CONF_CAL_V2_METHOD:-platt} \
          --out_dir /app/calibration \
          --champion_name confidence_calibration_v2.json;
        echo 'Run complete. Sleeping 6 hours...';
        sleep 21600;
      done"
    networks:
      - scanner-network


  trade-ml-sre-monitor-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-trade-ml-sre-monitor-timer
    restart: unless-stopped
    # depends_on:
      # redis-worker-1:
        # condition: service_healthy
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=.:/app
      - ML_CONFIRM_METRICS_STREAM=metrics:ml_confirm
      - NOTIFY_TELEGRAM_STREAM=notify:telegram
      - ML_SRE_WINDOW_MS=600000
      - ML_SRE_PEDGE_P50_MIN=0.20
      - ML_SRE_MISSING_RATE_MAX=0.02
      - ML_SRE_ERR_RATE_MAX=0.01
      - ML_SRE_LAT_P99_MAX_MS=500
      # TB Health Monitoring
      - TB_SRE_ENABLE=1
      - TB_INPUT_STREAM=signals:of:inputs
      - OF_INPUTS_GROUP=tb_labeler_v2
      - TB_LABELS_STREAM=labels:tb
      - TB_SRE_MAX_INPUT_LAG_MS=120000
      - TB_SRE_MAX_LABEL_STALE_MS=300000
      - TB_SRE_MAX_PENDING=5000
      # ML Confirm Stream Content Health
      - ML_SRE_MAX_STALE_MS=600000
      - ML_SRE_PEDGE_ZERO_RATE_MAX=0.05
      - ML_SRE_REQUIRED_MISS_RATE_MAX=0.01
      - ML_SRE_REQUIRED_FIELDS=p_edge,latency_ms,status,allow,ts_ms
      # Meta A/B + Drift checks: enabled now that meta-ab-evaluator-v1-timer and
      # meta-drift-guard-v1-timer write meta_ab:last_ts_ms / meta_drift:last_ts_ms every 30 min.
      # MAX_STALE = window_ms (10 min) by default — override to 3600000 (1h) to tolerate 30-min cycle.
      - META_AB_SRE_ENABLE=1
      - META_SRE_ENABLE=1
      - META_AB_MAX_STALE_MS=3600000
      - META_DRIFT_MAX_STALE_MS=3600000
      - META_SRE_MAX_TRAIN_STALE_MS=86400000
      # Optional: enable these when ABSTAIN/conf is live
      # - ML_SRE_ABSTAIN_RATE_MAX=0.25
      # - ML_SRE_CONF_P50_MIN=0.15
      # Config Suggestions Lifecycle (P6.2)
      - CFG_SUGGESTIONS_SRE_ENABLE=1
      - CFG_SUGGESTIONS_PREFIX=cfg:suggestions:entry_policy
      - CFG_SUGGESTIONS_KIND=meta_freeze
      - CFG_SUGGESTIONS_SCOPES=ALL
      - CFG_SUGGESTIONS_MAX_CREATED_AGE_MS=3600000
      - CFG_SUGGESTIONS_MAX_APPROVED_AGE_MS=600000
      - CFG_SUGGESTIONS_SRE_STRICT=1
      # Emergency Proposals (P6.4)
      - CFG_SUGGESTIONS_EMERGENCY_ENABLE=1
      - CFG_SUGGESTIONS_EMERGENCY_KIND=emergency_apply_stuck
      - CFG_SUGGESTIONS_EMERGENCY_MIN_MS=1800000
      - CFG_SUGGESTIONS_EMERGENCY_COOLDOWN_SEC=3600
      - CFG_SUGGESTIONS_EMERGENCY_TTL_SEC=86400
    # Severity Routing
      - NOTIFY_TELEGRAM_STREAM_WARN=notify:telegram
      - NOTIFY_TELEGRAM_STREAM_CRIT=notify:telegram:crit
      - NOTIFY_TELEGRAM_STREAM_PAGE=notify:telegram:page
      # Trade Pause (P6.5)
      - CFG_SUGGESTIONS_TRADE_PAUSE_ENABLE=1
      - CFG_SUGGESTIONS_TRADE_PAUSE_KIND=trade_pause
      - CFG_SUGGESTIONS_TRADE_UNPAUSE_KIND=trade_unpause
      # Delivery Receipts (P6.5)
      - NOTIFY_REQUIRE_RECEIPT_PAGE=1
      - NOTIFY_RECEIPT_RESEND_SEC=300
      # P6.9 SLO Burn Monitor Suggestions
      - NOTIFY_SLO_EMIT_SUGGESTIONS=1
      - NOTIFY_SLO_SUGGESTIONS_SCOPE=ALL
      - NOTIFY_SLO_SUGGESTION_TTL_SEC=86400

      # Emergency
      - NOTIFY_SLO_EMIT_EMERGENCY=1
      - NOTIFY_SLO_EMERGENCY_KIND=emergency_notify_delivery_degraded
      - NOTIFY_SLO_EMERGENCY_COOLDOWN_SEC=1800

      # Trade Pause
      - NOTIFY_SLO_EMIT_TRADE_PAUSE=1
      - NOTIFY_SLO_TRADE_PAUSE_KIND=trade_pause
      - NOTIFY_SLO_TRADE_PAUSE_SCOPE=ALL
      - NOTIFY_SLO_TRADE_PAUSE_COOLDOWN_SEC=3600
      - NOTIFY_SLO_TRADE_UNPAUSE_KIND=trade_unpause
      - NOTIFY_SLO_TRADE_UNPAUSE_COOLDOWN_SEC=3600
      - NOTIFY_SLO_UNPAUSE_ON_OK=1
      
      # OPS JSON
      - 'NOTIFY_SLO_TRADE_PAUSE_OPS_JSON=[{"op":"hset","key":"cfg:execution_gate","field":"paused","value":"1"}]'
      - 'NOTIFY_SLO_TRADE_UNPAUSE_OPS_JSON=[{"op":"hset","key":"cfg:execution_gate","field":"paused","value":"0"}]'
      - NOTIFY_SLO_ALLOW_NOOP_SUGGESTIONS=0
      # P32 Meta Coverage Outcome Guard
      - ENABLE_META_COV_OUTCOME_GUARD=1
      - META_COV_OUTCOME_EMIT_SUGGESTION=1
      # P33 Meta Coverage Auto-Downgrade
      - ENABLE_META_COV_OUTCOME_AUTO_APPLY=1
      - TRADE_EVENTS_STREAM=trades:closed
      - ENABLE_LOB_PRESSURE_SMOKE=1
      - META_ENFORCE_COV_AUTO_APPROVE=1
      - META_ENFORCE_COV_APPROVALS_REQUIRED=2
      # P40 Producer Contract Check
      - ENABLE_OF_GATE_CONTRACT_CHECK=1
      # P71 Policy Effectiveness Report
      - ENABLE_POLICY_EFFECTIVENESS_REPORT=1
    working_dir: /app
    volumes:
      - ./python-worker:/app
    command: >
      sh -c "sleep 30 && while true; do\
        NF=/tmp/.sre_notify_ts;\
        if [ ! -f $$NF ] || find $$NF -mmin +60 | grep -q .; then\
          echo 'Running SRE Monitors WITH notify (1h gate)...';\
          python3 -m tools.sre_monitor_all_v3 --emit-metrics --notify --emit-suggestions;\
          touch $$NF;\
        else\
          echo 'Running SRE Monitors metrics-only (notify suppressed)...';\
          python3 -m tools.sre_monitor_all_v3 --emit-metrics --emit-suggestions;\
        fi;\
        echo 'Monitor done. Sleeping 10 minutes...';\
        sleep 600;\
      done"
    networks:
      - scanner-network

