      - GOLDEN_REPLAY_OUTDIR=/var/lib/scanner/golden_replay
      - GR_CAPTURE_EXPORTER_PORT=9206
      - GR_CAPTURE_EXPORTER_SCRAPE_SEC=5
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
    working_dir: /app
    ports:
      - "9206:9206"
    volumes:
      - ./python-worker:/app
      - /var/lib/scanner:/var/lib/scanner
    command: ["python3", "-u", "orderflow_services/golden_replay_capture_exporter_p112.py"]
    networks:
