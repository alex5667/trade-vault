      - AUTO_APPLY_BLOCK_PREFIX=cfg:suggestions:entry_policy:auto_apply_block
      - META_COV_GUARD_APPLY=1
      - META_COV_GUARD_MAX_STALE_MS=21600000        # 6h
      - META_COV_GUARD_BLOCK_ON_QUARANTINE=1
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
    working_dir: /app
    volumes:
