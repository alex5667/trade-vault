      - CONF_CAL_VERSIONS_DIR=/app/calibration/history
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - conf-cal-status:/shared/conf_cal
      - ./calibration:/app/calibration
      - /var/log/trade:/var/log/trade:ro
    command: >
      sh -c "sleep 60 && while true; do
        echo 'Running Confidence Cal Live Health Loop...';
        python3 -m ml_analysis.tools.confidence_cal_live_health_loop_v1;
        echo 'Done. Sleeping 1 hour...';
        sleep 3600;
      done"
    networks:
      - scanner-network

