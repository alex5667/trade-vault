services:
  # Tick Gate Metrics Aggregator (Step 23 - v2)
  # Consumer group-based aggregator with self-diagnostics
  # Exposes /metrics (port 9112) and /health endpoints
  tick-gate-aggregator:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: tick-gate-aggregator
    restart: unless-stopped
    environment:
      # Redis connection
      - REDIS_URL=redis://redis-worker-1:6379/0
      - TICK_GATE_REDIS_STREAM=ops:tick_quality_gate
      # Consumer group settings
      - TICK_GATE_CONSUMER_GROUP=tick_gate_agg
      - TICK_GATE_CONSUMER_NAME=agg_1
      - TICK_GATE_BLOCK_MS=2000
      - TICK_GATE_COUNT=200
      # HTTP server
      - TICK_GATE_METRICS_ADDR=0.0.0.0
      - TICK_GATE_METRICS_PORT=9112
      # Cardinality guard for reason label
      - TICK_GATE_REASON_LABEL_MODE=collapse
      - TICK_GATE_REASON_ALLOWLIST=skew,unknown_side,process_p99,e2e_p99,ts_now,ts_stream,insufficient_data,metrics_unavailable
      # Self-diagnostics cadence (seconds)
      - TICK_GATE_SELF_DIAG_INTERVAL_S=15
      - PYTHONPATH=.:/app
    working_dir: /app
    ports:
      - "9112:9112"
    volumes:
      - ./python-worker/services:/app/services
      - ./python-worker/core:/app/core
      - ./python-worker/infra:/app/infra
      - ./python-worker/common:/app/common
      - ./python-worker/persistence:/app/persistence
      - ./python-worker/risk:/app/risk
      - ./python-worker/handlers:/app/handlers
      - ./python-worker/tools:/app/tools
      - ./python-worker/tests:/app/tests
    command: ["python", "-m", "tools.tick_gate_metrics_aggregator_v2"]
    networks:
      - scanner-network

  # Meta Schema Registry Check (Step 29 - P26)
  # Smoke test on startup to verify v1-v5 schemas are wired correctly
  meta-schema-registry-check:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-meta-schema-registry-check
    restart: "no"
    environment:
      - PYTHONPATH=.:/app
    working_dir: /app
    volumes:
      - ./python-worker:/app
    command: ["python3", "-u", "tools/test_meta_schema_registry_v6.py"]
    networks:
      - scanner-network

  conf-score-tuning-exporter:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-conf-score-tuning-exporter
    restart: always
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - DYN_CFG_KEY=settings:dynamic_cfg
      - EXPORTER_ADDR=0.0.0.0
      - EXPORTER_PORT=9117
      - PYTHONPATH=.:/app
    ports:
      - "9117:9117"
    working_dir: /app
    volumes:
      - ./python-worker:/app
    command: ["python3", "-u", "orderflow_services/conf_score_weight_tuning_exporter_v1.py"]
    networks:
      - scanner-network

  conf-score-tuning-nightly-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-conf-score-tuning-nightly-timer
    restart: always
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - DYN_CFG_KEY=settings:dynamic_cfg
      - REPLAY_INPUTS_ARCHIVE_DIR=/var/lib/trade/replay_inputs_archives
      - TRADES_DB_DSN=postgresql://trading:trading_password@scanner-postgres:5432/scanner_analytics
      - CONF_SCORE_TUNING_OUT_DIR=/var/lib/trade/conf_score_weight_tuning
      - CONF_SCORE_TUNING_DAYS=30
      - CONF_SCORE_TUNING_MIN_JOINED_ROWS=300
      - CONF_SCORE_TUNING_SYMBOLS=BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT
      - CONF_SCORE_TUNING_APPLY=0
      - CONF_SCORE_TUNING_FIELD=conf_score_weight_tuning_json
      - CONF_SCORE_TUNING_BACKUP_FIELD=conf_score_weight_tuning_json_prev
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - ./ml_analysis:/app/ml_analysis
      - /var/lib/trade/replay_inputs_archives:/var/lib/trade/replay_inputs_archives
      - /var/lib/trade/conf_score_weight_tuning:/var/lib/trade/conf_score_weight_tuning
    command: >
      sh -c "sleep 45 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        # Run daily at 22:00 UTC (after NYSE close)
        if [ \"$$HOUR\" -eq 22 ] && [ \"$$MIN\" -ge 0 ] && [ \"$$MIN\" -lt 15 ]; then
          echo 'Running Nightly Confidence Scorer Weight Tuning...';
          python3 -u orderflow_services/nightly_conf_score_weight_tuning_bundle_v1.py;
          echo 'Tuning done. Sleeping until next day...';
          sleep 82800;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

  # Meta Skew Guard Nightly (Stage 4 - v7)
  # Nightly audit chain: export -> skew audit -> write freeze guard
  # Prevents unsafe ramps by automatically freezing/capping if drift is detected
  meta-skew-guard-nightly-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-meta-skew-guard-nightly-timer
    restart: always
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - META_FREEZE_FILE=/var/lib/trade/meta_guard/meta_freeze.json
      - META_SKEW_OUT_DIR=/var/lib/trade/meta_guard/reports
      - META_TRAIN_NDJSON=/var/lib/trade/training/latest_confirm_train_v7.ndjson
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - /var/lib/trade:/var/lib/trade
    command: >
      sh -c "sleep 60 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        # Run daily at 22:30 UTC (after conf-score-tuning at 22:00)
        if [ \"$$HOUR\" -eq 22 ] && [ \"$$MIN\" -ge 30 ] && [ \"$$MIN\" -lt 45 ]; then
          echo 'Running Nightly Meta Skew Guard (Stage 4)...';
          python3 -u tools/nightly_meta_skew_guard_v7.py \
            --train-ndjson \"$$META_TRAIN_NDJSON\" \
            --out-dir \"$$META_SKEW_OUT_DIR\" \
            --freeze-json \"$$META_FREEZE_FILE\";
          echo 'Guard updated. Sleeping until next day...';
          sleep 82800;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

  # Stage 4: A/B Winner Evaluator (v1)
  # Deterministic nightly comparison between champion/challenger models
  # Automatically ramps meta_ab_challenger_share in Redis based on performance
  meta-ab-winner-evaluator-v1:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-meta-ab-winner-evaluator-v1
    restart: always
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - META_P_MIN=0.6
      - META_MIN_DELTA_EXP_R=0.005
      - META_TAIL_SLACK=0.1                      # 1.1x ratio
      - META_RAMP_STEP=0.05
      - META_SHARE_MAX=0.5
      - META_TRAIN_NDJSON=/var/lib/trade/training/latest_confirm_train_v7.ndjson
      - META_MODEL_CHAMPION_PATH=/var/lib/trade/models/meta_model_v7_champion.json
      - META_MODEL_CHALLENGER_PATH=/var/lib/trade/models/meta_model_v7_challenger.json
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - /var/lib/trade:/var/lib/trade
    command: >
      sh -c "sleep 120 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        # Run daily at 23:00 UTC (after meta-skew-guard at 22:30)
        if [ \"$$HOUR\" -eq 23 ] && [ \"$$MIN\" -ge 0 ] && [ \"$$MIN\" -lt 20 ]; then
          echo 'Running Stage 4 A/B Winner Evaluator...';
          python3 -u tools/meta_ab_winner_evaluator_v1.py \
            --dataset \"$$META_TRAIN_NDJSON\" \
            --model-champion \"$$META_MODEL_CHAMPION_PATH\" \
            --model-challenger \"$$META_MODEL_CHALLENGER_PATH\" \
            --p-min \"$$META_P_MIN\" \
            --min-delta-exp-r \"$$META_MIN_DELTA_EXP_R\" \
            --tail-slack \"$$META_TAIL_SLACK\" \
            --ramp-step \"$$META_RAMP_STEP\" \
            --share-max \"$$META_SHARE_MAX\" \
            --apply;
          echo 'Evaluator done. Sleeping until next day...';
          sleep 82800;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

  # Stage 4: A/B Winner Evaluator (v2) — fixed p_min + bootstrap CI + stratified guard
  # Runs daily at 04:30 UTC (30 min after v1 at 04:00, same dataset/models).
  # V1 is kept for research (per-model threshold scan); v2 uses the deployable p_min.
  # Key additions over v1:
  #   - Fixed p_min: both models scored at the same threshold (no false winner via threshold shift)
  #   - Bootstrap CI: CI_lo(ΔexpR) > 0 required before declaring challenger winner
  #   - Stratified worst-case guard: blocks ramp if top-K strata show degradation
  #   - Freeze cap: respects max_ab_share from meta_freeze_file if present
  meta-ab-winner-evaluator-v2:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-meta-ab-winner-evaluator-v2
    restart: always
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      # Fixed deployable threshold — MUST match runtime p_min to avoid false winners
      - META_P_MIN=0.55
      # Minimum eligible rows to produce a non-tie result
      - META_AB_MIN_ELIGIBLE=1000
      # Minimum expR improvement per candidate to declare challenger winner
      - META_AB_MIN_DELTA_EXPR=0.002
      # Tail event: executed and r_mult <= tail_r
      - META_AB_TAIL_R=-1.0
      # Max allowed Δ tail_rate_per_candidate
      - META_AB_TAIL_SLACK=0.01
      # Bootstrap CI (400 iters, 95% CI, seed=7)
      - META_AB_BOOTSTRAP=1
      - META_AB_BOOT_N=400
      - META_AB_BOOT_ALPHA=0.05
      - META_AB_BOOT_SEED=7
      # 1=require CI_lo(ΔexpR) > 0 before declaring challenger winner
      - META_AB_REQUIRE_CI_POSITIVE=1
      # Stratification: check top-10 largest strata for worst-case guard
      - META_AB_STRATA=symbol
      - META_AB_STRATA_TOPK=10
      # Ramp config
      - META_AB_RAMP_STEP=0.05
      - META_AB_MAX_SHARE=0.50
      - META_AB_CURRENT_SHARE=0.0
      # 1=write winner+share to Redis dynamic cfg hash
      - META_AB_APPLY=1
      # Paths (same as v1 — compare on same data)
      - META_TRAIN_NDJSON=/var/lib/trade/training/latest_confirm_train_v7.ndjson
      - META_MODEL_CHAMPION_PATH=/var/lib/trade/models/meta_model_v7_champion.json
      - META_MODEL_CHALLENGER_PATH=/var/lib/trade/models/meta_model_v7_challenger.json
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - /var/lib/trade:/var/lib/trade
    command: >
      sh -c "sleep 150 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        # Run daily at 23:30 UTC (after v1 at 23:00, after meta-skew-guard at 22:30)
        if [ \"$$HOUR\" -eq 23 ] && [ \"$$MIN\" -ge 30 ] && [ \"$$MIN\" -lt 50 ]; then
          echo 'Running Stage 4 A/B Winner Evaluator v2 (fixed p_min + CI + strata)...';
          python3 -u -m tools.meta_ab_winner_evaluator_v2 \
            --in-ndjson \"$$META_TRAIN_NDJSON\" \
            --champion-model \"$$META_MODEL_CHAMPION_PATH\" \
            --challenger-model \"$$META_MODEL_CHALLENGER_PATH\" \
            --p-min \"$$META_P_MIN\" \
            --min-n \"$$META_AB_MIN_ELIGIBLE\" \
            --min-delta-exp-r \"$$META_AB_MIN_DELTA_EXPR\" \
            --tail-r \"$$META_AB_TAIL_R\" \
            --tail-slack \"$$META_AB_TAIL_SLACK\" \
            --bootstrap \"$$META_AB_BOOTSTRAP\" \
            --boot-n \"$$META_AB_BOOT_N\" \
            --strata \"$$META_AB_STRATA\" \
            --strata-topk \"$$META_AB_STRATA_TOPK\" \
            --ramp-step \"$$META_AB_RAMP_STEP\" \
            --max-share \"$$META_AB_MAX_SHARE\" \
            --current-share \"$$META_AB_CURRENT_SHARE\" \
            --apply \"$$META_AB_APPLY\";
          echo 'Evaluator v2 done. Sleeping until next day...';
          sleep 82800;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

  # Meta AB v2 Report Exporter (Stage 4)
  # Exposes metrics regarding policy guardrail block reasons and AB performance
  meta-ab-v2-report-exporter:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-meta-ab-v2-report-exporter
    restart: unless-stopped
    environment:
      - META_AB_V2_REPORT_JSON=/var/lib/trade/of_reports/meta_ab_v2/ab_v2_report.json
      - META_AB_V2_EXPORTER_PORT=9634
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
    working_dir: /app
    ports:
      - "9634:9634"
    volumes:
      - ./python-worker:/app
      - /var/lib/trade/of_reports:/var/lib/trade/of_reports
    command: ["python3", "-m", "tools.meta_ab_v2_report_exporter_v1", "--port", "9634"]
    networks:
      - scanner-network

  # Meta A/B Evaluator v1 — heartbeat worker
  # Reads trades:closed, computes champion vs challenger arm stats (meta_arm field in evidence).
  # Writes: meta_ab:last_ts_ms + meta_ab:last_report + metrics:meta_ab stream.
  # Required by ml_sre_monitor (META_AB_SRE_ENABLE=1): stale check uses meta_ab:last_ts_ms.
  meta-ab-evaluator-v1-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-meta-ab-evaluator-v1-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=.:/app
      - TRADES_CLOSED_STREAM=trades:closed
      - META_AB_MIN_N=200
      - META_AB_MIN_DELTA_MEAN_R=0.05
      - META_AB_SINCE_MIN=720
    working_dir: /app
    volumes:
      - ./python-worker:/app
    command: ["sh", "-c", "sleep 60 && while true; do echo 'Running Meta A/B Evaluator v1...'; python3 tools/meta_ab_evaluator_v1.py --since-min 720 --min-n 200 --min-delta-mean-r 0.05; echo 'Meta A/B evaluation done. Sleeping 30 minutes...'; sleep 1800; done"]
    networks:
      - scanner-network

  # Meta Drift Guard v1 — heartbeat worker
  # Reads trades:closed, checks meta model prediction quality (meta_p field in evidence).
  # Writes: meta_drift:last_ts_ms + meta_drift:last_report.
  # Required by ml_sre_monitor (META_AB_SRE_ENABLE=1): stale check uses meta_drift:last_ts_ms.
  meta-drift-guard-v1-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-meta-drift-guard-v1-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=.:/app
      - TRADES_CLOSED_STREAM=trades:closed
      - META_DRIFT_SINCE_MIN=180
      - META_DRIFT_PEDGE_P50_MIN=0.0
      - META_DRIFT_PEDGE_ZERO_RATE_MAX=1.01
      - META_DRIFT_MISSING_META_RATE_MAX=1.01
      - META_DRIFT_COV_P50_MIN=0.0
      - META_DRIFT_COV_BAD_RATE_MAX=1.01
      - META_DRIFT_SUGGESTIONS_PREFIX=cfg:suggestions:entry_policy
      - META_DRIFT_SUGGESTIONS_SCOPE=ALL
      - META_DRIFT_SUGGESTIONS_TTL_SEC=86400
      - META_DRIFT_SUGGESTIONS_COOLDOWN_MIN=60
      - "CFG_HASH_PREFIX=config:orderflow:"
      - CANARY_SYMBOLS=BTCUSDT,ETHUSDT
      - META_FREEZE_MODE=OPEN
      - NOTIFY_TELEGRAM_STREAM=notify:telegram
    working_dir: /app
    volumes:
      - ./python-worker:/app
    command: ["sh", "-c", "sleep 90 && while true; do echo 'Running Meta Drift Guard v1...'; python3 tools/meta_drift_guard_v1.py --since-min 180 --emit-suggestion --unfreeze-on-ok --notify; echo 'Meta drift guard done. Sleeping 30 minutes...'; sleep 1800; done"]
    networks:
      - scanner-network

  # Confirmations Coverage Exporter (Stage 4 drift guard)
  confirmations-coverage-exporter:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-confirmations-coverage-exporter
    restart: unless-stopped
    environment:
      - CONFIRMATIONS_COVERAGE_OUT_JSON=/var/lib/trade/of_reports/confirmations_coverage_report.json
      - CONFIRMATIONS_COVERAGE_EXPORTER_PORT=9628
      - CONFIRMATIONS_COVERAGE_REPORT_STALE_SEC=129600
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
    working_dir: /app
    ports:
      - "9628:9628"
    volumes:
      - ./python-worker:/app
      - /var/lib/trade/of_reports:/var/lib/trade/of_reports
    command: ["python3", "-m", "tools.confirmations_coverage_report_exporter_v1", "--port", "9628"]
    networks:
      - scanner-network


  # Tick Gate Reaper (Step 24)
  # PEL safety net - XAUTOCLAIM old pending entries to prevent consumer group stalling
  # Exposes /metrics (port 9113)
  tick-gate-reaper:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: tick-gate-reaper
    restart: unless-stopped
    environment:
      # Redis connection
      - REDIS_URL=redis://redis-worker-1:6379/0
      # Stream/group to maintain (must match aggregator)
      - TICK_GATE_REDIS_STREAM=ops:tick_quality_gate
      - TICK_GATE_REDIS_GROUP=tick_gate_agg
      # Reaper behavior
      - TICK_GATE_REAPER_IDLE_MS=300000    # 5 minutes
      - TICK_GATE_REAPER_CLAIM_COUNT=200
      - TICK_GATE_REAPER_INTERVAL_S=15
      - TICK_GATE_REAPER_ACK_ONLY=1         # 1=claim+ack, 0=claim-only
      # Metrics
      - TICK_GATE_REAPER_METRICS_PORT=9113
      - PYTHONPATH=.:/app
    working_dir: /app
    ports:
      - "9113:9113"
    volumes:
      - ./python-worker/services:/app/services
      - ./python-worker/core:/app/core
      - ./python-worker/infra:/app/infra
      - ./python-worker/common:/app/common
      - ./python-worker/persistence:/app/persistence
      - ./python-worker/risk:/app/risk
      - ./python-worker/handlers:/app/handlers
      - ./python-worker/tools:/app/tools
    command: ["python", "-m", "tools.tick_gate_group_reaper"]
    networks:
      - scanner-network

  # Auto-Apply Tick Gate Blocker (Step 25)
  # Daemon that monitors tick quality gate and blocks auto-apply when quality degrades
  # Publishes block state to Redis keys, audit events to ops stream, and Prometheus metrics
  # Exposes /metrics (port 9114)
  # Step 26: Auto-Apply Tick Gate Blocker v2 (anti-flap)
  # Интегрировано с infra/systemd/auto-apply-tick-gate-blocker-v2.service
  # Периодически проверяет tick-quality gate и устанавливает/снимает блокировку auto-apply
  # Anti-flap logic: min hold time, pass streak, reason pinning
  auto-apply-tick-gate-blocker-v2:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-auto-apply-tick-gate-blocker-v2
    restart: unless-stopped
#     depends_on:
      # redis-worker-1:
      #   condition: service_healthy
#       redis-ticks:
#         condition: service_healthy

    environment:
      # Redis connection
      - REDIS_URL=redis://redis-worker-1:6379/0
      # Tick gate metrics source (must be reachable from blocker container)
      - TICK_GATE_METRICS_URL=http://crypto-orderflow-service:8001/metrics
      - TICK_GATE_WINDOW_S=60
      - TICK_GATE_SYMBOL=
      # Blocker behavior: loop interval, anti-flap parameters (v2)
      - AUTO_APPLY_BLOCKER_INTERVAL_S=30
      - AUTO_APPLY_BLOCK_MIN_HOLD_S=300
      - AUTO_APPLY_UNBLOCK_PASS_STREAK=3
      - AUTO_APPLY_BLOCK_REASON_PIN_S=600
      - AUTO_APPLY_BLOCKER_INSUFF_MODE=fail_open
      # Redis keys for block state (prefix + suffix)
      - AUTO_APPLY_BLOCK_PREFIX=cfg:suggestions:entry_policy:auto_apply_block
      - AUTO_APPLY_BLOCK_TTL_S=900
      # Ops stream for audit trail
      - AUTO_APPLY_TICK_GATE_PUBLISH_REDIS=1
      - AUTO_APPLY_TICK_GATE_STREAM=ops:auto_apply_tick_gate
      - AUTO_APPLY_TICK_GATE_STREAM_MAXLEN=20000

      # Python environment
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
    working_dir: /app
    ports:
      - "9114:9114"
    volumes:
      - ./python-worker/services:/app/services
      - ./python-worker/core:/app/core
      - ./python-worker/infra:/app/infra
      - ./python-worker/common:/app/common
      - ./python-worker/persistence:/app/persistence
      - ./python-worker/risk:/app/risk
      - ./python-worker/handlers:/app/handlers
      - ./python-worker/tools:/app/tools
    command: ["python", "-m", "tools.auto_apply_tick_gate_blocker_v2"]
    networks:
      - scanner-network
#    depends_on:
#      redis-worker-1:
#        condition: service_healthy



  # Auto-Apply Tick Gate Exporter (Step 27)
  # Prometheus exporter for auto-apply block state
  # Exposes /metrics (port 9118)
  auto-apply-tick-gate-exporter:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: auto-apply-tick-gate-exporter
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      # Key prefix used by blocker (Step25/26)
      - AUTO_APPLY_BLOCK_PREFIX=cfg:suggestions:entry_policy:auto_apply_block
      # Exporter config
      - AUTO_APPLY_EXPORTER_PORT=9118
      - AUTO_APPLY_EXPORTER_POLL_S=5
      - AUTO_APPLY_REASON_LABEL_MODE=collapse
      - AUTO_APPLY_REASON_ALLOWLIST=unknown_side,skew,process_p99,e2e_p99,ts_now,ts_stream,fail,pass
      - PYTHONPATH=.:/app
    working_dir: /app
    ports:
      - "9118:9118"
    volumes:
      - ./python-worker/services:/app/services
      - ./python-worker/core:/app/core
      - ./python-worker/infra:/app/infra
      - ./python-worker/common:/app/common
      - ./python-worker/persistence:/app/persistence
      - ./python-worker/risk:/app/risk
      - ./python-worker/handlers:/app/handlers
      - ./python-worker/tools:/app/tools
    command: ["python", "-m", "tools.auto_apply_tick_gate_exporter"]
    networks:
