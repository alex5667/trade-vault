  # FGH Offline Edge Stack Dataset Builder Timer
  # Runs daily at 01:30 UTC to build dataset from Redis streams / archives
  fgh-dataset-builder-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-fgh-dataset-builder-timer
    restart: always
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
      - ML_REPLAY_STREAM=signals:of:inputs
      - TRADES_CLOSED_STREAM=trades:closed
      - ML_FEATURE_SCHEMA_VER=v7_of
      - SIGNALS_ARCHIVE_DIR=/var/lib/trade/archives/signals
      - TRADES_CLOSED_ARCHIVE_DIR=/var/lib/trade/archives/trades
      - ARCHIVE_LOOKBACK_DAYS=7
      - FILE_FALLBACK=1
      - FGH_BUILDER_OUT_JSONL=/var/lib/trade/training/latest_edge_stack_fgh.ndjson
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - /var/lib/trade:/var/lib/trade
    command: >
      sh -c "sleep 60 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        if [ \"$$HOUR\" -eq 21 ] && [ \"$$MIN\" -ge 30 ] && [ \"$$MIN\" -lt 45 ]; then
          echo '[fgh-builder] Running Offline Builder for Edge Stack (FGH)...';
          python3 -m ml_analysis.tools.build_edge_stack_dataset_from_redis \
            --out_jsonl \"$$FGH_BUILDER_OUT_JSONL\" \
            --feature_schema_ver \"$$ML_FEATURE_SCHEMA_VER\";
          echo '[fgh-builder] Done. Outputs: '\"$$FGH_BUILDER_OUT_JSONL\";
          sleep 82800;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

  # Ablation E-block + Denylist Auto-Generator Timer
  # Offline only: drop-group retrain for Hawkes/VPIN/limit-add features.
  # Runs daily at 05:30 UTC after nightly edge-stack training is done.
  # Outputs: ablation_overall.csv, ablation_by_regime.csv,
  #          importance_e_features.csv, denylist_autogen.json/.txt
  # To activate auto-denylist at runtime set ML_FEATURE_DENYLIST_PATH=$$ABLATION_E_OUT_DIR/denylist_autogen.json
  ablation-e-denylist-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-ablation-e-denylist-timer
    restart: always
    environment:
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
      # Dataset produced by nightly edge-stack training (v7 schema)
      - ABLATION_E_DATA_PATH=/var/lib/trade/training/edge_train_latest.parquet
      - ABLATION_E_META_JSON=/var/lib/trade/training/edge_train_latest.parquet.meta.json
      - ABLATION_E_OUT_DIR=/var/lib/trade/ablation/e_block
      # Model & CV config (conservative defaults, offline safe)
      - ABLATION_E_MODEL=gbdt          # gbdt | lr
      - ABLATION_E_N_SPLITS=5
      - ABLATION_E_PURGE_MS=60000      # 1-min embargo between train/test
      - ABLATION_E_MIN_TRAIN_ROWS=10000
      # Auto-denylist threshold: features with perm AUC-drop <= this go to denylist
      - ABLATION_E_DENY_MIN_AUC_DROP=0.0005
      - ABLATION_E_DENY_MAX_FEATURES=64
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - ./python-worker/ml_analysis:/app/ml_analysis
      - /var/lib/trade/training:/var/lib/trade/training
      - /var/lib/trade/ablation:/var/lib/trade/ablation
    command: >
      sh -c "sleep 90 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        # Run daily at 05:30 UTC (after nightly edge-stack train at ~04:30)
        if [ \"$$HOUR\" -eq 0 ] && [ \"$$MIN\" -ge 30 ] && [ \"$$MIN\" -lt 55 ]; then
          if [ ! -f \"$$ABLATION_E_DATA_PATH\" ]; then
            echo '[ablation-e] Dataset not found, skipping: '\"$$ABLATION_E_DATA_PATH\";
            sleep 82800;
            continue;
          fi;
          if [ ! -f \"$$ABLATION_E_META_JSON\" ]; then
            echo '[ablation-e] Meta JSON not found, skipping: '\"$$ABLATION_E_META_JSON\";
            sleep 82800;
            continue;
          fi;
          echo '[ablation-e] Running E-block drop-group ablation + denylist gen...';
          python3 -m ml_analysis.tools.ablation_groups_e_v1 \
            --data_path \"$$ABLATION_E_DATA_PATH\" \
            --meta_json \"$$ABLATION_E_META_JSON\" \
            --out_dir \"$$ABLATION_E_OUT_DIR\" \
            --model \"$$ABLATION_E_MODEL\" \
            --n_splits \"$$ABLATION_E_N_SPLITS\" \
            --purge_ms \"$$ABLATION_E_PURGE_MS\" \
            --min_train_rows \"$$ABLATION_E_MIN_TRAIN_ROWS\" \
            --deny_min_perm_auc_drop \"$$ABLATION_E_DENY_MIN_AUC_DROP\" \
            --deny_max_features \"$$ABLATION_E_DENY_MAX_FEATURES\";
          echo '[ablation-e] Done. Outputs: '\"$$ABLATION_E_OUT_DIR\";
          echo '[ablation-e] Sleeping until next day...';
          sleep 82800;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

