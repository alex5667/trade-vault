  ml-nightly-edge-stack-train-bundle:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-ml-nightly-edge-stack-train-bundle
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
      # Dataset build guardrail: lowered from default 2000 to match actual Redis volume
      - EDGE_STACK_MIN_JOINED=300
      # v9_of: pinned snapshot of infer_feature_cols() from 2026-03-03 run 20260303_175837
      # Coverage: 128 numeric keys = 100% of actual signals:of:inputs indicators
      # Created in core/ml_feature_schema_v9_of.py, registered in feature_registry.py
      - ML_FEATURE_SCHEMA_VER=v9_of
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - /var/lib/trade:/var/lib/trade
    command: >
      sh -c "sleep 60 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        if [ \"$$HOUR\" -eq 0 ] && [ \"$$MIN\" -ge 0 ] && [ \"$$MIN\" -lt 20 ]; then
          echo 'Running Nightly Edge Stack v1 Train Bundle...';
          python3 -m ml_analysis.tools.nightly_edge_stack_v1_train_bundle;
          echo 'Done. Sleeping until next day...';
          sleep 82800;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

