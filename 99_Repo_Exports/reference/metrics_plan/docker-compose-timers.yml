  # LiqMap Snapshot Service (patch A1)
  # Continuously consumes stream:liq_evt and writes liqmap:snapshot:{SYMBOL}:{WINDOW}
  # keys to Redis, used by _inject_liqmap_features in tick_processor.
  # Restart on exit (services.liquidation_map_service has its own run_forever loop;
  # the outer sh -c restarts it if the process crashes).
  liqmap-snapshot-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-liqmap-snapshot-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      # Key prefix where snapshots are written (must match tick_processor LIQMAP_SNAPSHOT_KEY_PREFIX)
      - LIQMAP_SNAPSHOT_KEY_PREFIX=liqmap:snapshot
      # Windows to build snapshots for
      - LIQMAP_WINDOWS=5m,1h
      # Liquidation event stream (written by Go worker)
      - LIQ_EVT_STREAM=stream:liq_evt
      - LIQMAP_GROUP=liqmap_group
      - LIQMAP_CONSUMER=liqmap_snap_1
      # Snapshot TTL in seconds (must be > max refresh interval)
      - LIQMAP_SNAPSHOT_TTL_SEC=300
      # Publish cycle interval in seconds
      - LIQMAP_PUBLISH_INTERVAL_S=5
      # Optional: publish snapshots to a stream for WS push (disabled by default)
      - LIQMAP_PUBLISH_STREAM_ENABLED=0
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
    working_dir: /app
    volumes:
      - ./python-worker:/app
    command: >
      sh -c "sleep 10 && while true; do
        echo '[liqmap-snapshot-timer] Starting liquidation_map_service...';
        python3 -u services/liquidation_map_service.py;
        echo '[liqmap-snapshot-timer] Service exited, restarting in 5s...';
        sleep 5;
      done"
    networks:
      - scanner-network

  preflight-baseline-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-preflight-baseline-timer
    restart: unless-stopped
    environment:
      - PREFLIGHT_METRICS_URL=http://crypto-orderflow-service:8001/metrics
      - PREFLIGHT_PROM_URL=http://trade-prometheus:9090
      - PREFLIGHT_COMPOSE=/app/docker-compose-crypto-orderflow.yml
      - PREFLIGHT_OUT=/var/lib/trade/of_reports/preflight_baseline.json
      - PYTHONPATH=.:/app
    working_dir: /app
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'sh' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - .:/app
      - /var/lib/trade/of_reports:/var/lib/trade/of_reports
    command: >
      sh -c "sleep 30 && while true; do
        echo '[preflight-baseline-timer] Running preflight baseline...';
        python3 -u tools/preflight_baseline_v1.py;
        echo '[preflight-baseline-timer] Done. Sleeping 24h...';
        sleep 86400;
      done"
    networks:
      - scanner-network


  # Added for patch_H2_liqmap_kpi_storage.git.diff
  trade-kpi-liqmap-archiver-timer:
