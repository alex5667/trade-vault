  # DQ Gate Config Timer
  # Periodically applies DQ Gate penalty-only configuration to Redis
  # Ensures configuration persistence even after Redis restarts
  dq-gate-config-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-dq-gate-config-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=.:/app
    working_dir: /app
    volumes:
      - ./python-worker:/app
    command: >
      sh -c "sleep 60 && while true; do
        echo 'Applying DQ Gate Penalty-Only Config...';
        python3 -c \"import redis, os; r = redis.from_url(os.environ['REDIS_URL'], decode_responses=True); [r.hset(p[1], p[2], p[3]) for line in open('/app/ops/dynamic_cfg_examples/dq_gate_penalty_only.hset') for p in [line.strip().split()] if line.strip() and not line.startswith('#') and p[0].upper() == 'HSET']\";
        echo 'DQ Gate config applied. Sleeping 10 minutes...';
        sleep 600;
      done"
    networks:
      - scanner-network

