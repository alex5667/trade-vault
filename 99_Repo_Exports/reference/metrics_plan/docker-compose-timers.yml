#    depends_on:
#      redis-worker-1:
#        condition: service_healthy

  # Auto-Apply Tick Gate Daily Report Timer (Step 27)
  # Generates daily report of auto-apply blocking decisions
  auto-apply-tick-gate-report-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-auto-apply-tick-gate-report-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=.:/app
      - AUTO_APPLY_TICK_GATE_STREAM=ops:auto_apply_tick_gate
    working_dir: /app
    volumes:
      - ./python-worker:/app
    command: >
      sh -c "sleep 60 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        # Run at 07:00 UTC
        if [ \"$$HOUR\" -eq 7 ] && [ \"$$MIN\" -ge 0 ] && [ \"$$MIN\" -lt 10 ]; then
          echo 'Running Auto-Apply Tick Gate Daily Report...';
          python3 -m tools.auto_apply_tick_gate_daily_report --hours 24;
          echo 'Report done. Sleeping 1 hour...';
          sleep 3600;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

  # Auto-Apply Job Timer (Step 28)
  # Unified orchestrator for auto-apply commands with tick-gate blocking
  # Runs every 5 minutes, checks tick-gate block before executing
  # Logs all decisions to ops:auto_apply_runs stream
  auto-apply-job-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-auto-apply-job-timer
    restart: unless-stopped
    environment:
      # Redis for block keys + ops audit stream
      - REDIS_URL=redis://redis-worker-1:6379/0
      # Required: actual apply runner command
      # Example: replace with your real apply runner
      - AUTO_APPLY_CMD=python -m tools.nightly_meta_enforce_ramp_or_freeze_bundle
      # Optional: working directory for command
      - AUTO_APPLY_WORKDIR=/app
      # Optional: timeout for apply runner (seconds)
      - AUTO_APPLY_TIMEOUT_S=600
      # Where to log attempts (best-effort)
      - AUTO_APPLY_OPS_STREAM=ops:auto_apply_runs
      # Block keys namespace (must match Step 25/26 blocker)
      - AUTO_APPLY_BLOCK_PREFIX=cfg:suggestions:entry_policy:auto_apply_block
      # If Redis/guard fails: fail_open (default) or fail_closed
      - AUTO_APPLY_FAIL_MODE=fail_open
      
      # P6.11.1 Guard Allowlist & Metrics
      - AUTO_APPLY_BLOCK_EXISTENCE_BLOCKS=0
      - AUTO_APPLY_BLOCK_IGNORE_KEY_SUFFIXES=:notes,:last_seen
      - AUTO_APPLY_GUARD_METRICS_ENABLE=1
      - AUTO_APPLY_GUARD_METRICS_STREAM=metrics:auto_apply_guard
      # Block reasons (multi-reason support)
      - AUTO_APPLY_BLOCK_REASONS=tick_gate,meta_cov
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - /var/lib/trade/of_reports:/var/lib/trade/of_reports
    command: >
      sh -c "sleep 90 && while true; do
        echo 'Running Auto-Apply Job (Step 28)...';
        python3 -m tools.auto_apply_job_entrypoint_hardguard_v1;
        echo 'Job done. Sleeping 5 minutes...';
        sleep 300;
      done"
    networks:
      - scanner-network

  # Meta Coverage Outcome Guard (Step 42)
  # Monitors meta coverage outcomes and blocks auto-apply if stale or bad
  meta-cov-outcome-guard:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-meta-cov-outcome-guard
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
