      context: .
      dockerfile: python-worker/Dockerfile
    container_name: scanner-trade-kpi-liqmap-archiver-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - TRADES_DB_DSN=postgresql://trading:trading_password@scanner-postgres:5432/scanner_analytics
      - POST_SL_LIQMAP_KPI_ARCHIVE_ENABLED=1
      - POST_SL_LIQMAP_KPI_AUTO_MIGRATE=1
      - ENTRY_AUDIT_ARCHIVE_ENABLED=0
      - POSITION_EVENTS_ARCHIVE_ENABLED=0
      - CONFIDENCE_SCORES_ARCHIVE_ENABLED=0
      - OF_GATE_METRICS_ARCHIVE_ENABLED=0
      - OF_GATE_QUARANTINE_ARCHIVE_ENABLED=0
    command: ["python", "-u", "services/archivers/stream_archiver.py"]
    volumes:
      - ./python-worker/services:/app/services
      - ./python-worker/core:/app/core
      - ./python-worker/utils:/app/utils
    networks:
      - scanner-network
  # B5 Golden Replay parity check timer
  ml-golden-replay-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-ml-golden-replay-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - ./ml_analysis:/app/ml_analysis
      - /var/lib/trade/of_reports:/var/lib/trade/of_reports
      - /var/lib/trade/training:/var/lib/trade/training
    command: >
      sh -c "sleep 60 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        # Run daily at 05:05 UTC
        if [ \"$$HOUR\" -eq 23 ] && [ \"$$MIN\" -ge 15 ] && [ \"$$MIN\" -lt 30 ]; then
          echo 'Running ML Golden Replay Parity Check...';
          python3 -m ml_analysis.tools.golden_replay_parity_v1 --input /var/lib/trade/training/latest_confirm_train_v7.ndjson --outdir /var/lib/trade/of_reports/out_gr --limit 5000 --compare-meta-features --evidence lite;
          echo 'Golden Replay Done. Sleeping until next day...';
          sleep 82800;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

  scanner-golden-replay-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-golden-replay-timer
    restart: unless-stopped
    environment:
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
      - OFC_CAPTURE_DIR=/var/lib/scanner/ofc_capture
      - GOLDEN_REPLAY_OUTDIR=/var/lib/scanner/golden_replay_reports
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - /var/lib/scanner/ofc_capture:/var/lib/scanner/ofc_capture
      - /var/lib/scanner/golden_replay_reports:/var/lib/scanner/golden_replay_reports
      - ./ml_analysis:/app/ml_analysis
    command: >
      sh -c "sleep 60 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        # Run daily at 22:30 UTC (after NYSE close)
        if [ \"$$HOUR\" -eq 22 ] && [ \"$$MIN\" -ge 30 ] && [ \"$$MIN\" -lt 45 ]; then
          echo 'Running scanner golden replay parity nightly...';
          python3 -m ml_analysis.tools.nightly_golden_replay_job_v1 --fail-on-mismatch;
          echo 'Done. Sleeping until next day...';
          sleep 82800;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

  scanner-gr-capture-exporter:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-gr-capture-exporter
    restart: always
    environment:
