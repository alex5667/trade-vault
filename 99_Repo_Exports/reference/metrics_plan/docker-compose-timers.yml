  of-nightly-calibrate-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-of-nightly-calibrate-timer
    restart: unless-stopped
    runtime: nvidia
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - OF_INPUTS_STREAM=signals:of:inputs
      - OF_INPUTS_STREAM_FIELD=payload
      - TRADE_EVENTS_STREAM=events:trades
      - ANALYTICS_DB_DSN=postgresql://trading:trading_password@scanner-postgres:5432/scanner_analytics
      - NOTIFY_TELEGRAM_STREAM=notify:telegram
      - CANARY_SYMBOLS=BTCUSDT,ETHUSDT
      # P25: Signature
      - META_MODEL_REQUIRE_SIGNATURE=${META_MODEL_REQUIRE_SIGNATURE:-0}
      - META_MODEL_ENFORCE_REQUIRES_SCHEMA=${META_MODEL_ENFORCE_REQUIRES_SCHEMA:-0}
      - META_MODEL_SCHEMA=
      - META_MODEL_SCHEMA_HASH=
      - OUT_DIR=/var/lib/trade/of_reports/out
      - STATE_FILE=/var/lib/trade/of_reports/out/of_inputs.state
      - RECS_HMAC_SECRET=${RECS_HMAC_SECRET:-CHANGE_ME_LONG_RANDOM}
      - RECS_TTL_SEC=86400
      - TRADES_SINCE_HOURS=72
      - GPU_ENABLED=true
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    working_dir: /app
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./python-worker:/app
      - /var/lib/trade/of_reports:/var/lib/trade/of_reports
    command: >
      sh -c "sleep 120 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        if [ \"$$HOUR\" = \"01\" ] && [ \"$$MIN\" -ge \"0\" ] && [ \"$$MIN\" -lt \"20\" ]; then
          echo 'Running Nightly Gate Calibrate Bundle...';
          python3 -m tools.nightly_gate_calibrate_bundle;
          echo 'Calibration done. Sleeping 1 hour...';
          sleep 3600;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

  confidence-calibrator-nightly-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-confidence-calibrator-nightly-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - NOTIFY_TELEGRAM_STREAM=notify:telegram
      # Additional conf
      - CONF_CAL_OUT_DIR=/var/lib/trade/of_calibrators
      - CONF_CAL_REPORTS_DIR=/var/lib/trade/of_reports/out/confidence_cal
      - CONF_CAL_METHOD=auto
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - ./ml_analysis:/app/ml_analysis
      - /var/lib/trade/of_reports:/var/lib/trade/of_reports
      - /var/lib/trade/of_calibrators:/var/lib/trade/of_calibrators
    command: >
      sh -c "sleep 180 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        # Run at 06:15 UTC (after OF nightly?)
        if [ \"$$HOUR\" = \"01\" ] && [ \"$$MIN\" -ge \"30\" ] && [ \"$$MIN\" -lt \"50\" ]; then
          echo 'Running Nightly Confidence Calibrator V2...';
          python3 -m ml_analysis.tools.nightly_confidence_calibrator_v1 --method auto;
          echo 'Done. Sleeping 1 hour...';
          sleep 3600;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

