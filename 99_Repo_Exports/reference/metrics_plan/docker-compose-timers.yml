  # Soak DQ Level Share Timer (Step 5)
  soak-dq-level-share-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-soak-dq-level-share-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - SOAK_CAPTURE_NDJSON=/var/lib/trade/training/latest_confirm_train_v7.ndjson
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - ./ml_analysis:/app/ml_analysis
      - /var/lib/trade:/var/lib/trade
    command: >
      sh -c "sleep 120 && while true; do
        # Run 24h soak stats
        echo 'Running Soak DQ Level Share Analysis...';
        python3 ml_analysis/tools/soak_dq_level_share_v1.py \"\$$SOAK_CAPTURE_NDJSON\" --max-points 20000;
        sleep 86400;
      done"
    networks:
      - scanner-network


  # Binance USDT-M Futures Hourly Account Reporter (P0)
  # Fetches real account state from Binance and sends a Telegram report 1x/hour.
  # Reports: wallet balance, margin, available, uPnL, initial/maint margin,
  #          open positions (all), top-N positions by notional, open orders count.
  # Optional: Redis snapshot (account:snapshot:binance_usdtm), Prometheus metrics.
  # Required env: BINANCE_API_KEY, BINANCE_API_SECRET
  # Optional env: BINANCE_FUTURES_BASE_URL (default fapi.binance.com, testnet: testnet.binancefuture.com)
  #               REPORT_INTERVAL_SEC=3600, REPORT_ALIGN_TO_HOUR=1, REPORT_TOPN_POSITIONS=5
  #               ACCOUNT_SNAPSHOT_KEY, ACCOUNT_SNAPSHOT_TTL_SEC, ACCOUNT_REPORT_METRICS_ENABLE
  binance-account-reporter-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-binance-account-reporter-timer
    restart: unless-stopped
    environment:
      # --- Required: Binance API credentials (read-only keys sufficient for P0) ---
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET:-}
      # --- Binance endpoint (comment out to use mainnet default) ---
      - BINANCE_FUTURES_BASE_URL=${BINANCE_FUTURES_BASE_URL:-https://fapi.binance.com}
      # --- Telegram (preferred names; legacy BOT_TOKEN/CHAT_ID also supported) ---
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      # --- Redis snapshot (optional) ---
      - REDIS_URL=redis://redis-worker-1:6379/0
      - ACCOUNT_SNAPSHOT_KEY=account:snapshot:binance_usdtm
      - ACCOUNT_SNAPSHOT_TTL_SEC=7200
      # --- Reporter schedule ---
      - REPORT_INTERVAL_SEC=3600
      - REPORT_ALIGN_TO_HOUR=1   # align to UTC hour boundary
      - REPORT_TOPN_POSITIONS=5
      - REPORT_INCLUDE_OPEN_ORDERS=1
      # --- Prometheus metrics (disabled by default to avoid port conflicts) ---
      - ACCOUNT_REPORT_METRICS_ENABLE=0
      - ACCOUNT_REPORT_METRICS_PORT=9133
      - ACCOUNT_REPORT_METRICS_ADDR=0.0.0.0
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1
    working_dir: /app
    volumes:
      - ./python-worker:/app
    command: ["python3", "-u", "-m", "services.binance_account_reporter"]
    networks:
      - scanner-network

  # NOTE: binance-executor-service is defined in docker-compose-binance.yml
  # (included via docker-compose.yml). Removed here to avoid duplicate container_name conflict.

  # Nightly engine regression: replay baseline inputs through current engine and diff vs baseline output.
  # Runs at 04:30 UTC daily (after training timers complete). Auto-disables ENFORCE on mismatch.
  nightly-regress-engine-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-nightly-regress-engine-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - NOTIFY_TELEGRAM_STREAM=notify:telegram
      - CANARY_SYMBOLS=BTCUSDT,ETHUSDT
      - BASELINE_DIR=/var/lib/trade/of_reports/baselines
      - BASELINE_INPUTS=/var/lib/trade/of_reports/baselines/inputs_canary.ndjson
      - BASELINE_OUTPUT=/var/lib/trade/of_reports/baselines/baseline.ndjson
      - OUT_DIR=/var/lib/trade/of_reports/out
      # 0 = all mismatches fail, set higher for tolerance
      - REGRESS_MAX_MISMATCHES=0
      # 1 = auto-disable ENFORCE (set meta_model_mode=SHADOW) on fail
      - REGRESS_FAIL_DISABLE_ENFORCE=1
      - REGRESS_TARGET_SYMBOLS=BTCUSDT,ETHUSDT
      - REGRESS_PASS_STREAK_KEY=sre:regress:pass_streak
      - REGRESS_LAST_STATUS_KEY=sre:regress:last_status
      - REGRESS_LAST_TS_KEY=sre:regress:last_ts_ms
      - RECS_HMAC_SECRET=${RECS_HMAC_SECRET:-CHANGE_ME_LONG_RANDOM}
      - RECS_TTL_SEC=86400
      - 'CFG_HASH_PREFIX=config:orderflow:'
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - /var/lib/trade/of_reports:/var/lib/trade/of_reports
    command: >
      sh -c "sleep 90 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        if [ \"$$HOUR\" = \"04\" ] && [ \"$$MIN\" -ge \"30\" ] && [ \"$$MIN\" -lt \"50\" ]; then
          echo 'Running nightly engine regress (safe)...';
          python3 -m tools.nightly_regress_engine_replay_safe || true;
          echo 'Regress done. Sleeping 1 hour...';
          sleep 3600;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

volumes:
  conf-cal-status:

networks:
  scanner-network:
    external: true
