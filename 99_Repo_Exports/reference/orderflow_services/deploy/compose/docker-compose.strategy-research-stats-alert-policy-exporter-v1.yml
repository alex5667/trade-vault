services:
  strategy-research-stats-alert-policy-exporter:
    image: ${TRADE_ORDERFLOW_IMAGE:?}
    container_name: strategy-research-stats-alert-policy-exporter
    working_dir: /app/python-worker
    environment:
      PYTHONPATH: /app/python-worker
      REDIS_URL: ${REDIS_URL:?}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_PREFIX: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_PREFIX:-cfg:strategy_research_stats:alert_policy:v1}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_DEFAULTS_KEY: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_DEFAULTS_KEY:-cfg:strategy_research_stats:alert_policy:v1:defaults}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_PREFIX: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_PREFIX:-cfg:strategy_research_stats:alert_policy:suppress_override:v1}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_STATE_PREFIX: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_STATE_PREFIX:-cfg:strategy_research_stats:alert_policy:suppress_state:v1}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_OPS_STREAM: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_OPS_STREAM:-ops:strategy_research_stats:alert_policy:v1}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_REMINDER_WINDOW_S: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_REMINDER_WINDOW_S:-3600}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_EXPIRED_RECENT_WINDOW_S: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_EXPIRED_RECENT_WINDOW_S:-21600}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_LIMITS_PREFIX: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_LIMITS_PREFIX:-cfg:strategy_research_stats:alert_policy:override_limits:v1}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_LIMITS_DEFAULTS_KEY: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_LIMITS_DEFAULTS_KEY:-cfg:strategy_research_stats:alert_policy:override_limits:v1:defaults}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_DEFAULT_MAX_BUDGET_S: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_DEFAULT_MAX_BUDGET_S:-259200}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_DEFAULT_MAX_RENEW_COUNT: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_DEFAULT_MAX_RENEW_COUNT:-2}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_REQUIRE_ESCALATION_ON_LIMIT: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_OVERRIDE_REQUIRE_ESCALATION_ON_LIMIT:-1}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_PURPOSES: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_PURPOSES:-conf_score_guardrails_apply,conf_score_guardrails_promote,conf_score_guardrails_autopromo_controller,meta_cov_rollout_controller}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_DEFAULT_PBO_HIGH_MIN_EVENTS_24H: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_DEFAULT_PBO_HIGH_MIN_EVENTS_24H:-3}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_DEFAULT_REPORT_STALE_MIN_EVENTS_7D: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_DEFAULT_REPORT_STALE_MIN_EVENTS_7D:-5}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_DEFAULT_PSR_DSR_LOW_MIN_EVENTS_24H: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_DEFAULT_PSR_DSR_LOW_MIN_EVENTS_24H:-4}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_DEFAULT_PSR_DSR_LOW_SHARE_24H: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_DEFAULT_PSR_DSR_LOW_SHARE_24H:-0.60}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_DEFAULT_PSR_DSR_LOW_DELTA_VS_7D: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_DEFAULT_PSR_DSR_LOW_DELTA_VS_7D:-0.15}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_EXPORTER_PORT: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_EXPORTER_PORT:-9838}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_EXPORTER_INTERVAL_S: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_EXPORTER_INTERVAL_S:-30}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_DUAL_CONTROL_ON_LIMIT: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_DUAL_CONTROL_ON_LIMIT:-1}
      STRATEGY_RESEARCH_STATS_ALERT_POLICY_DUAL_CONTROL_APPROVED_FRESHNESS_S: ${STRATEGY_RESEARCH_STATS_ALERT_POLICY_DUAL_CONTROL_APPROVED_FRESHNESS_S:-1800}
    volumes:
      - ${TRADE_REPO_ROOT:?}:/app:ro
    expose:
      - "${STRATEGY_RESEARCH_STATS_ALERT_POLICY_EXPORTER_PORT:-9838}"
    ports:
      - "${STRATEGY_RESEARCH_STATS_ALERT_POLICY_EXPORTER_PORT:-9838}:${STRATEGY_RESEARCH_STATS_ALERT_POLICY_EXPORTER_PORT:-9838}"
    networks:
      - scanner-core
      - scanner-infra
    command:
      - python3
      - -m
      - orderflow_services.strategy_research_stats_alert_policy_exporter_v1

networks:
  scanner-core:
    external: true
  scanner-infra:
    external: true
