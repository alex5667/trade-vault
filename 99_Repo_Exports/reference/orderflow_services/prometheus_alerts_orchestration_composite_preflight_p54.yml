groups:
  - name: orchestration_composite_preflight_p54
    rules:
      - alert: TradeOrchestrationCompositePreflightBlockedCrit
        expr: orchestration_composite_preflight_decision_status{status="block"} > 0
        for: 10m
        labels:
          severity: crit
          component: orchestration_composite_preflight
        annotations:
          summary: "Composite orchestration preflight is blocking rollout"
          description: >-
            The rollout-sensitive purpose {{ $labels.purpose }} is currently blocked by the
            composite preflight control-plane. Inspect selected_source/selected_reason_code
            and the latest ops:orchestration:preflight:v1 event before forcing any rollout.

      - alert: TradeOrchestrationCompositePreflightInvalidWarn
        expr: orchestration_composite_preflight_decision_status{status="invalid"} > 0
        for: 15m
        labels:
          severity: warn
          component: orchestration_composite_preflight
        annotations:
          summary: "Composite orchestration preflight state is invalid"
          description: >-
            The rollout-sensitive purpose {{ $labels.purpose }} is not in a clean OK/BLOCK
            state. This usually means missing/stale control-plane state or Redis connectivity
            issues. Review selected_source and selected_reason_code.

      - alert: TradeOrchestrationCompositePreflightStateStaleWarn
        expr: (orchestration_composite_preflight_state_present > 0) and (orchestration_composite_preflight_state_age_seconds > 6 * 3600)
        for: 30m
        labels:
          severity: warn
          component: orchestration_composite_preflight
        annotations:
          summary: "Composite orchestration preflight state is stale"
          description: >-
            Persisted orchestration control-plane state for {{ $labels.purpose }} is older than
            six hours. Check whether rollout-sensitive jobs or wrappers stopped publishing
            composite decisions.
