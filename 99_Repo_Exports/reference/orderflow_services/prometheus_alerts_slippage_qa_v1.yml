groups:
  # ─────────────────────────────────────────────────────────────────────────────
  # Slippage QA v1 – orderflow_services  (P9x)
  # ─────────────────────────────────────────────────────────────────────────────

- name: of_slippage_qa_v1
  interval: 60s
  rules:

      # ── Recording rule: 10-minute P99 of expected_slippage_decomp_bps per sym ──
  - record: of_gate:expected_slip_decomp_p99:10m
    expr: |
      histogram_quantile(0.99,
        sum by (sym, le) (
          rate(trade_expected_slippage_bps_bucket{model="decomp"}[10m])
        )
      )

      # ── Warning: P99 expected slippage > 25 bps for > 15 min ─────────────────
  - alert: OF_ExpectedSlippageDecompHigh_Warn
    expr: of_gate:expected_slip_decomp_p99:10m > 25
    for: 15m
    labels:
      severity: warning
    annotations:
      summary: "{{ $labels.sym }}: expected slippage P99 high ({{ $value | printf
        \"%.1f\" }} bps)"
      description: |
        Symbol {{ $labels.sym }}: 10-min P99 of expected_slippage_decomp_bps
        = {{ $value | printf "%.1f" }} bps, above warning threshold (25 bps) for 15m.
        Check impact_proxy, spread_bps_submit, and exec_regime_bucket distribution.

      # ── Critical: P99 expected slippage > 40 bps for > 10 min ────────────────
      runbook_path: /runbooks/tbd.md
      dashboard_path: /d/tbd
  - alert: OF_ExpectedSlippageDecompHigh_Crit
    expr: of_gate:expected_slip_decomp_p99:10m > 40
    for: 10m
    labels:
      severity: critical
    annotations:
      summary: "{{ $labels.sym }}: expected slippage P99 CRITICAL ({{ $value | printf
        \"%.1f\" }} bps)"
      description: |
        Symbol {{ $labels.sym }}: 10-min P99 of expected_slippage_decomp_bps
        = {{ $value | printf "%.1f" }} bps, above critical threshold (40 bps) for 10m.
        Review market conditions, calibrated k-coefficients in Redis, and depth metrics.

      # ── Slippage limit exceeded rate > 5% ────────────────────────────────────
      runbook_path: /runbooks/tbd.md
      dashboard_path: /d/tbd
  - alert: OF_ExpectedSlippageLimitExceeded
    expr: |
      (
        sum by (sym) (rate(trade_expected_slippage_limit_exceed_total[5m]))
        /
        sum by (sym) (rate(trade_expected_slippage_bps_count{model="decomp"}[5m]))
      ) > 0.05
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "{{ $labels.sym }}: slippage limit exceeded > 5% of decisions"
      description: |
        Symbol {{ $labels.sym }}: more than 5% of tick decisions have
        expected_slippage_decomp_bps > max_expected_slippage_bps_eff for 10m.
        Review max_expected_slippage_bps_eff threshold vs current market regime.
      runbook_path: /runbooks/tbd.md
      dashboard_path: /d/tbd
