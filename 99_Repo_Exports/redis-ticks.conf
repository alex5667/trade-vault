# Redis Configuration for High-Frequency Tick Data
# Optimized for streams with high write throughput and consumer groups
# Version: 7.x

# ═══════════════════════════════════════════════════════════════
# NETWORK & BINDING
# ═══════════════════════════════════════════════════════════════

bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 4096
timeout 0
tcp-keepalive 300

# ═══════════════════════════════════════════════════════════════
# MEMORY MANAGEMENT - Optimized for Ticks
# ═══════════════════════════════════════════════════════════════

# High memory limit for tick streams (10GB)
maxmemory 10gb

# LRU eviction для старых тиков
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ═══════════════════════════════════════════════════════════════
# PERSISTENCE - Minimal (Ticks are ephemeral)
# ═══════════════════════════════════════════════════════════════

# Data directory - сохраняем данные в volume
dir /data

# RDB ПОЛНОСТЬЮ ОТКЛЮЧЁН:
# BGSAVE вызывает fork()-паузу при >10GB, тики — временные данные.
# Персистентность для calibrator state обеспечивается через AOF (appendfsync everysec).
save ""

# AOF ENABLED: To persist calibrator state (like tick_dn_calib) across project restarts
appendonly yes
appendfilename "appendonly-ticks.aof"
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 512mb

# ═══════════════════════════════════════════════════════════════
# STREAMS OPTIMIZATION
# ═══════════════════════════════════════════════════════════════

# Compact stream encoding: smaller nodes = less memory, finer LRU eviction.
# 100 entries per node with 4096 bytes — aligned with redis-worker-stable.conf.
stream-node-max-bytes 4096
stream-node-max-entries 100

# ═══════════════════════════════════════════════════════════════
# PERFORMANCE TUNING
# ═══════════════════════════════════════════════════════════════

# Slower eviction для стабильности
hz 25

# Dynamic HZ для лучшей производительности
dynamic-hz yes

# Отключаем slow log для высокой производительности
slowlog-log-slower-than -1
slowlog-max-len 128

# ═══════════════════════════════════════════════════════════════
# CLIENT CONNECTIONS
# ═══════════════════════════════════════════════════════════════

maxclients 10000

# Client output buffer для streams (увеличен)
client-output-buffer-limit normal 32mb 16mb 60
client-output-buffer-limit replica 512mb 256mb 60
client-output-buffer-limit pubsub 64mb 32mb 60

# ═══════════════════════════════════════════════════════════════
# ADVANCED CONFIG
# ═══════════════════════════════════════════════════════════════

# Lazy freeing для лучшей производительности
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# Active defragmentation
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 25
active-defrag-cycle-min 5
active-defrag-cycle-max 25

# IO threads для multi-core использования (4 threads)
io-threads 4
io-threads-do-reads yes

# Logging
loglevel notice
logfile ""

# Database
databases 1

# Replication
repl-diskless-sync yes
repl-diskless-sync-delay 5
repl-ping-replica-period 10
repl-timeout 60
repl-disable-tcp-nodelay no
repl-backlog-size 64mb
repl-backlog-ttl 3600

# LUA scripting timeout
lua-time-limit 5000

# Latency monitoring
latency-monitor-threshold 100

# Notify keyspace events - минимальные (только для streams)
notify-keyspace-events "Ex"

