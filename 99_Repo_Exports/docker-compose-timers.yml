    - BINANCE_API_KEY=${BINANCE_API_KEY:-}
    - BINANCE_API_SECRET=${BINANCE_API_SECRET:-}
    - BINANCE_FUTURES_BASE_URL=${BINANCE_FUTURES_BASE_URL:-https://fapi.binance.com}
    - BINANCE_HTTP_TIMEOUT_S=${BINANCE_HTTP_TIMEOUT_S:-8.0}
    - ACTIVE_SYMBOL_GUARD_REPAIR_INTERVAL_SEC=${ACTIVE_SYMBOL_GUARD_REPAIR_INTERVAL_SEC:-5}
    - ACTIVE_SYMBOL_GUARD_REPAIR_DRY_RUN=${ACTIVE_SYMBOL_GUARD_REPAIR_DRY_RUN:-0}
    - EXEC_SINGLE_ACTIVE_POSITION_REQUIRE_FLAT_NO_ORDERS=${EXEC_SINGLE_ACTIVE_POSITION_REQUIRE_FLAT_NO_ORDERS:-1}
    - EXEC_SINGLE_ACTIVE_POSITION_GUARD_REPAIR_ENABLE=${EXEC_SINGLE_ACTIVE_POSITION_GUARD_REPAIR_ENABLE:-1}
    - ACTIVE_SYMBOL_GUARD_TOMBSTONE_TTL_SEC=${ACTIVE_SYMBOL_GUARD_TOMBSTONE_TTL_SEC:-120}
    - ORDERS_ACTIVE_SYMBOL_KEY_PREFIX=${ORDERS_ACTIVE_SYMBOL_KEY_PREFIX:-orders:active_symbol_sid:}
    - ORDERS_STATE_KEY_PREFIX=${ORDERS_STATE_KEY_PREFIX:-orders:state:}
    - USER_STREAM_STATUS_KEY=${USER_STREAM_STATUS_KEY:-orders:user_stream:status}
    - ORDERS_STATE_TTL_SEC=${ORDERS_STATE_TTL_SEC:-86400}
    - EXEC_SINGLE_ACTIVE_POSITION_EXCHANGE_TRUTH_RELEASE=${EXEC_SINGLE_ACTIVE_POSITION_EXCHANGE_TRUTH_RELEASE:-1}
    - PYTHONPATH=/app
    - PYTHONUNBUFFERED=1
    - TZ=UTC
