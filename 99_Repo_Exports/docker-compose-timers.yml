    - ACTIVE_SYMBOL_GUARD_INCIDENT_DEDUPE_INFO_SEC=${ACTIVE_SYMBOL_GUARD_INCIDENT_DEDUPE_INFO_SEC:-300}
    - ACTIVE_SYMBOL_GUARD_INCIDENT_DEDUPE_WARNING_SEC=${ACTIVE_SYMBOL_GUARD_INCIDENT_DEDUPE_WARNING_SEC:-900}
    - ACTIVE_SYMBOL_GUARD_INCIDENT_DEDUPE_CRITICAL_SEC=${ACTIVE_SYMBOL_GUARD_INCIDENT_DEDUPE_CRITICAL_SEC:-1800}
    - ACTIVE_SYMBOL_GUARD_SYMBOL_SUPPRESS_SEC=${ACTIVE_SYMBOL_GUARD_SYMBOL_SUPPRESS_SEC:-1800}
    - ACTIVE_SYMBOL_GUARD_FINGERPRINT_SUPPRESS_SEC=${ACTIVE_SYMBOL_GUARD_FINGERPRINT_SUPPRESS_SEC:-900}
    - ACTIVE_SYMBOL_GUARD_RUNBOOK_HOLD_TTL_SEC=${ACTIVE_SYMBOL_GUARD_RUNBOOK_HOLD_TTL_SEC:-1800}
    - ACTIVE_SYMBOL_GUARD_ESCALATION_ACK_TTL_SEC=${ACTIVE_SYMBOL_GUARD_ESCALATION_ACK_TTL_SEC:-1800}
    - ACTIVE_SYMBOL_GUARD_ESCALATION_TARGET=${ACTIVE_SYMBOL_GUARD_ESCALATION_TARGET:-telegram:oncall}
    - ORDERS_ACTIVE_SYMBOL_KEY_PREFIX=${ORDERS_ACTIVE_SYMBOL_KEY_PREFIX:-orders:active_symbol_sid:}
    - ORDERS_STATE_KEY_PREFIX=${ORDERS_STATE_KEY_PREFIX:-orders:state:}
    - ORDERS_STATE_TTL_SEC=${ORDERS_STATE_TTL_SEC:-86400}
    - ACTIVE_SYMBOL_GUARD_TOMBSTONE_TTL_SEC=${ACTIVE_SYMBOL_GUARD_TOMBSTONE_TTL_SEC:-120}
    - ACTIVE_SYMBOL_GUARD_STALE_TOMBSTONE_MS=${ACTIVE_SYMBOL_GUARD_STALE_TOMBSTONE_MS:-600000}
    - ACTIVE_SYMBOL_GUARD_EXPORTER_HOT_LIMIT=${ACTIVE_SYMBOL_GUARD_EXPORTER_HOT_LIMIT:-10}
    - PYTHONPATH=/app
    - PYTHONUNBUFFERED=1
    - TZ=UTC
    volumes:
    - ./python-worker/services:/app/services
    command: "sh -c \"sleep 5 && while true; do\n  python3 -u -m services.active_symbol_guard_incident_notifier;\n\
      \  sleep 15;\ndone\"\n"
    networks:
    - scanner-timers
    - scanner-infra
  monitoring-smoke-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    container_name: scanner-monitoring-smoke-timer
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 128M
        reservations:
          memory: 24M
    environment:
    - REDIS_URL=${REDIS_URL:-redis://redis-worker-1:6379/0}
    - MONITORING_SMOKE_METRICS_KEY=${MONITORING_SMOKE_METRICS_KEY:-metrics:monitoring_smoke:last}
    - PYTHONPATH=.:/app
    - PYTHONUNBUFFERED=1
    - TZ=UTC
    working_dir: /app
    volumes:
    - ./python-worker:/app
    command: "sh -c \"sleep 5 && while true; do\n  HOUR=$$(date +%-H);\n  MIN=$$(date\
      \ +%-M);\n  # Run daily at 02:25 UTC\n  if [ \\\"$$HOUR\\\" -eq 2 ] && [ \\\"\
      $$MIN\\\" -ge 25 ] && [ \\\"$$MIN\\\" -lt 40 ]; then\n    echo 'Running Nightly\
      \ Monitoring Smoke Tests...';\n    python3 -u ml_analysis/tools/nightly_monitoring_smoke_tests_v1.py;\n\
      \    echo 'Smoke tests complete. Sleeping...';\n    sleep 82800;\n  else\n \
      \   sleep 60;\n  fi\ndone\"\n"
    depends_on:
      redis-worker-1:
        condition: service_healthy
    networks:
    - scanner-timers
    - scanner-infra
