x-crypto-of-env: &id001
# All common env vars are now in config/crypto-of-common.env (single source of truth).
# Service-specific vars and ${} references that need compose interpolation stay here.
- REDIS_URL=${REDIS_URL}
- REDIS_TICKS_URL=redis://redis-ticks:6379/0
- ATR_REDIS_URL=${REDIS_URL}
- CRYPTO_NOTIFY_STREAM=notify:telegram
- CRYPTO_NOTIFY_REDIS_URL=${REDIS_URL}
- CRYPTO_SIGNAL_MIN_CONF=${CRYPTO_SIGNAL_MIN_CONF:-70}
- PYTHONUNBUFFERED=1
- NOTIFY_STREAM=${NOTIFY_STREAM:-notify:telegram}

x-crypto-of-common: &crypto-of-common
  build:
    context: .
    dockerfile: python-worker/Dockerfile.gpu
  # runtime: nvidia
  env_file:
    - config/crypto-of-common.env
  environment: *id001
  healthcheck:
    test: ["CMD-SHELL", "pgrep -f 'python' > /dev/null || exit 1"]
    interval: 60s
    timeout: 5s
    start_period: 45s
    retries: 3
  depends_on:
    redis:
      condition: service_healthy
    redis-ticks:
      condition: service_healthy
  networks:
  - scanner-core
  - scanner-infra
  volumes:
  - ./logs:/app/logs
  restart: on-failure:5
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: '0.5'
      reservations:
        memory: 128M
  command:
  - sh
  - -c
  - sleep 40 && python services/crypto_orderflow_service.py
