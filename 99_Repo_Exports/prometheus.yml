global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'orderflow_services/prometheus_alerts_ml_phase3_56_route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_experiment_incident_rca_apply_verification_rollback_v1.yml'
  - 'websocket_alerts.yml'
  - 'regime_alerts.yml'
  - 'prometheus/ml_confirm_alerts.yml'
  - 'prometheus/tick_quality_alerts.yml'
  - 'prometheus/tick_ingest_latency_alerts.yml'
  - 'prometheus/alerts_meta_dq.yml'
  - 'prometheus/liq_quarantine_alerts.yml'
  - 'python-worker/services/prometheus_alerts_active_symbol_guard_p12.yml'
  - 'prometheus/manip_gate_alerts.yml'
  - 'prometheus/news_cache_alerts.yml'
  - 'prometheus/alerts_tm_orphans.yml'
  - 'python-worker/orderflow_services/prometheus_alerts_cont_ctx_window_calibrator_v1.yml'
  - 'prometheus/prometheus_alerts_apply_flow_experiment_controller_v3_49.yml'
  - 'prometheus/prometheus_alerts_apply_flow_experiment_verification_rollback_v3_50.yml'
  - 'prometheus/alerts_execution.yml'
  - 'prometheus/alerts/redis_alerts.yml'
  - 'prometheus/alerts/redis_stream_alerts.yml'
  - 'prometheus/alerts/python_worker_health.yml'
  # P56: Execution audit-chain alerts (report stale, broken signal/trade/analytics links)
  - 'python-worker/monitoring/prometheus_rules_execution_p56_audit_chain.yml'
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus сам себя мониторит
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Go Workers метрики - 10 воркеров для всех таймфреймов
  - job_name: 'go-workers'
    static_configs:
      - targets:
          - 'go-worker-1m:2112'
          - 'go-worker-5m:2113'
          - 'go-worker-15m:2114'
          - 'go-worker-1h:2115'
          - 'go-worker-4h:2116'
          - 'go-worker-1d:2117'
          - 'go-worker-1w:2118'
          - 'go-worker-1month:2119'
          - 'go-worker-3month:2120'
          - 'go-worker-1y:2121'
        labels:
          service: 'go-worker'
    scrape_interval: 10s
    metrics_path: '/metrics'

  # Redis метрики — по одному экспортеру на каждый redis-worker
  - job_name: 'redis-workers'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['redis-exporter-main:9121']
        labels:
          instance: 'redis'
      - targets: ['redis-exporter-worker-1:9121']
        labels:
          instance: 'redis-worker-1'
      - targets: ['redis-exporter-worker-2:9121']
        labels:
          instance: 'redis-worker-2'
      - targets: ['redis-exporter-worker-1b:9121']
        labels:
          instance: 'redis-worker-1b'
      - targets: ['redis-exporter-worker-2b:9121']
        labels:
          instance: 'redis-worker-2b'
      - targets: ['redis-exporter-ticks:9121']
        labels:
          instance: 'redis-ticks'


  # Python Worker метрики (если добавлен экспортер)
  - job_name: 'python-worker'
    static_configs:
      - targets: ['python-worker:8000', 'python-worker-2:8000']
    scrape_interval: 15s

  # Regime Quantiles Job метрики
  - job_name: 'regime-quantiles'
    static_configs:
      - targets: ['regime-quantiles-job:8001']
    scrape_interval: 30s

  # Metrics Exporter (Redis-based) метрики
  - job_name: 'metrics-exporter-redis'
    static_configs:
      - targets: ['scanner-metrics-server-timer:9109']
    scrape_interval: 15s
    metrics_path: '/metrics'

  # OF Confirm Service метрики
  - job_name: 'of-confirm-service'
    static_configs:
      - targets: ['of-confirm-service:8003']
    scrape_interval: 15s

  # Execution Gate Service метрики
  - job_name: 'execution-gate-service'
    static_configs:
      - targets: ['execution-gate-service:8004']
    scrape_interval: 15s

  # ML Confirm SRE Poller метрики
  - job_name: 'ml-confirm-sre-poller'
    static_configs:
      - targets: ['ml-confirm-sre-poller:8005']
    scrape_interval: 15s

  # P76 — OF gate contract smoke-check exporter (port 9148)
  # Exposes bad_share, missing_schema_share, dq_code/reason_code breakdowns
  - job_name: 'of-gate-contract-smoke'
    static_configs:
      - targets: ['of-gate-contract-smoke-exporter:9148']
    scrape_interval: 30s

  # P59 — Edge Stack v1 nightly train metrics exporter (port 9813)
  # Reads Redis hash metrics:edge_stack_train:last; alerts in prometheus_alerts_edge_stack_train_p59.yml
  - job_name: edge_stack_train_p59
    scrape_interval: 15s
    static_configs:
      - targets:
          - scanner-edge-stack-train-exporter-p59:9813

  # P60 — Edge Stack v1 shadow eval status exporter (port 8012)
  # Reads shadow_status.json; alerts in prometheus_alerts_edge_stack_shadow_p60.yml
  - job_name: edge_stack_shadow_p60
    scrape_interval: 30s
    static_configs:
      - targets:
          - scanner-edge-stack-shadow-exporter-p60:8012

  # P77 — Enforce bucket state exporter (port 9142)
  # Exports of_enforce_bucket_flag, impact_coeff, promoter report age/residuals.
  # Alerts in orderflow_services/prometheus_alerts_enforce_bucket_promoter_v1.yml
  - job_name: enforce_bucket_state_p77
    scrape_interval: 15s
    static_configs:
      - targets:
          - scanner-enforce-bucket-state-exporter:9142

  # Go Gateway (Exposes gateway_up and others)
  - job_name: go_gateway
    scrape_interval: 5s
    static_configs:
      - targets:
          - scanner-go-gateway:8090

  # P94 — Feature Registry contract exporter (port 9817)
  # Reads metrics:feature_registry_contract:last; alerts in prometheus_alerts_feature_registry_p94.yml
  - job_name: feature_registry_contract_p94
    scrape_interval: 15s
    static_configs:
      - targets:
          - feature-registry-contract-exporter:9822

  # AIOps Agent v15.0 targets — AB Apply Runner (port 9109 in scanner-network)
  - job_name: ab_apply_runner
    scrape_interval: 15s
    static_configs:
      - targets:
          - ab-winner-apply-runner:9109

  # AIOps Agent v15.0 targets — Exec Health Freeze Control (port 9827 in scanner-network)
  - job_name: exec_health_freeze_control
    scrape_interval: 15s
    static_configs:
      - targets:
          - scanner-exec-health-freeze-control-exporter:9827

  # AIOps Agent v15.0 targets — Exec Health Freeze Integrity (port 9828)
  - job_name: exec_health_freeze_integrity
    scrape_interval: 10s
    static_configs:
      - targets:
          - scanner-exec-health-freeze-integrity-exporter:9828

  # AIOps Agent v15.0 targets — Exec Health SLO Checkers (ports 9824, 9838)
  # NOTE: autoguard-exporter moved from 9825→9838 to free 9825 for decision-snapshot-writer
  - job_name: exec_health_slo
    scrape_interval: 10s
    static_configs:
      - targets:
          - scanner-exec-health-slo-exporter:9824
          - scanner-exec-health-slo-autoguard-exporter:9839

  # DecisionSnapshotWriter (A3-A5) metrics — port 9825 (expose only, internal DNS)
  - job_name: decision_snapshot_writer
    scrape_interval: 15s
    static_configs:
      - targets:
          - scanner-decision-snapshot-writer:9825

  # AIOps Agent v15.0 targets — Exec Health Freeze Dual-Control (port 9829)
  - job_name: exec_health_freeze_dual_control
    scrape_interval: 10s
    static_configs:
      - targets:
          - scanner-exec-health-freeze-dual-control-exporter:9829

  # AIOps Agent v15.0 targets — Exec Health Tamper Guard & ACL Audit (ports 9830, 9831, 9842)
  - job_name: exec_health_tamper_acl
    scrape_interval: 10s
    static_configs:
      - targets:
          - scanner-exec-health-freeze-tamper-guard:9830
          - scanner-exec-health-freeze-acl-audit-exporter:9831
          - scanner-exec-health-freeze-acl-drift-exporter:9842

  # Continuation Context Window Calibrator (port 9137)
  - job_name: cont_ctx_window_calibrator
    scrape_interval: 30s
    static_configs:
      - targets:
          - cont-ctx-window-calibrator-v1:9137


  # Trade Monitor Liveness exporter (ports 9844, 9845)
  - job_name: 'trade_monitor_liveness'
    scrape_interval: 10s
    static_configs:
      - targets: ['scanner-trade-monitor:9844', 'scanner-trade-monitor-2:9845']

  # P0: Derivatives Context Exporter (port 9837)
  # Exposes deriv_ctx_exporter_snapshot_age_ms, funding_rate, etc.
  - job_name: 'derivatives_context'
    scrape_interval: 15s
    static_configs:
      - targets: ['scanner-deriv-ctx-exporter:9837']
