server {
  listen 8082;
  server_name _;
  error_log /var/log/nginx/error.log warn;
  access_log off;

  root /usr/share/nginx/html;
  autoindex on;
  autoindex_exact_size off;
  autoindex_localtime on;

  location / {
    default_type text/plain;
    try_files $uri $uri/ =404;
  }

  location = /healthz {
    return 200 "ok\n";
  }
}
