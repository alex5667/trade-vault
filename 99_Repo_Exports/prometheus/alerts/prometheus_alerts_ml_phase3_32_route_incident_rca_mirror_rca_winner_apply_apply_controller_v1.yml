groups:
  - name: ml_phase3_32_route_incident_rca_mirror_rca_winner_apply_apply_controller_v1
    rules:
      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyApplyControllerStale
        expr: time() - ml_route_incident_rca_mirror_rca_winner_apply_apply_controller_last_run_ts_seconds > 1800
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "route incident RCA mirror RCA winner-apply apply controller is stale"

      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyApplyControllerErrors
        expr: increase(ml_route_incident_rca_mirror_rca_winner_apply_apply_controller_runs_total{status="error"}[30m]) > 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "route incident RCA mirror RCA winner-apply apply controller has errors"

      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyApplyControllerVertex
        expr: increase(ml_route_incident_rca_mirror_rca_winner_apply_apply_controller_runs_total{decision="APPLY_PRIMARY_ARM_SHADOW"}[30m]) > 0
        for: 5m
        labels: { severity: info }
        annotations:
          summary: "route incident RCA mirror RCA winner-apply apply controller recommends shadow primary apply"

      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyApplyControllerSingleArm
        expr: increase(ml_route_incident_rca_mirror_rca_winner_apply_apply_controller_runs_total{decision="APPLY_SINGLE_ARM"}[30m]) > 0
        for: 5m
        labels: { severity: info }
        annotations:
          summary: "route incident RCA mirror RCA winner-apply apply controller recommends single-arm apply"
