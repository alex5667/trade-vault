groups:
  - name: ml_phase3_22_route_incident_rca_mirror_rca_winner_apply_experiment_v1
    rules:
      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyExperimentStale
        expr: time() - ml_route_incident_rca_mirror_rca_winner_apply_experiment_last_run_ts_seconds > 1800
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "route incident RCA mirror RCA winner apply experiment harness is stale"

      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyExperimentErrors
        expr: rate(ml_route_incident_rca_mirror_rca_winner_apply_experiment_runs_total{status="error"}[5m]) > 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "route incident RCA mirror RCA winner apply experiment harness has errors"

      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyExperimentLocalExposure
        expr: rate(ml_route_incident_rca_mirror_rca_winner_apply_exposures_total{arm="local_fallback_candidate"}[15m]) > 0
        for: 1m
        labels: { severity: info }
        annotations:
          summary: "winner apply experiment is exposing bundles to local fallback candidate arm"
