groups:
  - name: ml_phase3_39_route_incident_rca_mirror_rca_winner_apply_apply_governance_evaluator_v1
    rules:
      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyApplyGovernanceEvaluatorStale
        expr: time() - ml_route_incident_rca_mirror_rca_winner_apply_apply_governance_evaluator_last_run_ts_seconds > 1800
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "route incident RCA mirror winner-apply apply governance evaluator is stale"

      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyApplyGovernanceEvaluatorErrors
        expr: increase(ml_route_incident_rca_mirror_rca_winner_apply_apply_governance_evaluator_runs_total{status="error"}[30m]) > 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "route incident RCA mirror winner-apply apply governance evaluator has errors"

      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyApplyGovernanceEvaluatorVertexRecommended
        expr: increase(ml_route_incident_rca_mirror_rca_winner_apply_apply_governance_evaluator_runs_total{decision="PROMOTE_VERTEX_CANDIDATE"}[30m]) > 0
        for: 5m
        labels: { severity: info }
        annotations:
          summary: "route incident RCA mirror winner-apply apply governance evaluator recommends vertex_candidate"

      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyApplyGovernanceEvaluatorLocalRecommended
        expr: increase(ml_route_incident_rca_mirror_rca_winner_apply_apply_governance_evaluator_runs_total{decision="PROMOTE_LOCAL_FALLBACK_CANDIDATE"}[30m]) > 0
        for: 5m
        labels: { severity: info }
        annotations:
          summary: "route incident RCA mirror winner-apply apply governance evaluator recommends local_fallback_candidate"
