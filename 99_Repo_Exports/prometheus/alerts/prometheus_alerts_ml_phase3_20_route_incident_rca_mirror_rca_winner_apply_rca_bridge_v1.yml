groups:
  - name: ml_phase3_20_route_incident_rca_mirror_rca_winner_apply_rca_bridge_v1
    rules:
      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyRCABridgeStale
        expr: time() - ml_route_incident_rca_mirror_rca_winner_apply_rca_bridge_last_run_ts_seconds > 1800
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "route incident RCA mirror RCA winner apply RCA bridge is stale"

      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyRCABridgeErrors
        expr: rate(ml_route_incident_rca_mirror_rca_winner_apply_rca_bridge_runs_total{status="error"}[5m]) > 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "route incident RCA mirror RCA winner apply RCA bridge has errors"

      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyRCABridgeLocalRouting
        expr: rate(ml_route_incident_rca_mirror_rca_winner_apply_rca_bridge_routed_total{route="local"}[15m]) > 0
        for: 1m
        labels: { severity: info }
        annotations:
          summary: "winner apply RCA bridge is routing forensic bundles to local fallback (Vertex likely degraded)"
