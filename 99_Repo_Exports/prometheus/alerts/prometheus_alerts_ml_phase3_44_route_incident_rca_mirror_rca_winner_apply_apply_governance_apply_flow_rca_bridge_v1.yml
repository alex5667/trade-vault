groups:
  - name: ml_phase3_44_route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_rca_bridge_v1
    rules:
      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyApplyGovernanceApplyFlowRCABridgeStale
        expr: time() - ml_route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_rca_bridge_last_run_ts_seconds > 1800
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "route incident RCA mirror winner-apply apply governance apply-flow RCA bridge is stale"

      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyApplyGovernanceApplyFlowRCABridgeErrors
        expr: increase(ml_route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_rca_bridge_runs_total{status="error"}[30m]) > 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "route incident RCA mirror winner-apply apply governance apply-flow RCA bridge has errors"

      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyApplyGovernanceApplyFlowRCABridgeLocalRouting
        expr: increase(ml_route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_rca_bridge_routed_total{route="local"}[30m]) > 0
        for: 5m
        labels: { severity: info }
        annotations:
          summary: "route incident RCA mirror winner-apply apply governance apply-flow RCA bridge is routing bundles to local fallback"
