# ============================================================================
# Redis Configuration - Production-Grade Stable Setup
# Optimized for high-throughput trading scanner infrastructure
# Author: Senior Infrastructure Specialist
# ============================================================================

# ============================================================================
# NETWORK CONFIGURATION
# ============================================================================
port 6379
bind 0.0.0.0
protected-mode no

# TCP settings optimized for stability and long-lived connections
tcp-keepalive 30
tcp-backlog 4096
timeout 0

# ============================================================================
# MEMORY MANAGEMENT
# ============================================================================
# Reserve 20% overhead for Redis internals (12.8GB usable from 16GB limit)
maxmemory 13gb
# ⚡ OPTIMIZATION: Changed from allkeys-lru to volatile-lru
# Reason: Prevents eviction of Redis Streams which don't have TTL
# Only keys with EXPIRE set will be evicted (non-critical cached data)
maxmemory-policy volatile-lru
maxmemory-samples 5

# ============================================================================
# CLIENT LIMITS
# ============================================================================
maxclients 10000

# Client output buffer limits (prevent memory issues)
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 64mb 16mb 60

# Query buffer limit (prevent DoS)
client-query-buffer-limit 256mb
proto-max-bulk-len 256mb

# ============================================================================
# PERSISTENCE - BALANCED APPROACH
# ============================================================================
# Data directory - сохраняем данные в volume
dir /data

# RDB ПОЛНОСТЬЮ ОТКЛЮЧЁН:
# BGSAVE вызывает fork()-паузу (~200ms при 13GB), блокируя event loop.
# Персистентность обеспечивается только через AOF (appendfsync everysec).
save ""
stop-writes-on-bgsave-error no
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
rdb-save-incremental-fsync yes

# Enable AOF for data safety with minimal performance impact
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 128mb
aof-rewrite-incremental-fsync yes
aof-load-truncated yes
aof-use-rdb-preamble yes

# ============================================================================
# LOGGING AND MONITORING
# ============================================================================
loglevel notice
logfile ""

# Slow log - CRITICAL for debugging (10ms threshold)
slowlog-log-slower-than 10000
slowlog-max-len 256

# Latency monitoring - CRITICAL for production (100ms threshold)
latency-monitor-threshold 100

# ============================================================================
# ADVANCED MEMORY OPTIMIZATION
# ============================================================================
# Data structure optimization
hash-max-listpack-entries 512
hash-max-listpack-value 64
list-max-listpack-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-listpack-entries 128
zset-max-listpack-value 64
hll-sparse-max-bytes 3000

# Streams optimization (critical for scanner infrastructure)
# Compact encoding: smaller nodes = less memory, finer LRU eviction granularity
stream-node-max-bytes 4096
stream-node-max-entries 100

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================
# Optimal hz for balance between responsiveness and CPU usage
hz 10
dynamic-hz yes

# Active rehashing for memory efficiency
activerehashing yes

# Lazy freeing (reduces latency spikes)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes
replica-lazy-flush yes

# Threading (Redis 6.0+)
io-threads 4
io-threads-do-reads yes

# Jemalloc optimization
jemalloc-bg-thread yes

# ============================================================================
# REPLICATION SETTINGS
# ============================================================================
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync yes
repl-diskless-sync-delay 5
repl-diskless-sync-max-replicas 0
repl-diskless-load on-empty-db
repl-ping-replica-period 10
repl-timeout 60
repl-disable-tcp-nodelay no
repl-backlog-size 16mb
repl-backlog-ttl 3600
min-replicas-to-write 0
min-replicas-max-lag 10

# ============================================================================
# SECURITY
# ============================================================================
# Disable dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command DEBUG ""
rename-command SHUTDOWN SHUTDOWN_REDIS_SAFE

# ============================================================================
# LUA SCRIPTING
# ============================================================================
lua-time-limit 5000
lua-replicate-commands yes

# ============================================================================
# EVENT NOTIFICATIONS
# ============================================================================
# Disabled for performance (enable only if needed)
notify-keyspace-events ""

# ============================================================================
# CLUSTER/SENTINEL
# ============================================================================
cluster-enabled no

# ============================================================================
# MISCELLANEOUS
# ============================================================================
databases 16
always-show-logo no
set-proc-title yes
proc-title-template "{title} {listen-addr} {server-mode}"

# Crash log settings
crash-log-enabled yes
crash-memcheck-enabled yes

# ============================================================================
# NOTES FOR OPERATIONS
# ============================================================================
# 1. Monitor with: redis-cli INFO stats | grep instantaneous_ops_per_sec
# 2. Check slow queries: redis-cli SLOWLOG GET 10
# 3. Monitor latency: redis-cli --latency
# 4. Memory analysis: redis-cli --bigkeys
# 5. Client list: redis-cli CLIENT LIST
# ============================================================================
