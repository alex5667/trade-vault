  py-obi-service:
    build:
      context: ./py-obi
      dockerfile: Dockerfile.gpu
    container_name: scanner-py-obi
    runtime: nvidia
    environment:
    - PYTHONUNBUFFERED=1
    - PORT=8088
    - OBI_WINDOW_LEVELS=5
    - OBI_THRESHOLD=0.25
    - OBI_SUSTAIN_MS=1200
    - RING_SECONDS=600
    - NOTIFY_URL=http://scanner-go-gateway:8090/notify
    - REDIS_HOST=redis-ticks
    - REDIS_PORT=6379
    - REDIS_URL=redis://redis-ticks:6379/0
    - GPU_ENABLED=true
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    - CUPY_CACHE_DIR=/tmp/cupy_cache
    - CUPY_CACHE_SAVE_CUDA_SOURCE=0
    - NUMBA_CACHE_DIR=/tmp/numba_cache
    - OUTBOX_CONTRACT_MODE=warn
    - OUTBOX_CONTRACT_SAMPLE_RATE=0.1
    - USE_SIGNAL_OUTBOX=true
    - TZ=UTC
