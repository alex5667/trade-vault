x-default-python-worker:
  build: &id001
    context: .
    dockerfile: python-worker/Dockerfile
  restart: on-failure:5
  healthcheck:
    test:
    - CMD-SHELL
    - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz',
      timeout=2).read()" >/dev/null 2>&1 || exit 1
    interval: 30s
    timeout: 10s
    start_period: 45s
    retries: 5
  networks: &id002
  - scanner-core
  - scanner-infra
