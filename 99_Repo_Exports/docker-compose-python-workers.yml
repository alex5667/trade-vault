  meta-model-calibrator-v14:
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    image: scanner-python-worker:latest
    container_name: scanner-meta-model-calibrator-v14
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      # Redis worker-1 — источник streams inputs/labels
      - REDIS_URL=redis://redis-worker-1:6379/0
      # Redis main — notify:telegram stream
      - REDIS_MAIN_URL=redis://redis:6379/0
      - NOTIFY_STREAM=notify:telegram
      # Потоки данных
      - V14_INPUTS_STREAM=signals:of:inputs
      - V14_LABELS_STREAM=labels:tb
      - V14_CAL_MAX_RECORDS=5000
      - V14_CAL_SINCE_HOURS=72
      # Ключи Redis для модели
      - V14_CHAMPION_KEY=cfg:ml_confirm:champion
      - V14_CAL_KEY=cfg:ml_confirm:v14_of:calibrator
      - V14_SHADOW_STATE_KEY=cfg:ml_confirm:champion
      # Выходные файлы
      - V14_CAL_OUT_DIR=/var/lib/trade/of_reports/models
      - V14_CAL_STATE_PATH=/var/lib/trade/of_reports/meta_model_calibrator_state.json
      # Критерии gate
      - V14_CAL_MIN_AUC=0.62
      - V14_CAL_MAX_ECE=0.10
      - V14_CAL_MAX_BRIER=0.22
      - V14_CAL_MIN_N=200
      - V14_CAL_MAX_ARTIFACT_AGE=7
      - V14_CAL_SHADOW_MIN_HOURS=48
      # Метод калибровки: temp_logit | platt_logit | identity
      - V14_CAL_METHOD=temp_logit
      # 0 = dry-run, 1 = записать калибратор
      - V14_CAL_APPLY=${V14_CAL_APPLY:-1}
      # 0 = только калибратор, 1 = также флипнуть mode → ENFORCE
      - V14_CAL_ENFORCE=${V14_CAL_ENFORCE:-1}
      # Daemon mode (1 = встроенный loop + Prometheus; 0 = one-shot)
      - V14_CAL_DAEMON=1
      - V14_CAL_COOLDOWN_SEC=21600
      - V14_CAL_PROM_PORT=9845
      - TZ=UTC
    ports:
      - "9845:9845"
    volumes:
      - /var/lib/trade:/var/lib/trade
    depends_on:
      redis-worker-1:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scanner-core
      - scanner-infra
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 128M
    command:
      - sh
      - -c
      - sleep 15 && python -m orderflow_services.meta_model_calibrator_v1

