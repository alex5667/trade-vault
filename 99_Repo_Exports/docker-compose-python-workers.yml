    - "echo \"\u23F3 \u041E\u0436\u0438\u0434\u0430\u043D\u0438\u0435 \u043F\u043E\
      \u043B\u043D\u043E\u0439 \u0437\u0430\u0433\u0440\u0443\u0437\u043A\u0438 Redis...\"\
      \nsleep 30\necho \"\U0001F680 \u0417\u0430\u043F\u0443\u0441\u043A py-obi \u0441\
      \u0435\u0440\u0432\u0438\u0441\u0430...\"\npython3 book_obi_service.py\n"
    networks:
    - scanner-core
    - scanner-infra
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
        reservations:
          memory: 512M
    healthcheck:
      test:
      - CMD-SHELL
      - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8088/healthz',
        timeout=2).read()" >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
  signal-outbox-router:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-signal-outbox-router
    runtime: nvidia
    environment:
    - PYTHONUNBUFFERED=1
    - REDIS_URL=${REDIS_URL}
    - SIGNAL_OUTBOX_STREAM=stream:signals:outbox
    - SIGNAL_DLQ_STREAM=stream:signals:dlq
    - SIGNAL_OUTBOX_GROUP=signals-outbox-group
    - SIGNAL_OUTBOX_CONSUMER=signal-outbox-router
    - SIGNAL_OUTBOX_READ_COUNT=200
    - SIGNAL_OUTBOX_READ_BLOCK_MS=1000
    # Outbox protocol dual-read window (v1 + v2). Explicit override == current
    # default in core/outbox_envelope.py (SCHEMA_VERSION=2, LEGACY_SCHEMA_VERSIONS=(1,)).
    # Cutoff to single-read: set to "2" once dispatcher_schema_version_total{schema_version="1"}
    # has been at 0 for ≥48h. See CLAUDE.md §Outbox Data Contracts.
    - OUTBOX_ACCEPT_SCHEMA_VERSIONS=1,2
    # Prometheus metrics port (dispatcher_schema_version_total etc.). Required
    # to observe the v1→v2 cutoff criterion. Scrape job: prometheus.yml.
    - OUTBOX_ROUTER_METRICS_PORT=9836
    - SIGNAL_TASK_KEY_PREFIX=signal:task
    - SIGNAL_DUE_ZSET_PREFIX=zset:signals:due
    - SIGNAL_DELIVERY_TTL_SEC=86400
    - SIGNAL_OUTBOX_CLAIM_MIN_IDLE_MS=60000
    - SIGNAL_OUTBOX_CLAIM_COUNT=200
    - GO_WORKER_REDIS_USER=${GO_WORKER_REDIS_USER:-go_worker}
    - GO_WORKER_REDIS_PASS=${GO_WORKER_REDIS_PASS}
    - REDIS_SIGNALS_HOST=redis-worker-1
    - REDIS_SIGNALS_HOST_2=redis-worker-1
    - OUTBOX_CONTRACT_MODE=warn
    - OUTBOX_CONTRACT_SAMPLE_RATE=0.1
    - USE_SIGNAL_OUTBOX=true
    - TZ=UTC
    depends_on:
      redis:
        condition: service_healthy
      redis-worker-1:
        condition: service_healthy
    networks:
    - scanner-core
    - scanner-infra
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          devices:
          - driver: nvidia
            count: all
            capabilities:
            - gpu
          memory: 512M
    volumes:
    - ./logs:/app/logs
    - ./python-worker/services:/app/services
    - ./python-worker/core:/app/core
    - ./python-worker/common:/app/common
    command:
    - sh
    - -c
    - sleep 5 && python -m services.signal_outbox_router
