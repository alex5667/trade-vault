x-default-python-worker:
  build: &id001
    context: .
    dockerfile: python-worker/Dockerfile
  restart: on-failure:5
  healthcheck:
    test:
    - CMD-SHELL
    - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz',
      timeout=2).read()" >/dev/null 2>&1 || exit 1
    interval: 30s
    timeout: 10s
    start_period: 45s
    retries: 5
  networks: &id002
  - scanner-core
  - scanner-infra
services:
  python-worker:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    image: scanner-python-worker:latest
    container_name: scanner-python-worker
    runtime: nvidia
    profiles:
    - default
    env_file:
    - config/generated/symbols.env
    ports:
    - 8000:8000
    healthcheck:
      test:
      - CMD-SHELL
      - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz',
        timeout=2).read()" >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    environment:
    - liqmap_gate_mode=${LIQMAP_GATE_MODE:-enforce}
    # Direction-aware counter-trend gate: off | shadow | enforce
    - REGIME_DIRECTION_GATE_MODE=${REGIME_DIRECTION_GATE_MODE:-enforce}
    # 2026-05-14: TradeProfileRouter ENFORCE — overlay (tp_rr / stop_atr_mult /
    # tp1_atr_mult) already applies in SHADOW, but ENFORCE additionally enables
    # the net_edge_bps gate and canary-share logic per profile.
    - TRADE_PROFILE_ROUTER_ENABLED=${TRADE_PROFILE_ROUTER_ENABLED:-1}
    - TRADE_PROFILE_MODE=${TRADE_PROFILE_MODE:-ENFORCE}
    # Layer A/B/C enforce-gate (auto-promoted from of_layers_shadow_calibrator)
    # off | shadow | enforce — default OFF (полный no-op в pipeline)
    - OF_LAYER_ENFORCE_MODE=${OF_LAYER_ENFORCE_MODE:-off}
    - LAYER_ENFORCE_HMAC_SECRET=${LAYER_ENFORCE_HMAC_SECRET:-${LAYERS_CAL_HMAC_SECRET:-${RECS_HMAC_SECRET:-CHANGE_ME}}}
    - LAYER_ENFORCE_KEY_PREFIX=${LAYER_ENFORCE_KEY_PREFIX:-of_gate}
    - LAYER_ENFORCE_CACHE_TTL_SEC=${LAYER_ENFORCE_CACHE_TTL_SEC:-5}
    # Layer D early-arm hook (inline on every tick after MFE update)
    # off | shadow | enforce — default OFF
    - LAYER_D_HOOK_ENABLED=${LAYER_D_HOOK_ENABLED:-0}
    - OF_LAYER_D_EARLY_ARM_MODE=${OF_LAYER_D_EARLY_ARM_MODE:-off}
    - OF_LAYER_D_ARM_THRESHOLD_R=${OF_LAYER_D_ARM_THRESHOLD_R:-0.25}
    - LAYER_D_HMAC_SECRET=${LAYER_D_HMAC_SECRET:-${LAYERS_CAL_HMAC_SECRET:-${RECS_HMAC_SECRET:-CHANGE_ME}}}
    - LAYER_D_GATES_KEY_PREFIX=${LAYER_D_GATES_KEY_PREFIX:-of_gate}
    - LAYER_D_CONFIG_CACHE_TTL_SEC=${LAYER_D_CONFIG_CACHE_TTL_SEC:-5}
    - LAYER_D_ARM_STREAM=${LAYER_D_ARM_STREAM:-trail:arm:requests}
