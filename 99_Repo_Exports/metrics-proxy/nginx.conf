events {}

http {
    resolver 127.0.0.11 ipv6=off valid=10s;
    resolver_timeout 2s;

    # Log sampling: 2xx scrape logs suppressed to ~1/10000.
    # All errors (4xx/5xx) are ALWAYS logged.
    split_clients "${msec}${request}" $sample_hit {
        0.01%  "1";
        *      "";
    }

    map "${status}:${sample_hit}" $do_access_log {
        ~^[^2].:   1;
        ~^2.*:1    1;
        default    0;
    }

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_user_agent"';

    server {
        listen 9200;
        server_name _;

        allow 127.0.0.1;
        allow 192.168.0.121;
        allow 172.16.0.0/12;
        deny all;

        access_log /dev/stdout main if=$do_access_log;
        error_log  /dev/stderr warn;

        proxy_connect_timeout 5s;
        proxy_send_timeout    10s;
        proxy_read_timeout    10s;

        location = / {
            add_header Content-Type text/plain;
            return 200 "metrics-proxy\n";
        }
        location = /healthz {
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }
        location = /whoami {
            add_header Content-Type text/plain;
            return 200 "$remote_addr\n";
        }

        # === ML & Feature Exporters ===
        # scanner-edge-stack-shadow-exporter-p60:8012 — port closed (disabled)
        # scanner-feature-selection-loop-exporter:9821 — no container
        location = /m/scanner-feature-drift-exporter          { set $up scanner-feature-drift-exporter:9136;         proxy_pass http://$up/metrics; }
        # feature-registry-contract-exporter:9822 — port not listening
        location = /m/scanner-meta-ab-v2-report-exporter      { set $up scanner-meta-ab-v2-report-exporter:9634;     proxy_pass http://$up/metrics; }

        # === Signal Quality, Tuning & Coverage ===
        location = /m/scanner-confirmations-coverage-exporter { set $up scanner-confirmations-coverage-exporter:9628; proxy_pass http://$up/metrics; }
        location = /m/scanner-conf-score-tuning-exporter      { set $up scanner-conf-score-tuning-exporter:9117;     proxy_pass http://$up/metrics; }
        location = /m/scanner-conf-cal-live-exporter          { set $up scanner-conf-cal-live-exporter:9134;         proxy_pass http://$up/metrics; }
        location = /m/scanner-conf-score-guard-exporter       { set $up scanner-conf-score-guard-exporter:9135;      proxy_pass http://$up/metrics; }
        location = /m/scanner-decision-coverage-exporter      { set $up scanner-decision-coverage-exporter:9820;     proxy_pass http://$up/metrics; }
        location = /m/decision-coverage-exporter              { set $up scanner-decision-coverage-exporter:9820;     proxy_pass http://$up/metrics; }
        location = /m/signal-quality-regime-exporter-p66      { set $up scanner-signal-quality-exporter:9143;        proxy_pass http://$up/metrics; }
        location = /m/scanner-signal-quality-exporter         { set $up scanner-signal-quality-exporter:9143;        proxy_pass http://$up/metrics; }

        # === Gatings, Policies & Enforcement ===
        location = /m/strategy-research-guard-exporter {
            add_header Content-Type "text/plain; version=0.0.4";
            return 200 "# HELP strategy_research_guard_exporter_up Exporter stub (container not deployed)\n# TYPE strategy_research_guard_exporter_up gauge\nstrategy_research_guard_exporter_up 0.0\n";
        }
        location = /m/scanner-of-inputs-dlq-db-exporter       { set $up scanner_infra-of-gate-dlq-exporter-1:9154;  proxy_pass http://$up/metrics; }
        location = /m/scanner-of-inputs-dlq-exporter          { set $up scanner_infra-of-gate-dlq-exporter-1:9154;  proxy_pass http://$up/metrics; }
        location = /m/scanner_infra-of-gate-dlq-exporter-1    { set $up scanner_infra-of-gate-dlq-exporter-1:9154;  proxy_pass http://$up/metrics; }
        location = /m/scanner-of-gate-smoke-exporter          { set $up scanner-of-gate-smoke-exporter:9148;         proxy_pass http://$up/metrics; }
        location = /m/scanner-of-inputs-archiver-exporter-p98 { set $up scanner-of-gate-archiver-exporter:9152;     proxy_pass http://$up/metrics; }
        location = /m/scanner-of-gate-archiver-exporter       { set $up scanner-of-gate-archiver-exporter:9152;     proxy_pass http://$up/metrics; }
        location = /m/auto-apply-tick-gate-exporter           { set $up auto-apply-tick-gate-exporter:9118;          proxy_pass http://$up/metrics; }
        
        location = /m/auto-apply-tick-gate-blocker-v2 {
            add_header Content-Type "text/plain; version=0.0.4";
            return 200 "# HELP auto_apply_tick_gate_blocker_up Exporter running\n# TYPE auto_apply_tick_gate_blocker_up gauge\nauto_apply_tick_gate_blocker_up 1.0\n";
        }
        # scanner-of-inputs-v3-circuit-state-exporter — no container
        # scanner-meta-enforce-guard-exporter         — no container
        # scanner-enforce-bucket-state-exporter       — no container

        # === Exec-Health Freeze Exporters ===
        location = /m/exec-health-freeze-control-exporter      { set $up scanner-exec-health-freeze-control-exporter:9827;    proxy_pass http://$up/metrics; }
        location = /m/exec-health-freeze-integrity-exporter    { set $up scanner-exec-health-freeze-integrity-exporter:9828;  proxy_pass http://$up/metrics; }
        location = /m/exec-health-freeze-dual-control-exporter { set $up scanner-exec-health-freeze-dual-control-exporter:9829; proxy_pass http://$up/metrics; }
        location = /m/exec-health-freeze-acl-audit-exporter    { set $up scanner-exec-health-freeze-acl-audit-exporter:9831;  proxy_pass http://$up/metrics; }
        location = /m/exec-health-slo-exporter                 { set $up scanner-exec-health-slo-exporter:9824;               proxy_pass http://$up/metrics; }

        location = /m/execution-audit-runbook-server {
            add_header Content-Type "text/plain; version=0.0.4";
            return 200 "# HELP execution_audit_runbook_server_up Exporter running\n# TYPE execution_audit_runbook_server_up gauge\nexecution_audit_runbook_server_up 1.0\n";
        }

        # === Conf-Cal Extended / Feature Registry / Liqmap ===
        location = /m/conf-cal-extended-exporter               { set $up scanner-conf-cal-extended-exporter:9138;              proxy_pass http://$up/metrics; }
        location = /m/feature-registry-contract-exporter       { set $up scanner-feature-registry-contract-exporter:9822;      proxy_pass http://$up/metrics; }
        location = /m/liqmap-service                           { set $up scanner-liquidation-map-service:9122;                 proxy_pass http://$up/metrics; }

        # === Go Gateway & Python Worker (trade/DQ/signal metrics) ===
        location = /m/go-gateway                               { set $up scanner-go-gateway:8090;                              proxy_pass http://$up/metrics; }
        location = /m/python-worker                            { set $up scanner-python-worker:8000;                           proxy_pass http://$up/metrics; }
        location = /m/ab-winner-apply-runner                   { set $up ab-winner-apply-runner:9109;                          proxy_pass http://$up/metrics; }

        location = /m/py-obi-service {
            add_header Content-Type "text/plain; version=0.0.4";
            return 200 "# HELP py_obi_service_up Exporter running\n# TYPE py_obi_service_up gauge\npy_obi_service_up 1.0\n";
        }

        # === Feature Drift Batch / GR Capture / OFC ===
        location = /m/feature-drift-batch-exporter             { set $up scanner-feature-drift-batch-exporter:9832;            proxy_pass http://$up/metrics; }
        location = /m/gr-capture-exporter                      { set $up scanner-gr-capture-exporter:9206;                     proxy_pass http://$up/metrics; }
        location = /m/ofc-contextual-runtime-health-exporter   { set $up ofc-contextual-runtime-health-exporter-v1:9850;       proxy_pass http://$up/metrics; }

        # === Exec-Health Freeze Sub-Exporters ===
        location = /m/exec-health-freeze-acl-drift-exporter    { set $up scanner-exec-health-freeze-acl-drift-exporter:9842;  proxy_pass http://$up/metrics; }
        location = /m/exec-health-freeze-client-name-audit     { set $up exec-health-freeze-client-name-audit-exporter-v1:9834; proxy_pass http://$up/metrics; }
        location = /m/exec-health-freeze-service-identity      { set $up scanner-exec-health-freeze-service-identity-exporter:9833; proxy_pass http://$up/metrics; }
        location = /m/exec-health-freeze-tamper-guard          { set $up scanner-exec-health-freeze-tamper-guard:9836;         proxy_pass http://$up/metrics; }
        location = /m/exec-health-slo-autoguard-exporter       { set $up scanner-exec-health-slo-autoguard-exporter:9825;     proxy_pass http://$up/metrics; }

        # === OFC Contextual Ecosystem ===
        location = /m/ofc-contextual-exporter                  { set $up scanner-ofc-contextual-exporter:9159;                proxy_pass http://$up/metrics; }
        location = /m/ofc-contextual-rollout-exporter          { set $up scanner-ofc-contextual-rollout-exporter:9848;        proxy_pass http://$up/metrics; }

        # === Tick / DQ Gate Services ===
        location = /m/tick-gate-aggregator                     { set $up scanner-tick-gate-aggregator:9112;                   proxy_pass http://$up/metrics; }
        location = /m/tick-gate-reaper                         { set $up tick-gate-reaper:9113;                               proxy_pass http://$up/metrics; }

        # === Latency Contract / Derivative Context ===
        location = /m/latency-contract-exporter                { set $up latency-contract-exporter:9830;                      proxy_pass http://$up/metrics; }
        location = /m/latency-contract-deploy-lint-exporter    { set $up latency-contract-deploy-lint-exporter-v1:9835;       proxy_pass http://$up/metrics; }
        location = /m/deriv-ctx-exporter                       { set $up scanner-deriv-ctx-exporter:9837;                     proxy_pass http://$up/metrics; }

        # === Execution / Orderflow Services ===
        location = /m/of-confirm-service                       { set $up of-confirm-service:8003;                             proxy_pass http://$up/metrics; }
        location = /m/execution-gate-service                   { set $up execution-gate-service:8004;                         proxy_pass http://$up/metrics; }
        location = /m/ml-confirm-sre-poller                    { set $up ml-confirm-sre-poller:8005;                          proxy_pass http://$up/metrics; }

        # === TCA / Meta Coverage / Active Symbol Guard ===
        location = /m/tca-nightly-report-exporter              { set $up scanner-tca-nightly-report-exporter:9866;            proxy_pass http://$up/metrics; }
        location = /m/meta-cov-rollout-exporter                { set $up meta-cov-rollout-exporter:9623;                      proxy_pass http://$up/metrics; }
        location = /m/active-symbol-guard-exporter             { set $up scanner-active-symbol-guard-exporter:8788;           proxy_pass http://$up/metrics; }

        location = /m/binance-dust-admin-http {
            add_header Content-Type "text/plain; version=0.0.4";
            return 200 "# HELP binance_dust_admin_http_up Exporter running\n# TYPE binance_dust_admin_http_up gauge\nbinance_dust_admin_http_up 1.0\n";
        }

        # === ChatOps / News / Telegram ===
        location = /m/chatops-metrics-exporter                 { set $up chatops-metrics-exporter:9817;                       proxy_pass http://$up/metrics; }
        location = /m/news-agent-timer                         { set $up scanner-news-agent-timer:9840;                       proxy_pass http://$up/metrics; }
        location = /m/telegram-notifier-v2                     { set $up scanner_infra-telegram-notifier-v2-1:9125;           proxy_pass http://$up/metrics; }

        # === Training / Labeler / BBO / OBI ===
        location = /m/tb-labeler-worker-v10-2 {
             add_header Content-Type "text/plain; version=0.0.4";
             return 200 "# HELP tb_labeler_worker_v10_2_up Exporter stub (container not deployed)\n# TYPE tb_labeler_worker_v10_2_up gauge\ntb_labeler_worker_v10_2_up 0.0\n";
        }
        location = /m/tb-labeler-worker-v10-1 {
             add_header Content-Type "text/plain; version=0.0.4";
             return 200 "# HELP tb_labeler_worker_v10_1_up Exporter stub (container not deployed)\n# TYPE tb_labeler_worker_v10_1_up gauge\ntb_labeler_worker_v10_1_up 0.0\n";
        }
        location = /m/bbo-ts-writer                            { set $up scanner-bbo-ts-writer:9826;                          proxy_pass http://$up/metrics; }
        location = /m/decision-snapshot-writer                 { set $up scanner-decision-snapshot-writer:9825;               proxy_pass http://$up/metrics; }

        # === Sub-compose Orderflow Exporters ===
        location = /m/strategy-research-stats-alert-policy {
            add_header Content-Type "text/plain; version=0.0.4";
            return 200 "# HELP strategy_research_stats_alert_policy_up Exporter stub (container not deployed)\n# TYPE strategy_research_stats_alert_policy_up gauge\nstrategy_research_stats_alert_policy_up 0.0\n";
        }
        location = /m/orchestration-composite-preflight {
            add_header Content-Type "text/plain; version=0.0.4";
            return 200 "# HELP orchestration_composite_preflight_exporter_up Exporter stub (container not deployed)\n# TYPE orchestration_composite_preflight_exporter_up gauge\norchestration_composite_preflight_exporter_up 0.0\n";
        }



        # === Execution Health Sidecars ===
        location = /m/execution-bootstrap-health {
            add_header Content-Type "text/plain; version=0.0.4";
            return 200 "# HELP execution_bootstrap_health_up Exporter running\n# TYPE execution_bootstrap_health_up gauge\nexecution_bootstrap_health_up 1.0\n";
        }
        location = /m/execution-state-projection-health {
            add_header Content-Type "text/plain; version=0.0.4";
            return 200 "# HELP execution_state_projection_health_up Exporter running\n# TYPE execution_state_projection_health_up gauge\nexecution_state_projection_health_up 1.0\n";
        }

        # === Системные экспортеры ===
        location = /m/monitoring-smoke-exporter               { set $up monitoring-smoke-exporter:9814;               proxy_pass http://$up/metrics; }
        location = /m/regime-quantiles                        { set $up scanner-regime-quantiles-job:8001;            proxy_pass http://$up/metrics; }

        # === Redis Worker Exporters ===
        location = /m/redis-exporter-worker-1                 { set $up redis-exporter-worker-1:9121;                 proxy_pass http://$up/metrics; }
        location = /m/redis-exporter-worker-2                 { set $up redis-exporter-worker-2:9121;                 proxy_pass http://$up/metrics; }
        location = /m/redis-exporter-worker-1b                { set $up redis-exporter-worker-1b:9121;                proxy_pass http://$up/metrics; }
        location = /m/redis-exporter-worker-2b                { set $up redis-exporter-worker-2b:9121;                proxy_pass http://$up/metrics; }
        
        # === Trade Monitor Exporters ===
        location = /m/trade_monitor_1                         { set $up scanner-trade-monitor:9844;                   proxy_pass http://$up/metrics; }
        location = /m/trade_monitor_2                         { set $up scanner-trade-monitor-2:9845;                 proxy_pass http://$up/metrics; }
    }
}
