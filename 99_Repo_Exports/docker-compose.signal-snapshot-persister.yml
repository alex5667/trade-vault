services:
  signal-snapshot-persister:
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    image: scanner-python-worker:latest
    container_name: scanner-signal-snapshot-persister
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=${REDIS_URL:-redis://redis-worker-1:6379/0}
      # PG DSN priority: ANALYTICS_DB_DSN > PG_DSN > built default
      - ANALYTICS_DB_DSN=${ANALYTICS_DB_DSN:-postgresql://trading:${TRADING_PASSWORD}@scanner-postgres:5432/scanner_analytics}
      - SSP_STREAM=${SSP_STREAM:-signals:of:inputs}
      - SSP_GROUP=${SSP_GROUP:-signal-snapshot-persister}
      - SSP_CONSUMER=${SSP_CONSUMER:-ssp-1}
      - SSP_BATCH_SIZE=${SSP_BATCH_SIZE:-200}
      - SSP_BLOCK_MS=${SSP_BLOCK_MS:-5000}
      - SSP_FLUSH_INTERVAL_S=${SSP_FLUSH_INTERVAL_S:-5}
      - SSP_MAX_RETRIES=${SSP_MAX_RETRIES:-5}
      - SSP_DLQ_STREAM=${SSP_DLQ_STREAM:-signal_snapshot_persister:dlq}
      - METRICS_PORT=9877
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=UTC
    ports:
      - "9877:9877"
    depends_on:
      redis-worker-1:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - scanner-core
      - scanner-infra
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.3'
        reservations:
          memory: 96M
    command:
      - sh
      - -c
      - |
        sleep 15
        python -m services.signal_snapshot_persister
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://localhost:9877/metrics 2>/dev/null | grep -q ssp_msgs_read_total || exit 1"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - com.scanner.service=signal-snapshot-persister
      - com.scanner.description=30d archive of signals:of:inputs into Timescale signal_snapshots
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

networks:
  scanner-core:
    external: true
  scanner-infra:
    external: true
