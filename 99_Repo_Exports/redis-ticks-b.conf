# redis-ticks-b.conf — replica of redis-ticks
# Extends redis-ticks.conf
# CRITICAL: replicaof must come AFTER include to override any default

include /usr/local/etc/redis/redis-ticks.conf

# ExecHealth ACL users
aclfile /usr/local/etc/redis/redis-ticks-acl.conf

# ============================================================================
# REPLICA CONFIGURATION
# ============================================================================
# Connect to redis-ticks
replicaof redis-ticks 6379

# Lower maxmemory
maxmemory 10000mb
