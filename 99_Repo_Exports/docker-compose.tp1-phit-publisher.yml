services:
  tp1-phit-publisher:
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    image: scanner-python-worker:latest
    container_name: scanner-tp1-phit-publisher
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      # Main loop gate. Default 0 — publisher is opt-in until AdaptiveTP1Policy
      # readers in signal pipeline are turned on (Phase 2).
      - TP1_PHIT_PUBLISH_ENABLE=${TP1_PHIT_PUBLISH_ENABLE:-0}
      # Periodicity + analysis window.
      - TP1_PHIT_INTERVAL=${TP1_PHIT_INTERVAL:-900}
      - TP1_PHIT_WINDOW_H=${TP1_PHIT_WINDOW_H:-168.0}
      # Calibration thresholds — must match TP1_ADAPTIVE_MIN_SAMPLES on consumer
      # side; reader gates by `passes` flag here, so producer is the source of truth.
      - TP1_PHIT_MIN_SAMPLES=${TP1_PHIT_MIN_SAMPLES:-200}
      - TP1_PHIT_GRID=${TP1_PHIT_GRID:-0.65,0.80,1.00,1.15,1.30,1.50}
      - TP1_PHIT_INCLUDE_VIRTUAL=${TP1_PHIT_INCLUDE_VIRTUAL:-1}
      - TP1_PHIT_STREAM=trades:closed
      - TP1_PHIT_REDIS_URL=redis://redis-worker-1:6379/0
      - TP1_PHIT_STATE_KEY=autocal:tp1_phit:state
      - TP1_PHIT_HMAC_SECRET=${TP1_PHIT_HMAC_SECRET:-${RECS_HMAC_SECRET:-}}
      - TP1_PHIT_PROM_PORT=9865
      - TZ=UTC
    ports:
      - "9865:9865"
    depends_on:
      redis-worker-1:
        condition: service_healthy
    networks:
      - scanner-core
      - scanner-infra
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.3'
        reservations:
          memory: 128M
    command:
      - sh
      - -c
      - |
        sleep 15
        if [ "$${TP1_PHIT_PUBLISH_ENABLE:-0}" = "0" ]; then
          echo "TP1_PHIT_PUBLISH_ENABLE=0 — idle (set =1 to start)"
          while true; do sleep 3600; done
        fi
        python -m orderflow_services.tp1_hit_prob_publisher_v1
    labels:
      - com.scanner.service=tp1-phit-publisher
      - com.scanner.description=Empirical P_hit(TP1_R) curve publisher (AdaptiveTP1Policy Phase 2)
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

networks:
  scanner-core:
    external: true
  scanner-infra:
    external: true
