# Стабильная конфигурация Redis для trade_back
# Решает проблемы с ECONNRESET и переподключением

# Основные настройки
port 6379
bind 0.0.0.0
protected-mode no
tcp-keepalive 300
timeout 0

# Память и производительность - ОПТИМИЗИРОВАНО ДЛЯ СТАБИЛЬНОСТИ
maxmemory 4gb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# Persistence настройки - БАЛАНС ПРОИЗВОДИТЕЛЬНОСТИ И НАДЕЖНОСТИ
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error no
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb

# AOF для надежности - ОПТИМИЗИРОВАНО
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 128mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# Logging
loglevel notice
logfile ""
syslog-enabled no

# Client настройки для стабильности - КРИТИЧНО ДЛЯ ECONNRESET
tcp-backlog 65535
databases 16

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 1024

# Latency мониторинг
latency-monitor-threshold 100

# Security
requirepass ""

# Streams настройки
stream-node-max-bytes 8192
stream-node-max-entries 1000

# Memory оптимизация
hash-max-ziplist-entries 1024
hash-max-ziplist-value 128
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 1024
zset-max-ziplist-entries 256
zset-max-ziplist-value 128

# HyperLogLog оптимизация
hll-sparse-max-bytes 3000

# Уведомления для мониторинга
notify-keyspace-events ""

# Replica настройки
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync no
repl-diskless-sync-delay 5

# Security
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""

# Client output buffer limits - КРИТИЧНО ДЛЯ СТАБИЛЬНОСТИ
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 512mb 128mb 60
client-output-buffer-limit pubsub 64mb 16mb 60

# Client query buffer limit
client-query-buffer-limit 1gb

# Protocol max bulk length
proto-max-bulk-len 512mb

# Увеличиваем лимиты соединений - КРИТИЧНО
maxclients 10000

# Настройки для стабильности при высокой нагрузке
hz 10
dynamic-hz yes

# Настройки для предотвращения блокировок
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# ДОПОЛНИТЕЛЬНЫЕ НАСТРОЙКИ ДЛЯ РЕШЕНИЯ ECONNRESET

# Настройки для предотвращения OOM
oom-score-adj no
oom-score-adj-values 0 200 800

# Настройки для предотвращения блокировок при записи
rdb-save-incremental-fsync yes
aof-rewrite-incremental-fsync yes

# Настройки для мониторинга производительности
latency-tracking yes
latency-tracking-info-percentiles 50 99 99.9

# Настройки для предотвращения проблем с памятью
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 5
active-defrag-cycle-max 75
active-defrag-max-scan-fields 1000

# Настройки для предотвращения проблем с потоками
io-threads 4
io-threads-do-reads yes

# Настройки для предотвращения проблем с памятью при высокой нагрузке
jemalloc-bg-thread yes

# КРИТИЧНЫЕ НАСТРОЙКИ ДЛЯ РЕШЕНИЯ ECONNRESET

# Настройки для предотвращения проблем с соединениями
client-output-buffer-limit pubsub 0 0 0
client-output-buffer-limit replica 0 0 0

# Настройки для предотвращения проблем с сетью
tcp-keepalive 300
timeout 0

# Настройки для предотвращения проблем с памятью
maxmemory-samples 10
maxmemory-policy allkeys-lru

# Настройки для предотвращения проблем с производительностью
hz 10
dynamic-hz yes

# Настройки для предотвращения проблем с потоками
io-threads 4
io-threads-do-reads yes

# Настройки для предотвращения проблем с памятью при высокой нагрузке
jemalloc-bg-thread yes
