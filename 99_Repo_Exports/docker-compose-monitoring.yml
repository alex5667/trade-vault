services:
  grafana:
    image: grafana/grafana:latest
    container_name: scanner-grafana
    profiles:
    - disabled
    ports:
    - 3001:3000
    environment:
    - GF_SECURITY_ADMIN_PASSWORD=admin
    - GF_LOG_LEVEL=warn
    - TZ=UTC
    volumes:
    - grafana-data:/var/lib/grafana
    networks:
    - scanner-ops
    - scanner-infra
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 24M
  alertmanager-telegram-webhook:
    build:
      context: ./monitoring/alertmanager/telegram_webhook
      dockerfile: Dockerfile
    container_name: alertmanager-telegram-webhook
    restart: unless-stopped
    env_file:
    - .env
    - config/generated/symbols.env
    environment:
    - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    - TELEGRAM_MESSAGE_THREAD_ID=${TELEGRAM_MESSAGE_THREAD_ID:-}
    - WEBHOOK_PORT=8081
    - LOG_LEVEL=${ALERT_WEBHOOK_LOG_LEVEL:-INFO}
    - RUNBOOKS_BASE_URL=${RUNBOOKS_BASE_URL:-http://127.0.0.1:8082}
    - GRAFANA_BASE_URL=${GRAFANA_BASE_URL:-http://127.0.0.1:3000}
    - ALERTMANAGER_BASE_URL=${ALERTMANAGER_BASE_URL:-http://127.0.0.1:9093}
    - PYTHONUNBUFFERED=1
    - ALERT_DEDUPE_TTL_S=${ALERT_DEDUPE_TTL_S:-180}
    - ALERT_RATE_LIMIT_PER_MIN=${ALERT_RATE_LIMIT_PER_MIN:-30}
    - TELEGRAM_ROUTING_JSON=${TELEGRAM_ROUTING_JSON:-}
    - TZ=UTC
    ports:
    - ${ALERT_WEBHOOK_PORT_HOST:-8081}:8081
    networks:
    - scanner-ops
    - scanner-infra
    deploy:
      resources:
        reservations:
          memory: 24M
  alertmanager:
    image: prom/alertmanager:latest
    container_name: scanner-alertmanager
    profiles:
    - disabled
    restart: unless-stopped
    volumes:
    - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    - alertmanager-data:/alertmanager
    ports:
    - 9093:9093
    command:
    - --config.file=/etc/alertmanager/alertmanager.yml
    - --storage.path=/alertmanager
    depends_on:
    - alertmanager-telegram-webhook
    networks:
    - scanner-ops
    - scanner-infra
    deploy:
      resources:
        reservations:
          memory: 24M
    environment:
    - TZ=UTC
  feature-registry-contract-exporter:
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    container_name: scanner-feature-registry-contract-exporter
    restart: unless-stopped
    environment:
    # Prod-pinned to v13_of (matches ML_FEATURE_SCHEMA_VER in
    # docker-compose-crypto-orderflow.yml). Override via FEATURE_SCHEMA_VER env
    # only during intentional schema migrations.
    - REDIS_URL=${REDIS_URL}
    - FEATURE_SCHEMA_VER=${FEATURE_SCHEMA_VER:-v13_of}
    - FEATURE_REGISTRY_CONTRACT_EXPORTER_PORT=9822
    - FEATURE_REGISTRY_CONTRACT_EXPORTER_INTERVAL_S=30
    - FEATURE_REGISTRY_CONTRACT_METRICS_KEY=metrics:feature_registry_contract:last
    - FEATURE_REGISTRY_PIN_KEY=cfg:feature_registry:edge_stack:v13_of
    - PYTHONPATH=/app
    - TZ=UTC
    volumes:
    - ./python-worker:/app
    ports:
    - 9822:9822
    command:
    - python3
    - -m
    - orderflow_services.feature_registry_contract_exporter_v1
    networks:
    - scanner-ops
    - scanner-infra
    deploy:
      resources:
        reservations:
          memory: 24M
  feature-registry-contract-check-v14of:
    # Canary contract-check loop pinned to v14_of (339 keys). Runs the
    # one-shot `feature_registry_contract_check_v1` every hour and writes
    # results to a dedicated Redis key consumed by the v14of exporter.
    # Promotion plan: when v14_of becomes prod, bump the primary check
    # (via of_timers_worker env) to v14_of and retire this canary loop.
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    container_name: scanner-feature-registry-contract-check-v14of
    restart: unless-stopped
    environment:
    - REDIS_URL=${REDIS_URL}
    - FEATURE_SCHEMA_VER=v14_of
    - FEATURE_REGISTRY_PIN_KEY=cfg:feature_registry:edge_stack:v14_of
    - FEATURE_REGISTRY_CONTRACT_METRICS_KEY=metrics:feature_registry_contract:v14_of:last
    - FEATURE_REGISTRY_CONTRACT_CHECK_INTERVAL_S=${FEATURE_REGISTRY_CONTRACT_CHECK_INTERVAL_S_V14OF:-3600}
    - FEATURE_REGISTRY_REQUIRE_PINS=${FEATURE_REGISTRY_REQUIRE_PINS_V14OF:-0}
    - PYTHONPATH=/app
    - TZ=UTC
    volumes:
    - ./python-worker:/app
    command:
    - sh
    - -c
    - |
      set -eu
      while true; do
        echo "[v14of-check] $(date -u +%FT%TZ) running contract check"
        python3 -m orderflow_services.feature_registry_contract_check_v1 || true
        sleep "${FEATURE_REGISTRY_CONTRACT_CHECK_INTERVAL_S:-3600}"
      done
    networks:
    - scanner-ops
    - scanner-infra
    deploy:
      resources:
        reservations:
          memory: 32M
  feature-registry-contract-exporter-v14of:
    # Exporter that reads metrics:feature_registry_contract:v14_of:last
    # (written by the canary check loop above) and exposes Prometheus
    # gauges on :9823 — separate scrape target so alerts can distinguish
    # v13_of (port 9822) from v14_of canary contract status.
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    container_name: scanner-feature-registry-contract-exporter-v14of
    restart: unless-stopped
    environment:
    - REDIS_URL=${REDIS_URL}
    - FEATURE_REGISTRY_CONTRACT_EXPORTER_PORT=9823
    - FEATURE_REGISTRY_CONTRACT_EXPORTER_INTERVAL_S=30
    - FEATURE_REGISTRY_CONTRACT_METRICS_KEY=metrics:feature_registry_contract:v14_of:last
    - PYTHONPATH=/app
    - TZ=UTC
    volumes:
    - ./python-worker:/app
    ports:
    - 9823:9823
    command:
    - python3
    - -m
    - orderflow_services.feature_registry_contract_exporter_v1
    networks:
    - scanner-ops
    - scanner-infra
    deploy:
      resources:
        reservations:
          memory: 24M
  feature-registry-contract-check-v15of:
    # Shadow contract-check loop for v15_of (515 keys). Runs the one-shot
    # feature_registry_contract_check_v1 every hour and writes results to
    # metrics:feature_registry_contract:v15_of:last, consumed by the v15of
    # exporter below. Activate shadow once pins are seeded:
    #   python3 -m tools.seed_feature_registry_pins --schemas v15_of
    # Port: none (check-only loop, no HTTP server).
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    container_name: scanner-feature-registry-contract-check-v15of
    restart: unless-stopped
    environment:
    - REDIS_URL=${REDIS_URL}
    - FEATURE_SCHEMA_VER=v15_of
    - FEATURE_REGISTRY_PIN_KEY=cfg:feature_registry:edge_stack:v15_of
    - FEATURE_REGISTRY_CONTRACT_METRICS_KEY=metrics:feature_registry_contract:v15_of:last
    - FEATURE_REGISTRY_CONTRACT_CHECK_INTERVAL_S=${FEATURE_REGISTRY_CONTRACT_CHECK_INTERVAL_S_V15OF:-3600}
    - FEATURE_REGISTRY_REQUIRE_PINS=${FEATURE_REGISTRY_REQUIRE_PINS_V15OF:-0}
    - PYTHONPATH=/app
    - TZ=UTC
    volumes:
    - ./python-worker:/app
    command:
    - sh
    - -c
    - |
      set -eu
      while true; do
        echo "[v15of-check] $(date -u +%FT%TZ) running contract check"
        python3 -m orderflow_services.feature_registry_contract_check_v1 || true
        sleep "${FEATURE_REGISTRY_CONTRACT_CHECK_INTERVAL_S:-3600}"
      done
    networks:
    - scanner-ops
    - scanner-infra
    deploy:
      resources:
        reservations:
          memory: 32M
  feature-registry-contract-exporter-v15of:
    # Exporter that reads metrics:feature_registry_contract:v15_of:last
    # (written by the shadow check loop above) and exposes Prometheus gauges
    # on :9901 — separate from v13_of (:9822), v14_of (:9823), and
    # exec-health-slo (:9824). Alert rules in
    # monitoring/prometheus_alerts_ml_pipeline_failopen.yml reference :9901.
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    container_name: scanner-feature-registry-contract-exporter-v15of
    restart: unless-stopped
    environment:
    - REDIS_URL=${REDIS_URL}
    - FEATURE_REGISTRY_CONTRACT_EXPORTER_PORT=9901
    - FEATURE_REGISTRY_CONTRACT_EXPORTER_INTERVAL_S=30
    - FEATURE_REGISTRY_CONTRACT_METRICS_KEY=metrics:feature_registry_contract:v15_of:last
    - PYTHONPATH=/app
    - TZ=UTC
    volumes:
    - ./python-worker:/app
    ports:
    - 9901:9901
    command:
    - python3
    - -m
    - orderflow_services.feature_registry_contract_exporter_v1
    networks:
    - scanner-ops
    - scanner-infra
    deploy:
      resources:
        reservations:
          memory: 24M
networks:
  scanner-ops:
    external: true
  scanner-infra:
    external: true
volumes:
  alertmanager-data:
    driver: local
  grafana-data:
    driver: local
