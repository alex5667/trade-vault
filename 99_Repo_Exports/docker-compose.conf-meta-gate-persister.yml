services:
  conf-meta-gate-persister:
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    image: scanner-python-worker:latest
    container_name: scanner-conf-meta-gate-persister
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      # Stream input lives on redis-worker-1 (same as signal-snapshot-persister
      # and the gated-out outcome tracker).
      - REDIS_URL=${REDIS_URL:-redis://redis-worker-1:6379/0}
      - CONF_META_GATE_PERSISTER_REDIS_URL=${CONF_META_GATE_PERSISTER_REDIS_URL:-${REDIS_URL:-redis://redis-worker-1:6379/0}}
      - TRADES_DB_DSN=${TRADES_DB_DSN:-postgresql://trading:${TRADING_PASSWORD}@scanner-postgres:5432/trade}
      - CONF_META_GATE_PERSISTER_DB_DSN=${CONF_META_GATE_PERSISTER_DB_DSN:-${TRADES_DB_DSN:-postgresql://trading:${TRADING_PASSWORD}@scanner-postgres:5432/trade}}
      # Plan 1 Phase 5: persist decision rows into the
      # confidence_meta_gate_decisions hypertable (migration 20260530_06,
      # applied via python-worker/migrations/apply_migrations.sh — required
      # before flipping this flag). Rollback: set =0 to drop back to
      # counts-only mode (XADD still reads/acks, no INSERT).
      - CONF_META_GATE_PERSISTER_ENABLED=${CONF_META_GATE_PERSISTER_ENABLED:-1}
      - CONF_META_GATE_PERSISTER_IN_STREAM=${CONF_META_GATE_PERSISTER_IN_STREAM:-stream:decisions:conf_meta_gate}
      - CONF_META_GATE_PERSISTER_GROUP=${CONF_META_GATE_PERSISTER_GROUP:-conf-meta-gate-persister}
      - CONF_META_GATE_PERSISTER_CONSUMER=${CONF_META_GATE_PERSISTER_CONSUMER:-conf-meta-gate-persister-1}
      - CONF_META_GATE_PERSISTER_BATCH=${CONF_META_GATE_PERSISTER_BATCH:-200}
      - CONF_META_GATE_PERSISTER_PORT=9927
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=UTC
    ports:
      - "9927:9927"
    depends_on:
      redis-worker-1:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - scanner-core
      - scanner-infra
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.3'
        reservations:
          memory: 96M
    command:
      - sh
      - -c
      - |
        sleep 15
        python -m services.conf_meta_gate_persister
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -qO- http://localhost:9927/metrics 2>/dev/null | grep -q conf_meta_gate_persister_read_total || exit 1"
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - com.scanner.service=conf-meta-gate-persister
      - com.scanner.description=Plan 1 Phase 5 — drains stream:decisions:conf_meta_gate to confidence_meta_gate_decisions hypertable
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

networks:
  scanner-core:
    external: true
  scanner-infra:
    external: true
