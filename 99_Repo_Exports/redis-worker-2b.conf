# redis-worker-2b.conf — replica of redis-worker-2
# Extends redis-worker-stable.conf with replicaof directive
# CRITICAL: replicaof must come AFTER include to override any default

include /usr/local/etc/redis/redis-worker-stable.conf

# ExecHealth ACL users — same ACL base as master
aclfile /data/redis-worker-2-acl.conf

# ============================================================================
# REPLICA CONFIGURATION
# ============================================================================
# Connect to redis-worker-2 (Docker DNS resolves to the master container)
replicaof redis-worker-2 6379

# Lower maxmemory — replica needs enough to hold master dataset (~6GB currently)
maxmemory 8000mb
