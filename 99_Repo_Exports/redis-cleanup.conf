# Конфигурация автоматической очистки Redis для scanner-infra
# Этот файл содержит настройки для cron и автоматической очистки

# ========================================
# НАСТРОЙКИ ОЧИСТКИ STREAMS
# ========================================

# Основные стримы для очистки
"stream:symbol-to-redis:1000"         # Символы: 1000 записей
"stream:kline_1m:30000"               # 1m свечи: 5000 записей
"stream:kline_5m:5000"               # 5m свечи: 3000 записей
"stream:kline_15m:3000"              # 15m свечи: 2000 записей
"stream:kline_30m:1500"              # 30m свечи: 1500 записей
"stream:kline_1h:1000"               # 1h свечи: 1000 записей
"stream:kline_4h:500"                # 4h свечи: 500 записей
"stream:kline_1d:100"                # 1d свечи: 100 записей

# ========================================
# НАСТРОЙКИ TTL ДЛЯ КЛЮЧЕЙ
# ========================================

# TTL для различных типов данных (в секундах)
TTL_SETTINGS=(
    "temp:*:3600"                        # Временные данные: 1 час
    "cache:*:3600"                        # Кэш: 1 час
    "session:*:3600"                      # Сессии: 1 час
    "ws:*:86400"                          # WebSocket: 24 часа
    "connection:*:86400"                  # Подключения: 24 часа
    "analytics:*:604800"                  # Аналитика: 7 дней
    "stats:*:604800"                      # Статистика: 7 дней
    "log:*:2592000"                       # Логи: 30 дней
    "debug:*:2592000"                     # Отладка: 30 дней
    "notify:*:604800"                     # Уведомления: 7 дней
    "alert:*:604800"                      # Алерты: 7 дней
    "metric:*:86400"                      # Метрики: 1 день
    "prometheus:*:86400"                  # Prometheus: 1 день
    "telegram:channel:*:status:2592000"  # Статусы каналов: 30 дней
    "config:*:604800"                     # Конфигурация: 7 дней
)

# ========================================
# НАСТРОЙКИ CRON
# ========================================

# Рекомендуемые cron задачи для автоматической очистки

# Ежедневная очистка в 2:00 утра
CRON_DAILY="0 2 * * * /usr/bin/docker exec scanner-redis redis-cli --eval /tmp/cleanup.lua"

# Еженедельная очистка в воскресенье в 3:00 утра
CRON_WEEKLY="0 3 * * 0 /usr/bin/docker exec scanner-redis redis-cli --eval /tmp/cleanup-weekly.lua"

# Ежемесячная очистка в первое число месяца в 4:00 утра
CRON_MONTHLY="0 4 1 * * /usr/bin/docker exec scanner-redis redis-cli --eval /tmp/cleanup-monthly.lua"

# ========================================
# НАСТРОЙКИ МОНИТОРИНГА
# ========================================

# Пороговые значения для предупреждений
WARNING_THRESHOLDS=(
    "memory_usage:80"                     # Предупреждение при 80% использовании памяти
    "stream_length:90"                     # Предупреждение при 90% заполнении стрима
    "client_connections:80"                # Предупреждение при 80% подключений
    "fragmentation:1.5"                    # Предупреждение при фрагментации > 1.5
)

# ========================================
# НАСТРОЙКИ ПРОИЗВОДИТЕЛЬНОСТИ
# ========================================

# Оптимальные настройки Redis для scanner-infra
REDIS_OPTIMIZATIONS=(
    "maxmemory-policy:volatile-lru"       # Политика памяти: удаление по LRU для ключей с TTL
    "hz:10"                               # Частота проверки TTL: 10 раз в секунду
    "activedefrag:yes"                    # Активная очистка памяти: включена
    "active-defrag-threshold-lower:10"    # Нижний порог для очистки: 10%
    "active-defrag-threshold-upper:100"   # Верхний порог для очистки: 100%
    "active-defrag-cycle-min:25"          # Минимальный цикл очистки: 25%
    "active-defrag-cycle-max:75"          # Максимальный цикл очистки: 75%
)

# ========================================
# ИНСТРУКЦИИ ПО ИСПОЛЬЗОВАНИЮ
# ========================================

# 1. Настройка автоматической очистки:
#    ./redis-streams-cleanup.sh all
#    ./redis-ttl-setup.sh all

# 2. Добавление cron задач:
#    crontab -e
#    # Добавить строки из CRON_DAILY, CRON_WEEKLY, CRON_MONTHLY

# 3. Мониторинг состояния:
#    ./redis-monitor.sh all
#    ./redis-quick-check.sh

# 4. Ручная очистка:
#    redis-cli --eval cleanup.lua

# 5. Проверка настроек:
#    redis-cli config get maxmemory-policy
#    redis-cli config get hz
#    redis-cli config get activedefrag timeout 0
tcp-keepalive 300
