# Feature producers — fill v14_of dead-feature gap.
# Each service writes to a Redis snapshot key that core/feature_enricher_v1.py reads.
# See docs/feature_producer_backlog.md.

services:

  execution-stats-updater:
    # Consumes trades:closed → maintains stats:execution:{symbol} HASH.
    # Unlocks: expectancy_bps, profit_factor_roll20, recovery_factor_roll,
    # kelly_fraction_roll, slippage_realized_bps, fill_time_p90_ms, adverse_drift_ms.
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    image: scanner-python-worker:latest
    container_name: scanner-execution-stats-updater
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=${REDIS_URL:-redis://redis-worker-1:6379/0}
      - ESU_STREAM=${ESU_STREAM:-trades:closed}
      - ESU_GROUP=${ESU_GROUP:-execution-stats-updater}
      - ESU_CONSUMER=${ESU_CONSUMER:-esu-1}
      - ESU_WINDOW_SIZE=${ESU_WINDOW_SIZE:-50}
      - ESU_FLUSH_INTERVAL_S=${ESU_FLUSH_INTERVAL_S:-30}
      - ESU_MIN_TRADES_TO_PUBLISH=${ESU_MIN_TRADES_TO_PUBLISH:-10}
      - METRICS_PORT=9878
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=UTC
    ports:
      - "9878:9878"
    depends_on:
      redis-worker-1:
        condition: service_healthy
    networks:
      - scanner-core
      - scanner-infra
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 64M
    command:
      - sh
      - -c
      - |
        sleep 20
        python -m services.execution_stats_updater
    labels:
      - com.scanner.service=execution-stats-updater
      - com.scanner.description=Rolling per-symbol exec stats from trades:closed
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  fear-greed-exporter:
    # Hourly fetch from alternative.me → cache:fear_greed JSON.
    # Unlocks: crypto_fear_greed, market_breadth_score.
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    image: scanner-python-worker:latest
    container_name: scanner-fear-greed-exporter
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=${REDIS_URL:-redis://redis-worker-1:6379/0}
      - FGE_INTERVAL_S=${FGE_INTERVAL_S:-3600}
      - FGE_TTL_SEC=${FGE_TTL_SEC:-7200}
      - METRICS_PORT=9879
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=UTC
    ports:
      - "9879:9879"
    depends_on:
      redis-worker-1:
        condition: service_healthy
    networks:
      - scanner-core
      - scanner-infra
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 32M
    command:
      - sh
      - -c
      - |
        sleep 15
        python -m services.fear_greed_exporter
    labels:
      - com.scanner.service=fear-greed-exporter
      - com.scanner.description=Crypto Fear&Greed daily from alternative.me
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  crossasset-ctx-writer:
    # Cross-asset features vs BTC: btc_corr_5m, alt_season_index, cross_asset_vol_ratio.
    # Reads stream:kline_1m:{SYMBOL} → writes crossasset:ctx:{SYMBOL} JSON.
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    image: scanner-python-worker:latest
    container_name: scanner-crossasset-ctx-writer
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=${REDIS_URL:-redis://redis-worker-1:6379/0}
      - CCW_BTC_SYMBOL=${CCW_BTC_SYMBOL:-BTCUSDT}
      - CCW_SYMBOLS=${CCW_SYMBOLS:-ETHUSDT,SOLUSDT,1000PEPEUSDT,APTUSDT,DOGEUSDT,WIFUSDT,ARBUSDT,1000BONKUSDT,1000SHIBUSDT}
      - CCW_TICKS_URL=${CCW_TICKS_URL:-redis://redis-ticks:6379/0}
      - CCW_WINDOW_BARS=${CCW_WINDOW_BARS:-30}
      - CCW_INTERVAL_S=${CCW_INTERVAL_S:-60}
      - CCW_TTL_SEC=${CCW_TTL_SEC:-180}
      - METRICS_PORT=9880
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=UTC
    ports:
      - "9880:9880"
    depends_on:
      redis-worker-1:
        condition: service_healthy
    networks:
      - scanner-core
      - scanner-infra
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 64M
    command:
      - sh
      - -c
      - |
        sleep 25
        python -m services.crossasset_ctx_writer
    labels:
      - com.scanner.service=crossasset-ctx-writer
      - com.scanner.description=BTC correlation + alt-season + cross-vol per symbol
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  microstructure-metrics-v2:
