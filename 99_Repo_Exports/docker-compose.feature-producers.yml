      - SDV2_SIGNALS_URL=${SDV2_SIGNALS_URL:-redis://redis-worker-1:6379/0}
      - SDV2_SYMBOLS=${SDV2_SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT,1000PEPEUSDT}
