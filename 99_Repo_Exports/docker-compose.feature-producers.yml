      dockerfile: python-worker/Dockerfile
    image: scanner-python-worker:latest
    container_name: scanner-microstructure-metrics-v2
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=${MSV2_READ_URL:-redis://redis-ticks:6379/0}
      - MSV2_PUBLISH_URL=${MSV2_PUBLISH_URL:-redis://redis-worker-1:6379/0}
      - MSV2_SYMBOLS=${MSV2_SYMBOLS:-BTCUSDT,ETHUSDT,SOLUSDT,1000PEPEUSDT}
      - MSV2_WINDOW_TICKS=${MSV2_WINDOW_TICKS:-200}
      - MSV2_INTERVAL_S=${MSV2_INTERVAL_S:-30}
      - MSV2_TTL_SEC=${MSV2_TTL_SEC:-120}
      - METRICS_PORT=9881
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=UTC
    ports:
      - "9881:9881"
    depends_on:
      redis-ticks:
        condition: service_healthy
      redis-worker-1:
        condition: service_healthy
    networks:
      - scanner-core
      - scanner-infra
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.3'
        reservations:
          memory: 96M
    command:
      - sh
      - -c
      - |
        sleep 30
        python -m core.microstructure_metrics_v2
    labels:
      - "com.scanner.service=microstructure-metrics-v2"
      - "com.scanner.description=Microstructure v2: Kyle, VPIN, OHLC vol, Amihud, PIN"
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  orderflow-pressure-v2:
