services:
  redis:
    image: redis:7-alpine
    container_name: scanner-redis
    ports:
    - 6379:6379
    volumes:
    - scanner-redis-data:/data
    - ./redis-stable-high-load.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
    - scanner-network
    healthcheck:
      test:
      - CMD
      - redis-cli
      - -h
      - localhost
      - -p
      - '6379'
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: '4.0'
        reservations:
          memory: 4G
          cpus: '2.0'
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    sysctls:
    - net.core.somaxconn=65535
    - net.ipv4.tcp_max_syn_backlog=65535
    - net.core.netdev_max_backlog=5000
    - net.ipv4.tcp_keepalive_time=600
    - net.ipv4.tcp_keepalive_intvl=60
    - net.ipv4.tcp_keepalive_probes=3
    shm_size: 2gb
    environment:
    - REDIS_REPLICATION_MODE=master
    - TZ=UTC
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: '3'
  go-worker:
    build:
      context: ./go-worker
      dockerfile: Dockerfile
    container_name: scanner-go-worker
    environment:
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - REDIS_DB=0
    - REDIS_POOL_SIZE=500
    - REDIS_MIN_IDLE_CONNS=50
    - REDIS_MAX_RETRIES=50
    - REDIS_DIAL_TIMEOUT=30s
    - REDIS_READ_TIMEOUT=300s
    - REDIS_WRITE_TIMEOUT=300s
    - TZ=UTC
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - scanner-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '1.0'
    ulimits:
      nofile:
        soft: 32768
        hard: 32768
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: '3'
  python-worker:
    build:
      context: .
      dockerfile: python-worker/Dockerfile
    container_name: scanner-python-worker
    environment:
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - REDIS_DB=0
    - REDIS_SOCKET_TIMEOUT=300
    - REDIS_SOCKET_CONNECT_TIMEOUT=30
    - REDIS_MAX_CONNECTIONS=200
    - REDIS_RETRY_ON_TIMEOUT=true
    - REDIS_HEALTH_CHECK_INTERVAL=30
    - DECISION_TRACE_ENABLE=1
    - DECISION_TRACE_MAX_EVENTS=200
    - DECISION_TRACE_DIAG_STREAM=stream:signals:diagnostics
    - SIGNAL_DIAGNOSTICS_STREAM=stream:signals:diagnostics
    - DECISION_TRACE_SIDECAR_UPDATE_ON_SUCCESS=0
    - DECISION_TRACE_LOG_SAMPLE_RATE=0.02
    - DECISION_TRACE_SUMMARY_MAXLEN=240
    - DECISION_TRACE_SIDECAR_MAX_BYTES=120000
    - RUNTIME_REFRESH_EVERY_SEC=10
    - TZ=UTC
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - scanner-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: '3'
  trade-back:
    build:
      context: ./trade_back_fixed
      dockerfile: Dockerfile
    container_name: scanner-trade-back
    ports:
    - 3000:3000
    environment:
    - REDIS_HOST=redis
    - REDIS_PORT=6379
    - REDIS_DB=0
    - REDIS_CONNECT_TIMEOUT=15000
    - REDIS_COMMAND_TIMEOUT=10000
    - REDIS_MAX_RETRIES_PER_REQUEST=20
    - REDIS_RETRY_DELAY_ON_FAILOVER=50
    - REDIS_KEEPALIVE=30000
    - TZ=UTC
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - scanner-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: 100m
        max-file: '3'
  redis-monitor:
    image: redis:7-alpine
    container_name: scanner-redis-monitor
    command: "sh -c \"\n  apk add --no-cache redis-tools &&\n  while true; do\n  \
      \  echo '=== Redis Stats ===' &&\n    redis-cli -h redis info stats &&\n   \
      \ echo '=== Memory Usage ===' &&\n    redis-cli -h redis info memory &&\n  \
      \  echo '=== Clients ===' &&\n    redis-cli -h redis info clients &&\n    echo\
      \ '=== Replication ===' &&\n    redis-cli -h redis info replication &&\n   \
      \ sleep 60\n  done\n\"\n"
    depends_on:
      redis:
        condition: service_healthy
    networks:
    - scanner-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: '2'
    environment:
    - TZ=UTC
networks:
  scanner-network:
    driver: bridge
    ipam:
      config:
      - subnet: 172.20.0.0/16
        gateway: 172.20.0.1
    driver_opts:
      com.docker.network.bridge.name: scanner-br
      com.docker.network.bridge.enable_icc: 'true'
      com.docker.network.bridge.enable_ip_masquerade: 'true'
      com.docker.network.bridge.host_binding_ipv4: 0.0.0.0
      com.docker.network.bridge.mtu: '1500'
volumes:
  scanner-redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /var/lib/docker/volumes/scanner-redis-data
