groups:
  - name: monitoring-smoke
    rules:
      - alert: MonitoringSmokeFailed
        expr: monitoring_smoke_last_success == 0
        for: 15m
        labels:
          severity: warning
          team: trade
          component: monitoring
        annotations:
          summary: "Monitoring smoke tests FAILED"
          description: "Nightly integration smoke failed (public-proxy routes or Telegram link building). Check metrics:monitoring_smoke:last in Redis and webhook logs."
          runbook_path: "/monitoring_smoke.md"
          dashboard_path: "/d/edge_stack_overview/edge-stack-overview?orgId=1"

      - alert: MonitoringSmokeStale
        expr: monitoring_smoke_age_seconds > 7200
        for: 30m
        labels:
          severity: warning
          team: trade
          component: monitoring
        annotations:
          summary: "Monitoring smoke tests stale"
          description: "No fresh monitoring smoke update in >2h. Ensure nightly job runs and Redis is reachable."
          runbook_path: "/monitoring_smoke.md"
          dashboard_path: "/d/edge_stack_overview/edge-stack-overview?orgId=1"
