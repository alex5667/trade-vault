groups:
  - name: atr_daily_triage_ops
    rules:
      - alert: ATRDailyBoardNotGenerated
        expr: time() - atr_daily_triage_board_last_run_timestamp_seconds > 86400
        for: 1h
        labels:
          severity: warning
          service: atr_daily_triage_service
        annotations:
          summary: "Daily triage board not generated"
          description: "No daily triage board artifact was created in the last 25 hours."

      - alert: ATRDailyRepeatedYellow
        expr: sum by(section) (count_over_time(atr_daily_triage_section_total{status="YELLOW"}[3d])) >= 3
        for: 0m
        labels:
          severity: warning
          service: atr_daily_triage_service
        annotations:
          summary: "Repeated YELLOW status on daily triage section"
          description: "Section {{ $labels.section }} has been YELLOW for 3 consecutive days."

      - alert: ATRDailyOverdueActions
        expr: atr_daily_triage_overdue_actions_total{priority=~"P0|P1|P2"} > 0
        for: 2h
        labels:
          severity: warning
          service: atr_daily_triage_service
        annotations:
          summary: "Overdue daily triage actions"
          description: "Owner {{ $labels.owner }} has {{ $value }} overdue daily actions."

      - alert: ATRDailyBoardBlack
        expr: atr_daily_triage_board_total{overall_status="BLACK"} > 0
        for: 0m
        labels:
          severity: page
          service: atr_daily_triage_service
        annotations:
          summary: "Daily Triage Board overall status is BLACK"
          description: "Critical constraints are active. Immediate oncall escalation required."

      - alert: ATRDailyProtectiveBlack
        expr: atr_daily_triage_section_total{section="protective", status="BLACK"} > 0
        for: 0m
        labels:
          severity: page
          service: atr_daily_triage_service
        annotations:
          summary: "Protective section BLACK"
          description: "Protective invariants violated (e.g. BE before TP1, backwards SL)."

      - alert: ATRDailyExecutionBlack
        expr: atr_daily_triage_section_total{section="execution", status="BLACK"} > 0
        for: 0m
        labels:
          severity: page
          service: atr_daily_triage_service
        annotations:
          summary: "Execution section BLACK"
          description: "High volume of requotes or connection bursts on active venues."

      - alert: ATRDailyActionP0PastSLA
        expr: sum by(action_id) (time() - atr_daily_action_due_timestamp{priority="P0"} > 0) > 0
        for: 0m
        labels:
          severity: page
          service: atr_daily_triage_service
        annotations:
          summary: "P0 Daily Action past SLA"
          description: "A P0 action item generated by daily triage exceeded its 1-hour SLA."
