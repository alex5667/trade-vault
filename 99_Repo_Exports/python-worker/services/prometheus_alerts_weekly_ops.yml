groups:
- name: atr_weekly_scorecard_ops
  rules:
  - alert: ATRWeeklyScorecardSkipped
    expr: sum(rate(atr_weekly_scorecard_total[7d])) < 1
    for: 1d
    labels:
      severity: warning
      service: atr-weekly-scorecard
    annotations:
      summary: "Weekly scorecard not generated on time"
      description: "The weekly operating scorecard has not been generated for over 7 days, check atr_weekly_scorecard_service"

  - alert: ATRWeeklyScorecardHold
    expr: atr_weekly_scorecard_total{overall_status="HOLD"} > 0
    for: 10m
    labels:
      severity: page
      service: atr-weekly-scorecard
    annotations:
      summary: "Weekly scorecard resulted in HOLD"
      description: "Critical trading week or multiple RED domains caused overall HOLD status."

  - alert: ATRWeeklyScorecardFreezeEscalation
    expr: atr_weekly_scorecard_total{overall_status="FREEZE_ESCALATION"} > 0
    for: 10m
    labels:
      severity: page
      service: atr-weekly-scorecard
    annotations:
      summary: "Weekly scorecard resulted in FREEZE_ESCALATION"
      description: "Repeated runtime/protective failures triggered freeze escalation."

  - alert: ATRWeeklyScorecardOverdueAction
    expr: atr_weekly_review_overdue_actions_total >= 1
    for: 10m
    labels:
      severity: page
      service: atr-weekly-scorecard
    annotations:
      summary: "Open P0/P1 action item past due"
      description: "An action item generated by the weekly scorecard is open past SLA."
