services:
  scanner-ml-operator-rca-experiment-router-v2-4:
    image: scanner_infra-scanner-ml-operator-rca-routing-v2-3
    volumes:
      - ./python-worker:/app
    command: ["python", "-m", "orderflow_services.operator_rca_experiment_router_v2_4"]
    environment:
      REDIS_URL: ${REDIS_URL:-redis://go_gateway:fdb98a081579737da0d6a5b25746a3c9d63abdad70e7d47f0d24159726146130@redis-worker-1:6379/0}
      ML_OPERATOR_RCA_EXPERIMENT_ENABLE: ${ML_OPERATOR_RCA_EXPERIMENT_ENABLE:-1}
      ML_OPERATOR_RCA_EXPERIMENT_ID: ${ML_OPERATOR_RCA_EXPERIMENT_ID:-operator_rca_ab_v1}
      ML_OPERATOR_RCA_EXPERIMENT_ROUTER_METRICS_PORT: ${ML_OPERATOR_RCA_EXPERIMENT_ROUTER_METRICS_PORT:-9875}
      ML_OPERATOR_RCA_EXPERIMENT_ARMS_JSON: ${ML_OPERATOR_RCA_EXPERIMENT_ARMS_JSON:-[{"name":"control","weight":0.5,"provider":"vertex","model_name":"gemini-2.5-flash-lite","prompt_version":"ml_triage_v1","policy_version":"policy_v1"},{"name":"challenger","weight":0.5,"provider":"vertex","model_name":"gemini-2.5-flash","prompt_version":"ml_triage_v2","policy_version":"policy_v1"}]}
    ports:
      - "9875:9875"
    networks:
      - scanner-network
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3

  scanner-ml-operator-rca-experiment-winner-v2-4:
    image: scanner_infra-scanner-ml-operator-rca-routing-v2-3
    volumes:
      - ./python-worker:/app
    command: ["python", "-m", "orderflow_services.operator_rca_experiment_winner_selector_v2_4"]
    environment:
      REDIS_URL: ${REDIS_URL:-redis://go_gateway:fdb98a081579737da0d6a5b25746a3c9d63abdad70e7d47f0d24159726146130@redis-worker-1:6379/0}
      ML_OPERATOR_RCA_EXPERIMENT_WINDOW_MIN: ${ML_OPERATOR_RCA_EXPERIMENT_WINDOW_MIN:-1440}
      ML_OPERATOR_RCA_EXPERIMENT_MIN_SAMPLE: ${ML_OPERATOR_RCA_EXPERIMENT_MIN_SAMPLE:-8}
      ML_OPERATOR_RCA_EXPERIMENT_SCAN_COUNT: ${ML_OPERATOR_RCA_EXPERIMENT_SCAN_COUNT:-2000}
      ML_OPERATOR_RCA_EXPERIMENT_WINNER_LOOP_SEC: ${ML_OPERATOR_RCA_EXPERIMENT_WINNER_LOOP_SEC:-300}
      ML_OPERATOR_RCA_EXPERIMENT_WINNER_METRICS_PORT: ${ML_OPERATOR_RCA_EXPERIMENT_WINNER_METRICS_PORT:-9876}
    ports:
      - "9876:9876"
    networks:
      - scanner-network
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  scanner-network:
    external: true
