groups:
  - name: ml_phase2_21_operator_routing_incident_route_rca_routing_v1
    rules:
      - alert: MLOperatorRoutingIncidentRouteRCARoutingStale
        expr: time() - ml_operator_routing_incident_route_rca_routing_last_run_ts_seconds > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Routing incident Route RCA Routing controller is stale"
