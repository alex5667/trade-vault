services:
  scanner-operator-rca-routing-incident-bundle-builder-v2-8:
    image: scanner_infra-scanner-ml-operator-rca-routing-v2-3
    volumes:
      - ./python-worker:/app
    command: ["python", "-m", "orderflow_services.operator_rca_routing_incident_bundle_builder_v2_8"]
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://go_gateway:fdb98a081579737da0d6a5b25746a3c9d63abdad70e7d47f0d24159726146130@redis-worker-1:6379/0}
      DATABASE_URL: ${DATABASE_URL:-postgresql://trading:${TRADING_PASSWORD}@scanner-pgbouncer:5432/scanner_analytics?sslmode=disable}
      ML_OPERATOR_RCA_ROUTING_INCIDENT_BUNDLE_PORT: ${ML_OPERATOR_RCA_ROUTING_INCIDENT_BUNDLE_PORT:-9883}
      ML_OPERATOR_RCA_ROUTING_INCIDENT_BUNDLE_REQUESTS_STREAM: ${ML_OPERATOR_RCA_ROUTING_INCIDENT_BUNDLE_REQUESTS_STREAM:-stream:ml:operator_rca_routing_incident_bundle_requests}
      ML_OPERATOR_RCA_ROUTING_INCIDENT_BUNDLE_RESULTS_STREAM: ${ML_OPERATOR_RCA_ROUTING_INCIDENT_BUNDLE_RESULTS_STREAM:-stream:ml:operator_rca_routing_incident_bundle_results}
      ML_OPERATOR_RCA_ROUTING_INCIDENT_BUNDLE_LOOKBACK: ${ML_OPERATOR_RCA_ROUTING_INCIDENT_BUNDLE_LOOKBACK:-200}
    ports:
      - "${ML_OPERATOR_RCA_ROUTING_INCIDENT_BUNDLE_PORT:-9883}:9883"
    networks:
      - scanner-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9883/metrics >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

networks:
  scanner-network:
    external: true
