services:
  scanner-operator-routing-incident-rca-routing-v2-12:
    image: scanner_infra-scanner-ml-operator-rca-routing-v2-3
    volumes:
      - ./python-worker:/app
    command: ["python", "-m", "orderflow_services.operator_routing_incident_rca_routing_controller_v2_12"]
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://go_gateway:fdb98a081579737da0d6a5b25746a3c9d63abdad70e7d47f0d24159726146130@redis-worker-1:6379/0}
      DATABASE_URL: ${DATABASE_URL:-postgresql://trading:${TRADING_PASSWORD}@scanner-pgbouncer:5432/scanner_analytics?sslmode=disable}
      ML_OPERATOR_ROUTING_INCIDENT_RCA_ROUTING_PORT: ${ML_OPERATOR_ROUTING_INCIDENT_RCA_ROUTING_PORT:-9890}
    ports:
      - "${ML_OPERATOR_ROUTING_INCIDENT_RCA_ROUTING_PORT:-9890}:9890"
    networks:
      - scanner-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9890/metrics >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
