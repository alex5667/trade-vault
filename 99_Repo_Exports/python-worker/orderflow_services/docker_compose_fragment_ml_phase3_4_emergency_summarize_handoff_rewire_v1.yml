# Reference docker-compose fragment for Phase 3.4 Emergency Summarize Handoff Rewire.
# The actual service definition is in docker-compose-timers.yml.
services:
  scanner-emergency-summarize-handoff-rewire-v3-4:
    build: { context: ., dockerfile: python-worker/Dockerfile.gpu }
    command: ["python", "-m", "orderflow_services.emergency_summarize_handoff_rewire_adapter_v3_4"]
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis-worker-1:6379/0}
      ANALYTICS_DB_DSN: ${ANALYTICS_DB_DSN:-}
      ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_PORT: ${ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_PORT:-9920}
      ML_EMERGENCY_SUMMARIZE_HANDOFF_SOURCE_STREAM: ${ML_EMERGENCY_SUMMARIZE_HANDOFF_SOURCE_STREAM:-stream:ml:emergency_summarize_handoff_source}
      ML_VERTEX_LOCAL_HANDOFF_INPUT_STREAM: ${ML_VERTEX_LOCAL_HANDOFF_INPUT_STREAM:-stream:ml:vertex_local_handoff_requests}
      ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_ENABLED: ${ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_ENABLED:-1}
      ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_MODE: ${ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_MODE:-ENABLED}
      ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_MAX_PAYLOAD_BYTES: ${ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_MAX_PAYLOAD_BYTES:-65536}
      ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_MAX_PROMPT_CHARS: ${ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_MAX_PROMPT_CHARS:-8000}
      ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_FORCE_LOCAL: ${ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_FORCE_LOCAL:-0}
      ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_ALLOW_WARNING: ${ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_ALLOW_WARNING:-1}
      ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_ALLOW_CRITICAL: ${ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_ALLOW_CRITICAL:-1}
      ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_ALLOW_INFO: ${ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_ALLOW_INFO:-0}
    ports: ["${ML_EMERGENCY_SUMMARIZE_HANDOFF_REWIRE_PORT:-9920}:9920"]
    depends_on: [redis-worker-1]
    networks:
      - scanner-timers
      - scanner-infra
