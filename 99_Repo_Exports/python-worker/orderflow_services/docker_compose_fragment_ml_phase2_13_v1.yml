services:
  scanner-operator-routing-incident-rca-experiment-router-v2-13:
    image: scanner_infra-scanner-ml-operator-rca-routing-v2-3
    volumes:
      - ./python-worker:/app
    command: ["python", "-m", "orderflow_services.operator_routing_incident_rca_experiment_router_v2_13"]
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://go_gateway:fdb98a081579737da0d6a5b25746a3c9d63abdad70e7d47f0d24159726146130@redis-worker-1:6379/0}
      ML_OPERATOR_ROUTING_INCIDENT_RCA_EXPERIMENT_ROUTER_PORT: ${ML_OPERATOR_ROUTING_INCIDENT_RCA_EXPERIMENT_ROUTER_PORT:-9891}
      ML_OPERATOR_ROUTING_INCIDENT_RCA_EXPERIMENT_ENABLE: "1"
    ports:
      - "${ML_OPERATOR_ROUTING_INCIDENT_RCA_EXPERIMENT_ROUTER_PORT:-9891}:9891"
    networks:
      - scanner-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9891/metrics >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 384M

  scanner-operator-routing-incident-rca-experiment-winner-selector-v2-13:
    image: scanner_infra-scanner-ml-operator-rca-routing-v2-3
    volumes:
      - ./python-worker:/app
    command: ["python", "-m", "orderflow_services.operator_routing_incident_rca_experiment_winner_selector_v2_13"]
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://go_gateway:fdb98a081579737da0d6a5b25746a3c9d63abdad70e7d47f0d24159726146130@redis-worker-1:6379/0}
      DATABASE_URL: ${DATABASE_URL:-postgresql://trading:${TRADING_PASSWORD}@scanner-pgbouncer:5432/scanner_analytics?sslmode=disable}
      ML_OPERATOR_ROUTING_INCIDENT_RCA_EXPERIMENT_WINNER_PORT: ${ML_OPERATOR_ROUTING_INCIDENT_RCA_EXPERIMENT_WINNER_PORT:-9892}
    ports:
      - "${ML_OPERATOR_ROUTING_INCIDENT_RCA_EXPERIMENT_WINNER_PORT:-9892}:9892"
    networks:
      - scanner-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9892/metrics >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 384M
