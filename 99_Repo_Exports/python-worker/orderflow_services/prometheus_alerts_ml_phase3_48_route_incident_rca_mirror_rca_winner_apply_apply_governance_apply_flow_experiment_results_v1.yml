groups:
  - name: ml_phase3_48_route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_experiment_results_v1
    rules:
      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyApplyGovernanceApplyFlowExperimentResultsStale
        expr: time() - ml_route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_experiment_results_last_run_ts_seconds > 1800
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "route incident RCA mirror winner-apply apply governance apply-flow experiment result consumer is stale"

      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyApplyGovernanceApplyFlowExperimentWinnerStale
        expr: time() - ml_route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_experiment_winner_last_run_ts_seconds > 1800
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "route incident RCA mirror winner-apply apply governance apply-flow experiment winner selector is stale"

      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyApplyGovernanceApplyFlowExperimentResultsErrors
        expr: increase(ml_route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_experiment_results_runs_total{status="error"}[30m]) > 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "route incident RCA mirror winner-apply apply governance apply-flow experiment result consumer has errors"

      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyApplyGovernanceApplyFlowExperimentWinnerLocalRecommendation
        expr: increase(ml_route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_experiment_winner_runs_total{decision="PROMOTE_LOCAL_CANDIDATE"}[30m]) > 0
        for: 5m
        labels: { severity: info }
        annotations:
          summary: "route incident RCA mirror winner-apply apply governance apply-flow experiment recommends local candidate"

      - alert: MLRouteIncidentRCAMirrorRCAWinnerApplyApplyGovernanceApplyFlowExperimentWinnerCompactRecommendation
        expr: increase(ml_route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_experiment_winner_runs_total{decision="PROMOTE_VERTEX_COMPACT_CANDIDATE"}[30m]) > 0
        for: 5m
        labels: { severity: info }
        annotations:
          summary: "route incident RCA mirror winner-apply apply governance apply-flow experiment recommends vertex compact candidate"
