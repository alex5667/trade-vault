# Include snippet for metrics-proxy nginx.conf
location /m/strategy-research-stats-alert-policy-exporter {
  proxy_pass http://strategy-research-stats-alert-policy-exporter:9838/metrics;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}
