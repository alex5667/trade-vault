location /m/orchestration-composite-preflight-exporter {
    proxy_pass http://orchestration-composite-preflight-exporter:${ORCHESTRATION_COMPOSITE_PREFLIGHT_EXPORTER_PORT:-9837}/metrics;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
