groups:
  - name: ml_phase3_52_apply_flow_experiment_incident_bundles_v1
    rules:
      - alert: MLApplyFlowExperimentIncidentBundlesStale
        expr: time() - ml_route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_experiment_incident_bundles_last_run_ts_seconds > 1800
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "apply-flow experiment incident bundle builder is stale"

      - alert: MLApplyFlowExperimentIncidentBundlesErrors
        expr: increase(ml_route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_experiment_incident_bundles_runs_total{status="error"}[30m]) > 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "apply-flow experiment incident bundle builder has errors"

      - alert: MLApplyFlowExperimentIncidentBundlesCriticalEscalation
        expr: increase(ml_route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_experiment_incident_bundles_total{severity="critical"}[30m]) > 0
        for: 5m
        labels: { severity: info }
        annotations:
          summary: "apply-flow experiment critical incident bundle was built"

      - alert: MLApplyFlowExperimentIncidentBundlesRollbackDriven
        expr: increase(ml_route_incident_rca_mirror_rca_winner_apply_apply_governance_apply_flow_experiment_incident_bundles_runs_total{decision="BUILD_BUNDLE",trigger_type="rollback"}[30m]) > 0
        for: 5m
        labels: { severity: info }
        annotations:
          summary: "apply-flow experiment rollback-driven incident bundle was built"
