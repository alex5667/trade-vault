groups:
  - name: ml_phase2_14_operator_routing_incident_rca_winner_routing_apply_v1
    rules:
      - alert: MLOperatorRoutingIncidentRCAWinnerApplyStale
        expr: time() - ml_operator_routing_incident_rca_winner_routing_apply_last_run_ts_seconds > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Routing incident RCA winner apply controller is stale"
          description: "Controller has not run in 5+ minutes"
