groups:
  - name: ml_operator_rca_routing_v2_3
    rules:
      - alert: MLOperatorRCARoutingStale
        expr: time() - ml_operator_rca_routing_last_run_ts_seconds > 900
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: operator RCA routing controller is stale

      - alert: MLOperatorRCARoutingQueueLagHigh
        expr: max(ml_operator_rca_routing_queue_lag_ms) > 300000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: operator RCA routing queue lag is high

      - alert: MLOperatorRCARoutingNoRequestsRouted
        expr: increase(ml_operator_rca_requests_routed_total[60m]) == 0
        for: 60m
        labels:
          severity: info
        annotations:
          summary: no operator RCA requests have been routed in the last hour
