services:
  scanner-operator-routing-incident-route-rca-results-v2-19:
    image: scanner_infra-scanner-ml-operator-rca-routing-v2-3
    volumes:
      - ./python-worker:/app
    command: ["python", "-m", "orderflow_services.operator_routing_incident_route_rca_results_persister_v2_19"]
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://go_gateway:fdb98a081579737da0d6a5b25746a3c9d63abdad70e7d47f0d24159726146130@redis-worker-1:6379/0}
      ML_OPERATOR_ROUTING_INCIDENT_ROUTE_RCA_RESULTS_PORT: ${ML_OPERATOR_ROUTING_INCIDENT_ROUTE_RCA_RESULTS_PORT:-9902}
    ports:
      - "${ML_OPERATOR_ROUTING_INCIDENT_ROUTE_RCA_RESULTS_PORT:-9902}:9902"
    networks:
      - scanner-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9902/metrics >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 384M

