services:
  meta-cov-rollout-controller:
    image: ${TRADE_ORDERFLOW_IMAGE:?}
    working_dir: /app
    environment:
      PYTHONPATH: /app
      REDIS_URL: ${REDIS_URL:?}
      META_COV_ROLLOUT_LOOKBACK_MIN: ${META_COV_ROLLOUT_LOOKBACK_MIN:-60}
      META_COV_ROLLOUT_MIN_HOLD_SEC: ${META_COV_ROLLOUT_MIN_HOLD_SEC:-600}
      LATENCY_CONTRACT_PREFLIGHT_PURPOSE: meta_cov_rollout_controller
      ENABLE_LATENCY_CONTRACT_DEPLOY_LINT_PREFLIGHT: ${ENABLE_LATENCY_CONTRACT_DEPLOY_LINT_PREFLIGHT:-1}
      ORCHESTRATION_PREFLIGHT_OPS_EVENT_STREAM: ${ORCHESTRATION_PREFLIGHT_OPS_EVENT_STREAM:-ops:orchestration:preflight:v1}
      ENABLE_STRATEGY_RESEARCH_STATS_COMPOSITE_PREFLIGHT: ${ENABLE_STRATEGY_RESEARCH_STATS_COMPOSITE_PREFLIGHT:-1}
      STRATEGY_RESEARCH_STATS_BLOCKER_KEY: ${STRATEGY_RESEARCH_STATS_BLOCKER_KEY:-cfg:strategy_research_stats:blocker:v1}
      STRATEGY_RESEARCH_STATS_SUMMARY_KEY: ${STRATEGY_RESEARCH_STATS_SUMMARY_KEY:-metrics:strategy_research_stats:last}
      STRATEGY_RESEARCH_STATS_MAX_AGE_SEC: ${STRATEGY_RESEARCH_STATS_MAX_AGE_SEC:-129600}
      STRATEGY_RESEARCH_STATS_FAIL_CLOSED_MISSING: ${STRATEGY_RESEARCH_STATS_FAIL_CLOSED_MISSING:-0}
      STRATEGY_RESEARCH_STATS_PREFLIGHT_ALLOW_STAGE: ${STRATEGY_RESEARCH_STATS_PREFLIGHT_ALLOW_STAGE:-1}
      ENABLE_STRATEGY_RESEARCH_GUARD_HARD_GATE: ${ENABLE_STRATEGY_RESEARCH_GUARD_HARD_GATE:-0}
      STRATEGY_RESEARCH_GUARD_BLOCKER_KEY: ${STRATEGY_RESEARCH_GUARD_BLOCKER_KEY:-cfg:research_guard:blocker:v1}
      STRATEGY_RESEARCH_GUARD_SUMMARY_KEY: ${STRATEGY_RESEARCH_GUARD_SUMMARY_KEY:-metrics:strategy_research_guard:last}
      STRATEGY_RESEARCH_GUARD_MAX_AGE_SEC: ${STRATEGY_RESEARCH_GUARD_MAX_AGE_SEC:-129600}
      STRATEGY_RESEARCH_GUARD_FAIL_CLOSED_MISSING: ${STRATEGY_RESEARCH_GUARD_FAIL_CLOSED_MISSING:-1}
    volumes:
      - ${TRADE_REPO_ROOT:?}:/app:ro
      - /var/lib/trade:/var/lib/trade
    command:
      - bash
      - -lc
      - >-
        /app/orderflow_services/integrations/run_with_orchestration_composite_rollout_preflight_v1.sh
        python3 -m orderflow_services.meta_cov_rollout_controller_v1
        --redis-url "${REDIS_URL:?}"
        --lookback-min "${META_COV_ROLLOUT_LOOKBACK_MIN:-60}"
        --min-hold-sec "${META_COV_ROLLOUT_MIN_HOLD_SEC:-600}"
        --apply 1
