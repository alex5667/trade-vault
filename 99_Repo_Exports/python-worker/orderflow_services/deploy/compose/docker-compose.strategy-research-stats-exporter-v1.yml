services:
  strategy-research-stats-exporter:
    image: ${TRADE_ORDERFLOW_IMAGE:?}
    working_dir: /app
    environment:
      PYTHONPATH: /app
      REDIS_URL: ${REDIS_URL:?}
      STRATEGY_RESEARCH_STATS_SUMMARY_KEY: ${STRATEGY_RESEARCH_STATS_SUMMARY_KEY:-metrics:strategy_research_stats:last}
      STRATEGY_RESEARCH_STATS_BLOCKER_KEY: ${STRATEGY_RESEARCH_STATS_BLOCKER_KEY:-cfg:strategy_research_stats:blocker:v1}
      STRATEGY_RESEARCH_STATS_MAX_AGE_SEC: ${STRATEGY_RESEARCH_STATS_MAX_AGE_SEC:-129600}
      STRATEGY_RESEARCH_STATS_FAIL_CLOSED_MISSING: ${STRATEGY_RESEARCH_STATS_FAIL_CLOSED_MISSING:-0}
      STRATEGY_RESEARCH_STATS_EXPORTER_PORT: ${STRATEGY_RESEARCH_STATS_EXPORTER_PORT:-9839}
      STRATEGY_RESEARCH_STATS_EXPORTER_INTERVAL_S: ${STRATEGY_RESEARCH_STATS_EXPORTER_INTERVAL_S:-15}
    volumes:
      - ${TRADE_REPO_ROOT:?}:/app:ro
    ports:
      - "${STRATEGY_RESEARCH_STATS_EXPORTER_PORT:-9839}:${STRATEGY_RESEARCH_STATS_EXPORTER_PORT:-9839}"
    command:
      - python3
      - -m
      - orderflow_services.strategy_research_stats_exporter_v1
