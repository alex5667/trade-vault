services:
  scanner-operator-routing-incident-rca-route-slo-analytics-v2-16:
    image: scanner_infra-scanner-ml-operator-rca-routing-v2-3
    volumes:
      - ./python-worker:/app
    command: ["python", "-m", "orderflow_services.operator_routing_incident_rca_route_slo_analytics_v2_16"]
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL:-redis://go_gateway:fdb98a081579737da0d6a5b25746a3c9d63abdad70e7d47f0d24159726146130@redis-worker-1:6379/0}
      ML_OPERATOR_ROUTING_INCIDENT_RCA_ROUTE_SLO_PORT: ${ML_OPERATOR_ROUTING_INCIDENT_RCA_ROUTE_SLO_PORT:-9896}
      ML_OPERATOR_ROUTING_INCIDENT_RCA_ROUTE_MTTR_SLO_SEC: "900"
      ML_OPERATOR_ROUTING_INCIDENT_RCA_ROUTE_SUCCESS_RATE_MIN: "0.85"
    ports:
      - "${ML_OPERATOR_ROUTING_INCIDENT_RCA_ROUTE_SLO_PORT:-9896}:9896"
    networks:
      - scanner-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9896/metrics >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.30'
          memory: 384M

  scanner-operator-routing-incident-rca-route-retry-controller-v2-16:
