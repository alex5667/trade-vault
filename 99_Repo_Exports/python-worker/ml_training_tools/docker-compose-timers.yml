      - OF_INPUTS_STREAM=${OF_INPUTS_STREAM:-stream:of:inputs}
      - OF_INPUTS_STREAM_FIELD=${OF_INPUTS_STREAM_FIELD:-payload}
      - OF_INPUTS_SINCE_HOURS=${OF_INPUTS_SINCE_HOURS:-24}
      - OF_INPUTS_MAX_RECORDS=${OF_INPUTS_MAX_RECORDS:-250000}
      - OF_INPUTS_STATE_FILE=${OF_INPUTS_STATE_FILE:-}
      - OF_REPLAY_BASELINE=${OF_REPLAY_BASELINE:-}
