      - META_OUT_L_MIN_N_TREND=${META_OUT_L_MIN_N_TREND:-80}
      - META_OUT_L_MEAN_MIN_TREND=${META_OUT_L_MEAN_MIN_TREND:--0.02}
      - META_OUT_L_TAIL_MAX_TREND=${META_OUT_L_TAIL_MAX_TREND:-0.30}
      - META_OUT_L_MIN_N_RANGE=${META_OUT_L_MIN_N_RANGE:-80}
      - META_OUT_L_MEAN_MIN_RANGE=${META_OUT_L_MEAN_MIN_RANGE:--0.02}
      - META_OUT_L_TAIL_MAX_RANGE=${META_OUT_L_TAIL_MAX_RANGE:-0.30}
      # Quotas per cycle
      - META_MAX_RANGE_RELAX_PER_CYCLE=${META_MAX_RANGE_RELAX_PER_CYCLE:-4}
      - META_MAX_RANGE_RESTORE_PER_CYCLE=${META_MAX_RANGE_RESTORE_PER_CYCLE:-2}
      - META_MAX_TREND_RELAX_PER_CYCLE=${META_MAX_TREND_RELAX_PER_CYCLE:-999}
      - META_MAX_TREND_RESTORE_PER_CYCLE=${META_MAX_TREND_RESTORE_PER_CYCLE:-999}
      # Clamp state keys
      - META_CLAMP_ACTIVE_KEY=${META_CLAMP_ACTIVE_KEY:-meta:hardstop:clamp:active}
      - META_CLAMP_STAGE_KEY=${META_CLAMP_STAGE_KEY:-meta:hardstop:clamp:stage}
      # State tracking (per-cell: SYM|trend, SYM|range)
      - META_CLAMP_REMAINING_CELLS_KEY=${META_CLAMP_REMAINING_CELLS_KEY:-meta:hardstop:clamp:remaining_cells}
      - META_CLAMP_CELL_STATE_KEY=${META_CLAMP_CELL_STATE_KEY:-meta:hardstop:clamp:cell_state}
      - META_RELAX_STREAK_KEY=${META_RELAX_STREAK_KEY:-meta:hardstop:relax_streak}
      - META_REMOVE_STREAK_KEY=${META_REMOVE_STREAK_KEY:-meta:hardstop:remove_streak}
      # Unclamp hysteresis (in cycles; at 5-10min timer: 6=30-60min, 18=90-180min)
      - META_UNCLAMP_RELAX_STREAK_N=${META_UNCLAMP_RELAX_STREAK_N:-6}
      - META_UNCLAMP_REMOVE_STREAK_N=${META_UNCLAMP_REMOVE_STREAK_N:-18}
      - META_UNCLAMP_ACTION_COOLDOWN_SEC=${META_UNCLAMP_ACTION_COOLDOWN_SEC:-1800}
      - META_UNCLAMP_PENDING_KEY=${META_UNCLAMP_PENDING_KEY:-meta:hardstop:unclamp:pending}
      - META_UNCLAMP_LAST_ACTION_MS_KEY=${META_UNCLAMP_LAST_ACTION_MS_KEY:-meta:hardstop:unclamp:last_action_ms}
      # Relax caps per bucket
      - META_RELAX_CAP_TREND=${META_RELAX_CAP_TREND:-0.30}
      - META_RELAX_CAP_RANGE=${META_RELAX_CAP_RANGE:-0.10}
      # Budget limiter (v8): increase budgets per cycle
      - META_BUDGET_INC_TREND_RELAX=${META_BUDGET_INC_TREND_RELAX:-0.20}
      - META_BUDGET_INC_RANGE_RELAX=${META_BUDGET_INC_RANGE_RELAX:-0.06}
      - META_BUDGET_INC_TOTAL_RELAX=${META_BUDGET_INC_TOTAL_RELAX:-0.22}
      - META_BUDGET_INC_TREND_RESTORE=${META_BUDGET_INC_TREND_RESTORE:-0.12}
      - META_BUDGET_INC_RANGE_RESTORE=${META_BUDGET_INC_RANGE_RESTORE:-0.04}
      - META_BUDGET_INC_TOTAL_RESTORE=${META_BUDGET_INC_TOTAL_RESTORE:-0.14}
      # Config
      - CFG_HASH_PREFIX=${CFG_HASH_PREFIX:-config:orderflow:}
      # Rec/bot
      - RECS_TTL_SEC=${RECS_TTL_SEC:-86400}
      - RECS_HMAC_SECRET=${RECS_HMAC_SECRET:-CHANGE_ME_LONG_RANDOM}
    working_dir: /app
    volumes:
      - ./python-worker:/app
    command: >
      sh -c "sleep 30 && while true; do
        MIN=$$(date +%-M);
        MOD=$$((MIN % 5));
        if [ \"$$MOD\" = \"0\" ] || [ \"$$MOD\" = \"5\" ]; then
          echo 'Running hard-stop cap-unclamp v7 check (per-symbol seg-health + quotas + budget limiter, AUTO/PROPOSE)...';
          python3 -m tools.of_gate_hardstop_cap_unclamp_v7 || true;
          echo 'Unclamp v7 check done. Sleeping 1 minute...';
          sleep 60;
        else
          sleep 30;
        fi
      done"
    networks:
      - scanner-network

