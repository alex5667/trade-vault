          echo 'Running ML Golden Replay (export inputs -> replay -> diff)...';
          python3 -m tools.golden_replay_ml_confirm_from_redis --out-dir /var/lib/trade/ml_replay --since-hours 24 --baseline $${ML_REPLAY_BASELINE:-} --fail-on-mismatch 1 || echo 'ML Golden Replay failed (non-critical)';
          echo 'ML Golden Replay done. Sleeping 1 hour...';
          sleep 3600;
        else
          sleep 60;
        fi
      done"
