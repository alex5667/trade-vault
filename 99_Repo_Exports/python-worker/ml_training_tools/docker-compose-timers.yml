  ml-walkforward-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-ml-walkforward-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - MODELS_DIR=/var/lib/trade/of_reports/models
      - OUT_DIR=/var/lib/trade/of_reports/out
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - /var/lib/trade/of_reports:/var/lib/trade/of_reports
    command: >
      sh -c "sleep 60 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        if [ \"$$HOUR\" = \"05\" ] && [ \"$$MIN\" -ge \"40\" ] && [ \"$$MIN\" -lt \"50\" ]; then
          echo 'Running ML walk-forward evaluation...';
          DATASET=$${OUT_DIR}/ml_ds.ndjson;
          MODEL=$${MODELS_DIR}/ml_confirm.joblib;
          OUT=$${OUT_DIR}/wf_report_$$(date +%Y%m%d_%H%M%S).json;
          if [ -f \"$$DATASET\" ] && [ -f \"$$MODEL\" ]; then
            python3 -m tools.ml_walkforward_eval \
              --dataset \"$$DATASET\" \
              --model \"$$MODEL\" \
              --out \"$$OUT\" \
              --fold-hours 24 --step-hours 12 --embargo-min 30 || true;
            echo 'Walk-forward done.';
          else
            echo 'Dataset or model not found, skipping...';
          fi;
          echo 'Sleeping 1 hour...';
          sleep 3600;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

