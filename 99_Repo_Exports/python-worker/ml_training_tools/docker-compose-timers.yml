          python3 -m tools.golden_replay_from_redis --out-dir /var/lib/trade/of_replay --since-hours 24 --baseline $${OF_REPLAY_BASELINE:-} --fail-on-mismatch 1 || echo 'OF Gate Golden Replay failed (non-critical)';
          echo 'OF Gate Golden Replay done. Sleeping 1 hour...';
          sleep 3600;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

  # OFConfirm Golden Replay Timer
  # Интегрировано с systemd/trade-of-confirm-golden-replay.service
  # Запускается ежедневно в 03:15-03:25 для проверки детерминированности OFConfirm
  # При mismatch отправляет алерт в notify:telegram
  trade-of-confirm-golden-replay-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-trade-of-confirm-golden-replay-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis-worker-1:6379/0}
      - PYTHONPATH=.:/app
      - PYTHONUNBUFFERED=1  # Соответствует systemd unit файлу
      # Input stream configuration
      - OF_INPUTS_STREAM=${OF_INPUTS_STREAM:-signals:of:inputs}
      - OF_INPUTS_STREAM_FIELD=${OF_INPUTS_STREAM_FIELD:-payload}
      - OF_INPUTS_SINCE_HOURS=${OF_INPUTS_SINCE_HOURS:-24}
      - OF_INPUTS_MAX_RECORDS=${OF_INPUTS_MAX_RECORDS:-200000}
      - OF_INPUTS_STATE_FILE=${OF_INPUTS_STATE_FILE:-/var/lib/trade/of_replay/of_inputs.state}
      - OF_INPUTS_RESUME=${OF_INPUTS_RESUME:-1}
      # Replay configuration
      - OF_REPLAY_OUT_DIR=${OF_REPLAY_OUT_DIR:-/var/lib/trade/of_replay}
      - OF_REPLAY_BASELINE=${OF_REPLAY_BASELINE:-/var/lib/trade/of_replay/baseline.ndjson}
      - OF_REPLAY_FAIL_ON_MISMATCH=${OF_REPLAY_FAIL_ON_MISMATCH:-1}
      # Notification configuration (интегрировано из systemd unit)
      - OF_REPLAY_NOTIFY=${OF_REPLAY_NOTIFY:-1}
      - NOTIFY_TELEGRAM_STREAM=${NOTIFY_TELEGRAM_STREAM:-notify:telegram}
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - /var/lib/trade/of_replay:/var/lib/trade/of_replay
    command: >
      sh -c "sleep 60 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        if [ \"$$HOUR\" = \"05\" ] && [ \"$$MIN\" -ge \"15\" ] && [ \"$$MIN\" -lt \"25\" ]; then
          echo 'Running OFConfirm Golden Replay (export inputs -> replay -> diff)...';
          python3 -m tools.golden_replay_of_confirm_from_redis \
            --redis-url $${REDIS_URL} \
            --out-dir $${OF_REPLAY_OUT_DIR} \
            --stream $${OF_INPUTS_STREAM} \
            --field $${OF_INPUTS_STREAM_FIELD} \
            --since-hours $${OF_INPUTS_SINCE_HOURS} \
            --max-records $${OF_INPUTS_MAX_RECORDS} \
            --state-file $${OF_INPUTS_STATE_FILE} \
            --resume $${OF_INPUTS_RESUME} \
            --baseline $${OF_REPLAY_BASELINE} \
            --fail-on-mismatch $${OF_REPLAY_FAIL_ON_MISMATCH} \
            --notify $${OF_REPLAY_NOTIFY} \
            --notify-stream $${NOTIFY_TELEGRAM_STREAM} || echo 'OFConfirm Golden Replay failed (non-critical)';
          echo 'OFConfirm Golden Replay done. Sleeping 1 hour...';
          sleep 3600;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

