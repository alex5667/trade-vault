services:
  trailing-recommender-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-trailing-recommender-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
    working_dir: /app
    volumes:
      - ./python-worker:/app
    command: >
      sh -c "sleep 30 && while true; do
        python3 tools/recommend_trailing_from_redis.py --source CryptoOrderFlow --symbols ETHUSDT,BTCUSDT --auto-write --conf-threshold 0.6;
        echo 'Waiting 1 hour...';
        sleep 3600;
      done"
    networks:
      - scanner-network

  xau-aggregator-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-xau-aggregator-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
    working_dir: /app
    command: >
      sh -c "sleep 60 && while true; do
        START=$$(date -d 'today 00:00' -Iseconds);
        END=$$(date -Iseconds);
        OUT=/var/log/scanner_infra/exec_$$(date +%Y-%m-%d).parquet;
        python3 services/aggregate_exec.py --start \"$$START\" --end \"$$END\" --out \"$$OUT\";
        echo 'Daily aggregation complete. Sleeping until next day...';
        sleep 86400;
      done"
    volumes:
      - ./python-worker:/app
      - /var/log/scanner_infra:/var/log/scanner_infra
    networks:
      - scanner-network

  ab-winner-lcb-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-ab-winner-lcb-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - AB_EVENTS_STREAM=events:trades
      # Step 2: Cost-aware LCB configuration
      - LCB_COST_AWARE_ENABLE=${LCB_COST_AWARE_ENABLE:-0}
      - LCB_Z=${LCB_Z:-1.28}
      - LCB_MIN_N=${LCB_MIN_N:-40}
      - LCB_FLOOR_R=${LCB_FLOOR_R:-0.00}
      - LCB_MIN_DELTA_LCB=${LCB_MIN_DELTA_LCB:-0.05}
      - LCB_CONFIRM_WINDOWS=${LCB_CONFIRM_WINDOWS:-2}
      - LCB_LOOKBACK_HOURS=${LCB_LOOKBACK_HOURS:-24}
      - LCB_FEES_ALREADY_NET=${LCB_FEES_ALREADY_NET:-1}
      - LCB_SUBTRACT_FEES=${LCB_SUBTRACT_FEES:-0}
      - LCB_SLIPPAGE_BPS_CAP=${LCB_SLIPPAGE_BPS_CAP:-250}
    working_dir: /app
    volumes:
      - ./python-worker:/app
    command: >
      sh -c "sleep 45 && while true; do
        python3 services/ab_winner_suggester_service_v2.py --run-once;
        sleep 3600;
      done"
    networks:
      - scanner-network

  ab-policy-suggester-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-ab-policy-suggester-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
    working_dir: /app
    env_file: .env
    volumes:
      - ./python-worker:/app
    command: >
      sh -c "sleep 50 && while true; do
        python3 -m tools.ab_suggest_entry_policy;
        sleep 900;
      done"
    networks:
      - scanner-network

  trade-diagnostics-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-trade-diagnostics-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - ANALYTICS_DB_DSN=postgresql://trading:${TRADING_PASSWORD}@postgres:5432/scanner_analytics
      - REPORT_SEND_TELEGRAM=1
      - NOTIFY_STREAM=notify:telegram
      # Default: last 24h. Script handles it if ENV vars are missing/default.
    working_dir: /app
    volumes:
      - ./python-worker:/app
    command: >
      sh -c "sleep 60 && while true; do
        echo 'Running Trade Diagnostics Report...';
        python3 tools/trade_diagnostics/report_top_loss_reasons.py;
        echo 'Report done. Sleeping 24h...';
        sleep 86400;
      done"
    networks:
      - scanner-network

  of-gate-sre-monitor-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-of-gate-sre-monitor-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - OF_GATE_METRICS_STREAM=metrics:of_gate
      - NOTIFY_TELEGRAM_STREAM=notify:telegram
      - SRE_WINDOW_MIN=10
      - SRE_MAX_SCAN=250000
      - SRE_ALWAYS=0
      - SRE_OF_GATE_MIN_N=40
      - SRE_OK_MIN=0.20
      - SRE_SOFT_MAX=0.35
      - SRE_LAT_P99_MAX_US=3000
      - SRE_EXEC_P90_MAX=0.85
      - SRE_SCEN_L1_MAX=0.30
      - SRE_PREV_KEY=sre:of_gate:last_stats
    working_dir: /app
    volumes:
      - ./python-worker:/app
    command: >
      sh -c "sleep 30 && while true; do
        echo 'Running OF Gate SRE Monitor...';
        python3 -m tools.of_gate_sre_monitor --window-min 10;
        echo 'Monitor done. Sleeping 10 minutes...';
        sleep 600;
      done"
    networks:
      - scanner-network

  trade-ml-sre-monitor-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-trade-ml-sre-monitor-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - ML_CONFIRM_METRICS_STREAM=metrics:ml_confirm
      - NOTIFY_TELEGRAM_STREAM=notify:telegram
      - ML_SRE_WINDOW_MS=600000
      - ML_SRE_PEDGE_P50_MIN=0.20
      - ML_SRE_MISSING_RATE_MAX=0.02
      - ML_SRE_ERR_RATE_MAX=0.01
      - ML_SRE_LAT_P99_MAX_MS=300.0
      # Optional: enable these when ABSTAIN/conf is live
      # - ML_SRE_ABSTAIN_RATE_MAX=0.25
      # - ML_SRE_CONF_P50_MIN=0.15
    working_dir: /app
    volumes:
      - ./python-worker:/app
    command: >
      sh -c "sleep 30 && while true; do
        echo 'Running ML SRE Monitor...';
        python3 -m tools.ml_sre_monitor;
        echo 'Monitor done. Sleeping 10 minutes...';
        sleep 600;
      done"
    networks:
      - scanner-network

  trade-ml-calibration-health-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-trade-ml-calibration-health-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - ML_CFG_CHAMPION_KEY=cfg:ml_confirm:champion
      - NOTIFY_TELEGRAM_STREAM=notify:telegram
      - ML_CALIB_ECE_MAX=${ML_CALIB_ECE_MAX:-0.06}
      - ML_CALIB_BRIER_MAX=${ML_CALIB_BRIER_MAX:-0.22}
      - ML_CALIB_LOGLOSS_MAX=${ML_CALIB_LOGLOSS_MAX:-0.65}
    working_dir: /app
    volumes:
      - ./python-worker:/app
    command: >
      sh -c "sleep 60 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        if [ \"$$HOUR\" -eq 5 ] && [ \"$$MIN\" -ge 20 ] && [ \"$$MIN\" -lt 30 ]; then
          echo 'Running ML Calibration Health Monitor...';
          python3 -m tools.ml_calibration_health_monitor;
          echo 'Health monitor done. Sleeping 1 hour...';
          sleep 3600;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

  of-nightly-calibrate-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-of-nightly-calibrate-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - OF_INPUTS_STREAM=signals:of:inputs
      - OF_INPUTS_STREAM_FIELD=payload
      - TRADE_EVENTS_STREAM=events:trades
      - ANALYTICS_DB_DSN=postgresql://trading:${TRADING_PASSWORD}@postgres:5432/scanner_analytics
      - NOTIFY_TELEGRAM_STREAM=notify:telegram
      - CANARY_SYMBOLS=BTCUSDT,ETHUSDT
      - OUT_DIR=/var/lib/trade/of_reports/out
      - STATE_FILE=/var/lib/trade/of_reports/out/of_inputs.state
      - RECS_HMAC_SECRET=${RECS_HMAC_SECRET:-CHANGE_ME_LONG_RANDOM}
      - RECS_TTL_SEC=86400
      - TRADES_SINCE_HOURS=72
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - /var/lib/trade/of_reports:/var/lib/trade/of_reports
    command: >
      sh -c "sleep 60 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        if [ \"$$HOUR\" -eq 5 ] && [ \"$$MIN\" -ge 30 ] && [ \"$$MIN\" -lt 40 ]; then
          echo 'Running nightly calibration...';
          python3 -m tools.nightly_gate_calibrate_bundle;
          echo 'Calibration done. Sleeping 1 hour...';
          sleep 3600;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

  of-nightly-meta-train-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-of-nightly-meta-train-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - OF_INPUTS_STREAM=signals:of:inputs
      - OF_INPUTS_STREAM_FIELD=payload
      - TRADE_EVENTS_STREAM=events:trades
      - ANALYTICS_DB_DSN=postgresql://trading:${TRADING_PASSWORD}@postgres:5432/scanner_analytics
      - NOTIFY_TELEGRAM_STREAM=notify:telegram
      - CANARY_SYMBOLS=BTCUSDT,ETHUSDT
      - OUT_DIR=/var/lib/trade/of_reports/out
      - STATE_FILE=/var/lib/trade/of_reports/out/of_inputs.state
      - MODELS_DIR=/var/lib/trade/of_reports/models
      - RECS_HMAC_SECRET=${RECS_HMAC_SECRET:-CHANGE_ME_LONG_RANDOM}
      - RECS_TTL_SEC=86400
      - TRADES_SINCE_HOURS=72
      - META_P_MIN=0.55
      - ML_AUTO_CONFIRM_META_MODEL=1
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - /var/lib/trade/of_reports:/var/lib/trade/of_reports
    command: >
      sh -c "sleep 60 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        if [ \"$$HOUR\" -eq 5 ] && [ \"$$MIN\" -ge 10 ] && [ \"$$MIN\" -lt 20 ]; then
          echo 'Running nightly meta-model training...';
          CMD=\"python3 -m tools.nightly_train_meta_model_bundle\";
          if [ \"$$ML_AUTO_CONFIRM_META_MODEL\" = \"1\" ]; then CMD=\"$$CMD --auto-confirm\"; fi;
          $$CMD;
          echo 'Training done. Sleeping 1 hour...';
          sleep 3600;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

  of-nightly-meta-enforce-ramp-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-of-nightly-meta-enforce-ramp-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - TRADE_EVENTS_STREAM=events:trades
      - NOTIFY_TELEGRAM_STREAM=notify:telegram
      - CANARY_SYMBOLS=${CANARY_SYMBOLS:-BTCUSDT,ETHUSDT}
      - META_ENFORCE_SHARE_SCHEDULE=${META_ENFORCE_SHARE_SCHEDULE:-0.10,0.25,0.50,1.00}
      - META_RAMP_DID_WINDOW_HOURS=${META_RAMP_DID_WINDOW_HOURS:-72}
      - META_RAMP_EXPORT_HOURS=${META_RAMP_EXPORT_HOURS:-180}
      - META_ENFORCE_MIN_STREAK=${META_ENFORCE_MIN_STREAK:-3}
      - META_ENFORCE_RAMP_NOTIFY_ON_SKIP=${META_ENFORCE_RAMP_NOTIFY_ON_SKIP:-1}
      - META_ENFORCE_RAMP_MIN_HOURS_SINCE_LAST_EMERG=${META_ENFORCE_RAMP_MIN_HOURS_SINCE_LAST_EMERG:-24}
      - META_RAMP_LAST_APPLIED_MS_KEY=${META_RAMP_LAST_APPLIED_MS_KEY:-meta:ramp:last_applied_ms}
      - META_RAMP_LAST_SHARE_KEY=${META_RAMP_LAST_SHARE_KEY:-meta:ramp:last_share}
      - META_RAMP_LAST_BUNDLE_ID_KEY=${META_RAMP_LAST_BUNDLE_ID_KEY:-meta:ramp:last_bundle_id}
      - OUT_DIR=/var/lib/trade/of_reports/out
      - "CFG_HASH_PREFIX=config:orderflow:"
      - RECS_HMAC_SECRET=${RECS_HMAC_SECRET:-CHANGE_ME_LONG_RANDOM}
      - RECS_TTL_SEC=${RECS_TTL_SEC:-86400}
      - TRADES_MAX_SCAN=${TRADES_MAX_SCAN:-500000}
      - META_ENFORCE_SALT=${META_ENFORCE_SALT:-enf_v1}
      - REGRESS_PASS_STREAK_KEY=sre:regress:pass_streak
      - REGRESS_LAST_STATUS_KEY=sre:regress:last_status
      - REGRESS_LAST_TS_KEY=sre:regress:last_ts_ms
      - BASELINE_PROPOSE_MAX_AGE_HOURS=${BASELINE_PROPOSE_MAX_AGE_HOURS:-30}
      - EMERG_COOLDOWN_KEY=sre:of_gate:emergency:last_ms
      # Per-regime shares (recommended)
      - META_ENFORCE_PER_REGIME=${META_ENFORCE_PER_REGIME:-1}
      # Stratified DiD thresholds
      - META_RAMP_MIN_N_PER_CELL=${META_RAMP_MIN_N_PER_CELL:-120}
      - META_RAMP_MIN_CELLS=${META_RAMP_MIN_CELLS:-3}
      - META_RAMP_AFTER_TAIL_ENF_MAX=${META_RAMP_AFTER_TAIL_ENF_MAX:-0.18}
      - META_RAMP_DID_TAIL_P95_MAX=${META_RAMP_DID_TAIL_P95_MAX:-0.0}
      - META_RAMP_DID_MEAN_P05_MIN=${META_RAMP_DID_MEAN_P05_MIN:--0.03}
      # Freeze policy
      - META_FREEZE_TO_SHARE=${META_FREEZE_TO_SHARE:-0.00}
      - META_FREEZE_MAX_CELLS=${META_FREEZE_MAX_CELLS:-3}
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - /var/lib/trade/of_reports:/var/lib/trade/of_reports
    command: >
      sh -c "sleep 60 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        if [ \"$$HOUR\" -eq 6 ] && [ \"$$MIN\" -ge 20 ] && [ \"$$MIN\" -lt 30 ]; then
          echo 'Running nightly meta ENFORCE ramp-or-freeze (stratified worst-case DiD)...';
          python3 -m tools.nightly_meta_enforce_ramp_or_freeze_bundle;
          echo 'Ramp/freeze proposal done. Sleeping 1 hour...';
          sleep 3600;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

  of-nightly-meta-self-heal-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-of-nightly-meta-self-heal-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - TRADE_EVENTS_STREAM=events:trades
      - NOTIFY_TELEGRAM_STREAM=notify:telegram
      - OUT_DIR=/var/lib/trade/of_reports/out
      - "CFG_HASH_PREFIX=config:orderflow:"
      - RECS_HMAC_SECRET=${RECS_HMAC_SECRET:-CHANGE_ME_LONG_RANDOM}
      - RECS_TTL_SEC=${RECS_TTL_SEC:-86400}
      - TRADES_MAX_SCAN=${TRADES_MAX_SCAN:-500000}
      # Freeze floor and registries
      - META_FREEZE_FLOOR=${META_FREEZE_FLOOR:-0.05}
      - META_FREEZE_REGISTRY_KEY=${META_FREEZE_REGISTRY_KEY:-meta:freeze:cells}
      - META_UNFREEZE_REGISTRY_KEY=${META_UNFREEZE_REGISTRY_KEY:-meta:unfreeze:cells}
      # Staged unfreeze policy
      - META_UNFREEZE_MIN_DAYS=${META_UNFREEZE_MIN_DAYS:-7}
      - META_UNFREEZE_STAGE1_SHARE=${META_UNFREEZE_STAGE1_SHARE:-0.10}
      - META_UNFREEZE_MAX_CELLS=${META_UNFREEZE_MAX_CELLS:-5}
      # Stage1 evaluation window + delay
      - META_STAGE1_EVAL_HOURS=${META_STAGE1_EVAL_HOURS:-48}
      - META_STAGE1_EVAL_DELAY_HOURS=${META_STAGE1_EVAL_DELAY_HOURS:-24}
      # Health gates (cell-level)
      - META_CELL_MIN_ENF_N=${META_CELL_MIN_ENF_N:-50}
      - META_CELL_MIN_CTL_N=${META_CELL_MIN_CTL_N:-50}
      - META_CELL_TAIL_ENF_MAX=${META_CELL_TAIL_ENF_MAX:-0.18}
      - META_CELL_TAIL_IMPROVE_MIN=${META_CELL_TAIL_IMPROVE_MIN:-0.01}
      - META_CELL_MEAN_DELTA_MIN=${META_CELL_MEAN_DELTA_MIN:--0.02}
      - META_CELL_BOOT_ITERS=${META_CELL_BOOT_ITERS:-800}
      - META_CELL_BOOT_SEED=${META_CELL_BOOT_SEED:-42}
      # Per-regime shares ON (needed for cell freeze/unfreeze)
      - META_ENFORCE_PER_REGIME=${META_ENFORCE_PER_REGIME:-1}
      # Restore reference (for staged unfreeze final target)
      - META_RAMP_LAST_SHARE_KEY=${META_RAMP_LAST_SHARE_KEY:-meta:ramp:last_share}
      - META_RAMP_LAST_SHARE_TREND_KEY=${META_RAMP_LAST_SHARE_TREND_KEY:-meta:ramp:last_share_trend}
      - META_RAMP_LAST_SHARE_RANGE_KEY=${META_RAMP_LAST_SHARE_RANGE_KEY:-meta:ramp:last_share_range}
      # Safety auto-refreeze cooldown
      - META_REFREEZE_COOLDOWN_SEC=${META_REFREEZE_COOLDOWN_SEC:-21600}
      - META_REFREEZE_COOLDOWN_KEY=${META_REFREEZE_COOLDOWN_KEY:-meta:refreeze:last_ms}
      # Self-heal export window
      - META_SELF_HEAL_EXPORT_HOURS=${META_SELF_HEAL_EXPORT_HOURS:-170}
      - META_STAGE2_MAX_CELLS=${META_STAGE2_MAX_CELLS:-5}
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - /var/lib/trade/of_reports:/var/lib/trade/of_reports
    command: >
      sh -c "sleep 60 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        if [ \"$$HOUR\" -eq 7 ] && [ \"$$MIN\" -ge 10 ] && [ \"$$MIN\" -lt 20 ]; then
          echo 'Running nightly meta cells self-heal (staged unfreeze + auto-refreeze)...';
          python3 -m tools.nightly_meta_cells_self_heal;
          echo 'Self-heal done. Sleeping 1 hour...';
          sleep 3600;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

  code-audit-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-code-audit-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
    working_dir: /app
    volumes:
      - ./python-worker:/app
      - /var/lib/trade/of_reports:/var/lib/trade/of_reports
    command: >
      sh -c "sleep 60 && while true; do
        HOUR=$$(date +%-H);
        MIN=$$(date +%-M);
        if [ \"$$HOUR\" -eq 4 ] && [ \"$$MIN\" -ge 50 ]; then
          echo 'Running code integrity audit...';
          python3 -m tools.audit_code_integrity --root . --out /var/lib/trade/of_reports/out/code_audit.json --fail-on-dup 1;
          echo 'Audit done. Sleeping 1 hour...';
          sleep 3600;
        else
          sleep 60;
        fi
      done"
    networks:
      - scanner-network

  of-nightly-meta-stage2-opt-timer:
    build:
      context: .
      dockerfile: python-worker/Dockerfile.gpu
    container_name: scanner-of-nightly-meta-stage2-opt-timer
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis-worker-1:6379/0
      - PYTHONPATH=.:/app
      - TRADE_EVENTS_STREAM=events:trades
      - NOTIFY_TELEGRAM_STREAM=notify:telegram
      - OUT_DIR=/var/lib/trade/of_reports/out
      - "CFG_HASH_PREFIX=config:orderflow:"
      - RECS_HMAC_SECRET=${RECS_HMAC_SECRET:-CHANGE_ME_LONG_RANDOM}
      - RECS_TTL_SEC=${RECS_TTL_SEC:-86400}
      - TRADES_MAX_SCAN=${TRADES_MAX_SCAN:-500000}
      # Registries
      - META_UNFREEZE_REGISTRY_KEY=${META_UNFREEZE_REGISTRY_KEY:-meta:unfreeze:cells}
      # Stage1 evaluation window + delay
      - META_STAGE1_EVAL_HOURS=${META_STAGE1_EVAL_HOURS:-48}
      - META_STAGE1_EVAL_DELAY_HOURS=${META_STAGE1_EVAL_DELAY_HOURS:-24}
      # Stage2 v4 optimization parameters (adaptive budgets + global budget)
      - META_OPT_EXPORT_HOURS=${META_OPT_EXPORT_HOURS:-336}
      - META_OPT_MAX_CELLS=${META_OPT_MAX_CELLS:-6}
      # Separate grids for trend and range buckets
      - META_OPT_SHARE_GRID_TREND=${META_OPT_SHARE_GRID_TREND:-0.10,0.25,0.35,0.50,0.75,1.00}
      - META_OPT_SHARE_GRID_RANGE=${META_OPT_SHARE_GRID_RANGE:-0.10,0.15,0.25,0.35,0.50}
      # Step regularization: maximum allowed step up/down
      - META_OPT_MAX_UP_STEP=${META_OPT_MAX_UP_STEP:-0.25}
      - META_OPT_MAX_DOWN_STEP=${META_OPT_MAX_DOWN_STEP:-0.00}
      # Turnover proxy constraints: minimum exec_rate and maximum drop relative to current
      - META_OPT_MIN_EXEC_RATE=${META_OPT_MIN_EXEC_RATE:-0.30}
      - META_OPT_MAX_EXEC_RATE_DROP=${META_OPT_MAX_EXEC_RATE_DROP:-0.20}
      # Risk caps + objective weights (multi-objective)
      - META_OPT_TAIL_EXEC_MAX=${META_OPT_TAIL_EXEC_MAX:-0.18}
      - META_OPT_LAM_TAIL=${META_OPT_LAM_TAIL:-0.50}
      - META_OPT_LAM_P05=${META_OPT_LAM_P05:-0.10}
      - META_OPT_LAM_TURN=${META_OPT_LAM_TURN:-0.30}
      - META_OPT_LAM_STEP=${META_OPT_LAM_STEP:-0.05}
      # Group caps (v4 safety layer)
      - META_BUCKET_CAP_TREND=${META_BUCKET_CAP_TREND:-1.00}
      - META_BUCKET_CAP_RANGE=${META_BUCKET_CAP_RANGE:-0.50}
      # Optional coupling: if trend share < threshold -> range must be <= cap
