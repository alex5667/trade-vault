          python3 -m tools.export_of_inputs_ndjson --out \"$$INPUTS\" --since-hours $${ML_TB_V10_EXPORT_SINCE_HOURS:-168} --max-scan $${ML_TB_V10_EXPORT_MAX_SCAN:-800000} || echo 'OF inputs export failed (non-critical)';
          echo 'Step 2: Label triple barrier from Redis Stream ticks (v10)...';
          python3 -m tools.label_triple_barrier_from_redis_ticks_v10 \
            --inputs \"$$INPUTS\" \
            --out \"$$TB_LABELS\" \
            --ticks-redis-url $${TICKS_REDIS_URL:-redis://redis-ticks:6379/0} \
            --tick-stream-prefix $${ML_TB_V10_TICK_STREAM_PREFIX:-stream:tick_} \
            --since-hours $${ML_TB_V10_EXPORT_SINCE_HOURS:-1.0} \
            --max-rows-per-symbol $${ML_TB_V10_MAX_ROWS_PER_SYMBOL:-200000} \
            --h-ms $${TB_H_MS:-180000} \
            --tp-k-atr $${TB_TP_K_ATR:-1.0} \
            --sl-k-atr $${TB_SL_K_ATR:-1.0} \
            --fallback-tp-bps $${TB_FALLBACK_TP_BPS:-30} \
            --fallback-sl-bps $${TB_FALLBACK_SL_BPS:-30} \
            --print-stream-age || echo 'Triple barrier labeling v10 failed (non-critical)';
          echo 'Step 3: Build ML dataset...';
          python3 -m tools.build_dataset_from_inputs_outcomes_v4_tb --inputs \"$$INPUTS\" --tb-labels \"$$TB_LABELS\" --out \"$$DATASET\" || echo 'Dataset build failed (non-critical)';
          echo 'ML triple-barrier v10 pipeline done. Sleeping 1 hour...';
