  taker-flow-gate-calibrator-timer:
    build:
      context: /home/alex/front/trade/scanner_infra
      dockerfile: python-worker/Dockerfile.gpu
    command:
      - sh
      - -c
      - |-
        sleep 120 && LAST_REMIND=0 && while true; do
          HOUR=$$(date +%-H);
          MIN=$$(date +%-M);
          NOW=$$(date +%s);
          REMIND_INTERVAL=1800;
          ELAPSED=$$((NOW - LAST_REMIND));
          if [ "$$HOUR" -eq 2 ] && [ "$$MIN" -ge 30 ] && [ "$$MIN" -lt 45 ]; then
            echo 'Running TakerFlow Gate Calibrator...';
            python3 -m tools.taker_flow_gate_calibrator --hours 168 --min-veto-hits 5 --max-r-mult -1.0;
            echo 'TakerFlow calibration done. Sleeping 23h...';
            LAST_REMIND=$$NOW;
            sleep 82800;
          elif [ "$$ELAPSED" -ge "$$REMIND_INTERVAL" ]; then
            echo 'Checking for pending TakerFlowGate proposals to remind...';
            python3 -m tools.taker_flow_gate_calibrator --remind-pending --remind-interval-sec "$$REMIND_INTERVAL";
            LAST_REMIND=$$NOW;
            sleep 60;
          else
            sleep 60;
          fi
        done
    container_name: scanner-taker-flow-gate-calibrator-timer
    depends_on:
      redis-worker-1:
        condition: service_healthy
        required: true
    deploy:
      resources:
        limits:
          cpus: 0.2
          memory: "268435456"
        reservations:
          devices:
            - capabilities:
                - gpu
              driver: nvidia
              count: 1
    environment:
