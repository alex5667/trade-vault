name: scanner_infra
services:
  ab-policy-suggester-timer:
    build:
      context: /home/alex/front/trade/scanner_infra
      dockerfile: python-worker/Dockerfile.gpu
    command:
      - sh
      - -c
      - |-
        sleep 120 && while true; do
          python3 -m tools.ab_suggest_entry_policy;
          sleep 900;
        done
    container_name: scanner-ab-policy-suggester-timer
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: "268435456"
        reservations:
          devices:
            - capabilities:
