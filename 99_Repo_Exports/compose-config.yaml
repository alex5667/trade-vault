  policy-calibration-suggester-timer:
    build:
      context: /home/alex/front/trade/scanner_infra
      dockerfile: python-worker/Dockerfile.gpu
    command:
      - sh
      - -c
      - |-
        sleep 120 && while true; do
          echo 'Running Policy Calibration Suggester (P74)...';
          python3 tools/policy_calibration_suggester_p74.py --once;
          echo 'Suggestion done. Sleeping 5 minutes...';
          sleep 300;
        done
    container_name: scanner-policy-calibration-suggester-timer
    depends_on:
      redis-worker-1:
        condition: service_healthy
        required: true
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: "536870912"
        reservations:
          devices:
            - capabilities:
                - gpu
              driver: nvidia
              count: 1
    environment:
      ENABLE_POLICY_EFFECTIVENESS_REPORT: "1"
      ENABLE_POLICY_REGIME_EFFECTIVENESS_REPORT: "1"
      POLICY_CALIBRATION_SUGGEST_INTERVAL_SEC: "300"
