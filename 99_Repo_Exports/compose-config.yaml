  nightly-regress-engine-timer:
    build:
      context: /home/alex/front/trade/scanner_infra
      dockerfile: python-worker/Dockerfile.gpu
    command:
      - sh
      - -c
      - |-
        sleep 120 && while true; do
          HOUR=$$(date +%-H);
          MIN=$$(date +%-M);
          if [ "$$HOUR" = "04" ] && [ "$$MIN" -ge "30" ] && [ "$$MIN" -lt "50" ]; then
            echo 'Running nightly engine regress (safe)...';
            python3 -m tools.nightly_regress_engine_replay_safe || true;
            echo 'Regress done. Sleeping 1 hour...';
            sleep 3600;
          else
            sleep 60;
          fi
        done
    container_name: scanner-nightly-regress-engine-timer
    deploy:
      resources:
        reservations:
          devices:
            - capabilities:
                - gpu
              driver: nvidia
              count: 1
